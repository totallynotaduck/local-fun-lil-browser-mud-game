// ENEMY GENERATION
function getAvailableEnemies(location) {
    const loc = locations[location];
    if (!loc || !loc.enemies) return [];
    return loc.enemies;
}

function generateEnemy(location, isBoss = false) {
    const enemyKeys = getAvailableEnemies(location);
    if (enemyKeys.length === 0) return null;
    
    if (isBoss && location === 'dragon_lair') {
        const boss = pick(WORLD_BOSSES.filter(b => b.tier <= gameState.player.level));
        return boss ? { ...boss, maxHp: boss.hp } : null;
    }
    
    const key = pick(enemyKeys);
    const template = enemies[key];
    if (!template) return null;
    
    const levelScale = 1 + (gameState.player.level - 1) * 0.05;
    return {
        ...template,
        hp: Math.floor(template.hp * levelScale),
        maxHp: Math.floor(template.maxHp * levelScale),
        atk: Math.floor(template.atk * levelScale),
        def: Math.floor(template.def * levelScale)
    };
}

// ITEM DROP SYSTEM WITH RARITY RATES
// Legendary: 0.5%, Epic: 2.5%, Rare: 10%, Uncommon: 25%, Common: 62%
function getItemDropByRarity() {
    return getModifiedItemRarity({
        common: 62,
        uncommon: 25,
        rare: 10,
        epic: 1.83,
        unique: 0.67,
        legendary: 0.45,
        uber_unique: 0.05
    }) || 'common';
}

// Get item drop with level cap based on ENEMY TIER, not player level
// Enemy tier 0-10 maps directly to maximum item level requirement
// Tier 0 = max level 5, Tier 1 = max level 10, Tier 5 = max level 30, Tier 10 = max level 60
function getLeveledItemDrop(targetRarity, enemyTier) {
    // Calculate maximum allowed item level based on enemy tier
    const maxItemLevel = enemyTier * 6;
    
    // Filter items by rarity and level requirement matching enemy strength
    const allItems = Object.values(itemPool);
    const matchingItems = allItems.filter(item => 
        item.rarity === targetRarity && 
        item.equipSlot &&
        item.type !== 'material' && 
        item.type !== 'currency' &&
        item.type !== 'consumable' &&
        (!item.levelReq || item.levelReq <= maxItemLevel)
    );
    
    if (matchingItems.length > 0) {
        return pick(matchingItems);
    }
    
    // Fallback: try lower rarity if no items match
    const rarityOrder = ['uber_unique', 'unique', 'legendary', 'epic', 'rare', 'uncommon', 'common'];
    const currentIdx = rarityOrder.indexOf(targetRarity);
    
    for (let i = currentIdx + 1; i < rarityOrder.length; i++) {
        const fallbackItems = allItems.filter(item => 
            item.rarity === rarityOrder[i] && 
            item.equipSlot && 
            item.type !== 'material' && 
            item.type !== 'currency' &&
            item.type !== 'consumable' &&
            (!item.levelReq || item.levelReq <= maxItemLevel)
        );
        
        if (fallbackItems.length > 0) {
            return pick(fallbackItems);
        }
    }
    
    // Final fallback: any item that fits level cap
    const anyLevelItems = allItems.filter(item => 
        item.equipSlot && 
        item.type !== 'material' && 
        item.type !== 'currency' &&
        item.type !== 'consumable' &&
        (!item.levelReq || item.levelReq <= maxItemLevel)
    );
    
    if (anyLevelItems.length > 0) {
        return pick(anyLevelItems);
    }
    
    return null;
}

// Get material/consumable drop (always allow, no level cap)
function getMaterialDrop(enemyDrops) {
    if (!enemyDrops || enemyDrops.length === 0) return null;

    const normalizedDrops = enemyDrops
        .map(drop => {
            if (!drop) return null;
            if (typeof drop === 'string') {
                return { name: drop, weight: 1, qty: 1 };
            }
            if (typeof drop === 'object' && drop.name) {
                return {
                    name: drop.name,
                    weight: Math.max(1, Number(drop.weight) || 1),
                    qty: Math.max(1, Number(drop.qty) || 1)
                };
            }
            return null;
        })
        .filter(Boolean);

    if (normalizedDrops.length === 0) return null;

    const totalWeight = normalizedDrops.reduce((sum, drop) => sum + drop.weight, 0);
    let roll = Math.random() * totalWeight;
    let selectedDrop = normalizedDrops[normalizedDrops.length - 1];

    for (const drop of normalizedDrops) {
        roll -= drop.weight;
        if (roll <= 0) {
            selectedDrop = drop;
            break;
        }
    }

    const dropItem = itemPool[selectedDrop.name];
    if (dropItem) {
        return { ...dropItem, qty: selectedDrop.qty || 1 };
    }

    return null;
}

// BATTLE SYSTEM
function startBattle(location) {
    if (gameState.inBattle) {
        // If already in battle, go directly to battle screen
        showScreen('battle');
        return;
    }
    if (guardCombatCooldown(addBattleMsg, renderTravel)) return;
    
    const enemy = generateEnemy(location);
    if (!enemy) {
        // No enemies found - show feedback directly on travel screen
        const container = document.getElementById('travel-content');
        
        // Remove existing no enemy alert if present
        const existingAlert = container.querySelector('.no-enemies-alert');
        if (existingAlert) existingAlert.remove();
        
        const alertDiv = document.createElement('div');
        alertDiv.className = 'battle-log no-enemies-alert';
        alertDiv.style.borderLeftColor = '#4444ff';
        alertDiv.innerHTML = `<p class="info">🔍 No enemies found here right now! Try again.</p>`;
        
        // Insert alert at top of travel screen
        container.insertBefore(alertDiv, container.firstChild);
        
        // Auto-remove after 3 seconds
        setTimeout(() => {
            if (alertDiv.parentNode) alertDiv.remove();
        }, 3000);
        
        addBattleMsg('No enemies found here!', 'info');
        return;
    }
    
    gameState.inBattle = true;
    gameState.currentEnemy = enemy;
    gameState.battleLog = [];
    addBattleMsg(`A ${enemy.name} appears!`, 'info');
    
    showScreen('battle');
}

function addBattleMsg(msg, type = 'info') {
    const cls = type === 'damage' ? 'damage' : type === 'heal' ? 'heal' : type === 'reward' ? 'reward' : 'info';
    gameState.battleLog.push({ msg, cls });
    if (gameState.battleLog.length > 100) gameState.battleLog.shift();
}

let silentPersistTimeoutId = null;
function scheduleSilentPersist(delay = 250) {
    if (silentPersistTimeoutId) {
        clearTimeout(silentPersistTimeoutId);
    }

    silentPersistTimeoutId = setTimeout(() => {
        silentPersistTimeoutId = null;
        persistCurrentGameState().catch(err => console.warn('Silent persist failed', err));
    }, delay);
}

// Use a scroll from equipped scrolls
function useScroll(slotIndex, options = {}) {
    const context = options.context || getCurrentCombatContext();
    if (!context) return;
    if (slotIndex < 0 || slotIndex >= gameState.unlockedScrollSlots) return;
    
    const scroll = gameState.equippedScrolls[slotIndex];
    if (!scroll) {
        getCombatLogCallback(context)('No scroll equipped in this slot!', 'info');
        return;
    }

    const logCallback = getCombatLogCallback(context);
    const target = getCurrentCombatEnemy(context);
    const isImmediateEffect = scroll.effect === 'heal' || scroll.effect === 'nuke';

    if (isCombatScrollSlotUsed(slotIndex)) {
        if (!options.auto) {
            logCallback(`${scroll.name} has already been used this battle.`, 'info');
        }
        return;
    }

    markCombatScrollSlotUsed(slotIndex);

    if (combatScrollState.activatedEffects[scroll.effect]) {
        logCallback(`${scroll.name} does not activate because ${scroll.effect.replace(/_/g, ' ')} is already active this battle.`, 'info');
        if (!options.suppressRerender) {
            rerenderCombatContext(context);
            updateStats();
        }
        return;
    }

    combatScrollState.activatedEffects[scroll.effect] = scroll.name;
    
    if (!isImmediateEffect) {
        gameState.activeScrollEffects.push({
            name: scroll.name,
            effect: scroll.effect,
            value: scroll.value,
            duration: scroll.duration,
            remainingTurns: scroll.duration
        });
    }
    
    // Immediate effects
    if (scroll.effect === 'heal') {
        gameState.player.hp = Math.min(getTotalMaxHp(), gameState.player.hp + scroll.value);
        logCallback(`Used ${scroll.name}: Healed ${scroll.value} HP!`, 'heal');
    } else if (scroll.effect === 'nuke') {
        if (!target) {
            logCallback(`${scroll.name} fizzles with no target.`, 'damage');
        } else {
            const actualDamage = Math.min(scroll.value, target.hp);
            target.hp = Math.max(0, target.hp - scroll.value);
            if (context === 'worldboss') recordWorldBossPlayerDamage(actualDamage);
            logCallback(`💥 Used ${scroll.name}: Dealt ${actualDamage} damage instantly!`, 'reward');
        }
    } else if (scroll.effect === 'invulnerable') {
        logCallback(`Used ${scroll.name}: Invulnerable for ${scroll.duration} turn${scroll.duration > 1 ? 's' : ''}!`, 'reward');
    } else if (scroll.effect === 'crit_chance') {
        logCallback(`Used ${scroll.name}: ${(scroll.value * 100).toFixed(0)}% crit for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'execute') {
        logCallback(`Used ${scroll.name}: Execute enemies under ${(scroll.value * 100).toFixed(0)}% HP for ${scroll.duration} turn${scroll.duration > 1 ? 's' : ''}!`, 'reward');
    } else if (scroll.effect === 'damage_boost' || scroll.effect === 'berserker') {
        logCallback(`Used ${scroll.name}: Offensive power surges for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'defense_boost') {
        logCallback(`Used ${scroll.name}: Defense increased for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'dodge_boost') {
        logCallback(`Used ${scroll.name}: Dodge increased for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'burn' || scroll.effect === 'poison') {
        logCallback(`Used ${scroll.name}: ${target ? target.name : 'The enemy'} is afflicted for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'slow') {
        logCallback(`Used ${scroll.name}: ${target ? target.name : 'The enemy'} deals reduced damage for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'regen') {
        logCallback(`Used ${scroll.name}: Regenerating health for ${scroll.duration} turns!`, 'heal');
    } else if (scroll.effect === 'thorns') {
        logCallback(`Used ${scroll.name}: Thorns active for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'lifesteal') {
        logCallback(`Used ${scroll.name}: ${(scroll.value * 100).toFixed(0)}% lifesteal for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'freeze') {
        logCallback(`Used ${scroll.name}: ${target ? target.name : 'The enemy'} is frozen for ${scroll.duration} turn${scroll.duration > 1 ? 's' : ''}!`, 'reward');
    } else if (scroll.effect === 'revive') {
        logCallback(`Used ${scroll.name}: You will revive at ${(scroll.value * 100).toFixed(0)}% HP if defeated!`, 'reward');
    } else if (scroll.effect === 'drop_boost') {
        logCallback(`Used ${scroll.name}: Drop rate increased for ${scroll.duration} turns!`, 'reward');
    }
    
    // Scrolls are infinite-use, so they remain equipped after activation.

    if (target && target.hp <= 0) {
        handleCombatVictoryByContext(context);
        updateStats();
        return;
    }
    
    if (!options.suppressRerender) {
        rerenderCombatContext(context);
        updateStats();
    }
}

// ==============================================
// ✅ UNIVERSAL SINGLE COMBAT ENGINE
// ==============================================
// This is the ONLY combat system in the entire game.
// EVERY SINGLE COMBAT IN THE GAME GOES THROUGH THIS FUNCTION.
// Change this once, and it changes EVERYTHING.
// ==============================================
function runUniversalCombatTurn(action, playerObj, enemyObj, logCallback, healCallback, afterHitCallback) {
    if (!playerObj) playerObj = gameState.player;
    if (!enemyObj) return { playerDied: false, enemyDied: false };
    if (!logCallback) logCallback = addBattleMsg;
    
    const totalAtk = getTotalAtk();
    const totalDef = getEffectivePlayerDefense();
    const totalCrit = getTotalCrit();
    const totalCritDmg = getTotalCritDmg();
    
    // Get scroll effect values
    const damageMult = getScrollDamageMultiplier();
    const critBonus = getScrollCritBonus();
    const invulnerable = isInvulnerable();
    const executeThreshold = getExecuteThreshold();
    
    // ✅ UBER UNIQUE SPECIAL ABILITIES CHECK - RUNS FOR ALL ACTIONS
    let has75DamageReduction = false;
    let hasGuaranteedExtraDrop = false;
    let has100EscapeSuccess = false;
    
    const eqSlots = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];
    
    eqSlots.forEach(slot => {
        const eq = gameState.equipment[slot];
        if (!eq || !eq.specialAbility) return;
        
        switch(eq.specialAbility) {
            case 'damage_reduction_75':
                has75DamageReduction = true;
                break;
            case 'guaranteed_extra_drop':
                hasGuaranteedExtraDrop = true;
                break;
            case '100_escape_success':
                has100EscapeSuccess = true;
                break;
        }
    });
    
    // Store special flags
    gameState.has75DamageReduction = has75DamageReduction;
    gameState.hasGuaranteedExtraDrop = hasGuaranteedExtraDrop;
    gameState.has100EscapeSuccess = has100EscapeSuccess;
    
    let playerDied = false;
    let enemyDied = false;
    let fled = false;
    
    switch (action) {
        case 'attack': {
            // ✅ DODGE CHANCE CHECK
            const dodgeChance = enemyObj.dodge || 0;
            const cappedDodge = Math.min(dodgeChance, 0.95); // HARD CAP 95% MAX DODGE
            if (Math.random() < cappedDodge) {
                logCallback(`${enemyObj.name} DODGED your attack! (Dodge: ${(cappedDodge*100).toFixed(1)}%)`, 'damage');
                break;
            }
            
            // Luck reduces damage variance - at 9 luck, always max damage roll
            const totalLuck = getTotalLuck();
            const cappedLuck = Math.min(totalLuck, 9);
            const minRoll = Math.min(-3 + cappedLuck, 3); // luck reduces negative variance
            const effectiveEnemyDefense = getEffectiveEnemyDefense(enemyObj);
            let dmg = Math.max(1, totalAtk - effectiveEnemyDefense + rand(minRoll, 3));
            let crit = Math.random() * 100 < (totalCrit + critBonus);
            if (crit) dmg = Math.floor(dmg * (1.5 + totalCritDmg / 100));
            // Apply damage multiplier from scrolls
            dmg = Math.floor(dmg * damageMult);

            // ✅ UBER UNIQUE SPECIAL ABILITIES SYSTEM - ATTACK SPECIFIC
            let bonusDmg = 0;
            let specialMsg = '';
            let attackCount = 1;
            let trueDamage = false;
            let guaranteedCrit = false;
            
            // Initialize attack counters if not exists
            if (typeof gameState.attackCounter === 'undefined') {
                gameState.attackCounter = 0;
            }
            gameState.attackCounter++;
            
            eqSlots.forEach(slot => {
                const eq = gameState.equipment[slot];
                if (!eq || !eq.specialAbility) return;
                
                switch(eq.specialAbility) {
                    case 'half_current_hp':
                        bonusDmg += Math.floor(enemyObj.hp * 0.5);
                        specialMsg += ' (Reaper Scythe)';
                        break;
                    case 'crit_guaranteed':
                        guaranteedCrit = true;
                        crit = true;
                        break;
                    case 'low_hp_damage_buff':
                        if (playerObj.hp < (getTotalMaxHp() * 0.1)) {
                            dmg = Math.floor(dmg * 2);
                            specialMsg += ' (Low HP Bonus x2)';
                        }
                        break;
                    case 'triple_attack_every_4':
                        if (gameState.attackCounter % 4 === 0) {
                            attackCount = 3;
                            specialMsg += ' (Triple Attack!)';
                        }
                        break;
                    case 'true_damage_every_3':
                        if (gameState.attackCounter % 3 === 0) {
                            trueDamage = true;
                            specialMsg += ' (True Damage!)';
                        }
                        break;
                }
            });
            
            // Apply guaranteed crit if active
            if (guaranteedCrit) {
                crit = true;
                dmg = Math.floor(dmg * (1.5 + totalCritDmg / 100));
            }
            
            // Apply true damage (ignore defense)
            if (trueDamage) {
                dmg = totalAtk + bonusDmg;
            } else {
                dmg += bonusDmg;
            }
            
            // Handle multiple attacks
            const totalAttackInstances = getTotalAttackInstances(attackCount);
            let totalDamageDealt = 0;
            for (let i = 0; i < totalAttackInstances; i++) {
                totalDamageDealt += dmg;
                enemyObj.hp = Math.max(0, enemyObj.hp - dmg);
            }
            
            const multiHitMsg = totalAttackInstances > 1 ? ` (${totalAttackInstances} hits)` : '';
            logCallback(`You hit ${enemyObj.name} for ${totalDamageDealt} damage${crit ? ' (CRIT!)' : ''}${specialMsg}${multiHitMsg}!`, crit ? 'reward' : 'info');
            
            // Apply lifesteal healing
            const healAmt = calculateDamageBasedHealing(totalDamageDealt);
            if (healAmt > 0) {
                const actualHeal = Math.min(healAmt, getTotalMaxHp() - playerObj.hp);
                playerObj.hp += actualHeal;
                if (actualHeal > 0) {
                    logCallback(`Lifesteal healed you for ${actualHeal} HP!`, 'heal');
                    if (healCallback) healCallback(actualHeal);
                }
            }

            // Check for execute effect
            if (executeThreshold > 0 && enemyObj.hp > 0 && enemyObj.hp <= Math.floor(enemyObj.maxHp * executeThreshold)) {
                enemyObj.hp = 0;
                logCallback(`Execute effect triggers! ${enemyObj.name} is instantly killed!`, 'reward');
            }
            
            if (enemyObj.hp <= 0) {
                enemyDied = true;
                break;
            }
            break;
        }
        case 'flee': {
            // ✅ Apply 100% escape success special ability
            if (gameState.has100EscapeSuccess) {
                fled = true;
                break;
            }
            
            if (Math.random() < 0.5 + getTotalLuck() * 0.02) {
                logCallback('You fled successfully!', 'info');
                fled = true;
            } else {
                logCallback('Failed to flee!', 'damage');
            }
            break;
        }
    }
    
    if (!fled && !enemyDied) {
        const enemyTurnResult = resolveEnemyCounterAttack(playerObj, enemyObj, logCallback, healCallback, {
            invulnerable,
            totalDef
        });
        if (enemyTurnResult.enemyDied) {
            enemyDied = true;
        }
    }

    const endOfTurnResult = applyEndOfTurnScrollEffects(playerObj, enemyObj, logCallback);
    if (endOfTurnResult.enemyDied) {
        enemyDied = true;
    }
    
    if (playerObj.hp <= 0) {
        if (!tryConsumeReviveScroll(playerObj, logCallback)) {
            playerDied = true;
        }
    }
    
    // Decrement scroll effects at end of turn
    decrementScrollEffects(logCallback);
    
    // Mana regeneration: 5% of max MP every turn
    const maxMp = getTotalMaxMp();
    const manaRegenAmount = Math.floor(maxMp * 0.05);
    gameState.player.mp = Math.min(maxMp, gameState.player.mp + manaRegenAmount);
    
    // After hit callback
    if (afterHitCallback) afterHitCallback();
    
    return { playerDied, enemyDied, fled };
}

// Get active scroll effect values
function getScrollDamageMultiplier() {
    let multiplier = 1;
    gameState.activeScrollEffects.forEach(effect => {
        if (effect.effect === 'damage_boost' || effect.effect === 'berserker') {
            multiplier *= effect.value;
        }
    });
    return multiplier;
}

function getScrollCritBonus() {
    let bonus = 0;
    gameState.activeScrollEffects.forEach(effect => {
        if (effect.effect === 'crit_chance') {
            bonus += effect.value * 100;
        }
    });
    return bonus;
}

function isInvulnerable() {
    return gameState.activeScrollEffects.some(effect => effect.effect === 'invulnerable');
}

function getExecuteThreshold() {
    let threshold = 0;
    gameState.activeScrollEffects.forEach(effect => {
        if (effect.effect === 'execute') {
            threshold = Math.max(threshold, effect.value);
        }
    });
    return threshold;
}

// Decrement scroll effects at end of turn
function decrementScrollEffects(logCallback = addBattleMsg) {
    gameState.activeScrollEffects = gameState.activeScrollEffects.filter(effect => {
        effect.remainingTurns--;
        if (effect.remainingTurns <= 0) {
            logCallback(`${effect.name} effect wore off.`, 'info');
            return false;
        }
        return true;
    });
}

function battleAction(action) {
    if (!gameState.inBattle || !gameState.currentEnemy) return;
    if (guardCombatCooldown(addBattleMsg, renderBattle)) return;
    activateCombatScrollsForCurrentBattle('battle');
    
    if (action === 'spell') {
        // Spell attack: 0.5-3x damage at cost of 15 mana
        if (gameState.player.mp < 15) {
            addBattleMsg('Not enough mana! Requires 15 MP to cast spell.', 'damage');
            renderBattle();
            return;
        }
        
        gameState.player.mp -= 15;
        
        // Get scroll effect values (DOUBLE EFFECT FOR SPELLS)
        const damageMult = getScrollDamageMultiplier() * 2;
        const critBonus = getScrollCritBonus() * 2;
        const invulnerable = isInvulnerable();
        const executeThreshold = getExecuteThreshold();
        const totalDef = getEffectivePlayerDefense();
        
        // Calculate spell damage multiplier between 0.5x and 3x
        const spellMultiplier = 0.5 + Math.random() * 2.5;
        const totalAtk = getTotalAtk();
        const totalCrit = getTotalCrit();
        const effectiveEnemyDefense = getEffectiveEnemyDefense(gameState.currentEnemy);
        const totalAttackInstances = getTotalAttackInstances();
        
        let dmg = Math.max(1, totalAtk - effectiveEnemyDefense + rand(-3, 3));
        let crit = Math.random() * 100 < (totalCrit + critBonus);
        if (crit) dmg = Math.floor(dmg * (1.5 + getTotalCritDmg() / 100));
        
        // Apply spell multiplier + scroll damage multiplier
        dmg = Math.floor(dmg * spellMultiplier * damageMult);
        dmg *= totalAttackInstances;
        
        gameState.currentEnemy.hp = Math.max(0, gameState.currentEnemy.hp - dmg);
        
        addBattleMsg(`You cast a spell for ${dmg} damage${totalAttackInstances > 1 ? ` (${totalAttackInstances} hits)` : ''}! (${spellMultiplier.toFixed(1)}x ${damageMult > 1 ? `+ Scroll x${damageMult.toFixed(1)}` : ''})`, crit ? 'reward' : 'info');

        const spellHeal = calculateDamageBasedHealing(dmg);
        if (spellHeal > 0) {
            const actualHeal = Math.min(spellHeal, getTotalMaxHp() - gameState.player.hp);
            if (actualHeal > 0) {
                gameState.player.hp += actualHeal;
                addBattleMsg(`Lifesteal healed you for ${actualHeal} HP!`, 'heal');
            }
        }
        
        // Check for execute effect
        if (executeThreshold > 0 && gameState.currentEnemy.hp > 0 && gameState.currentEnemy.hp <= Math.floor(gameState.currentEnemy.maxHp * executeThreshold)) {
            gameState.currentEnemy.hp = 0;
            addBattleMsg(`Execute effect triggers! ${gameState.currentEnemy.name} is instantly killed!`, 'reward');
        }
        
        if (gameState.currentEnemy.hp <= 0) {
            enemyDefeated();
            return;
        }
        
        const counterResult = resolveEnemyCounterAttack(gameState.player, gameState.currentEnemy, addBattleMsg, null, {
            invulnerable,
            totalDef
        });
        if (counterResult.enemyDied) {
            enemyDefeated();
            return;
        }

        const endOfTurnResult = applyEndOfTurnScrollEffects(gameState.player, gameState.currentEnemy, addBattleMsg);
        if (endOfTurnResult.enemyDied) {
            enemyDefeated();
            return;
        }
        
        if (gameState.player.hp <= 0) {
            triggerDefeatRecovery(addBattleMsg);
            gameState.player.gold = Math.floor(gameState.player.gold * 0.9);
            resetCombatScrollSession();
            gameState.inBattle = false;
            gameState.currentEnemy = null;
            showScreen('travel');
            return;
        }
        
        // Decrement scroll effects at end of turn
        decrementScrollEffects(addBattleMsg);
        
        // Mana regeneration: 5% of max MP every turn
        const maxMp = getTotalMaxMp();
        const manaRegenAmount = Math.floor(maxMp * 0.05);
        gameState.player.mp = Math.min(maxMp, gameState.player.mp + manaRegenAmount);
        
        renderBattle();
        updateStats();
        return;
    }
    
    const result = runUniversalCombatTurn(action, gameState.player, gameState.currentEnemy);
    
    if (result.enemyDied) {
        enemyDefeated();
        return;
    }
    
    if (result.playerDied) {
        triggerDefeatRecovery(addBattleMsg);
        gameState.player.gold = Math.floor(gameState.player.gold * 0.9);
        resetCombatScrollSession();
        gameState.inBattle = false;
        gameState.currentEnemy = null;
        showScreen('travel');
        return;
    }
    
    if (result.fled) {
        resetCombatScrollSession();
        gameState.inBattle = false;
        gameState.currentEnemy = null;
        showScreen('travel');
        return;
    }
    
    renderBattle();
    updateStats();
}

function enemyDefeated() {
    const p = gameState.player;
    const e = gameState.currentEnemy;
    
    // Scale XP and Gold to enemy level/tier, not player level
    const scaledXp = e.xp;
    const scaledGold = e.gold;
    
    p.xp += scaledXp;
    p.gold += scaledGold;
    
    addBattleMsg(`You defeated ${e.name}!`, 'reward');
    addBattleMsg(`Gained ${scaledXp} XP and ${scaledGold} gold!`, 'reward');
    
    // Show in chat
    addChatMessage('SYSTEM', `${p.name} defeated ${e.name} and gained ${scaledXp} XP, ${scaledGold} Gold!`, true);
    
    // Check quest progress
    checkQuestProgress(e.name.replace(/ /g, '_'));
    
    // Drop system with new rarity rates
    // 35% base chance to drop something
    const dropChance = Math.min(1, (0.35 + getTotalLuck() * 0.01) * (1 + getScrollDropBoost()));
    
    if (Math.random() < dropChance) {
        // 60% chance for material/consumable drop (from enemy's loot table)
        // 40% chance for equipment drop (using new rarity system)
        if (Math.random() < 0.6 && e.drops && e.drops.length > 0) {
            // Material/consumable drop from enemy's loot table
            const dropItem = getMaterialDrop(e.drops);
            if (dropItem) {
                addToInventory({ ...dropItem, qty: dropItem.qty || 1 });
                addBattleMsg(`Dropped: ${dropItem.name}${(dropItem.qty || 1) > 1 ? ` x${dropItem.qty}` : ''}!`, 'reward');
                addItemLog('battle', dropItem.name);
                // Show in chat
                addChatMessage('SYSTEM', `${p.name} found: ${dropItem.name}${(dropItem.qty || 1) > 1 ? ` x${dropItem.qty}` : ''}!`, true);
            }
        } else {
            // Equipment drop using new rarity system
            const targetRarity = getItemDropByRarity();
            const droppedItem = getLeveledItemDrop(targetRarity, e.tier);
            
            if (droppedItem) {
                addToInventory({ ...droppedItem, qty: 1 });
                const rarityColor = getRarityColor(droppedItem.rarity);
                const isUber = isUberUnique(droppedItem);
                const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
                addBattleMsg(`Dropped: <span style="${itemColorStyle}">${droppedItem.name}</span> (${droppedItem.rarity})!`, 'reward');
                addItemLog('battle', droppedItem.name);
                // Show in chat
                addChatMessage('SYSTEM', `${p.name} found a ${droppedItem.rarity} item: ${droppedItem.name}!`, true);
            }
        }
    }
    
    // ✅ Apply guaranteed extra item drop special ability
    if (gameState.hasGuaranteedExtraDrop) {
        // Guaranteed extra item drop - always drop an additional equipment item
        const targetRarity = getItemDropByRarity();
        const extraItem = getLeveledItemDrop(targetRarity, e.tier);
        
        if (extraItem) {
            addToInventory({ ...extraItem, qty: 1 });
            const rarityColor = getRarityColor(extraItem.rarity);
            const isUber = isUberUnique(extraItem);
            const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
            addBattleMsg(`✅ BONUS DROP: <span style="${itemColorStyle}">${extraItem.name}</span> (${extraItem.rarity})!`, 'reward');
            addItemLog('battle', extraItem.name);
            addChatMessage('SYSTEM', `${p.name} got BONUS DROP: ${extraItem.name}!`, true);
        }
    }
    
    // Random scroll drop (0.5% chance) with Magic Find-adjusted rarity weighting
    if (Math.random() < 0.005) {
        const scrollName = getRandomScrollDropName();
        if (scrollName && scrollPool[scrollName]) {
            addToInventory({ name: scrollName, type: 'scroll', qty: 1, ...scrollPool[scrollName] });
            addBattleMsg(`Dropped scroll: ${scrollName}!`, 'reward');
            addChatMessage('SYSTEM', `${p.name} found a scroll: ${scrollName}!`, true);
        }
    }
    
    // Check level up
    checkLevelUp();

    resetCombatScrollSession();
    
    gameState.inBattle = false;
    gameState.currentEnemy = null;
    
    renderBattle();
    updateStats();
}

function checkLevelUp() {
    const p = gameState.player;
    while (p.xp >= p.xpToNext) {
        p.xp -= p.xpToNext;
        p.level++;
        
        // ✅ HARD CORRECT LEVEL STAT CALCULATION - INFINITE LEVELS SUPPORT
        // Base stats are ALWAYS recalculated from level 1 formula
        const BASE_HP = 100;
        const BASE_MP = 50;
        const BASE_ATK = 10;
        const BASE_DEF = 5;
        
        // Exact 10% per level compound growth FOR ALL LEVELS - NO CAP
        p.maxHp = Math.floor(BASE_HP * Math.pow(1.10, p.level - 1));
        p.maxMp = Math.floor(BASE_MP * Math.pow(1.10, p.level - 1));
        
        // Exact flat +3 per level FOR ALL LEVELS - NO CAP
        p.atk = BASE_ATK + ((p.level - 1) * 3);
        p.def = BASE_DEF + ((p.level - 1) * 3);
        
        // Update base stat references for equipment calculation
        p.baseMaxHp = p.maxHp;
        p.baseMaxMp = p.maxMp;
        p.baseAtk = p.atk;
        p.baseDef = p.def;
        
        // Fully heal on level up
        p.hp = p.maxHp;
        p.mp = p.maxMp;

        // XP Requirement scaling HARD CAP at 999,999,999 XP maximum
        p.xpToNext = Math.min(999999999, Math.floor(p.xpToNext * 1.5));
        
        addBattleMsg(`LEVEL UP! You are now level ${p.level}!`, 'reward');
        addBattleMsg(`Max HP: ${p.maxHp}, Max MP: ${p.maxMp}, ATK: ${p.atk}, DEF: ${p.def}`, 'reward');
        addChatMessage('SYSTEM', `${p.name} reached level ${p.level}! Max HP: ${p.maxHp} ATK: ${p.atk} DEF: ${p.def}`, true);
    }
}

// INVENTORY
function addToInventory(item, options = {}) {
    if (!item) return;
    // sanitize luck: only allow luck on weapons or explicit 'charm' types
    const allowedLuckTypes = ['weapon', 'charm'];
    const copy = { ...item };
    delete copy.marketPrice;
    delete copy.marketQty;
    delete copy.marketId;
    delete copy.merchantPrice;
    if (copy.type && typeof copy.type === 'string') copy.type = copy.type.trim().toLowerCase();
    if (copy.luck && !allowedLuckTypes.includes(copy.type)) {
        delete copy.luck;
    }
    // Ensure equipSlot exists for items where type implies equip slot
    const resolved = resolveEquipSlot(copy);
    if (resolved && !copy.equipSlot) copy.equipSlot = resolved;

    const existing = gameState.inventory.find(i => i.name === copy.name && i.type === copy.type);
    if (existing) {
        const existingQty = Number.isFinite(existing.qty) && existing.qty > 0 ? existing.qty : 1;
        const qtyToAdd = Number.isFinite(copy.qty) && copy.qty > 0 ? copy.qty : 1;
        existing.qty = existingQty + qtyToAdd;
    } else {
        gameState.inventory.push(copy);
    }

    const shouldAnnounce = !options.suppressAnnouncement && (
        options.forceAnnouncement ||
        copy.rarity === 'unique' ||
        copy.rarity === 'uber_unique' ||
        copy.uberUnique === true
    );

    if (shouldAnnounce) {
        showItemAnnouncement(copy, options.announcementContext || 'loot', {
            title: options.announcementTitle,
            body: options.announcementBody
        });
    }
}

function removeFromInventory(index, qty = 1) {
    const item = gameState.inventory[index];
    if (!item) return;
    if (item.qty) {
        item.qty -= qty;
        if (item.qty <= 0) {
            gameState.inventory.splice(index, 1);
        }
    } else {
        gameState.inventory.splice(index, 1);
    }
}

function useItem(index) {
    const item = gameState.inventory[index];
    if (!item) return;
    
    if (item.type === 'consumable') {
        if (item.effect === 'heal') {
            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + item.value);
            addBattleMsg(`Used ${item.name}: Healed ${item.value} HP`, 'heal');
        } else if (item.effect === 'mana') {
            gameState.player.mp = Math.min(gameState.player.maxMp, gameState.player.mp + item.value);
            addBattleMsg(`Used ${item.name}: Restored ${item.value} MP`, 'heal');
        } else if (item.effect === 'blessing') {
            addBattleMsg(`Blessing Oil cannot be used from inventory! Go to the Temple to use it.`, 'info');
            return; // Don't remove from inventory
        } else if (item.effect === 'spawn_world_boss') {
            if (gameState.worldBossActive) {
                addBattleMsg(`There is already an active World Boss!`, 'damage');
                return;
            }
            spawnWorldBoss();
            addBattleMsg(`✅ World Boss summoned! Go to the Battle tab to fight!`, 'reward');
            addChatMessage('SYSTEM', `${gameState.player.name} used a World Boss Ticket!`, true);
        }
        removeFromInventory(index);
        updateStats();
        renderInventory();
    }
}

function equipItem(index) {
    const item = gameState.inventory[index];
    if (!item) return;

    const slot = resolveEquipSlot(item);
    if (!slot) {
        addChatMessage('SYSTEM', `Cannot equip ${item.name} - invalid equipment slot`, true);
        return;
    }

    // Level requirement check
    if (item.levelReq && gameState.player.level < item.levelReq) {
        addChatMessage('SYSTEM', `Cannot equip ${item.name} - requires level ${item.levelReq}`, true);
        return;
    }

    const currentlyEquipped = gameState.equipment[slot];

    // ✅ Full stat recalculation system
    // Remove old item stats first if something is equipped
    if (currentlyEquipped) {
        // Return previously equipped item to inventory with ALL stats preserved
        addToInventory({
            ...currentlyEquipped,
            qty: 1
        }, { suppressAnnouncement: true });
    }

    // Remove new item from inventory
    removeFromInventory(index);

    // Equip the item with complete property preservation
    gameState.equipment[slot] = {
        ...item,
        equipSlot: slot,
        equipped: true,
        equippedAt: Date.now()
    };

    // ✅ Recalculate ALL player derived stats from equipment
    recalculateAllPlayerStats();

    // Update UI
    updateStats();
    renderEquipment();
    renderInventory();
    updateSidePanels();

    addChatMessage('SYSTEM', `Equipped ${item.name}`, true);
}

/**
 * Complete stat recalculation engine - computes ALL player stats from base + equipment bonuses
 * Supports flat bonuses, percentage bonuses, stacking modifiers, and stat caps
 */
function recalculateAllPlayerStats() {
    const p = gameState.player;
    
    // Base player stats (these are permanent level up stats)
    const baseStats = {
        atk: p.baseAtk || p.atk,
        def: p.baseDef || p.def,
        maxHp: p.baseMaxHp || p.maxHp,
        maxMp: p.baseMaxMp || p.maxMp,
        luck: p.baseLuck || 0,
        crit: p.baseCrit || 0,
        critDmg: p.baseCritDmg || 50,
        dodge: p.baseDodge || 0,
        lifesteal: p.baseLifesteal || 0,
        dmgReduction: p.baseDmgReduction || 0,
        armorPen: p.baseArmorPen || 0,
        magicPen: p.baseMagicPen || 0,
        attackSpeed: p.baseAttackSpeed || 0,
        cdr: p.baseCdr || 0,
        moveSpeed: p.baseMoveSpeed || 0
    };

    // Initialize calculation accumulators
    const finalStats = { ...baseStats };
    const percentBonuses = {};

    // List of all equipment slots to process
    const equipmentSlots = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];

    // First pass: collect ALL flat bonuses and percentage modifiers
    equipmentSlots.forEach(slot => {
        const item = gameState.equipment[slot];
        if (!item) return;

        // Process every stat property on the item
        Object.keys(item).forEach(statKey => {
            // Skip non-stat properties
            if (['name', 'type', 'equipSlot', 'desc', 'rarity', 'levelReq', 'equipped', 'equippedAt', 'uberUnique', 'specialAbility'].includes(statKey)) {
                return;
            }

            const value = item[statKey];
            if (typeof value !== 'number' || isNaN(value)) return;

            // Check if this is a percentage stat (ends with Percent or %)
            if (statKey.endsWith('Percent') || statKey.endsWith('%')) {
                const baseStatName = statKey.replace('Percent', '').replace('%', '');
                if (!percentBonuses[baseStatName]) percentBonuses[baseStatName] = 0;
                percentBonuses[baseStatName] += value;
            } else {
                // Flat bonus stat
                if (finalStats[statKey] === undefined) finalStats[statKey] = 0;
                finalStats[statKey] += value;
            }
        });
    });

    // Second pass: apply all percentage bonuses AFTER flat bonuses are summed
    Object.keys(percentBonuses).forEach(stat => {
        if (finalStats[stat] !== undefined) {
            const multiplier = 1 + (percentBonuses[stat] / 100);
            finalStats[stat] = Math.floor(finalStats[stat] * multiplier);
        }
    });

    // ✅ Apply stat hard caps
    finalStats.crit = Math.min(finalStats.crit, 95);              // 95% max crit chance
    finalStats.dodge = Math.min(finalStats.dodge, 95);            // 95% max dodge
    finalStats.dmgReduction = Math.min(finalStats.dmgReduction, 95); // 95% max damage reduction
    finalStats.cdr = Math.min(finalStats.cdr, 80);                // 80% max cooldown reduction
    finalStats.lifesteal = Math.min(finalStats.lifesteal, 50);    // 50% max lifesteal

    // Assign final calculated stats back to player
    Object.keys(finalStats).forEach(stat => {
        p[stat] = finalStats[stat];
    });

    // Store base stats if not already stored (first run)
    if (!p.baseAtk) {
        p.baseAtk = p.atk;
        p.baseDef = p.def;
        p.baseMaxHp = p.maxHp;
        p.baseMaxMp = p.maxMp;
        p.baseLuck = p.luck || 0;
        p.baseCrit = p.crit || 0;
    }

    // Ensure current HP/MP don't exceed new maximums
    p.hp = Math.min(p.hp, p.maxHp);
    p.mp = Math.min(p.mp, p.maxMp);
}

function unequipItem(slot) {
    const item = gameState.equipment[slot];
    if (!item) return;

    // Return item to inventory
    addToInventory({
        ...item,
        qty: 1,
        equipped: false
    }, { suppressAnnouncement: true });

    // Clear equipment slot
    gameState.equipment[slot] = null;

    // Recalculate all stats without this item
    recalculateAllPlayerStats();

    // Update UI
    updateStats();
    renderEquipment();
    renderInventory();
    updateSidePanels();

    addChatMessage('SYSTEM', `Unequipped ${item.name}`, true);
}

// QUEST SYSTEM
function checkQuestProgress(enemyKey) {
    gameState.quests.forEach((quest, idx) => {
        if (quest.target === enemyKey) {
            const progressKey = quest.id || idx;
            if (!gameState.questProgress[progressKey]) gameState.questProgress[progressKey] = 0;
            gameState.questProgress[progressKey]++;
        }
    });
    
    // Also check guild quest progress
    gameState.guildQuests.forEach((quest, idx) => {
        if (quest.target === enemyKey) {
            const progressKey = quest.id || idx;
            if (!gameState.guildQuestProgress[progressKey]) gameState.guildQuestProgress[progressKey] = 0;
            gameState.guildQuestProgress[progressKey]++;
        }
    });
}

function acceptQuest(questId) {
    if (gameState.quests.find(q => q.id === questId)) return;
    
    const def = questDefs.find(q => q.id === questId);
    if (!def) return;
    
    gameState.quests.push({ ...def, progress: 0 });
    gameState.questProgress[questId] = gameState.questProgress[questId] || 0;
    renderQuests();
}

function turnInQuest(idx) {
    const quest = gameState.quests[idx];
    if (!quest) return;
    
    const progressKey = quest.id || idx;
    const progress = gameState.questProgress[progressKey] || 0;
    if (progress < quest.count) return;
    
    gameState.player.xp += quest.reward.xp;
    gameState.player.gold += quest.reward.gold;
    
    addBattleMsg(`Quest complete: ${quest.name}! Gained ${quest.reward.xp} XP and ${quest.reward.gold} gold!`, 'reward');
    
    gameState.completedQuests.push(quest.id);
    gameState.quests.splice(idx, 1);
    delete gameState.questProgress[progressKey];
    
    checkLevelUp();
    updateStats();
    renderQuests();
}

function generateGuildQuest(rarity) {
    const templates = guildQuestTemplates[rarity];
    if (!templates || templates.length === 0) return null;
    
    const template = pick(templates);
    const playerLevel = gameState.player.level;
    
    // Scale count and rewards based on player level
    const levelScale = 1 + Math.floor(playerLevel / 10) * 0.2;
    const count = Math.max(1, Math.floor(template.baseCount * levelScale));
    const reward = createGuildQuestReward(template, rarity, count, playerLevel);
    
    return {
        id: `guild_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
        name: template.name,
        desc: template.desc.replace('{count}', count),
        target: template.target,
        count: count,
        reward,
        rarity: rarity,
        progress: 0
    };
}

function generateGuildQuests() {
    gameState.guildQuests = [];
    gameState.guildQuestProgress = {};
    
    // Generate 1-5 quests
    const numQuests = rand(1, 5);
    
    for (let i = 0; i < numQuests; i++) {
        // Determine rarity based on weights
        const roll = rand(1, 100);
        let rarity;
        let cumulative = 0;
        
        for (const [r, weight] of Object.entries(guildRarityWeights)) {
            cumulative += weight;
            if (roll <= cumulative) {
                rarity = r;
                break;
            }
        }
        
        const quest = generateGuildQuest(rarity);
        if (quest) {
            gameState.guildQuests.push(quest);
        }
    }
    
    gameState.lastGuildQuestRefresh = Date.now();
    // Reset force refresh cost on automatic refresh
    gameState.forceRefreshCost = 100;
    gameState.forceRefreshCount = 0;
    addChatMessage('SYSTEM', 'The Adventurer\'s Guild has posted new quests!', true);
}

function forceRefreshGuildQuests() {
    const cost = gameState.forceRefreshCost;
    
    // Check if player has enough gold
    if (gameState.player.gold < cost) {
        addBattleMsg(`Not enough gold! Force refresh costs ${cost} gold.`, 'damage');
        return;
    }
    
    // Deduct gold
    gameState.player.gold -= cost;
    
    // Increase cost multiplicatively (x2 each time)
    gameState.forceRefreshCost = gameState.forceRefreshCost * 2;
    gameState.forceRefreshCount++;
    
    // Generate new quests
    gameState.guildQuests = [];
    gameState.guildQuestProgress = {};
    
    const numQuests = rand(1, 5);
    
    for (let i = 0; i < numQuests; i++) {
        const roll = rand(1, 100);
        let rarity;
        let cumulative = 0;
        
        for (const [r, weight] of Object.entries(guildRarityWeights)) {
            cumulative += weight;
            if (roll <= cumulative) {
                rarity = r;
                break;
            }
        }
        
        const quest = generateGuildQuest(rarity);
        if (quest) {
            gameState.guildQuests.push(quest);
        }
    }
    
    addBattleMsg(`Force refreshed guild quests for ${cost} gold! Next cost: ${gameState.forceRefreshCost} gold`, 'reward');
    updateStats();
    renderGuildQuests();
}

function acceptGuildQuest(idx) {
    if (idx < 0 || idx >= gameState.guildQuests.length) return;
    
    const quest = gameState.guildQuests[idx];
    if (quest.accepted) return;
    
    quest.accepted = true;
    gameState.guildQuestProgress[quest.id || idx] = 0;
    renderGuildQuests();
    addBattleMsg(`Accepted guild quest: ${quest.name}`, 'info');
}

function turnInGuildQuest(idx) {
    const quest = gameState.guildQuests[idx];
    if (!quest || !quest.accepted) return;
    
    const progressKey = quest.id || idx;
    const progress = gameState.guildQuestProgress[progressKey] || 0;
    if (progress < quest.count) return;
    
    // Grant rewards
    gameState.player.xp += quest.reward.xp;
    gameState.player.gold += quest.reward.gold;
    
    // Legendary quests give Soul Gems
    if (quest.reward.soulGem) {
        gameState.soulGems++;
        addBattleMsg(`Legendary quest complete: ${quest.name}! Gained ${quest.reward.xp} XP, ${quest.reward.gold} gold, and 1 Soul Gem!`, 'reward');
        addChatMessage('SYSTEM', `${gameState.player.name} completed a legendary guild quest and earned a Soul Gem!`, true);
    } else {
        addBattleMsg(`Guild quest complete: ${quest.name}! Gained ${quest.reward.xp} XP and ${quest.reward.gold} gold!`, 'reward');
    }

    gameState.guildQuests.splice(idx, 1);
    delete gameState.guildQuestProgress[progressKey];
    
    checkLevelUp();
    updateStats();
    renderGuildQuests();
}

function renderGuildQuests() {
    const container = document.getElementById('battle-content');
    
    // Check if we need to refresh quests
    const now = Date.now();
    const timeSinceRefresh = now - (gameState.lastGuildQuestRefresh || 0);
    if (timeSinceRefresh >= GUILD_QUEST_REFRESH_INTERVAL || gameState.guildQuests.length === 0) {
        generateGuildQuests();
    }
    
    const timeLeft = GUILD_QUEST_REFRESH_INTERVAL - timeSinceRefresh;
    const timeLeftMins = Math.floor(timeLeft / 60000);
    const timeLeftSecs = Math.floor((timeLeft % 60000) / 1000);
    
    let html = `<div class="location-header" style="color:#ffd700">&#9876; Adventurer's Guild &#9876;</div>`;
    html += `<div class="description">The guild posts new quests every hour. Complete legendary quests to earn Soul Gems!</div>`;
    html += `<div style="color:#aaa;font-size:0.85em;margin-bottom:15px">Next refresh in: ${timeLeftMins}m ${timeLeftSecs}s</div>`;
    
    html += `<div class="section-title">Available Guild Quests (${gameState.guildQuests.length})</div>`;
    
    if (gameState.guildQuests.length === 0) {
        html += `<div class="msg">No quests available. Check back soon!</div>`;
    }
    
    gameState.guildQuests.forEach((quest, idx) => {
        const progress = gameState.guildQuestProgress[quest.id || idx] || 0;
        const complete = quest.accepted && progress >= quest.count;
        const color = rarityColors[quest.rarity] || '#aaa';
        
        html += `<div class="quest-item" style="border-color: ${color}">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="quest-title" style="color:${color}">${quest.name}</div>
                <span style="color:${color};font-size:0.8em;font-weight:bold">[${quest.rarity.toUpperCase()}]</span>
            </div>
            <div class="description">${quest.desc}</div>
            <div style="color:#aaa;font-size:0.85em">
                Reward: ${quest.reward.xp} XP, ${quest.reward.gold} Gold
                ${quest.reward.soulGem ? '<span style="color:#ff00ff;font-weight:bold"> + 1 Soul Gem</span>' : ''}
            </div>
            ${quest.accepted ? `
                <div style="margin-top:8px">Progress: ${progress}/${quest.count} ${complete ? '- COMPLETE!' : ''}</div>
                ${complete ? `<button class="action-btn quest" onclick="turnInGuildQuest(${idx})">Turn In Quest</button>` : ''}
            ` : `
                <button class="action-btn quest" onclick="acceptGuildQuest(${idx})" style="margin-top:8px">Accept Quest</button>
            `}
        </div>`;
    });
    
    html += `<div style="margin-top:20px;">
        <button class="action-btn gold-btn" onclick="forceRefreshGuildQuests()" ${gameState.player.gold < gameState.forceRefreshCost ? 'disabled' : ''}>Refresh Quests (Force) - ${gameState.forceRefreshCost} Gold</button>
        <div style="color:#888;font-size:0.8em;margin-top:5px;">Cost doubles with each use (resets on auto-refresh)</div>
    </div>`;
    
    container.innerHTML = html;
}

// JOB SYSTEM - INSTANT COMPLETION
function increaseMaxJobPoints() {
    if (gameState.soulGems < 1) {
        addBattleMsg('Not enough Soul Gems! Requires 1 Soul Gem.', 'damage');
        return;
    }
    
    gameState.soulGems -= 1;
    gameState.maxJobPoints += 1;
    // Grant extra job point when upgrading
    gameState.jobPoints += 1;
    
    addBattleMsg(`Max Job Points increased! New maximum: ${gameState.maxJobPoints}`, 'reward');
    addChatMessage('SYSTEM', `${gameState.player.name} increased Max Job Points to ${gameState.maxJobPoints}!`, true);
    
    updateStats();
    renderJobs();
}

function startJob(idx) {
    const job = jobDefs[idx];
    if (!job) return;
    if (gameState.player.level < job.levelReq) return;
    if (gameState.jobPoints <= 0) return;
    
    gameState.jobPoints--;
    gameState.jobsCompleted++;
    
    // Instant completion - no waiting
    gameState.player.xp += job.xp;
    gameState.player.gold += job.gold;
    
    checkLevelUp();
    updateStats();
    renderJobs();
    addChatMessage('SYSTEM', `${gameState.player.name} completed ${job.name}!`, true);
}

// CRAFTING
function canCraft(recipe) {
    for (const [mat, qty] of Object.entries(recipe.materials)) {
        const item = gameState.inventory.find(i => i.name === mat && i.qty >= qty);
        if (!item) return false;
    }
    return true;
}

function craftItem(recipeIdx) {
    const recipe = craftingRecipes[recipeIdx];
    if (!recipe || !canCraft(recipe)) return;
    
    // Remove materials
    for (const [mat, qty] of Object.entries(recipe.materials)) {
        const idx = gameState.inventory.findIndex(i => i.name === mat);
        if (idx >= 0) {
            removeFromInventory(idx, qty);
        }
    }
    
    // Add result
    if (Math.random() <= recipe.chance) {
        addToInventory({ ...recipe.result, qty: 1 });
        addBattleMsg(`Crafted: ${recipe.result.name}!`, 'reward');

        if (recipe.result && recipe.result.rarity === 'unique' && Math.random() < (globalThis.UNIQUE_CRAFT_UBER_DROP_CHANCE || 0.10)) {
            const bonusUberUnique = getCraftingUberUniqueDrop(recipe.result);
            if (bonusUberUnique) {
                addToInventory({ ...bonusUberUnique, qty: 1 });
                addBattleMsg(`Lucky bonus drop! You also received Uber Unique: ${bonusUberUnique.name}!`, 'reward');
            }
        }
    } else {
        addBattleMsg('Crafting failed!', 'damage');
    }
    
    renderCrafting();
    updateStats();
}

function getCraftingUberUniqueDrop(baseItem) {
    const uberUniquePool = Object.values(itemPool).filter(item => item && (item.rarity === 'uber_unique' || item.uberUnique === true));
    if (!uberUniquePool.length) return null;

    const targetSlot = baseItem && (baseItem.equipSlot || baseItem.type);
    const slotMatches = targetSlot
        ? uberUniquePool.filter(item => (item.equipSlot || item.type) === targetSlot)
        : [];

    return pick(slotMatches.length ? slotMatches : uberUniquePool);
}

// LOCATIONS RENDER
function renderTravel() {
    const container = document.getElementById('travel-content');
    const p = gameState.player;
    const loc = locations[p.location];
    const combatCooldownRemaining = getCombatCooldownRemainingMs();
    const combatLocked = combatCooldownRemaining > 0;

    const locationEnemyNames = Array.isArray(loc.enemies) && loc.enemies.length > 0
        ? loc.enemies.map(enemyKey => {
            const enemyData = enemies[enemyKey];
            return enemyData?.name || enemyKey.replace(/_/g, ' ');
        })
        : [];

    let html = `<div class="location-header">${loc.name}</div>`;
    html += `<div class="description">${loc.desc}</div>`;

    if (locationEnemyNames.length > 0) {
        html += `<div class="description"><span style="color:#00ffff;">Enemies here:</span> ${locationEnemyNames.join(', ')}</div>`;
    }
    
    if (loc.enemies) {
        html += `<div class="section-title">Actions</div>`;
        html += `<button class="action-btn" onclick="startBattle('${p.location}')" ${combatLocked ? 'disabled' : ''}>${combatLocked ? `Combat Cooldown (${formatPvpCooldown(combatCooldownRemaining)})` : 'Search for Enemies'}</button>`;
        html += `<button class="action-btn ${gameState.wandering.active ? 'danger' : ''}" onclick="toggleWander()" ${combatLocked ? 'disabled' : ''}>${combatLocked ? 'Recovery Active' : (gameState.wandering.active ? 'Stop Wandering' : 'Enable Wandering')}</button>`;
        
        if (loc.levelRange) {
            html += `<div class="encounter-info">Level Range: ${loc.levelRange[0]}-${loc.levelRange[1]}</div>`;
        }
        if (combatLocked) {
            html += `<div class="encounter-info" style="color:#ff8888;">Combat systems recover in ${formatPvpCooldown(combatCooldownRemaining)}.</div>`;
        }
    }
    
    // Show wandering status if active
    if (gameState.wandering.active) {
        html += `<div class="battle-log" style="border-left-color: #00ffff; margin-top: 10px;">
            <p class="info">🔄 Wandering expedition is active... You are exploring the area.</p>
        </div>`;
    }
    
    html += `<div class="section-title">Connected Locations</div>`;
    html += `<div class="location-grid">`;
    
    loc.connections.forEach(connKey => {
        const conn = locations[connKey];
        const isCurrent = connKey === p.location;
        const unlocked = isLocationUnlocked(connKey);
        html += `<div class="location-card ${isCurrent ? 'current' : ''} ${unlocked ? '' : 'locked'}" onclick="${unlocked ? `travelTo('${connKey}')` : `showLockedLocationMessage('${connKey}')`}">
            <div class="location-name">${unlocked ? conn.name : `<span style="color:#ff4444">&#x1F512;</span> ${conn.name}`}</div>
            <div class="location-info">${isCurrent ? 'Current Location' : (unlocked ? conn.desc.substring(0, 50) : `Requires Level ${conn.minLevel}`)}...</div>
        </div>`;
    });
    
    html += `</div>`;
    container.innerHTML = html;
}

function showLockedLocationMessage(locKey) {
    const loc = locations[locKey];
    const requiredLevel = loc.minLevel;
    const currentLevel = gameState.player.level;
    addBattleMsg(`🔒 ${loc.name} is locked! Requires Level ${requiredLevel} (Your Level: ${currentLevel})`, 'damage');
    
    // Show a more prominent alert
    const container = document.getElementById('travel-content');
    const alertDiv = document.createElement('div');
    alertDiv.className = 'battle-log';
    alertDiv.style.borderLeftColor = '#ff4444';
    alertDiv.innerHTML = `<p class="damage">🔒 <strong>${loc.name} is locked!</strong></p>
        <p class="info">Required Level: ${requiredLevel}</p>
        <p class="info">Your Level: ${currentLevel}</p>
        <p class="info">Defeat enemies and complete quests to gain XP and level up!</p>`;
    
    // Remove existing alert if any
    const existing = container.querySelector('.locked-alert');
    if (existing) existing.remove();
    
    alertDiv.classList.add('locked-alert');
    container.insertBefore(alertDiv, container.firstChild);
    
    // Auto-remove after 5 seconds
    setTimeout(() => {
        if (alertDiv.parentNode) alertDiv.remove();
    }, 5000);
}

// WANDERING EXPEDITION SYSTEM
function toggleWander() {
    if (guardCombatCooldown(addBattleMsg, renderTravel)) return;
    // Start a wandering expedition and navigate to the wander screen
    startWanderingExpedition();
}

function startWanderingExpedition() {
    const p = gameState.player;
    
    // Generate random number of events (5-50)
    const totalEvents = rand(5, 50);
    
    // Initialize wandering state
    gameState.wandering = {
        active: true,
        totalEvents: totalEvents,
        currentEvent: 0,
        rewards: { xp: 0, gold: 0, items: [] },
        log: [],
        inBattle: false,
        currentEnemy: null
    };
    
    addWanderingLog('You begin your wandering expedition...', 'info');
    addWanderingLog(`This journey will have ${totalEvents} events.`, 'info');
    
    // Show wandering screen
    showScreen('wandering');
}

function addWanderingLog(msg, type = 'info') {
    gameState.wandering.log.unshift({ msg, type });
    if (gameState.wandering.log.length > 100) gameState.wandering.log.shift();
}

function wanderingContinue() {
    const w = gameState.wandering;
    if (!w.active) return;
    
    // If in battle, don't continue
    if (w.inBattle) return;
    
    // Check if we've completed all events
    if (w.currentEvent >= w.totalEvents) {
        completeWanderingExpedition();
        return;
    }
    
    // Advance to next event
    w.currentEvent++;
    
    // Generate random event
    generateWanderingEvent();
    
    renderWandering();
    updateStats();
}

function generateWanderingEvent() {
    const w = gameState.wandering;
    const p = gameState.player;
    const level = p.level;
    const luck = getTotalLuck();
    
    const eventType = Math.random() * 100;
    
    if (eventType < 30) {
        // 30% chance: Battle encounter
        const loc = locations[p.location];
        if (loc && loc.enemies && loc.enemies.length > 0) {
            const enemy = generateEnemy(p.location);
            if (enemy) {
                w.inBattle = true;
                w.currentEnemy = enemy;
                addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: A ${enemy.name} attacks!`, 'damage');
                return;
            }
        }
        // Fallback to trap if no enemies
        const trapDmg = Math.max(1, Math.floor(level * 1.5) + rand(-2, 2));
        p.hp = Math.max(1, p.hp - trapDmg);
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: You triggered a trap! Took ${trapDmg} damage.`, 'damage');
    } else if (eventType < 45) {
        // 15% chance: Trap encounter (standalone)
        const trapTypes = [
            { name: 'Spike Trap', dmgMult: 1.5, desc: 'Hidden spikes pierce your armor!' },
            { name: 'Pit Trap', dmgMult: 2, desc: 'You fall into a hidden pit!' },
            { name: 'Poison Dart Trap', dmgMult: 1, desc: 'Poisonous darts fly from the walls!' },
            { name: 'Magic Rune Trap', dmgMult: 2.5, desc: 'A magical rune explodes beneath you!' },
            { name: 'Swinging Blade Trap', dmgMult: 1.8, desc: 'A massive blade swings from the ceiling!' }
        ];
        const trap = pick(trapTypes);
        const trapDmg = Math.max(1, Math.floor(level * trap.dmgMult) + rand(-3, 3));
        p.hp = Math.max(1, p.hp - trapDmg);
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: ${trap.desc} (${trap.name}) Took ${trapDmg} damage!`, 'damage');
    } else if (eventType < 55) {
        // 10% chance: Find gold
        const goldFound = rand(Math.floor(level * 2) + 5, Math.floor(level * 5) + 20);
        const luckBonus = Math.floor(luck * 0.5);
        const totalGold = applyWanderingRewardBoost(goldFound + luckBonus);
        w.rewards.gold += totalGold;
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Found ${totalGold} gold!`, 'reward');
    } else if (eventType < 65) {
        // 10% chance: Gain XP
        const xpGained = rand(Math.floor(level * 2) + 10, Math.floor(level * 5) + 30);
        const luckBonus = Math.floor(luck * 0.2);
        const totalXp = applyWanderingRewardBoost(xpGained + luckBonus);
        w.rewards.xp += totalXp;
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Gained ${totalXp} XP from exploration!`, 'reward');
    } else if (eventType < 80) {
        // 15% chance: Find item
        const droppedItem = getWanderItemDrop();
        if (droppedItem) {
            w.rewards.items.push({ ...droppedItem, qty: 1 });
            const rarityColor = getRarityColor(droppedItem.rarity);
            const isUber = isUberUnique(droppedItem);
            const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Found <span style="${itemColorStyle}">${droppedItem.name}</span> (${droppedItem.rarity})!`, 'reward');
        } else {
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Searched but found nothing.`, 'info');
        }
    } else if (eventType < 95) {
        // 15% chance: Nothing or minor heal
        if (Math.random() < 0.5) {
            const healAmt = Math.floor(p.maxHp * 0.1);
            p.hp = Math.min(p.maxHp, p.hp + healAmt);
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Found a healing spring. Restored ${healAmt} HP.`, 'heal');
        } else {
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Uneventful passage.`, 'info');
        }
    } else if (eventType < 99.8) {
        // 4.8% chance: Nothing or minor heal (remainder before merchant)
        if (Math.random() < 0.5) {
            const healAmt = Math.floor(p.maxHp * 0.1);
            p.hp = Math.min(p.maxHp, p.hp + healAmt);
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Found a healing spring. Restored ${healAmt} HP.`, 'heal');
        } else {
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Uneventful passage.`, 'info');
        }
    } else {
        // 0.2% chance: Wandering Merchant (extremely rare!)
        w.merchantActive = true;
        w.merchantItems = generateMerchantItems();
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: A mysterious merchant appears from the shadows!`, 'reward');
        addWanderingLog(`The merchant offers rare and powerful items for sale...`, 'info');
    }
}

function wanderingBattle(action) {
    const w = gameState.wandering;
    if (!w.active || !w.inBattle || !w.currentEnemy) return;
    if (guardCombatCooldown(addWanderingLog, renderWandering)) return;
    activateCombatScrollsForCurrentBattle('wandering');
    
    const p = gameState.player;
    const e = w.currentEnemy;
    const result = runUniversalCombatTurn(action, p, e, addWanderingLog);

    if (result.enemyDied) {
        wanderingEnemyDefeated();
        return;
    }

    if (result.playerDied) {
        wanderingPlayerDeath();
        return;
    }

    if (result.fled) {
        resetCombatScrollSession();
        w.inBattle = false;
        w.currentEnemy = null;
        renderWandering();
        return;
    }
    
    renderWandering();
    updateStats();
}

function wanderingEnemyDefeated() {
    const w = gameState.wandering;
    const e = w.currentEnemy;
    const p = gameState.player;
    
    // Scale XP and Gold to enemy level/tier, not player level
    const scaledXp = applyWanderingRewardBoost(e.xp);
    const scaledGold = applyWanderingRewardBoost(e.gold);
    
    // Add battle rewards to wandering rewards
    w.rewards.xp += scaledXp;
    w.rewards.gold += scaledGold;
    
    addWanderingLog(`Defeated ${e.name}! Gained ${scaledXp} XP and ${scaledGold} gold!`, 'reward');
    
    // Show in chat
    addChatMessage('SYSTEM', `${p.name} defeated ${e.name} while wandering and gained ${scaledXp} XP, ${scaledGold} Gold!`, true);

    // Count wandering kills toward quests too
    checkQuestProgress(e.name.replace(/ /g, '_'));
    
    // Drop system with new rarity rates
    // 35% base chance to drop something
    const dropChance = Math.min(1, (0.35 + getTotalLuck() * 0.01) * (1 + getScrollDropBoost()));
    
    if (Math.random() < dropChance) {
        // 60% chance for material/consumable drop (from enemy's loot table)
        // 40% chance for equipment drop (using new rarity system)
        if (Math.random() < 0.6 && e.drops && e.drops.length > 0) {
            // Material/consumable drop from enemy's loot table
            const dropItem = getMaterialDrop(e.drops);
            if (dropItem) {
                w.rewards.items.push({ ...dropItem, qty: dropItem.qty || 1 });
                addWanderingLog(`Dropped: ${dropItem.name}${(dropItem.qty || 1) > 1 ? ` x${dropItem.qty}` : ''}!`, 'reward');
                addItemLog('wandering', dropItem.name);
                // Show in chat
                addChatMessage('SYSTEM', `${p.name} found while wandering: ${dropItem.name}${(dropItem.qty || 1) > 1 ? ` x${dropItem.qty}` : ''}!`, true);
            }
        } else {
            // Equipment drop using new rarity system
            const targetRarity = getItemDropByRarity();
            const droppedItem = getLeveledItemDrop(targetRarity, e.tier);
            
            if (droppedItem) {
                w.rewards.items.push({ ...droppedItem, qty: 1 });
                const rarityColor = getRarityColor(droppedItem.rarity);
                const isUber = isUberUnique(droppedItem);
                const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
                addWanderingLog(`Dropped: <span style="${itemColorStyle}">${droppedItem.name}</span> (${droppedItem.rarity})!`, 'reward');
                addItemLog('wandering', droppedItem.name);
                // Show in chat
                addChatMessage('SYSTEM', `${p.name} found a ${droppedItem.rarity} item while wandering: ${droppedItem.name}!`, true);
            }
        }
    }
    
    // Random scroll drop (0.5% chance) with Magic Find-adjusted rarity weighting
    if (Math.random() < 0.005) {
        const scrollName = getRandomScrollDropName();
        if (scrollName && scrollPool[scrollName]) {
            w.rewards.items.push({ name: scrollName, type: 'scroll', qty: 1, ...scrollPool[scrollName] });
            addWanderingLog(`Dropped scroll: ${scrollName}!`, 'reward');
            addChatMessage('SYSTEM', `${p.name} found a scroll while wandering: ${scrollName}!`, true);
        }
    }

    resetCombatScrollSession();
    
    w.inBattle = false;
    w.currentEnemy = null;
    
    renderWandering();
    updateStats();
}

function wanderingPlayerDeath() {
    const w = gameState.wandering;
    const p = gameState.player;
    
    addWanderingLog('You have fallen during your expedition!', 'damage');
    addWanderingLog('All rewards have been lost...', 'damage');
    
    // Nullify all rewards on death
    w.rewards = { xp: 0, gold: 0, items: [] };
    
    triggerDefeatRecovery(addWanderingLog);
    
    // End wandering
    w.active = false;
    w.inBattle = false;
    w.currentEnemy = null;
    resetCombatScrollSession();
    
    addChatMessage('SYSTEM', `${p.name} fell during a wandering expedition and lost all rewards!`, true);
    
    updateStats();
    renderWandering();
}

function wanderingEscape() {
    const w = gameState.wandering;
    const p = gameState.player;
    
    if (!w.active) return;
    
    // If in battle, can't escape this way
    if (w.inBattle) {
        addWanderingLog('You must finish or flee from the current battle first!', 'damage');
        renderWandering();
        return;
    }
    
    addWanderingLog('You chose to escape the expedition...', 'info');
    
    // Forfeit half the rewards
    const halfXp = Math.floor(w.rewards.xp / 2);
    const halfGold = Math.floor(w.rewards.gold / 2);
    const halfItems = w.rewards.items.slice(0, Math.floor(w.rewards.items.length / 2));
    
    // Apply halved rewards
    p.xp += halfXp;
    p.gold += halfGold;
    halfItems.forEach(item => addToInventory(item));
    
    addWanderingLog(`Escaped with half rewards: ${halfXp} XP, ${halfGold} Gold, ${halfItems.length} items.`, 'reward');
    
    // End wandering
    w.active = false;
    resetCombatScrollSession();
    
    addChatMessage('SYSTEM', `${p.name} escaped a wandering expedition with partial rewards.`, true);
    
    checkLevelUp();
    updateStats();
    showScreen('travel');
}

function completeWanderingExpedition() {
    const w = gameState.wandering;
    const p = gameState.player;
    
    addWanderingLog('Expedition complete!', 'reward');
    
    // Apply all rewards
    p.xp += w.rewards.xp;
    p.gold += w.rewards.gold;
    w.rewards.items.forEach(item => addToInventory(item));
    
    addWanderingLog(`Final rewards: ${w.rewards.xp} XP, ${w.rewards.gold} Gold, ${w.rewards.items.length} items.`, 'reward');
    
    // End wandering
    w.active = false;
    resetCombatScrollSession();
    
    addChatMessage('SYSTEM', `${p.name} completed a wandering expedition and gained ${w.rewards.xp} XP!`, true);
    
    checkLevelUp();
    updateStats();
    renderWandering();
}
