<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realm of Shadows - Text MUD</title>
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <linearGradient id="rainbow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ff0000" />
                <stop offset="16%" stop-color="#ff7700" />
                <stop offset="33%" stop-color="#ffff00" />
                <stop offset="50%" stop-color="#00ff00" />
                <stop offset="66%" stop-color="#00ffff" />
                <stop offset="83%" stop-color="#0077ff" />
                <stop offset="100%" stop-color="#ff00ff" />
            </linearGradient>
        </defs>
    </svg>
    <style>
        /* SVG definitions for gradients */
        .svg-defs { position: absolute; width: 0; height: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 10px; }
        #game-container { width: 100%; max-width: 950px; background-color: #111; border: 2px solid #00ff00; border-radius: 5px; overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 20px); }
        #header { background: linear-gradient(to right, #003300, #006600, #003300); padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; }
        #header h1 { font-size: 1.8em; text-shadow: 0 0 10px #00ff00; }
        #stats-bar { display: flex; justify-content: space-between; padding: 10px 15px; background-color: #1a1a1a; border-bottom: 1px solid #333; font-size: 0.85em; flex-wrap: wrap; }
        .stat { display: flex; gap: 5px; }
        .stat-label { color: #888; }
        .stat-value { color: #00ff00; }
        .stat-value.hp { color: #ff4444; }
        .stat-value.mp { color: #4444ff; }
        .stat-value.gold { color: #ffd700; }
        .stat-value.xp { color: #ff66ff; }
        .stat-value.soul { color: #ff00ff; }
        #navigation { display: flex; flex-wrap: wrap; background-color: #1a1a1a; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1 0 auto; width: calc(100% / 6); padding: 8px 5px; background: none; border: none; color: #666; font-family: 'Courier New', monospace; font-size: 0.75em; cursor: pointer; transition: all 0.3s; border-right: 1px solid #333; border-bottom: 1px solid #333; white-space: nowrap; text-align: center; }
        .nav-btn:nth-child(6n) { border-right: none; }
        .nav-btn:hover { background-color: #2a2a2a; color: #00ff00; }
        .nav-btn.active { background-color: #003300; color: #00ff00; }
        .nav-btn.alert { animation: alertPulse 1s infinite; background-color: #663300; color: #ffd700; }
        .nav-btn:disabled { background-color: #222; color: #555; cursor: not-allowed; }
        @keyframes alertPulse { 0%,100% { background-color: #663300; } 50% { background-color: #996600; } }
        #status-banner { display: none; background-color: #330000; border-bottom: 1px solid #ff4444; color: #ffaaaa; padding: 8px 12px; font-size: 0.8em; text-align: center; }
        #item-announcement { display: none; background: linear-gradient(135deg, #221100, #442200); border-bottom: 1px solid #ffaa00; color: #ffe0a3; padding: 10px 14px; text-align: center; }
        #item-announcement-title { color: #ffd700; font-size: 0.95em; font-weight: bold; margin-bottom: 4px; }
        #item-announcement-body { font-size: 0.85em; }
        .profile-input { width: 100%; background-color: #111; border: 1px solid #444; color: #00ff00; padding: 8px 10px; font-family: 'Courier New', monospace; margin-top: 6px; }
        .profile-field { margin-bottom: 14px; }
        .profile-label { color: #aaa; font-size: 0.85em; }
        #game-layout { display: flex; gap: 0; flex: 1; min-height: 0; overflow: hidden; }
        #left-panel { width: 200px; background-color: #0d0d0d; border-right: 1px solid #333; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; min-height: 0; }
        #left-panel-content { flex: 1; overflow-y: auto; min-height: 0; }
        #main-content { flex: 1; background-color: #0d0d0d; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; overflow-x: hidden; min-width: 0; }
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; overflow-x: hidden; min-height: 0; }
        .screen.active { display: flex; }
        .screen > div { display: flex; flex-direction: column; min-height: 0; overflow-y: auto; overflow-x: hidden; }
        .screen > div > .screen-content { flex: 1 1 auto; overflow-y: visible; overflow-x: visible; min-height: 0; padding-bottom: 5px; }
        .fixed-buttons { background-color: #0d0d0d; padding: 10px 0; border-top: 1px solid #333; margin-top: 0; flex-shrink: 0; }
        #right-panel { width: 200px; background-color: #0d0d0d; border-left: 1px solid #333; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; min-height: 0; }
        #right-panel-content { flex: 1; overflow-y: auto; min-height: 0; }
        .side-panel-content { padding: 10px; }
        .side-panel-header { color: #00ffff; font-weight: bold; font-size: 0.9em; padding: 8px; background-color: #1a1a1a; border-bottom: 1px solid #333; text-align: center; cursor: pointer; }
        .side-panel-header:hover { background-color: #2a2a2a; }
        .equip-mini { padding: 6px; border-bottom: 1px solid #222; font-size: 0.75em; }
        .equip-mini-name { color: #ff44ff; font-weight: bold; margin-bottom: 2px; }
        .equip-mini-stats { color: #888; }
        .equip-mini-slot { color: #666; font-size: 0.85em; }
        .inv-mini { padding: 6px; border-bottom: 1px solid #222; font-size: 0.75em; display: flex; justify-content: space-between; align-items: center; }
        .inv-mini-info { flex: 1; }
        .inv-mini-name { color: #00ff00; }
        .inv-mini-qty { color: #888; margin-left: 5px; }
        .inv-mini-btn { background-color: #003300; border: 1px solid #00ff00; color: #00ff00; padding: 2px 6px; cursor: pointer; font-size: 0.8em; margin-left: 3px; }
        .inv-mini-btn:hover { background-color: #006600; }
        .inv-mini-btn:disabled { background-color: #333; border-color: #555; color: #555; cursor: not-allowed; }
        .panel-collapsed { display: none; }
        .expand-btn { width: 100%; padding: 5px; background-color: #1a1a1a; border: none; color: #00ff00; cursor: pointer; font-size: 0.75em; }
        .expand-btn:hover { background-color: #2a2a2a; }
        .location-header { color: #00ffff; font-size: 1.2em; margin-bottom: 10px; }
        .description { color: #aaa; line-height: 1.6; margin-bottom: 15px; }
        .action-btn { background-color: #003300; border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; margin: 5px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 0.85em; }
        .action-btn:hover { background-color: #006600; }
        .action-btn:disabled { background-color: #333; border-color: #555; color: #555; cursor: not-allowed; }
        .action-btn.danger { background-color: #330000; border-color: #ff4444; color: #ff4444; }
        .action-btn.danger:hover { background-color: #660000; }
        .action-btn.quest { background-color: #000033; border-color: #4444ff; color: #4444ff; }
        .action-btn.gold-btn { background-color: #333300; border-color: #ffd700; color: #ffd700; }
        .action-btn.equip-btn { background-color: #330033; border-color: #ff44ff; color: #ff44ff; }
        .action-btn.equip-btn:hover { background-color: #660066; }
        .action-btn.soul-btn { background-color: #330033; border-color: #ff00ff; color: #ff00ff; }
        .action-btn.soul-btn:hover { background-color: #660066; }
        .action-btn.scroll-btn { background-color: #003333; border-color: #00ffff; color: #00ffff; }
        .action-btn.scroll-btn:hover { background-color: #006666; }
        .action-btn.premium-btn { background: linear-gradient(135deg, #330033, #660066); border-color: #ff00ff; color: #ff00ff; font-weight: bold; }
        .action-btn.premium-btn:hover { background: linear-gradient(135deg, #660066, #990099); }
        .action-btn.craft-btn { background-color: #332200; border-color: #ffaa00; color: #ffaa00; }
        .action-btn.craft-btn:hover { background-color: #664400; }
        .action-btn.dungeon-btn { background-color: #002233; border-color: #0088ff; color: #0088ff; }
        .action-btn.dungeon-btn:hover { background-color: #004466; }
        .action-btn.boss-btn { background-color: #330000; border-color: #ff6600; color: #ff6600; font-weight: bold; }
        .action-btn.boss-btn:hover { background-color: #660000; }
        .action-btn.temple-btn { background-color: #333300; border-color: #ffff00; color: #ffff00; }
        .action-btn.temple-btn:hover { background-color: #666600; }
        .location-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .location-card { background-color: #1a1a1a; border: 1px solid #333; padding: 12px; cursor: pointer; }
        .location-card:hover { border-color: #00ff00; }
        .location-card.current { border-color: #00ff00; background-color: #001a00; }
        .location-card.locked { opacity: 0.5; cursor: not-allowed; }
        .location-name { color: #00ffff; font-weight: bold; margin-bottom: 5px; }
        .location-info { color: #666; font-size: 0.8em; }
        .battle-log { background-color: #1a1a1a; padding: 10px; margin: 10px 0; border-left: 3px solid #ff4444; max-height: 150px; overflow-y: auto; }
        .battle-log p { margin: 5px 0; line-height: 1.4; }
        .damage { color: #ff4444; }
        .heal { color: #44ff44; }
        .info { color: #4444ff; }
        .reward { color: #ffd700; }
        .quest-item, .job-item { background-color: #1a1a1a; border: 1px solid #4444ff; padding: 12px; margin: 10px 0; }
        .job-item { border-color: #ffd700; }
        .quest-title, .job-title { color: #00ffff; font-weight: bold; margin-bottom: 5px; }
        .job-title { color: #ffd700; }
        .job-info { display: flex; justify-content: space-between; color: #aaa; font-size: 0.85em; margin-bottom: 8px; }
        .msg { color: #888; font-style: italic; margin: 10px 0; }
        .section-title { color: #00ffff; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 15px 0 10px 0; }
        .inv-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; align-items: center; }
        .inv-item button { background-color: #003300; border: 1px solid #00ff00; color: #00ff00; padding: 3px 8px; cursor: pointer; margin-left: 5px; }
        .equip-slot-card { background-color: #1a1a1a; border: 2px solid #ff44ff; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .equip-slot-card.empty { border-color: #555; }
        .equip-slot-title { color: #ff44ff; font-weight: bold; font-size: 1em; margin-bottom: 8px; }
        .equip-slot-stats { color: #00ff00; font-size: 0.9em; margin-bottom: 10px; }
        .item-compare-header { color: #666; font-size: 0.75em; margin: 6px 0 2px 0; }
        .item-stat-comparison { font-size: 0.8em; margin: 2px 0; }
        .item-stat-better { color: #44ff44; }
        .item-stat-worse { color: #ff4444; }
        .item-stat-equal { color: #aaa; }
        .quicksell-panel { background-color: #1a1a1a; border: 1px solid #444; padding: 12px; margin: 10px 0 15px 0; border-radius: 6px; }
        .quicksell-title { color: #ffd700; font-weight: bold; margin-bottom: 6px; }
        .quicksell-description { color: #aaa; font-size: 0.85em; margin-bottom: 10px; }
        .quicksell-options { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .quicksell-option { display: flex; align-items: center; gap: 6px; background-color: #111; border: 1px solid #333; padding: 6px 8px; border-radius: 4px; font-size: 0.85em; cursor: pointer; }
        .quicksell-option.disabled { opacity: 0.55; }
        .quicksell-option input { cursor: pointer; }
        .quicksell-level-filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .quicksell-level-field { display: flex; flex-direction: column; gap: 4px; color: #aaa; font-size: 0.8em; }
        .quicksell-level-field input { width: 100px; background-color: #111; border: 1px solid #444; color: #00ff00; padding: 6px 8px; font-family: 'Courier New', monospace; }
        .quicksell-summary { color: #888; font-size: 0.85em; margin-bottom: 8px; }
        .progress-bar { width: 150px; height: 15px; background-color: #333; overflow: hidden; }
        .progress-fill { height: 100%; background-color: #4444ff; }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #222; font-size: 0.8em; color: #aaa; }
        .log-source { color: #ffd700; }
        .log-item { color: #00ffff; }
        .reward-pool { background-color: #1a1a1a; border: 2px solid #ffd700; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .reward-pool-title { color: #ffd700; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .scroll-slot { background-color: #1a1a1a; border: 2px solid #00ffff; padding: 12px; margin: 8px 0; border-radius: 5px; }
        .scroll-slot.locked { border-color: #555; opacity: 0.6; }
        .scroll-slot-title { color: #00ffff; font-weight: bold; margin-bottom: 5px; }
        .scroll-item { background-color: #0a0a0a; border: 1px solid #00ffff; padding: 8px; margin: 5px 0; }
        .scroll-item.common { border-color: #aaa; }
        .scroll-item.uncommon { border-color: #44ff44; }
        .scroll-item.rare { border-color: #4444ff; }
        .scroll-item.epic { border-color: #ff00ff; }
        .scroll-item.legendary { border-color: #ffd700; }
        .premium-actions { display: flex; gap: 10px; margin: 10px 0; }
        .premium-action { flex: 1; text-align: center; }
        .premium-action-title { color: #ff00ff; font-weight: bold; margin-bottom: 5px; }
        .premium-action-cost { color: #ffd700; font-size: 0.8em; }
        #chat-container { background-color: #1a1a1a; border-top: 1px solid #333; padding: 10px; max-height: 150px; overflow-y: auto; }
        .chat-message { padding: 5px; margin: 3px 0; border-left: 2px solid #555; padding-left: 8px; }
        .chat-player { color: #00ff00; font-weight: bold; }
        .chat-fake { color: #ff8800; }
        .chat-system { color: #ffff00; font-style: italic; }
        .chat-time { color: #555; font-size: 0.75em; margin-right: 5px; }
        .player-card { background-color: #1a1a1a; border: 1px solid #00ff00; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .player-card.hostile { border-color: #ff4444; }
        .player-name { font-weight: bold; }
        .player-level { color: #888; font-size: 0.85em; }
        .auction-item { background-color: #1a1a1a; border: 2px solid #ffd700; padding: 12px; margin: 10px 0; }
        .auction-timer { color: #ff4444; font-weight: bold; }
        .auction-bidders { color: #888; font-size: 0.85em; margin-top: 5px; }
        .dungeon-info { background-color: #002233; border: 2px solid #0088ff; padding: 15px; margin: 10px 0; }
        .dungeon-stage { color: #0088ff; font-size: 1.3em; font-weight: bold; }
        .dungeon-rewards { color: #ffd700; }
        .boss-alert { background-color: #330000; border: 3px solid #ff6600; padding: 15px; margin: 10px 0; animation: bossPulse 2s infinite; }
        @keyframes bossPulse { 0%,100% { box-shadow: 0 0 5px #ff6600; } 50% { box-shadow: 0 0 20px #ff6600; } }
        .boss-name { color: #ff6600; font-size: 1.4em; font-weight: bold; }
        .boss-hp-bar { width: 100%; height: 20px; background-color: #333; margin: 10px 0; }
        .boss-hp-fill { height: 100%; background: linear-gradient(to right, #ff0000, #ff6600); }
        .craft-recipe { background-color: #1a1a1a; border: 1px solid #ffaa00; padding: 12px; margin: 8px 0; }
        .craft-materials { color: #aaa; margin: 5px 0; }
        .craft-result { color: #00ff00; font-weight: bold; }
        .encounter-info { color: #888; font-size: 0.8em; margin: 5px 0; }
        .wandering-screen-shell { position: relative; min-height: 100%; }
        .wandering-battle-dimmed { filter: brightness(0.55); pointer-events: none; user-select: none; }
        .wandering-battle-overlay { position: absolute; inset: 0; z-index: 25; display: flex; align-items: flex-start; justify-content: center; padding: 16px; background: rgba(5, 8, 12, 0.82); backdrop-filter: blur(2px); }
        .wandering-battle-card { width: min(100%, 720px); background: #111; border: 2px solid #ff4444; border-radius: 8px; box-shadow: 0 0 24px rgba(255, 68, 68, 0.28); padding: 16px; }
        .wandering-battle-card .section-title:first-child { margin-top: 0; }
        .wandering-battle-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .wandering-battle-card .battle-log { max-height: 200px; }
        
        @media (max-width: 900px) {
            #left-panel, #right-panel { width: 150px; }
            .nav-btn { font-size: 0.65em; padding: 6px 3px; }
            #header h1 { font-size: 1.4em; }
            #stats-bar { font-size: 0.75em; padding: 8px 10px; }
        }
        @media (max-width: 700px) {
            #left-panel, #right-panel { display: none; }
            .nav-btn { font-size: 0.6em; width: calc(100% / 4); }
            #main-content { padding: 10px; }
        }
        @media (max-width: 500px) {
            .nav-btn { font-size: 0.55em; width: calc(100% / 3); }
            #header h1 { font-size: 1.1em; }
            #stats-bar { font-size: 0.65em; }
            .location-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="header"><h1>[S] Realm of Shadows [S]</h1></div>
    <div id="stats-bar">
        <div class="stat"><span class="stat-label">HP:</span><span class="stat-value hp" id="stat-hp">100/100</span></div>
        <div class="stat"><span class="stat-label">MP:</span><span class="stat-value mp" id="stat-mp">50/50</span></div>
        <div class="stat"><span class="stat-label">ATK:</span><span class="stat-value" id="stat-atk">10</span></div>
        <div class="stat"><span class="stat-label">DEF:</span><span class="stat-value" id="stat-def">5</span></div>
        <div class="stat"><span class="stat-label">CRIT:</span><span class="stat-value" id="stat-crit" style="color:#ff00ff">0%</span></div>
        <div class="stat"><span class="stat-label">LVL:</span><span class="stat-value" id="stat-lvl">1</span></div>
        <div class="stat"><span class="stat-label">XP:</span><span class="stat-value xp" id="stat-xp">0/100</span></div>
        <div class="stat"><span class="stat-label">GOLD:</span><span class="stat-value gold" id="stat-gold">50</span></div>
        <div class="stat"><span class="stat-label">SOUL GEMS:</span><span class="stat-value soul" id="stat-soul">0</span></div>
    </div>
    <div id="navigation">
        <button class="nav-btn active" onclick="attemptShowScreen('travel')">Map Travel</button>
        <button class="nav-btn" onclick="attemptShowScreen('battle')">[/] Battle</button>
        <button class="nav-btn" onclick="attemptShowScreen('quest')">~ Quest</button>
        <button class="nav-btn" onclick="attemptShowScreen('job')">$ Job</button>
<button class="nav-btn" onclick="attemptShowScreen('wandering')" id="wander-tab">[?] Wander</button>
        <button class="nav-btn" onclick="attemptShowScreen('inventory')">[] Inventory</button>
        <button class="nav-btn" onclick="attemptShowScreen('equipment')">[=] Equipment</button>
        <button class="nav-btn" onclick="attemptShowScreen('scrolls')">[*] Scrolls</button>
        <button class="nav-btn" onclick="attemptShowScreen('crafting')">[+] Crafting</button>
        <button class="nav-btn" onclick="attemptShowScreen('auction')" id="auction-tab">[$] Auction</button>
        <button class="nav-btn" onclick="attemptShowScreen('players')">[@] Players</button>
        <button class="nav-btn" onclick="attemptShowScreen('merge')">[#] Merge</button>
        <button class="nav-btn" onclick="attemptShowScreen('save')">{*} Save</button>
    </div>
    <div id="status-banner"></div>
    <div id="item-announcement">
        <div id="item-announcement-title"></div>
        <div id="item-announcement-body"></div>
    </div>
    <div id="game-layout">
        <div id="left-panel">
            <div class="side-panel-header" onclick="attemptShowScreen('equipment')">[=] Equipment</div>
            <div id="left-panel-content" class="side-panel-content"></div>
        </div>
        <div id="main-content">
            <div id="travel-screen" class="screen active"><div id="travel-content"></div></div>
            <div id="battle-screen" class="screen"><div id="battle-content"></div></div>
            <div id="dungeon-screen" class="screen"><div id="dungeon-content"></div></div>
            <div id="quest-screen" class="screen"><div id="quest-content"></div></div>
            <div id="job-screen" class="screen"><div id="job-content"></div></div>
            <div id="inventory-screen" class="screen"><div id="inventory-screen-content"></div></div>
            <div id="equipment-screen" class="screen"><div id="equipment-screen-content"></div></div>
            <div id="scrolls-screen" class="screen"><div id="scrolls-screen-content"></div></div>
            <div id="crafting-screen" class="screen"><div id="crafting-screen-content"></div></div>
            <div id="auction-screen" class="screen"><div id="auction-screen-content"></div></div>
            <div id="players-screen" class="screen"><div id="players-screen-content"></div></div>
            <div id="save-screen" class="screen"><div id="save-screen-content"></div></div>
            <div id="merge-screen" class="screen"><div id="merge-screen-content"></div></div>
            <div id="wandering-screen" class="screen"><div id="wandering-content"></div></div>
        </div>
        <div id="right-panel">
            <div class="side-panel-header" onclick="attemptShowScreen('inventory')">[] Inventory</div>
            <div id="right-panel-content" class="side-panel-content"></div>
        </div>
    </div>
    <div id="chat-container"></div>
</div>
<script src="items.js"></script>
<script src="uberUniqueItems.js"></script>
<script src="normalUniqueItems.js"></script>
<script src="level55UberUniques.js"></script>
<script src="enemies.js"></script>
<script src="uberUniqueMergeSystem.js"></script>
<script>

// GAME STATE
const gameState = {

function getPvpCooldownRemainingMs() {
    return Math.max(0, (gameState.pvpCooldownUntil || 0) - Date.now());
}

function getTradeCooldownRemainingMs() {
    return Math.max(0, (gameState.tradeCooldownUntil || 0) - Date.now());
}

function getCombatCooldownRemainingMs() {
    return Math.max(0, (gameState.combatCooldownUntil || 0) - Date.now());
}

function getNavigationCooldownRemainingMs() {
    return Math.max(0, (gameState.navigationCooldownUntil || 0) - Date.now());
}

function formatPvpCooldown(ms) {
    const totalSeconds = Math.ceil(ms / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${minutes}m ${String(seconds).padStart(2, '0')}s`;
}

function getDefeatStatusMessage() {
    const combatRemaining = getCombatCooldownRemainingMs();
    const navigationRemaining = getNavigationCooldownRemainingMs();
    if (combatRemaining <= 0 && navigationRemaining <= 0) return '';

    const details = [];
    if (combatRemaining > 0) details.push(`Combat cooldown: ${formatPvpCooldown(combatRemaining)}`);
    if (navigationRemaining > 0) details.push(`Navigation cooldown: ${formatPvpCooldown(navigationRemaining)}`);
    return `You have been defeated. Reviving... ${details.join(' | ')}`;
}

function updateStatusBanner() {
    const banner = document.getElementById('status-banner');
    if (!banner) return;

    const message = getDefeatStatusMessage();
    banner.textContent = message;
    banner.style.display = message ? 'block' : 'none';
}

function updateNavigationCooldownState() {
    const remaining = getNavigationCooldownRemainingMs();
    const isActive = remaining > 0;
    document.querySelectorAll('#navigation .nav-btn').forEach(btn => {
        btn.disabled = isActive;
        btn.title = isActive ? `Navigation tabs are on cooldown for ${formatPvpCooldown(remaining)}.` : '';
    });
}

function refreshCooldownUi() {
    const combatSeconds = Math.ceil(getCombatCooldownRemainingMs() / 1000);
    const navigationSeconds = Math.ceil(getNavigationCooldownRemainingMs() / 1000);
    const signature = `${combatSeconds}:${navigationSeconds}`;
    if (signature === lastCooldownUiSignature) return;
    lastCooldownUiSignature = signature;

    updateNavigationCooldownState();
    updateStatusBanner();

    const activeScreen = document.querySelector('.screen.active');
    if (!activeScreen) return;

    switch (activeScreen.id) {
        case 'travel-screen': renderTravel(); break;
        case 'battle-screen': renderBattle(); break;
        case 'players-screen': renderPlayers(); break;
        case 'wandering-screen': renderWandering(); break;
    }
}

function attemptShowScreen(screenName) {
    const combatContext = getCurrentCombatContext();
    const targetScreen = combatContext === 'wandering' && screenName === 'battle'
        ? 'wandering'
        : screenName;
    const canBypassCooldown =
        (combatContext === 'battle' && targetScreen === 'battle') ||
        (combatContext === 'dungeon' && targetScreen === 'battle') ||
        (combatContext === 'worldboss' && targetScreen === 'battle') ||
        (combatContext === 'wandering' && targetScreen === 'wandering');

    const remaining = getNavigationCooldownRemainingMs();
    if (remaining > 0 && !canBypassCooldown) {
        addBattleMsg(`Navigation tabs are on cooldown for ${formatPvpCooldown(remaining)}.`, 'damage');
        refreshCooldownUi();
        return;
    }
    showScreen(targetScreen);
}

function guardCombatCooldown(logCallback = addBattleMsg, rerenderCallback = null) {
    const remaining = getCombatCooldownRemainingMs();
    if (remaining <= 0) return false;
    logCallback(`Combat systems are on cooldown for ${formatPvpCooldown(remaining)}.`, 'damage');
    if (typeof rerenderCallback === 'function') rerenderCallback();
    refreshCooldownUi();
    return true;
}

function triggerDefeatRecovery(logCallback = addBattleMsg) {
    const now = Date.now();
    gameState.player.hp = Math.max(1, Math.floor(getTotalMaxHp() * 0.5));
    gameState.combatCooldownUntil = Math.max(gameState.combatCooldownUntil || 0, now + DEFEAT_COMBAT_COOLDOWN_MS);
    gameState.navigationCooldownUntil = Math.max(gameState.navigationCooldownUntil || 0, now + DEFEAT_NAVIGATION_COOLDOWN_MS);
    logCallback('You have been defeated. Reviving...', 'damage');
    addChatMessage('SYSTEM', 'You have been defeated. Reviving...', true);
    scheduleSilentPersist();
    refreshCooldownUi();
}

function normalizeQuestProgressById(quests, progressMap) {
    const normalized = {};
    (quests || []).forEach((quest, idx) => {
        if (!quest) return;
        const progressKey = quest.id || idx;
        const progress = (progressMap && (progressMap[progressKey] ?? progressMap[idx])) || 0;
        if (progress > 0) normalized[progressKey] = progress;
    });
    return normalized;
}

// QUESTS
function roundQuestReward(value, step = 25) {
    return Math.max(step, Math.round(value / step) * step);
}

function getEnemyQuestData(enemyKey) {
    const enemy = enemies[enemyKey];
    return {
        tier: enemy?.tier ?? 0,
        xp: enemy?.xp ?? 15,
        gold: enemy?.gold ?? 5
    };
}

function createFixedQuestReward(target, count, bonusMultiplier = 1) {
    const enemyData = getEnemyQuestData(target);
    const tierScale = Math.pow(enemyData.tier + 1, 1.3);
    const xpReward = enemyData.xp * count * tierScale * (1.6 + enemyData.tier * 0.35) * bonusMultiplier;
    const goldReward = enemyData.gold * count * tierScale * (1.8 + enemyData.tier * 0.25) * bonusMultiplier;

    return {
        xp: roundQuestReward(xpReward, 25),
        gold: roundQuestReward(goldReward, 25)
    };
}

function createGuildQuestReward(template, rarity, count, playerLevel) {
    const rarityScale = {
        common: 1.25,
        uncommon: 1.8,
        rare: 2.8,
        epic: 4.5,
        legendary: 8
    };

    const enemyData = getEnemyQuestData(template.target);
    const levelScale = 1 + Math.floor(playerLevel / 10) * 0.35;
    const tierScale = Math.pow(enemyData.tier + 1, 1.15);
    const countScale = 1 + Math.max(0, count - template.baseCount) * 0.12;
    const rewardScale = (rarityScale[rarity] || 1.25) * levelScale * tierScale * countScale;

    return {
        xp: roundQuestReward(template.baseXP * rewardScale, 25),
        gold: roundQuestReward(template.baseGold * rewardScale, 25),
        soulGem: template.soulGem || false
    };
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randFloat(min, max) { return Math.random() * (max - min) + min; }
function sanitizeProfileText(value, fallback = '', maxLength = 24) {
    const cleaned = String(value ?? '')
        .replace(/[\r\n\t]+/g, ' ')
        .replace(/[<>]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, maxLength);
    return cleaned || fallback;
}
function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// Equip helpers - resolve equip slot from item.equipSlot or item.type
const EQUIP_TYPES = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];

function resolveEquipSlot(item) {
    if (!item) return null;
    if (item.equipSlot) return item.equipSlot;
    if (item.type) {
        const t = (typeof item.type === 'string') ? item.type.trim().toLowerCase() : item.type;
        if (t === 'charm') return 'amulet';
        if (EQUIP_TYPES.includes(t)) return t;
    }
    return null;
}

function isEquipable(item) {
    return !!resolveEquipSlot(item);
}

function fakePlayerHash(text) {
    let hash = 2166136261;
    for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
    }
    return hash >>> 0;
}

function nextFakeSeed(seed) {
    return (Math.imul(seed, 1664525) + 1013904223) >>> 0;
}

function seededRange(seed, min, max) {
    const next = nextFakeSeed(seed);
    return {
        seed: next,
        value: min + (next % (max - min + 1))
    };
}

function seededPick(seed, arr) {
    if (!arr || arr.length === 0) return { seed, value: null };
    const roll = seededRange(seed, 0, arr.length - 1);
    return { seed: roll.seed, value: arr[roll.value] };
}

function getFakePlayerRegion(level) {
    if (level >= 45) return locations.dragon_lair.name;
    if (level >= 28) return locations.swamp.name;
    if (level >= 16) return locations.dark_forest.name;
    if (level >= 8) return locations.mountains.name;
    return locations.forest.name;
}

function getFakeEquipmentPercent(item, stat) {
    if (!item) return 0;
    const directPercent = item[`${stat}%`] || item[`${stat}Percent`] || 0;
    if (directPercent) return directPercent;
    if (stat === 'maxHp') return item.hpPercent || item['hp%'] || 0;
    if (stat === 'maxMp') return item.mpPercent || item['mp%'] || 0;
    return 0;
}

function scoreFakePlayerItem(item, level, slot, archetype) {
    const levelReq = item.levelReq || 1;
    const rarityScore = FAKE_PLAYER_RARITY_SCORE[item.rarity] || 0;
    const statValue =
        (item.atk || 0) * 3 +
        (item.def || 0) * 2.6 +
        ((item.maxHp || item.hp || 0) / 12) +
        (item.crit || 0) * 1.8 +
        (item.dodge || 0) * 1.6 +
        (item.luck || 0) * 0.8 +
        (item.dmgReduction || 0) * 4 +
        getFakeEquipmentPercent(item, 'atk') * 1.8 +
        getFakeEquipmentPercent(item, 'def') * 1.5;
    const closeness = 120 - Math.abs(level - levelReq) * 5;
    const preference = archetype.preferredSlots.includes(slot) ? 20 : 0;
    return closeness + (rarityScore * 14) + statValue + preference;
}

function buildFakePlayerEquipment(level, archetype, seed) {
    const equipment = {};
    let workingSeed = seed;

    FAKE_PLAYER_SLOT_ORDER.forEach(slot => {
        const candidates = Object.values(itemPool)
            .filter(item => {
                if (resolveEquipSlot(item) !== slot) return false;
                if ((item.levelReq || 1) > level) return false;
                if (item.rarity === 'uber_unique' && level < 55) return false;
                return true;
            })
            .sort((a, b) => scoreFakePlayerItem(b, level, slot, archetype) - scoreFakePlayerItem(a, level, slot, archetype));

        if (candidates.length === 0) return;

        const shortlist = candidates.slice(0, Math.min(4, candidates.length));
        const picked = seededPick(workingSeed, shortlist);
        workingSeed = picked.seed;
        equipment[slot] = cloneData(picked.value);
    });

    return { equipment, seed: workingSeed };
}

function calculateFakePlayerStats(level, equipment, archetype) {
    const gear = Object.values(equipment || {}).filter(Boolean);
    let maxHp = Math.floor(100 * Math.pow(1.10, level - 1));
    let maxMp = Math.floor(50 * Math.pow(1.10, level - 1));
    let atk = 10 + ((level - 1) * 3);
    let def = 5 + ((level - 1) * 3);
    let crit = Math.floor(level / 12);

    gear.forEach(item => {
        atk += item.atk || 0;
        def += item.def || 0;
        maxHp += item.maxHp || item.hp || 0;
        maxMp += item.maxMp || item.mp || 0;
        crit += item.crit || 0;
    });

    let atkMultiplier = 1;
    let defMultiplier = 1;
    let hpMultiplier = 1;
    let mpMultiplier = 1;

    gear.forEach(item => {
        atkMultiplier += getFakeEquipmentPercent(item, 'atk') / 100;
        defMultiplier += getFakeEquipmentPercent(item, 'def') / 100;
        hpMultiplier += getFakeEquipmentPercent(item, 'maxHp') / 100;
        mpMultiplier += getFakeEquipmentPercent(item, 'maxMp') / 100;
    });

    atk = Math.floor(atk * atkMultiplier * archetype.bias.atk);
    def = Math.floor(def * defMultiplier * archetype.bias.def);
    maxHp = Math.floor(maxHp * hpMultiplier * archetype.bias.maxHp);
    maxMp = Math.floor(maxMp * mpMultiplier);
    crit = clamp(crit + (archetype.critBonus || 0), 0, 75);

    return { hp: maxHp, maxHp, mp: maxMp, maxMp, atk, def, crit };
}

function summarizeFakePlayerEquipment(equipment) {
    const highlights = [
        equipment.weapon?.name,
        equipment.armor?.name,
        equipment.ring?.name || equipment.amulet?.name

    return highlights.join(' • ');
}

function buildFakePlayerRoster(count = 80) {
    const targetCount = Math.max(1, Number(count) || 80);
    return Array.from({ length: targetCount }, (_, idx) => {
        const name = getExpandedFakePlayerName(idx);
        let seed = fakePlayerHash(`${name}:${idx}`);
        const levelFloor = Math.max(1, Math.floor((idx / targetCount) * 60) + 1);
        const levelRoll = seededRange(seed, levelFloor, Math.min(60, levelFloor + 7));
        seed = levelRoll.seed;

        const archetypeRoll = seededPick(seed, FAKE_PLAYER_ARCHETYPES);
        seed = archetypeRoll.seed;
        const archetype = archetypeRoll.value || FAKE_PLAYER_ARCHETYPES[0];

        const equipped = buildFakePlayerEquipment(levelRoll.value, archetype, seed);
        const stats = calculateFakePlayerStats(levelRoll.value, equipped.equipment, archetype);
        const goldReward = Math.max(25, Math.floor(levelRoll.value * 22 + ((stats.atk + stats.def) * 0.2)));

        return {
            name,
            title: archetype.title,
            region: getFakePlayerRegion(levelRoll.value),
            level: levelRoll.value,
            ...stats,
            gold: goldReward,
            xp: Math.max(120, Math.floor(levelRoll.value * 95)),
            tier: Math.max(1, Math.ceil(levelRoll.value / 10)),
            equipment: equipped.equipment,
            gearSummary: summarizeFakePlayerEquipment(equipped.equipment)
        };
    });
}

function ensureFakePlayerRoster(minCount = 80) {
    const targetCount = Math.max(80, Number(minCount) || 80);
    if (!Array.isArray(pvpEnemies) || pvpEnemies.length < targetCount) {

function getPlayerTradeRewardItem(targetRarity) {
    const maxLevel = Math.max(6, (gameState.player.level || 1) + 5);
    const allItems = Object.values(itemPool || {});
    const baseFilter = item =>
        item &&
        item.rarity === targetRarity &&
        item.equipSlot &&
        item.type !== 'material' &&
        item.type !== 'currency' &&
        item.type !== 'consumable';

    let matches = allItems.filter(item => baseFilter(item) && (!item.levelReq || item.levelReq <= maxLevel));
    if (matches.length === 0) {
        matches = allItems.filter(baseFilter);
    }

    return matches.length > 0 ? { ...pick(matches) } : null;
}

function tradeWithPlayer(idx) {
    const trader = ensureFakePlayerRoster()[idx];
    const remainingCooldown = getTradeCooldownRemainingMs();
    if (remainingCooldown > 0) {
        addChatMessage('SYSTEM', `Trade is on cooldown for ${formatPvpCooldown(remainingCooldown)}.`, true);
        if (document.getElementById('players-screen').classList.contains('active')) renderPlayers();
        return;
    }

    const tradableIndices = getTradableInventoryEquipmentIndices();
    if (tradableIndices.length === 0) {
        addChatMessage('SYSTEM', 'You need at least one unequipped equipment item in your inventory to trade.', true);
        return;
    }

    const rewardRarity = getPlayerTradeRewardRarity();
    const rewardItem = getPlayerTradeRewardItem(rewardRarity);
    if (!rewardItem) {
        addChatMessage('SYSTEM', 'No valid trade rewards are available right now. Try again later.', true);
        return;
    }

    const removedIndex = pick(tradableIndices);
    const removedItem = gameState.inventory[removedIndex];
    if (!removedItem) return;

    removeFromInventory(removedIndex);
    addToInventory({ ...rewardItem, qty: 1 }, { announcementContext: 'trade' });
    addItemLog('trade', rewardItem.name);
    gameState.tradeCooldownUntil = Date.now() + TRADE_COOLDOWN_MS;

    const traderName = trader ? trader.name : 'Traveler';
    addChatMessage(traderName, `Pleasure doing business with you.`, false, true);
    addChatMessage('SYSTEM', `You traded away ${removedItem.name} and received ${rewardItem.name} (${rewardItem.rarity}).`, true);

    updateStats();
    updateSidePanels();
    if (document.getElementById('players-screen').classList.contains('active')) renderPlayers();
    if (document.getElementById('inventory-screen').classList.contains('active')) renderInventory();
    scheduleSilentPersist();
}

    function getTotalStat(stat) {
        const p = gameState.player;
        let base = p[stat] || 0;
        let flatBonus = 0;
        let percentMultiplier = 1;
        
        const eqSlots = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];
        eqSlots.forEach(slot => {
            const eq = gameState.equipment[slot];
            if (eq) {
                // Add flat stat bonus
                if (eq[stat]) {
                    flatBonus += eq[stat];
                }
                // Special case: items use 'hp' property for max HP bonuses
                if (stat === 'maxHp' && eq.hp) {
                    flatBonus += eq.hp;
                }
                // Add percentage multiplier (supports atk%, def%, etc.)
                const percentStat = stat + '%';
                if (eq[percentStat]) {
                    percentMultiplier += (eq[percentStat] / 100);
                }
                // Special case for HP percentage bonuses (also look for 'hp%' and 'hpPercent')
                if (stat === 'maxHp') {
                    if (eq['hp%']) {
                        percentMultiplier += (eq['hp%'] / 100);
                    }
                    if (eq['hpPercent']) {
                        percentMultiplier += (eq['hpPercent'] / 100);
                    }
                }
            }
        });
        
        // Apply percentage scaling to total base + flat bonuses
        return Math.floor((base + flatBonus) * percentMultiplier);
    }

function getScrollEffectsByType(type) {
    return (gameState.activeScrollEffects || []).filter(effect => effect && effect.effect === type && effect.remainingTurns > 0);
}

function getScrollDefenseMultiplier() {
    let multiplier = 1;
    getScrollEffectsByType('defense_boost').forEach(effect => {
        multiplier *= effect.value;
    });
    getScrollEffectsByType('berserker').forEach(() => {
        multiplier *= 0.7;
    });
    return Math.max(0.1, multiplier);
}

function getScrollDodgeBonusPercent() {
    return getScrollEffectsByType('dodge_boost').reduce((bonus, effect) => bonus + ((effect.value || 0) * 100), 0);
}

function getScrollEnemyDamageMultiplier() {
    let multiplier = 1;
    getScrollEffectsByType('slow').forEach(effect => {
        multiplier *= Math.max(0, 1 - (effect.value || 0));
    });
    return Math.max(0, multiplier);
}

function getScrollLifestealPercent() {
    return getScrollEffectsByType('lifesteal').reduce((bonus, effect) => bonus + ((effect.value || 0) * 100), 0);
}

function getScrollThornsDamage() {
    return getScrollEffectsByType('thorns').reduce((total, effect) => total + (effect.value || 0), 0);
}

function getScrollDropBoost() {
    return getScrollEffectsByType('drop_boost').reduce((bonus, effect) => bonus + (effect.value || 0), 0);
}

function isEnemyFrozenByScroll() {
    return getScrollEffectsByType('freeze').length > 0;
}

function getEffectivePlayerDefense() {
    return Math.max(0, Math.floor(getTotalDef() * getScrollDefenseMultiplier()));
}

function getEffectivePlayerDodgeChance() {
    const dodgePercent = (gameState.player.dodge || 0) + getScrollDodgeBonusPercent();
    return Math.min(95, dodgePercent) / 100;
}

function getTotalArmorPen() {
    return Math.max(0, getTotalStat('armorPen') || 0);
}

function getTotalAttackSpeed() {
    return Math.max(0, getTotalStat('attackSpeed') || 0);
}

function getTotalMoveSpeed() {
    return Math.max(0, getTotalStat('moveSpeed') || 0);
}

function getTotalHealthRegen() {
    return Math.max(0, getTotalStat('healthRegen') || 0);
}

function getTotalMagicFind() {
    return Math.max(0, getTotalStat('magicFind') || 0);
}

function getEffectiveEnemyDefense(enemyObj, defenseMultiplier = 1) {
    const armorPenPercent = Math.min(100, getTotalArmorPen()) / 100;
    const baseDefense = Math.max(0, Math.floor((enemyObj?.def || 0) * defenseMultiplier));
    return Math.max(0, Math.floor(baseDefense * (1 - armorPenPercent)));
}

function getAttackSpeedHitCount() {
    const attackSpeed = getTotalAttackSpeed();
    const guaranteedExtraHits = Math.floor(attackSpeed / 100);
    const bonusHitChance = attackSpeed % 100;
    let totalHits = 1 + guaranteedExtraHits;

    if (Math.random() * 100 < bonusHitChance) {
        totalHits++;
    }

    return Math.max(1, totalHits);
}

function getTotalAttackInstances(baseHits = 1) {
    let totalHits = 0;
    const safeBaseHits = Math.max(1, Math.floor(baseHits || 1));
    for (let i = 0; i < safeBaseHits; i++) {
        totalHits += getAttackSpeedHitCount();
    }
    return Math.max(1, totalHits);
}

function applyCombatHealthRegen(playerObj, logCallback = addBattleMsg) {
    if (!playerObj) return 0;

    if (!Number.isFinite(combatScrollState.turnCounter)) {
        combatScrollState.turnCounter = 0;
    }

    combatScrollState.turnCounter++;
    if (combatScrollState.turnCounter % 5 !== 0) return 0;

    const regenPercent = getTotalHealthRegen();
    if (regenPercent <= 0) return 0;

    const maxHp = getTotalMaxHp();
    const healAmt = Math.min(maxHp - playerObj.hp, Math.floor(maxHp * regenPercent / 100));
    if (healAmt > 0) {
        playerObj.hp += healAmt;
        logCallback(`💚 Health Regen restores ${healAmt} HP! (${regenPercent}% Max HP)`, 'heal');
    }

    return healAmt;
}

function getWanderingRewardMultiplier() {
    return 1 + (getTotalMoveSpeed() / 100);
}

function applyWanderingRewardBoost(amount) {
    return Math.max(0, Math.floor((amount || 0) * getWanderingRewardMultiplier()));
}

function getAdjustedRarityWeights(baseWeights = {}) {
    const adjustedWeights = { ...baseWeights };
    const luck = Math.max(0, getTotalLuck());
    const magicFind = Math.max(0, getTotalMagicFind());
    const luckBoost = Math.min(luck * 0.01, 0.5);

    if (adjustedWeights.common !== undefined) {
        adjustedWeights.common *= Math.max(0.05, 1 - magicFind / 120);
    }
    if (adjustedWeights.uncommon !== undefined) {
        adjustedWeights.uncommon *= Math.max(0.10, 1 - magicFind / 150);
    }
    if (adjustedWeights.rare !== undefined) {
        adjustedWeights.rare *= 1 + (magicFind / 140) + (luckBoost * 0.5);
    }
    if (adjustedWeights.epic !== undefined) {
        adjustedWeights.epic *= 1 + (magicFind / 110) + (luckBoost * 0.7);
    }
    if (adjustedWeights.legendary !== undefined) {
        adjustedWeights.legendary *= 1 + (magicFind / 90) + luckBoost;
    }
    if (adjustedWeights.unique !== undefined) {
        adjustedWeights.unique *= 1 + (magicFind / 80) + (luckBoost * 1.1);
    }
    if (adjustedWeights.uber_unique !== undefined) {
        adjustedWeights.uber_unique *= 1 + (magicFind / 70) + (luckBoost * 1.2);
    }

    return adjustedWeights;
}

function rollRarityFromWeights(weights = {}) {
    const entries = Object.entries(weights).filter(([, weight]) => Number.isFinite(weight) && weight > 0);
    if (entries.length === 0) return null;

    const totalWeight = entries.reduce((sum, [, weight]) => sum + weight, 0);
    let roll = Math.random() * totalWeight;

    for (const [rarity, weight] of entries) {
        roll -= weight;
        if (roll <= 0) return rarity;
    }

    return entries[entries.length - 1][0];
}

function getModifiedItemRarity(baseWeights = {}) {
    return rollRarityFromWeights(getAdjustedRarityWeights(baseWeights));
}

function getRandomScrollDropName() {
    const availableScrollEntries = Object.entries(scrollPool || {});
    if (availableScrollEntries.length === 0) return null;

    const targetRarity = getModifiedItemRarity({
        common: 50,
        uncommon: 30,
        rare: 15,
        epic: 4,
        legendary: 1
    }) || 'common';

    const rarityOrder = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
    const getScrollNamesForRarity = (rarity) => availableScrollEntries
        .filter(([, scroll]) => (scroll?.rarity || 'common') === rarity)
        .map(([name]) => name);

    let matchingScrolls = getScrollNamesForRarity(targetRarity);

    if (matchingScrolls.length === 0) {
        const targetIndex = Math.max(0, rarityOrder.indexOf(targetRarity));
        for (let distance = 1; distance < rarityOrder.length && matchingScrolls.length === 0; distance++) {
            const higherRarity = rarityOrder[targetIndex + distance];
            const lowerRarity = rarityOrder[targetIndex - distance];

            if (higherRarity) {
                matchingScrolls = getScrollNamesForRarity(higherRarity);
            }
            if (matchingScrolls.length === 0 && lowerRarity) {
                matchingScrolls = getScrollNamesForRarity(lowerRarity);
            }
        }
    }

    if (matchingScrolls.length === 0) {
        matchingScrolls = availableScrollEntries.map(([name]) => name);
    }

    return matchingScrolls.length > 0 ? pick(matchingScrolls) : null;
}

function calculateDamageBasedHealing(damageDealt) {
    let healAmt = 0;

    if (hasEquippedSpecialAbility('full_lifesteal')) {
        healAmt += damageDealt;
    }

    const lifestealPercent = Math.min(100, (gameState.player.lifesteal || 0) + getScrollLifestealPercent());
    if (lifestealPercent > 0) {
        healAmt += Math.floor(damageDealt * lifestealPercent / 100);
    }

    return healAmt;
}

function recordWorldBossPlayerDamage(dmg) {
    if (!gameState.worldBossActive || !gameState.currentWorldBoss || dmg <= 0) return;

    const playerName = gameState.player.name;
    if (!gameState.worldBossDamage[playerName]) {
        gameState.worldBossDamage[playerName] = 0;
    }

    gameState.worldBossDamage[playerName] += dmg;
    gameState.worldBossTotalDamage += dmg;
    scheduleSilentPersist();
}

function tryConsumeReviveScroll(playerObj, logCallback = addBattleMsg) {
    const reviveIndex = (gameState.activeScrollEffects || []).findIndex(effect => effect && effect.effect === 'revive');
    if (reviveIndex === -1) return false;

    const reviveEffect = gameState.activeScrollEffects[reviveIndex];
    gameState.activeScrollEffects.splice(reviveIndex, 1);

    const reviveHp = Math.max(1, Math.floor(getTotalMaxHp() * (reviveEffect.value || 0.5)));
    playerObj.hp = reviveHp;
    logCallback(`🔥 ${reviveEffect.name} revives you with ${reviveHp} HP!`, 'heal');
    return true;
}

function resolveEnemyCounterAttack(playerObj, enemyObj, logCallback = addBattleMsg, healCallback, options = {}) {
    let enemyDied = false;
    const invulnerable = !!options.invulnerable;
    const totalDef = options.totalDef === undefined ? getEffectivePlayerDefense() : options.totalDef;
    const defenseMitigationFactor = options.defenseMitigationFactor === undefined ? 1 : options.defenseMitigationFactor;

    if (invulnerable) {
        logCallback(`${enemyObj.name} attacks, but you are invulnerable!`, 'info');
        return { enemyDied, damageTaken: 0 };
    }

    if (isEnemyFrozenByScroll()) {
        logCallback(`❄️ ${enemyObj.name} is frozen and cannot act!`, 'reward');
        return { enemyDied, damageTaken: 0, skipped: true };
    }

    const playerDodgeChance = getEffectivePlayerDodgeChance();
    if (Math.random() < playerDodgeChance) {
        logCallback(`You DODGED the attack! (Dodge: ${(playerDodgeChance * 100).toFixed(1)}%)`, 'heal');
        return { enemyDied, damageTaken: 0, dodged: true };
    }

    const blockChance = Math.min(getTotalBlock(), 95);
    if (Math.random() * 100 < blockChance) {
        logCallback(`🛡️ You BLOCKED the attack! (Block: ${blockChance.toFixed(1)}%)`, 'heal');

        if (hasEquippedSpecialAbility('heal_on_block')) {
            const healAmt = enemyObj.atk;
            playerObj.hp = Math.min(getTotalMaxHp(), playerObj.hp + healAmt);
            logCallback(`💚 Heal on Block activated! Healed ${healAmt} HP!`, 'heal');
            if (healCallback) healCallback(healAmt);
        }

        return { enemyDied, damageTaken: 0, blocked: true };
    }

    let enemyDmg = Math.max(1, enemyObj.atk - Math.floor(totalDef * defenseMitigationFactor) + rand(-2, 2));
    enemyDmg = Math.ceil(enemyDmg * getScrollEnemyDamageMultiplier());

    const drPercent = Math.min(gameState.player.dmgReduction || gameState.player.damageReduction || 0, 95) / 100;
    if (gameState.has75DamageReduction || hasEquippedSpecialAbility('damage_reduction_75')) {
        enemyDmg = Math.ceil(enemyDmg * 0.25);
        logCallback(`${enemyObj.name} hits you for ${enemyDmg} damage! (75% DR ACTIVE)`, 'damage');
    } else {
        enemyDmg = Math.ceil(enemyDmg * (1 - drPercent));
        logCallback(`${enemyObj.name} hits you for ${enemyDmg} damage! (DR: ${(drPercent * 100).toFixed(1)}%)`, 'damage');
    }

    const reflectChance = Math.min(getTotalReflect(), 95);
    if (reflectChance > 0 && Math.random() * 100 < reflectChance) {
        const reflectDamage = enemyDmg;
        enemyObj.hp = Math.max(0, enemyObj.hp - reflectDamage);
        if (enemyObj === gameState.currentWorldBoss) recordWorldBossPlayerDamage(reflectDamage);
        logCallback(`⚡ DAMAGE REFLECT! ${enemyObj.name} takes ${reflectDamage} reflected damage!`, 'reward');

        if (enemyObj.hp <= 0) {
            logCallback(`${enemyObj.name} was killed by reflected damage!`, 'reward');
            enemyDied = true;
        }
    }

    const thornsDamage = getScrollThornsDamage();
    if (thornsDamage > 0 && enemyObj.hp > 0) {
        enemyObj.hp = Math.max(0, enemyObj.hp - thornsDamage);
        if (enemyObj === gameState.currentWorldBoss) recordWorldBossPlayerDamage(thornsDamage);
        logCallback(`🌵 THORNS! ${enemyObj.name} takes ${thornsDamage} damage!`, 'reward');

        if (enemyObj.hp <= 0) {
            logCallback(`${enemyObj.name} was slain by thorns damage!`, 'reward');
            enemyDied = true;
        }
    }

    playerObj.hp = Math.max(0, playerObj.hp - enemyDmg);
    if (playerObj.hp <= 0 && tryConsumeReviveScroll(playerObj, logCallback)) {
        return { enemyDied, damageTaken: enemyDmg, revived: true };
    }

    return { enemyDied, damageTaken: enemyDmg };
}

function applyEndOfTurnScrollEffects(playerObj, enemyObj, logCallback = addBattleMsg) {
    let enemyDied = false;

    getScrollEffectsByType('regen').forEach(effect => {
        const healAmt = Math.min(effect.value || 0, getTotalMaxHp() - playerObj.hp);
        if (healAmt > 0) {
            playerObj.hp += healAmt;
            logCallback(`✨ ${effect.name} restores ${healAmt} HP!`, 'heal');
        }
    });

    ['burn', 'poison'].forEach(type => {
        getScrollEffectsByType(type).forEach(effect => {
            if (!enemyObj || enemyObj.hp <= 0) return;

            const dmg = Math.max(1, Math.floor(effect.value || 0));
            enemyObj.hp = Math.max(0, enemyObj.hp - dmg);
            if (enemyObj === gameState.currentWorldBoss) recordWorldBossPlayerDamage(dmg);

            const icon = type === 'burn' ? '🔥' : '☠️';
            logCallback(`${icon} ${effect.name} deals ${dmg} ${type} damage to ${enemyObj.name}!`, 'damage');

            if (enemyObj.hp <= 0) {
                logCallback(`${enemyObj.name} succumbs to ${type}!`, 'reward');
                enemyDied = true;
            }
        });
    });

    applyCombatHealthRegen(playerObj, logCallback);

    return { enemyDied };
}

function getCurrentCombatContext() {
    if (gameState.worldBossActive && gameState.currentWorldBoss) return 'worldboss';
    if (dungeonState.active && dungeonState.inBattle && dungeonState.currentEnemy) return 'dungeon';
    if (gameState.wandering && gameState.wandering.active && gameState.wandering.inBattle && gameState.wandering.currentEnemy) return 'wandering';
    if (gameState.inBattle && gameState.currentEnemy) return 'battle';
    return null;
}

function getCurrentCombatEnemy(context = getCurrentCombatContext()) {
    if (context === 'worldboss') return gameState.currentWorldBoss;
    if (context === 'dungeon') return dungeonState.currentEnemy;
    if (context === 'wandering') return gameState.wandering.currentEnemy;
    if (context === 'battle') return gameState.currentEnemy;
    return null;
}

function getCombatLogCallback(context = getCurrentCombatContext()) {
    if (context === 'dungeon') return addDungeonLog;
    if (context === 'wandering') return addWanderingLog;
    return addBattleMsg;
}

function rerenderCombatContext(context = getCurrentCombatContext()) {
    if (context === 'dungeon') {
        renderDungeon();
    } else if (context === 'wandering') {
        renderWandering();
    } else {
        renderBattle();
    }
}

function handleCombatVictoryByContext(context = getCurrentCombatContext()) {
    if (context === 'dungeon') {
        dungeonEnemyDefeated();
    } else if (context === 'wandering') {
        wanderingEnemyDefeated();
    } else if (context === 'worldboss') {
        despawnWorldBoss(true);
    } else {
        enemyDefeated();
    }
}

function ensureCombatScrollStateSlots() {
    if (!Array.isArray(combatScrollState.usedSlots) || combatScrollState.usedSlots.length !== gameState.scrollSlots) {
        combatScrollState.usedSlots = Array(gameState.scrollSlots).fill(false);
    }
}

function resetCombatScrollSession(clearEffects = true) {
    combatScrollState.active = false;
    combatScrollState.context = null;
    combatScrollState.sessionId = null;
    combatScrollState.activatedEffects = {};
    combatScrollState.usedSlots = Array(gameState.scrollSlots).fill(false);
    combatScrollState.turnCounter = 0;
    if (clearEffects) {
        gameState.activeScrollEffects = [];
    }
}

function isCombatScrollSlotUsed(slotIndex) {
    ensureCombatScrollStateSlots();
    return !!combatScrollState.usedSlots[slotIndex];
}

function markCombatScrollSlotUsed(slotIndex) {
    ensureCombatScrollStateSlots();
    combatScrollState.usedSlots[slotIndex] = true;
}

function ensureCombatSessionId(target, context = 'battle') {
    if (!target) return null;
    if (!target._combatSessionId) {
        target._combatSessionId = `${context}_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }
    return target._combatSessionId;
}

function getVisibleCombatScrolls() {
    const visible = [];
    for (let i = 0; i < gameState.unlockedScrollSlots; i++) {
        const scroll = gameState.equippedScrolls[i];
        if (scroll && !isCombatScrollSlotUsed(i)) {
            visible.push({ scroll, idx: i });
        }
    }
    return visible;
}

function activateCombatScrollsForCurrentBattle(context = getCurrentCombatContext()) {
    if (!context) return;

    const target = context === 'worldboss'
        ? gameState.currentWorldBoss
        : getCurrentCombatEnemy(context);
    if (!target) return;

    const sessionId = ensureCombatSessionId(target, context);
    if (combatScrollState.active && combatScrollState.sessionId === sessionId) return;

    combatScrollState.active = true;
    combatScrollState.context = context;
    combatScrollState.sessionId = sessionId;
    combatScrollState.activatedEffects = {};
    combatScrollState.usedSlots = Array(gameState.scrollSlots).fill(false);
    combatScrollState.turnCounter = 0;
    gameState.activeScrollEffects = [];

    for (let i = 0; i < gameState.unlockedScrollSlots; i++) {
        if (!gameState.equippedScrolls[i]) continue;
        useScroll(i, { auto: true, suppressRerender: true, context });

        const enemyStillExists = context === 'worldboss'
            ? !!gameState.currentWorldBoss
            : !!getCurrentCombatEnemy(context);
        if (!enemyStillExists) {
            break;
        }
    }
}

function getItemSellValueText(item) {
    if (typeof SELL_VALUES === 'undefined' || !item) return '';
    const sellValue = SELL_VALUES[item.rarity];
    if (!sellValue) return '';

    if (sellValue.soulGems) {
        return `${sellValue.soulGems} Soul Gem${sellValue.soulGems === 1 ? '' : 's'}`;
    }

    if (sellValue.gold) {
        return `${sellValue.gold} Gold`;
    }

    return '';
}

function getInventoryQuicksellRarities() {
    if (typeof SELL_VALUES === 'undefined') return [];

    const availableRarities = Object.keys(SELL_VALUES);
    const orderedRarities = INVENTORY_QUICKSELL_RARITY_ORDER.filter(rarity => availableRarities.includes(rarity));
    const extraRarities = availableRarities.filter(rarity => !orderedRarities.includes(rarity));
    return [...orderedRarities, ...extraRarities];
}

function normalizeInventoryQuicksellFilters() {
    const nextFilters = {};
    getInventoryQuicksellRarities().forEach(rarity => {
        nextFilters[rarity] = !!inventoryQuicksellFilters[rarity];
    });
    inventoryQuicksellFilters = nextFilters;
    return inventoryQuicksellFilters;
}

function getSelectedInventoryQuicksellRarities() {
    const filters = normalizeInventoryQuicksellFilters();
    return Object.keys(filters).filter(rarity => filters[rarity]);
}

function normalizeInventoryQuicksellLevelFilter() {
    const normalizeBound = value => {
        if (value === '' || value === null || value === undefined) return '';
        const parsed = Number.parseInt(value, 10);
        if (!Number.isFinite(parsed)) return '';
        return Math.max(0, parsed);
    };

    inventoryQuicksellLevelFilter = {
        min: normalizeBound(inventoryQuicksellLevelFilter.min),
        max: normalizeBound(inventoryQuicksellLevelFilter.max)
    };

    return inventoryQuicksellLevelFilter;
}

function getInventoryQuicksellItemLevel(item) {
    if (!item) return 1;
    return Number.isFinite(item.levelReq) ? item.levelReq : 1;
}

function doesInventoryQuicksellItemMatchLevelFilter(item) {
    const levelFilter = normalizeInventoryQuicksellLevelFilter();
    const itemLevel = getInventoryQuicksellItemLevel(item);

    if (levelFilter.min !== '' && itemLevel < levelFilter.min) return false;
    if (levelFilter.max !== '' && itemLevel > levelFilter.max) return false;
    return true;
}

function isInventoryQuicksellEligibleItem(item) {
    if (!item || item.equipped) return false;

    const slot = resolveEquipSlot(item);
    if (!slot) return false;

    return item.type !== 'material' &&
        item.type !== 'currency' &&
        item.type !== 'consumable' &&
        item.type !== 'scroll' &&
        !!(typeof SELL_VALUES !== 'undefined' && SELL_VALUES[item.rarity]);
}

function getInventoryQuicksellAvailability() {
    const availability = {};
    getInventoryQuicksellRarities().forEach(rarity => {
        availability[rarity] = { items: 0, stacks: 0 };
    });

    gameState.inventory.forEach(item => {
        if (!isInventoryQuicksellEligibleItem(item) || !doesInventoryQuicksellItemMatchLevelFilter(item) || !availability[item.rarity]) return;

        const qty = Number.isFinite(item.qty) && item.qty > 0 ? item.qty : 1;
        availability[item.rarity].items += qty;
        availability[item.rarity].stacks += 1;
    });

    return availability;
}

function getInventoryQuicksellCandidates(selectedRarities = getSelectedInventoryQuicksellRarities()) {
    const selectedSet = new Set(selectedRarities);

    return gameState.inventory
        .map((item, idx) => ({
            item,
            idx,
            qty: Number.isFinite(item && item.qty) && item.qty > 0 ? item.qty : 1
        }))
        .filter(({ item }) => isInventoryQuicksellEligibleItem(item) && doesInventoryQuicksellItemMatchLevelFilter(item) && selectedSet.has(item.rarity));
}

function getInventoryQuicksellSummary(selectedRarities = getSelectedInventoryQuicksellRarities()) {
    const summary = { items: 0, stacks: 0, gold: 0, soulGems: 0 };

    getInventoryQuicksellCandidates(selectedRarities).forEach(({ item, qty }) => {
        const sellValue = SELL_VALUES[item.rarity] || {};
        summary.items += qty;
        summary.stacks += 1;
        summary.gold += (sellValue.gold || 0) * qty;
        summary.soulGems += (sellValue.soulGems || 0) * qty;
    });

    return summary;
}

function formatInventoryQuicksellRewardText(summary) {
    const rewardParts = [];
    if (summary.gold > 0) rewardParts.push(`${summary.gold} Gold`);
    if (summary.soulGems > 0) rewardParts.push(`${summary.soulGems} Soul Gem${summary.soulGems === 1 ? '' : 's'}`);
    return rewardParts.join(' and ');
}

function formatRarityLabel(rarity) {
    return String(rarity || '')
        .split('_')
        .map(part => part ? part.charAt(0).toUpperCase() + part.slice(1) : '')
        .join(' ');
}

function formatInventoryQuicksellLevelFilterText() {
    const levelFilter = normalizeInventoryQuicksellLevelFilter();

    if (levelFilter.min !== '' && levelFilter.max !== '') {
        return ` | Level ${levelFilter.min}-${levelFilter.max}`;
    }

    if (levelFilter.min !== '') {
        return ` | Level ${levelFilter.min}+`;
    }

    if (levelFilter.max !== '') {
        return ` | Level ≤ ${levelFilter.max}`;
    }

    return '';
}

function setInventoryQuicksellRarity(rarity, checked) {
    const filters = normalizeInventoryQuicksellFilters();
    if (!(rarity in filters)) return;

    filters[rarity] = !!checked;

    if (document.getElementById('inventory-screen')?.classList.contains('active')) {
        renderInventory();
    }
}

function setInventoryQuicksellLevelFilter(bound, value) {
    if (bound !== 'min' && bound !== 'max') return;

    inventoryQuicksellLevelFilter[bound] = value;
    normalizeInventoryQuicksellLevelFilter();

    if (document.getElementById('inventory-screen')?.classList.contains('active')) {
        renderInventory();
    }
}

function quicksellSelectedInventoryEquipment() {
    const selectedRarities = getSelectedInventoryQuicksellRarities();
    if (selectedRarities.length === 0) {
        addChatMessage('SYSTEM', 'Select at least one rarity before using Quick Sell.', true);
        return;
    }

    const candidates = getInventoryQuicksellCandidates(selectedRarities);
    if (candidates.length === 0) {
        addChatMessage('SYSTEM', 'No unequipped equipment matching the selected rarities was found.', true);
        if (document.getElementById('inventory-screen')?.classList.contains('active')) {
            renderInventory();
        }
        return;
    }

    const summary = getInventoryQuicksellSummary(selectedRarities);

    candidates
        .sort((a, b) => b.idx - a.idx)
        .forEach(({ idx, qty }) => removeFromInventory(idx, qty));

    gameState.player.gold += summary.gold;
    gameState.soulGems += summary.soulGems;

    const rewardText = formatInventoryQuicksellRewardText(summary);
    addChatMessage(
        'SYSTEM',
        `Quicksold ${summary.items} unequipped equipment item${summary.items === 1 ? '' : 's'} for ${rewardText}.`,
        true
    );

    updateStats();
    renderInventory();
    updateSidePanels();
    scheduleSilentPersist();
}

function updateStats() {
    const p = gameState.player;
    const hpEl = document.getElementById('stat-hp');
    const mpEl = document.getElementById('stat-mp');
    const atkEl = document.getElementById('stat-atk');
    const defEl = document.getElementById('stat-def');
    const lvlEl = document.getElementById('stat-lvl');
    const xpEl = document.getElementById('stat-xp');
    const goldEl = document.getElementById('stat-gold');
    const soulEl = document.getElementById('stat-soul');
    const critEl = document.getElementById('stat-crit');
    
    // Calculate actual max HP/MP including equipment bonuses
    const actualMaxHp = getTotalMaxHp();
    const actualMaxMp = getTotalMaxMp();
    const actualCrit = getTotalCrit();
    
    // Scale current HP/MP proportionally when max values change, maintain percentage
    if (p.hp > 0 && p.maxHp > 0) {
        const hpPercent = p.hp / p.maxHp;
        p.hp = Math.max(1, Math.floor(actualMaxHp * hpPercent));
    }
    if (p.mp > 0 && p.maxMp > 0) {
        const mpPercent = p.mp / p.maxMp;
        p.mp = Math.max(1, Math.floor(actualMaxMp * mpPercent));
    }
    
    // Always make sure we don't exceed max values
    p.hp = Math.min(p.hp, actualMaxHp);
    p.mp = Math.min(p.mp, actualMaxMp);
    
    if (hpEl) hpEl.textContent = `${p.hp}/${actualMaxHp}`;
    if (mpEl) mpEl.textContent = `${p.mp}/${actualMaxMp}`;
    if (atkEl) atkEl.textContent = getTotalAtk();
    if (defEl) defEl.textContent = getTotalDef();
    if (critEl) critEl.textContent = `${actualCrit}%`;
    if (lvlEl) lvlEl.textContent = p.level;
    if (xpEl) xpEl.textContent = `${p.xp}/${p.xpToNext}`;
    if (goldEl) goldEl.textContent = p.gold;
    if (soulEl) soulEl.textContent = gameState.soulGems;
    refreshCooldownUi();
}

function showScreen(screenName) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    const screen = document.getElementById(screenName + '-screen');
    if (screen) screen.classList.add('active');
    
    const navBtns = document.querySelectorAll('.nav-btn');
    navBtns.forEach(btn => {
        if (btn.textContent.toLowerCase().includes(screenName.substring(0, 4)) || 
            (screenName === 'travel' && btn.textContent.includes('Map')) ||
            (screenName === 'battle' && btn.textContent.includes('Battle')) ||
            (screenName === 'quest' && btn.textContent.includes('Quest')) ||
            (screenName === 'job' && btn.textContent.includes('Job')) ||
            (screenName === 'inventory' && btn.textContent.includes('Inventory')) ||
            (screenName === 'equipment' && btn.textContent.includes('Equipment')) ||
            (screenName === 'scrolls' && btn.textContent.includes('Scrolls')) ||
            (screenName === 'crafting' && btn.textContent.includes('Crafting')) ||
            (screenName === 'auction' && btn.textContent.includes('Auction')) ||
            (screenName === 'players' && btn.textContent.includes('Players')) ||
            (screenName === 'save' && btn.textContent.includes('Save'))) {
            btn.classList.add('active');
        }
    });
    
    switch (screenName) {
        case 'travel': renderTravel(); break;
        case 'battle': renderBattle(); break;
        case 'quest': renderQuests(); break;
        case 'job': renderJobs(); break;
        case 'wandering': renderWandering(); break;
        case 'inventory': renderInventory(); break;
        case 'equipment': renderEquipment(); break;
        case 'scrolls': renderScrolls(); break;
        case 'crafting': renderCrafting(); break;
        case 'auction': renderAuction(); break;
        case 'players': renderPlayers(); break;
        case 'save': renderSave(); break;
        case 'merge': renderMerge(); break;
    }
    
    updateSidePanels();
    refreshCooldownUi();
}
