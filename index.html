            html += `<button class="action-btn" onclick="dungeonUseItem(${idx})">${p.name} (x${p.qty || 1})</button>`;
        });
    }
    
    html += `<div class="section-title">Dungeon Log</div>`;
    html += `<div class="battle-log" style="max-height:250px">`;
    dungeonState.log.slice(-20).reverse().forEach(log => {
        html += `<p class="${log.type}">${log.msg}</p>`;
    });
    html += `</div>`;
    
    container.innerHTML = html;
}

function dungeonUseItem(idx) {
    if (!dungeonState.active || !dungeonState.inBattle) return;
    const item = gameState.inventory[idx];
    if (!item) return;
    
    if (item.type === 'consumable') {
        if (item.effect === 'heal') {
            dungeonState.hp = Math.min(dungeonState.maxHp, dungeonState.hp + item.value);
            gameState.player.hp = dungeonState.hp;
            addDungeonLog(`Used ${item.name}: Healed ${item.value} HP`, 'heal');
        } else if (item.effect === 'mana') {
            gameState.player.mp = Math.min(gameState.player.maxMp, gameState.player.mp + item.value);
            addDungeonLog(`Used ${item.name}: Restored ${item.value} MP`, 'heal');
    } else if (item.effect === 'blessing') {
        addDungeonLog(`Blessing Oil cannot be used from inventory! Go to the Temple to use it.`, 'info');
        return; // Don't remove from inventory
    }
        removeFromInventory(idx);
        updateStats();
        renderDungeon();
    }
}

// ENCRYPTION UTILITIES (XOR + Base64 for anti-tampering)
const ENCRYPTION_KEY = 'R3alm0fSh4d0ws_S3cr3tK3y_2026!';

function encryptData(data) {
    const jsonString = JSON.stringify(data);
    let encrypted = '';
    for (let i = 0; i < jsonString.length; i++) {
        encrypted += String.fromCharCode(jsonString.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
    }
    return btoa(encodeURIComponent(encrypted));
}

function decryptData(encryptedBase64) {
    try {
        const decoded = decodeURIComponent(atob(encryptedBase64));
        let decrypted = '';
        for (let i = 0; i < decoded.length; i++) {
            decrypted += String.fromCharCode(decoded.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
        }
        return JSON.parse(decrypted);
    } catch (e) {
        return null;
    }
}

function invertAliasMap(map) {
    return Object.fromEntries(Object.entries(map).map(([key, value]) => [value, key]));
}

const SAVE_PLAYER_KEY_FROM_ALIAS = invertAliasMap(SAVE_PLAYER_KEY_ALIASES);
const SAVE_ITEM_KEY_FROM_ALIAS = invertAliasMap(SAVE_ITEM_KEY_ALIASES);
const SAVE_EQUIPMENT_KEY_FROM_ALIAS = invertAliasMap(SAVE_EQUIPMENT_KEY_ALIASES);

function cloneData(value) {
    if (value === undefined) return undefined;
    return JSON.parse(JSON.stringify(value));
}

function valuesEqual(a, b) {
    return JSON.stringify(a) === JSON.stringify(b);
}

function isGeneratedCatalogItemName(name) {
    return typeof name === 'string' && SAVE_ITEM_NAME_PATTERN.test(name);
}

function buildStaticSaveItemCatalog() {
    const entries = new Map();
    const addEntry = (name, item) => {
        if (!name || !item || entries.has(name) || isGeneratedCatalogItemName(name)) return;
        entries.set(name, item);
    };

    Object.entries(itemPool || {}).forEach(([name, item]) => addEntry(name, item));
    Object.entries(scrollPool || {}).forEach(([name, item]) => addEntry(name, item));
    Object.entries(SAVE_ITEM_BASE_EXTRAS).forEach(([name, item]) => addEntry(name, item));

    return Array.from(entries.keys()).sort((a, b) => a.localeCompare(b));
}

const SAVE_ITEM_CATALOG = buildStaticSaveItemCatalog();
const SAVE_ITEM_ID_TO_NAME = Object.create(null);
const SAVE_ITEM_NAME_TO_ID = Object.create(null);
SAVE_ITEM_CATALOG.forEach((name, index) => {
    const id = index + 1;
    SAVE_ITEM_ID_TO_NAME[id] = name;
    SAVE_ITEM_NAME_TO_ID[name] = id;
});

function getCanonicalItemByName(name) {
    if (!name) return null;
    return itemPool[name] || scrollPool[name] || SAVE_ITEM_BASE_EXTRAS[name] || null;
}

function getCatalogBaseForItem(item) {
    if (!item || !item.name) return null;
    const baseName = item.name.replace(/ \+\d+$/, '');
    const id = SAVE_ITEM_NAME_TO_ID[baseName];
    if (!id) return null;
    const base = getCanonicalItemByName(baseName);
    if (!base) return null;
    return { id, baseName, base };
}

function encodeAliasedDiffObject(source, base, aliases, options = {}) {
    const out = {};
    const omitKeys = new Set(options.omitKeys || []);
    const keys = new Set([
        ...Object.keys(base || {}),
        ...Object.keys(source || {})
    ]);

    keys.forEach(key => {
        if (omitKeys.has(key)) return;
        const value = source ? source[key] : undefined;
        if (value === undefined || typeof value === 'function') return;
        if (key === 'qty' && (value === undefined || value === 1) && (!base || base[key] === undefined)) return;

        const baseValue = base ? base[key] : undefined;
        const normalizedValue = key === 'qty' ? (value ?? 1) : value;
        const normalizedBase = key === 'qty' ? (baseValue ?? 1) : baseValue;
        if (base && valuesEqual(normalizedValue, normalizedBase)) return;

        const alias = aliases[key] || key;
        out[alias] = cloneData(value);
    });

    return out;
}

function decodeAliasedObject(source, reverseAliases) {
    const out = {};
    Object.entries(source || {}).forEach(([key, value]) => {
        out[reverseAliases[key] || key] = cloneData(value);
    });
    return out;
}

function getExpectedMergedItemName(baseName, mergeLevel) {
    return mergeLevel > 0 ? `${baseName} +${mergeLevel}` : baseName;
}

function humanizeSpecialAbility(ability) {
    const labels = {
        half_current_hp: 'Deals 50% of enemy current HP as bonus damage',
        status_immunity: 'Immune to negative status effects',
        encounter_multiplier_escape: 'Wander counts as extra encounters and escape keeps rewards'
    };
    return labels[ability] || String(ability || '').replace(/_/g, ' ');
}

function buildFallbackItemDescription(item) {
    if (!item) return '';

    const statLabels = [
        ['atk', 'ATK'], ['def', 'DEF'], ['crit', '% CRIT'], ['luck', 'LUCK'], ['critDmg', '% Crit Damage'],
        ['atkPercent', '% ATK'], ['defPercent', '% DEF'], ['hp', 'HP'], ['mp', 'MP'], ['maxHp', 'Max HP'],
        ['maxMp', 'Max MP'], ['dodge', '% Dodge'], ['lifesteal', '% Lifesteal'], ['dmgReduction', '% Damage Reduction'],
        ['armorPen', 'Armor Pen'], ['magicPen', 'Magic Pen'], ['attackSpeed', 'Attack Speed'], ['cdr', '% CDR'],
        ['moveSpeed', 'Move Speed'], ['healthRegen', 'Health Regen'], ['manaRegen', 'Mana Regen'],
        ['magicFind', 'Magic Find'], ['expBonus', '% EXP'], ['goldFind', '% Gold'], ['block', '% Block'],
        ['reflect', 'Reflect Damage'], ['thorns', 'Thorns'], ['eleDmg', 'Elemental Damage'], ['stunChance', '% Stun']
    ];

    if (item.type === 'scroll' || item.type === 'consumable') {
        const effectParts = [];
        if (item.effect) effectParts.push(String(item.effect).replace(/_/g, ' '));
        if (item.value !== undefined) effectParts.push(String(item.value));
        if (item.duration !== undefined) effectParts.push(`${item.duration} turns`);
        if (effectParts.length) return effectParts.join(' | ');
    }

    const parts = [];
    statLabels.forEach(([key, label]) => {
        if (typeof item[key] === 'number' && item[key] !== 0) {
            const prefix = label.startsWith('%') ? '' : '+';
            parts.push(`${prefix}${item[key]} ${label}`.trim());
        }
    });

    if (item.specialAbility) {
        parts.push(`Special: ${humanizeSpecialAbility(item.specialAbility)}`);
    }

    let desc = parts.join(', ');
    if (item.mergeLevel > 0) {
        const totalPercent = Math.round((Math.pow(1.5, item.mergeLevel) - 1) * 100);
        desc += `${desc ? '\n' : ''}✨ Merged ${item.mergeLevel} times | ATK +${totalPercent}%, DEF +${totalPercent}% | All other stats increased`;
    }

    return desc;
}

function ensureItemDescription(item) {
    if (!item) return item;
    if (item.desc) return item;

    const baseName = item.name ? item.name.replace(/ \+\d+$/, '') : null;
    const base = getCanonicalItemByName(baseName);
    if (base && base.desc) {
        item.desc = base.desc.split('\n✨')[0];
        if (item.mergeLevel > 0) {
            const totalPercent = Math.round((Math.pow(1.5, item.mergeLevel) - 1) * 100);
            item.desc += `\n✨ Merged ${item.mergeLevel} times | ATK +${totalPercent}%, DEF +${totalPercent}% | All other stats increased`;
        }
        return item;
    }

    item.desc = buildFallbackItemDescription(item);
    return item;
}

function encodeItemForSave(item) {
    if (!item) return 0;

    const catalogBase = getCatalogBaseForItem(item);
    if (catalogBase) {
        const { id, baseName, base } = catalogBase;
        const overrides = encodeAliasedDiffObject(item, base, SAVE_ITEM_KEY_ALIASES, {
            omitKeys: ['desc', 'equipped', 'equippedAt']
        });

        const mergeLevel = item.mergeLevel || 0;
        const expectedName = getExpectedMergedItemName(baseName, mergeLevel);
        if (item.name && item.name !== expectedName && item.name !== baseName) {
            overrides[SAVE_ITEM_KEY_ALIASES.name] = item.name;
        }

        if (Object.keys(overrides).length === 0) return id;
        return [id, overrides];
    }

    return ['c', encodeAliasedDiffObject(item, null, SAVE_ITEM_KEY_ALIASES, {
        omitKeys: ['desc', 'equipped', 'equippedAt']
    })];
}

function decodeItemForSave(entry) {
    if (!entry) return null;

    let item;
    if (typeof entry === 'number') {
        const baseName = SAVE_ITEM_ID_TO_NAME[entry];
        const base = getCanonicalItemByName(baseName);
        if (!base) return null;
        item = cloneData(base);
    } else if (Array.isArray(entry) && entry[0] === 'c') {
        item = decodeAliasedObject(entry[1] || {}, SAVE_ITEM_KEY_FROM_ALIAS);
    } else if (Array.isArray(entry)) {
        const baseName = SAVE_ITEM_ID_TO_NAME[entry[0]];
        const base = getCanonicalItemByName(baseName);
        if (!base) return null;
        const overrides = decodeAliasedObject(entry[1] || {}, SAVE_ITEM_KEY_FROM_ALIAS);
        item = { ...cloneData(base), ...overrides };
        if (item.mergeLevel > 0 && !overrides.name) {
            item.name = getExpectedMergedItemName(baseName, item.mergeLevel);
        }
    } else {
        return null;
    }

    if (item.qty === 1) delete item.qty;
    return ensureItemDescription(item);
}

function encodeEquipmentForSave(equipment) {
    const encoded = {};
    Object.entries(equipment || {}).forEach(([key, value]) => {
        const alias = SAVE_EQUIPMENT_KEY_ALIASES[key] || key;
        if (SAVE_EQUIPMENT_SLOT_KEYS.includes(key)) {
            if (!value) return;
            encoded[alias] = encodeItemForSave(value);
            return;
        }
        if (value === undefined || value === null || value === 0) return;
        encoded[alias] = value;
    });
    return encoded;
}

function decodeEquipmentFromSave(encoded) {
    const equipment = cloneData(INITIAL_GAME_STATE_SNAPSHOT.equipment);
    Object.entries(encoded || {}).forEach(([alias, value]) => {
        const key = SAVE_EQUIPMENT_KEY_FROM_ALIAS[alias] || alias;
        if (SAVE_EQUIPMENT_SLOT_KEYS.includes(key)) {
            equipment[key] = decodeItemForSave(value);
        } else {
            equipment[key] = cloneData(value);
        }
    });
    return equipment;
}

function encodeActiveQuestsForSave() {

function decodeActiveQuestsFromSave(entries) {

    const questProgress = {};
    (entries || []).forEach((entry, idx) => {
        const [questId, progress = 0] = entry || [];
        const def = questDefs.find(q => q.id === questId);

function findGuildQuestTemplate(name, target) {
    for (const rarity of Object.keys(guildQuestTemplates || {})) {
        const template = (guildQuestTemplates[rarity] || []).find(q => q.name === name && q.target === target);
        if (template) return { ...template, rarity };
    }
    return null;
}

function encodeGuildQuestsForSave() {
    return (gameState.guildQuests || []).map((quest, idx) => [
        quest.name,
        quest.target,
        quest.count,
        quest.reward?.xp || 0,
        quest.reward?.gold || 0,
        quest.reward?.soulGem ? 1 : 0,
        quest.rarity || '',
        quest.accepted ? 1 : 0,
        (gameState.guildQuestProgress && gameState.guildQuestProgress[idx]) || quest.progress || 0
    ]);
}

function decodeGuildQuestsFromSave(entries) {
    const quests = [];
    const guildQuestProgress = {};

    (entries || []).forEach((entry, idx) => {
        const [name, target, count, xp, gold, soulGem, rarity, accepted, progress = 0] = entry || [];
        if (!name || !target || !count) return;
        const template = findGuildQuestTemplate(name, target);
        const desc = template
            ? template.desc.replace('{count}', count)
            : `Defeat ${count} ${String(target).replace(/_/g, ' ')}`;

        quests.push({
            id: `guild_restore_${idx}_${target}`,
            name,
            desc,
            target,
            count,
            reward: { xp: xp || 0, gold: gold || 0, soulGem: !!soulGem },
            rarity: rarity || (template ? template.rarity : 'common'),
            accepted: !!accepted,
            progress
        });

        if (progress > 0) guildQuestProgress[quests.length - 1] = progress;
    });

    return { quests, guildQuestProgress };
}

function ensurePlayerBaseStats(player) {

    const level = Math.max(1, player.level || 1);
    const computedMaxHp = Math.floor(100 * Math.pow(1.10, level - 1));

    const computedDef = 5 + ((level - 1) * 3);

    if (player.baseDef === undefined) player.baseDef = computedDef;
    if (player.baseMaxHp === undefined) player.baseMaxHp = computedMaxHp;
    if (player.baseMaxMp === undefined) player.baseMaxMp = computedMaxMp;
    if (player.baseLuck === undefined) player.baseLuck = 0;
    if (player.baseCrit === undefined) player.baseCrit = 0;
    if (player.baseCritDmg === undefined) player.baseCritDmg = 50;
    if (player.baseDodge === undefined) player.baseDodge = 0;
    if (player.baseLifesteal === undefined) player.baseLifesteal = 0;
    if (player.baseDmgReduction === undefined) player.baseDmgReduction = 0;

    if (player.baseMagicPen === undefined) player.baseMagicPen = 0;
    if (player.baseAttackSpeed === undefined) player.baseAttackSpeed = 0;
    if (player.baseCdr === undefined) player.baseCdr = 0;
    if (player.baseMoveSpeed === undefined) player.baseMoveSpeed = 0;
}

function sanitizeLoadedStateData(state) {
    const allowedLuckTypes = ['weapon', 'charm'];
    ensurePlayerBaseStats(state.player);

    if (Array.isArray(state.inventory)) {
        state.inventory = state.inventory
            .filter(Boolean)
            .map(item => {
                if (item.luck && !allowedLuckTypes.includes(item.type)) delete item.luck;
                const resolved = resolveEquipSlot(item);
                if (resolved && !item.equipSlot) item.equipSlot = resolved;
                return ensureItemDescription(item);
            });
    }

    Object.keys(state.equipment || {}).forEach(slot => {
        const eq = state.equipment[slot];
        if (!eq || !SAVE_EQUIPMENT_SLOT_KEYS.includes(slot)) return;
        if (eq.luck && !allowedLuckTypes.includes(eq.type)) delete eq.luck;
        if (!eq.equipSlot) eq.equipSlot = slot;
        ensureItemDescription(eq);
    });

    if (Array.isArray(state.equippedScrolls)) {
        state.equippedScrolls = state.equippedScrolls.map(scroll => {
            if (!scroll) return null;
            if (!scroll.type) scroll.type = 'scroll';
            return ensureItemDescription(scroll);
        });
    }
}

function pruneTransientState(state) {
    state.inBattle = false;
    state.currentEnemy = null;
    state.battleLog = [];
    state.itemLog = [];
    state.activeScrollEffects = [];
    state.activeStatusEffects = [];
    state.dungeonActive = false;
    state.dungeonHP = 0;
    state.dungeonMaxHP = 0;
    state.bossActive = false;
    state.currentBoss = null;
    state.worldBossActive = false;
    state.currentWorldBoss = null;
    state.worldBossDamage = {};
    state.worldBossTotalDamage = 0;
    state.worldBossSpawnTime = 0;
    state.auctionItems = [];
    state.chatMessages = [];
    state.fakePlayers = [];
    state.wandering = cloneData(INITIAL_GAME_STATE_SNAPSHOT.wandering);
}

function isQuotaExceededError(error) {
    return !!error && (
        error.name === 'QuotaExceededError' ||
        error.name === 'NS_ERROR_DOM_QUOTA_REACHED' ||
        error.code === 22 ||
        error.code === 1014
    );
}

function openSaveDatabase() {
    return new Promise((resolve, reject) => {
        if (typeof indexedDB === 'undefined') {
            resolve(null);
            return;
        }

        const request = indexedDB.open(SAVE_DB_NAME, SAVE_DB_VERSION);
        request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(SAVE_DB_STORE)) {
                db.createObjectStore(SAVE_DB_STORE);
            }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function saveStringToIndexedDB(key, value) {
    const db = await openSaveDatabase();
    if (!db) return false;

    return new Promise((resolve, reject) => {
        const tx = db.transaction(SAVE_DB_STORE, 'readwrite');
        const store = tx.objectStore(SAVE_DB_STORE);
        store.put(value, key);
        tx.oncomplete = () => {
            db.close();
            resolve(true);
        };
        tx.onerror = () => {
            db.close();
            reject(tx.error);
        };
        tx.onabort = () => {
            db.close();
            reject(tx.error);
        };
    });
}

async function loadStringFromIndexedDB(key) {
    const db = await openSaveDatabase();
    if (!db) return null;

    return new Promise((resolve, reject) => {
        const tx = db.transaction(SAVE_DB_STORE, 'readonly');
        const store = tx.objectStore(SAVE_DB_STORE);
        const request = store.get(key);
        request.onsuccess = () => {
            db.close();
            resolve(request.result || null);
        };
        request.onerror = () => {
            db.close();
            reject(request.error);
        };
    });
}

async function removeStringFromIndexedDB(key) {
    const db = await openSaveDatabase();
    if (!db) return false;

    return new Promise((resolve, reject) => {
        const tx = db.transaction(SAVE_DB_STORE, 'readwrite');
        const store = tx.objectStore(SAVE_DB_STORE);
        store.delete(key);
        tx.oncomplete = () => {
            db.close();
            resolve(true);
        };
        tx.onerror = () => {
            db.close();
            reject(tx.error);
        };
        tx.onabort = () => {
            db.close();
            reject(tx.error);
        };
    });
}

function parsePersistedSaveCandidate(raw, source) {
    if (!raw) return null;
    try {
        const parsed = JSON.parse(raw);
        return {
            raw,
            parsed,
            source,
            timestamp: parsed && typeof parsed === 'object' && parsed.t ? parsed.t : 0
        };
    } catch (e) {
        return null;
    }
}

async function getPersistedSaveCandidates() {
    const candidates = [];

    const localCandidate = parsePersistedSaveCandidate(localStorage.getItem(SAVE_STORAGE_KEY), 'localStorage');
    if (localCandidate) candidates.push(localCandidate);

    try {
        const idbRaw = await loadStringFromIndexedDB(SAVE_STORAGE_KEY);
        const idbCandidate = parsePersistedSaveCandidate(idbRaw, 'indexedDB');
        if (idbCandidate) candidates.push(idbCandidate);
    } catch (e) {
        console.warn('IndexedDB load unavailable', e);
    }

    candidates.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    // Deduplicate identical payloads if both storage backends contain the same save.
    return candidates.filter((candidate, index, arr) => index === 0 || candidate.raw !== arr[index - 1].raw);
}

async function persistCurrentGameState() {
    const payload = JSON.stringify(buildCompactSaveData());
    let localSaved = false;
    let indexedDbSaved = false;
    let localError = null;
    let indexedDbError = null;

    try {
        localStorage.setItem(SAVE_STORAGE_KEY, payload);
        localSaved = true;
    } catch (e) {
        localError = e;
    }

    try {
        indexedDbSaved = await saveStringToIndexedDB(SAVE_STORAGE_KEY, payload);
    } catch (e) {
        indexedDbError = e;
    }

    if (!localSaved && !indexedDbSaved) {
        throw localError || indexedDbError || new Error('Unable to persist save data');
    }

    return {
        payloadLength: payload.length,
        localSaved,
        indexedDbSaved,
        usedIndexedDbFallback: !localSaved && indexedDbSaved,
        localError,
        indexedDbError
    };
}

async function restorePersistedGameState() {
    const candidates = await getPersistedSaveCandidates();

    for (const candidate of candidates) {
        try {
            if (restoreGameStateFromSaveData(candidate.raw)) {
                return candidate;
            }
        } catch (e) {
            console.warn(`Failed restoring save from ${candidate.source}`, e);
        }
    }

    return null;
}

function buildCompactSaveData() {
    const save = {
        v: SAVE_SCHEMA_VERSION,
        t: Date.now(),
        p: encodeAliasedDiffObject(gameState.player, INITIAL_GAME_STATE_SNAPSHOT.player, SAVE_PLAYER_KEY_ALIASES),
        i: (gameState.inventory || []).map(encodeItemForSave)
    };

    const equipment = encodeEquipmentForSave(gameState.equipment);
    if (Object.keys(equipment).length) save.e = equipment;

    const quests = encodeActiveQuestsForSave();
    if (quests.length) save.q = quests;
    if (gameState.completedQuests && gameState.completedQuests.length) save.cq = gameState.completedQuests.slice();
    if (gameState.jobCooldown) save.jc = gameState.jobCooldown;
    if (gameState.daysPassed) save.dp = gameState.daysPassed;
    if (gameState.wanderMode) save.wm = 1;
    if (gameState.jobsCompleted) save.jb = gameState.jobsCompleted;
    if (gameState.soulGems) save.sg = gameState.soulGems;
    if ((gameState.premiumMultiplier || 1) !== 1 || gameState.premiumActionsUsed) {
        save.pm = [gameState.premiumMultiplier || 1, gameState.premiumActionsUsed || 0];
    }
    if (
        gameState.jobPoints !== INITIAL_GAME_STATE_SNAPSHOT.jobPoints ||
        gameState.maxJobPoints !== INITIAL_GAME_STATE_SNAPSHOT.maxJobPoints ||
        gameState.lastJobPointRegen !== INITIAL_GAME_STATE_SNAPSHOT.lastJobPointRegen
    ) {
        save.jp = [gameState.jobPoints || 0, gameState.maxJobPoints || 0, gameState.lastJobPointRegen || Date.now()];
    }
    if (
        gameState.scrollSlots !== INITIAL_GAME_STATE_SNAPSHOT.scrollSlots ||
        gameState.unlockedScrollSlots !== INITIAL_GAME_STATE_SNAPSHOT.unlockedScrollSlots
    ) {
        save.ss = [gameState.scrollSlots || 5, gameState.unlockedScrollSlots || 1];
    }

    const equippedScrolls = (gameState.equippedScrolls || []).map(scroll => scroll ? encodeItemForSave(scroll) : 0);
    if (equippedScrolls.some(Boolean)) save.es = equippedScrolls;
    if (gameState.lastRegen !== INITIAL_GAME_STATE_SNAPSHOT.lastRegen) save.lr = gameState.lastRegen || Date.now();
    if (gameState.highestDungeonStage) save.hd = gameState.highestDungeonStage;
    if (gameState.worldBossNextSpawn) save.wbn = gameState.worldBossNextSpawn;

    const guildQuests = encodeGuildQuestsForSave();
    if (guildQuests.length) save.gq = guildQuests;
    if (gameState.lastGuildQuestRefresh) save.lgr = gameState.lastGuildQuestRefresh;

    if (
        gameState.forceRefreshCost !== INITIAL_GAME_STATE_SNAPSHOT.forceRefreshCost ||
        gameState.forceRefreshCount !== INITIAL_GAME_STATE_SNAPSHOT.forceRefreshCount ||
        gameState.marketForceRefreshCost !== INITIAL_GAME_STATE_SNAPSHOT.marketForceRefreshCost ||
        gameState.marketForceRefreshCount !== INITIAL_GAME_STATE_SNAPSHOT.marketForceRefreshCount
    ) {
        save.frc = [
            gameState.forceRefreshCost || 100,
            gameState.forceRefreshCount || 0,
            gameState.marketForceRefreshCost || 150,
            gameState.marketForceRefreshCount || 0
        ];
    }

    return save;
}

function decodeCompactSaveData(data) {
    const hydrated = cloneData(INITIAL_GAME_STATE_SNAPSHOT);
    hydrated.player = {
        ...hydrated.player,
        ...decodeAliasedObject(data.p || {}, SAVE_PLAYER_KEY_FROM_ALIAS)
    };
    hydrated.equipment = decodeEquipmentFromSave(data.e || {});
    hydrated.inventory = Array.isArray(data.i) ? data.i.map(decodeItemForSave).filter(Boolean) : cloneData(hydrated.inventory);

    const activeQuestState = decodeActiveQuestsFromSave(data.q || []);
    hydrated.quests = activeQuestState.quests;
    hydrated.questProgress = activeQuestState.questProgress;
    hydrated.completedQuests = Array.isArray(data.cq) ? data.cq.slice() : [];

    if (data.jc !== undefined) hydrated.jobCooldown = data.jc;
    if (data.dp !== undefined) hydrated.daysPassed = data.dp;
    if (data.wm !== undefined) hydrated.wanderMode = !!data.wm;
    if (data.jb !== undefined) hydrated.jobsCompleted = data.jb;
    if (data.sg !== undefined) hydrated.soulGems = data.sg;
    if (Array.isArray(data.pm)) {
        hydrated.premiumMultiplier = data.pm[0] ?? 1;
        hydrated.premiumActionsUsed = data.pm[1] ?? 0;
    }
    if (Array.isArray(data.jp)) {
        hydrated.jobPoints = data.jp[0] ?? hydrated.jobPoints;
        hydrated.maxJobPoints = data.jp[1] ?? hydrated.maxJobPoints;
        hydrated.lastJobPointRegen = data.jp[2] ?? Date.now();
    }
    if (Array.isArray(data.ss)) {
        hydrated.scrollSlots = data.ss[0] ?? hydrated.scrollSlots;
        hydrated.unlockedScrollSlots = data.ss[1] ?? hydrated.unlockedScrollSlots;
    }
    if (Array.isArray(data.es)) {
        hydrated.equippedScrolls = data.es.map(entry => entry ? decodeItemForSave(entry) : null);
    }
    if (data.lr !== undefined) hydrated.lastRegen = data.lr;
    if (data.hd !== undefined) hydrated.highestDungeonStage = data.hd;
    if (data.wbn !== undefined) hydrated.worldBossNextSpawn = data.wbn;

    const guildQuestState = decodeGuildQuestsFromSave(data.gq || []);
    hydrated.guildQuests = guildQuestState.quests;
    hydrated.guildQuestProgress = guildQuestState.guildQuestProgress;
    if (data.lgr !== undefined) hydrated.lastGuildQuestRefresh = data.lgr;

    if (Array.isArray(data.frc)) {
        hydrated.forceRefreshCost = data.frc[0] ?? hydrated.forceRefreshCost;
        hydrated.forceRefreshCount = data.frc[1] ?? hydrated.forceRefreshCount;
        hydrated.marketForceRefreshCost = data.frc[2] ?? hydrated.marketForceRefreshCost;
        hydrated.marketForceRefreshCount = data.frc[3] ?? hydrated.marketForceRefreshCount;
    }

    pruneTransientState(hydrated);
    sanitizeLoadedStateData(hydrated);
    return hydrated;
}

function decodeLegacySaveData(data) {
    const hydrated = cloneData(INITIAL_GAME_STATE_SNAPSHOT);

    Object.keys(hydrated).forEach(key => {
        if (data[key] !== undefined) {
            hydrated[key] = cloneData(data[key]);
        }
    });

    hydrated.player = { ...cloneData(INITIAL_GAME_STATE_SNAPSHOT.player), ...(cloneData(data.player) || {}) };
    hydrated.equipment = { ...cloneData(INITIAL_GAME_STATE_SNAPSHOT.equipment), ...(cloneData(data.equipment) || {}) };
    hydrated.inventory = Array.isArray(data.inventory) ? cloneData(data.inventory) : cloneData(hydrated.inventory);
    hydrated.equippedScrolls = Array.isArray(data.equippedScrolls)
        ? cloneData(data.equippedScrolls)
        : cloneData(hydrated.equippedScrolls);
    hydrated.quests = Array.isArray(data.quests) ? cloneData(data.quests) : [];
    hydrated.completedQuests = Array.isArray(data.completedQuests) ? cloneData(data.completedQuests) : [];
    hydrated.questProgress = cloneData(data.questProgress || {});
    hydrated.guildQuests = Array.isArray(data.guildQuests) ? cloneData(data.guildQuests) : [];
    hydrated.guildQuestProgress = cloneData(data.guildQuestProgress || {});

    pruneTransientState(hydrated);
    sanitizeLoadedStateData(hydrated);
    return hydrated;
}

function applyHydratedGameState(state) {
    const cleaned = cloneData(state);
    Object.keys(gameState).forEach(key => {
        gameState[key] = cleaned[key];
    });
    Object.keys(dungeonState).forEach(key => {
        dungeonState[key] = cloneData(INITIAL_DUNGEON_STATE_SNAPSHOT[key]);
    });

    recalculateAllPlayerStats();
}

function restoreGameStateFromSaveData(rawData) {
    let parsed = rawData;
    if (typeof rawData === 'string') {
        parsed = JSON.parse(rawData);
    }
    if (!parsed || typeof parsed !== 'object') return false;

    const hydrated = parsed.v === SAVE_SCHEMA_VERSION
        ? decodeCompactSaveData(parsed)
        : decodeLegacySaveData(parsed);

    if (!hydrated.player || !hydrated.inventory || !hydrated.equipment) return false;

    applyHydratedGameState(hydrated);
    return true;
}

function exportSavefile() {
    try {
        const encrypted = encryptData(buildCompactSaveData());
        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
        const filename = `realm-of-shadows-save-${timestamp}.ros`;
        
        const blob = new Blob([encrypted], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        addBattleMsg('Savefile exported successfully!', 'reward');
        addChatMessage('SYSTEM', 'Savefile exported as encrypted backup.', true);
    } catch (e) {
        addBattleMsg('Failed to export savefile!', 'damage');
        console.error('Export error:', e);
    }
}

function importSavefile(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = async function(e) {
        try {
            const encryptedData = e.target.result;
            const decrypted = decryptData(encryptedData);
            
            if (!decrypted) {
                addBattleMsg('Invalid or corrupted savefile!', 'damage');
                return;
            }
            
            // Validate essential game state properties
            if ((!decrypted.v && (!decrypted.player || !decrypted.inventory || !decrypted.equipment)) || (decrypted.v && typeof decrypted !== 'object')) {
                addBattleMsg('Invalid savefile format!', 'damage');
                return;
            }
            
            // Confirm before overwriting
            if (confirm('This will overwrite your current progress. Continue?')) {
                if (!restoreGameStateFromSaveData(decrypted)) {
                    throw new Error('Unable to restore imported save');
                }
                await persistCurrentGameState();
                updateStats();
                showScreen('travel');
                updateSidePanels();
                addBattleMsg('Savefile imported successfully!', 'reward');
                addChatMessage('SYSTEM', `${gameState.player.name} imported a savefile.`, true);
            }
        } catch (err) {
            addBattleMsg('Failed to import savefile!', 'damage');
            console.error('Import error:', err);
        }
    };
    reader.readAsText(file);
    
    // Reset file input so same file can be imported again
    event.target.value = '';
}

async function saveGame() {
    try {
        const result = await persistCurrentGameState();

        if (result.usedIndexedDbFallback) {
            addChatMessage('SYSTEM', '✅ Game saved using extended browser storage (localStorage quota workaround)!', true);
            console.warn('localStorage quota exceeded, save stored in IndexedDB instead', result.localError);
        } else if (result.localSaved && result.indexedDbSaved) {
            addChatMessage('SYSTEM', '✅ Game saved successfully!', true);
        } else if (result.localSaved) {
            addChatMessage('SYSTEM', '✅ Game saved locally!', true);
        } else {
            addChatMessage('SYSTEM', '✅ Game saved using extended browser storage!', true);
        }
    } catch (e) {
        console.log('Save failed', e);
        addChatMessage('SYSTEM', isQuotaExceededError(e)
            ? '❌ Browser storage quota exceeded and fallback save also failed!'
            : '❌ Failed to save game!', true);
    }
}

async function loadGame() {
    try {
        const restored = await restorePersistedGameState();
        if (restored) {
            updateStats();
            showScreen('travel');
            updateSidePanels();
            addChatMessage('SYSTEM', restored.source === 'indexedDB'
                ? '✅ Game loaded from extended browser storage!'
                : '✅ Game loaded successfully!', true);
        } else {
            addChatMessage('SYSTEM', '⚠️ No save file found!', true);
        }
    } catch (e) {
        console.log('Load failed', e);
        addChatMessage('SYSTEM', '❌ Failed to load game!', true);
    }
}

async function resetGame() {
    if (confirm('Are you sure you want to reset all progress?')) {
        localStorage.removeItem(SAVE_STORAGE_KEY);
        try {
            await removeStringFromIndexedDB(SAVE_STORAGE_KEY);
        } catch (e) {
            console.warn('Failed to clear IndexedDB save', e);
        }
        location.reload();
    }
}

// AUTO REGEN
function autoRegen() {
    const now = Date.now();
    const elapsed = (now - gameState.lastRegen) / 1000;
    
    if (elapsed >= 5) {
        const p = gameState.player;
        p.hp = Math.min(p.maxHp, p.hp + Math.floor(p.maxHp * 0.02));
        p.mp = Math.min(p.maxMp, p.mp + Math.floor(p.maxMp * 0.03));
        gameState.lastRegen = now;
        updateStats();
    }
    
    // Random Soul Gem drop: 1/12000 chance every tick, 1-3 soul gems
    if (Math.random() < 1/12000) {
        const gems = rand(1, 3);
        gameState.soulGems += gems;
        addChatMessage('SYSTEM', `✨ You found ${gems} Soul Gem${gems > 1 ? 's' : ''} while exploring!`, true);
        addBattleMsg(`✨ Found ${gems} Soul Gem${gems > 1 ? 's' : ''}!`, 'reward');
        updateStats();
    }
    
    // Job Point Regeneration - 1 point every 5 real minutes
    const JOB_POINT_REGEN_INTERVAL = 5 * 60 * 1000; // 5 minutes in milliseconds
    if (gameState.jobPoints < gameState.maxJobPoints) {
        const timeSinceLastRegen = now - gameState.lastJobPointRegen;
        if (timeSinceLastRegen >= JOB_POINT_REGEN_INTERVAL) {
            // Calculate how many full 5 minute intervals have passed
            const pointsToRegen = Math.floor(timeSinceLastRegen / JOB_POINT_REGEN_INTERVAL);
            // Regenerate points without exceeding max
            gameState.jobPoints = Math.min(gameState.maxJobPoints, gameState.jobPoints + pointsToRegen);
            // Correctly update last regen time while carrying over remaining time
            gameState.lastJobPointRegen += pointsToRegen * JOB_POINT_REGEN_INTERVAL;
            // Update UI if on jobs screen
            if (document.getElementById('job-content')) {
                renderJobs();
            }
        }
    }
}
async function init() {
    // Try to load saved game from localStorage or IndexedDB fallback.
    try {
        await restorePersistedGameState();
    } catch (e) {
        console.log('Failed to load save, starting new game');
    }
    
    updateStats();
    showScreen('travel');
    updateSidePanels();
    
    // Auto-save every 60 seconds
    setInterval(saveGame, 60000);
    
    // Auto-regen every 5 seconds
    setInterval(autoRegen, 5000);
    
    // Fake chat every 15-30 seconds
    setInterval(generateFakeChat, 15000 + Math.random() * 15000);
    
    // System message
    addChatMessage('SYSTEM', 'Welcome to Realm of Shadows!', true);
}

// ==================== WORLD BOSS SYSTEM ====================

const WORLD_BOSS_SPAWN_INTERVAL_MIN = 10 * 60 * 1000; // 10 minutes
const WORLD_BOSS_SPAWN_INTERVAL_MAX = 60 * 60 * 1000; // 60 minutes
const WORLD_BOSS_DURATION = 30 * 60 * 1000; // 30 minutes duration

function scheduleNextWorldBoss() {
    const delay = rand(WORLD_BOSS_SPAWN_INTERVAL_MIN, WORLD_BOSS_SPAWN_INTERVAL_MAX);
    gameState.worldBossNextSpawn = Date.now() + delay;
    
    setTimeout(() => {
        if (!gameState.worldBossActive) {
            spawnWorldBoss();
        }
    }, delay);
}

function spawnWorldBoss() {
    // Select appropriate boss based on player level
    const availableBosses = WORLD_BOSSES.filter(b => b.tier <= gameState.player.level + 10);
    if (availableBosses.length === 0) {
        scheduleNextWorldBoss();
        return;
    }
    
    const bossTemplate = pick(availableBosses);
    const levelScale = 1 + Math.max(0, gameState.player.level - 25) * 0.03;
    
    gameState.currentWorldBoss = {
        ...bossTemplate,
        hp: Math.floor(bossTemplate.hp * levelScale * 5),
        maxHp: Math.floor(bossTemplate.hp * levelScale * 5),
        atk: Math.floor(bossTemplate.atk * levelScale * 0.7),
        def: Math.floor(bossTemplate.def * levelScale * 0.7),
        name: `⚔️ WORLD BOSS: ${bossTemplate.name} ⚔️`
    };
    
    gameState.worldBossActive = true;
    gameState.worldBossDamage = {};
    gameState.worldBossTotalDamage = 0;
    gameState.worldBossSpawnTime = Date.now();
    
    // Highlight Battle tab in red
    const battleNavBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn => btn.textContent.includes('Battle'));
    if (battleNavBtn) {
        battleNavBtn.style.backgroundColor = '#660000';
        battleNavBtn.style.color = '#ff4444';
        battleNavBtn.style.animation = 'bossPulse 1.5s infinite';
        battleNavBtn.style.fontWeight = 'bold';
    }
    
    addChatMessage('SYSTEM', `⚠️ WORLD BOSS ${bossTemplate.name} HAS APPEARED! Go to the Battle tab!`, true);
    addChatMessage('SYSTEM', `⚠️ World Boss has ${gameState.currentWorldBoss.maxHp.toLocaleString()} HP! All players can attack!`, true);
    
    // Start fake player attacks
    startFakePlayerBossAttacks();
    
    // Boss will remain until defeated - no automatic despawn
}

function despawnWorldBoss(defeated) {
    gameState.worldBossActive = false;
    
    // Reset Battle tab styling
    const battleNavBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn => btn.textContent.includes('Battle'));
    if (battleNavBtn) {
        battleNavBtn.style.backgroundColor = '';
        battleNavBtn.style.color = '';
        battleNavBtn.style.animation = '';
        battleNavBtn.style.fontWeight = '';
    }
    
    // Distribute rewards to all participants
    distributeWorldBossRewards();
    
    if (defeated) {
        addChatMessage('SYSTEM', `🎉 WORLD BOSS ${gameState.currentWorldBoss.name} HAS BEEN DEFEATED! Rewards distributed!`, true);
    } else {
        addChatMessage('SYSTEM', `World Boss has escaped! Better luck next time!`, true);
    }
    
    gameState.currentWorldBoss = null;
    
    // Schedule next boss
    scheduleNextWorldBoss();
    
    // Refresh battle screen if open
    if (document.getElementById('battle-screen').classList.contains('active')) {
        renderBattle();
    }
}

function attackWorldBoss() {
    if (!gameState.worldBossActive || !gameState.currentWorldBoss) return;
    
    const boss = gameState.currentWorldBoss;
    const totalAtk = getTotalAtk();
    const totalCrit = getTotalCrit();
    const damageMult = getScrollDamageMultiplier();
    const critBonus = getScrollCritBonus();
    const invulnerable = isInvulnerable();
    const totalDef = getEffectivePlayerDefense();
    
    // Calculate damage
    let dmg = Math.max(5, totalAtk - Math.floor(boss.def * 0.3) + rand(-5, 10));
    let crit = Math.random() * 100 < (totalCrit + critBonus);
    if (crit) dmg = Math.floor(dmg * (1.5 + getTotalCritDmg() / 100));
    dmg = Math.floor(dmg * damageMult);

    // Apply special ability bonus damage
    let bonusDmg = 0;
    let specialMsg = '';
    const eqSlots = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];
    eqSlots.forEach(slot => {
        const eq = gameState.equipment[slot];
        if (eq) {
            if (eq.specialAbility === 'half_current_hp') {
                bonusDmg += Math.floor(boss.hp * 0.5);
                specialMsg += ' (Reaper Scythe bonus)';
            }
        }
    });
    dmg += bonusDmg;

    boss.hp = Math.max(0, boss.hp - dmg);

    // Record player damage
    recordWorldBossPlayerDamage(dmg);
    
    addBattleMsg(`You hit the World Boss for ${dmg} damage${crit ? ' (CRIT!)' : ''}${specialMsg}!`, crit ? 'reward' : 'info');

    // Apply lifesteal
    let healAmt = calculateDamageBasedHealing(dmg);
    if (healAmt > 0) {
        const p = gameState.player;
        const actualHeal = Math.min(healAmt, getTotalMaxHp() - p.hp);
        p.hp += actualHeal;
        if (actualHeal > 0) {
            addBattleMsg(`Lifesteal healed you for ${actualHeal} HP!`, 'heal');
        }
    }

    // Check if boss is dead
    if (boss.hp <= 0) {
        despawnWorldBoss(true);
        return;
    }
    
    const p = gameState.player;
    const counterResult = resolveEnemyCounterAttack(p, boss, addBattleMsg, null, {
        invulnerable,
        totalDef,
        defenseMitigationFactor: 0.4
    });

    if (counterResult.enemyDied) {
        despawnWorldBoss(true);
        return;
    }

    const endOfTurnResult = applyEndOfTurnScrollEffects(p, boss, addBattleMsg);
    if (endOfTurnResult.enemyDied) {
        despawnWorldBoss(true);
        return;
    }

    decrementScrollEffects(addBattleMsg);
    
    if (p.hp <= 0) {
        addBattleMsg('You have been defeated by the World Boss!', 'damage');
        p.hp = Math.floor(p.maxHp * 0.5);
    }
    
    renderBattle();
    updateStats();
}

function startFakePlayerBossAttacks() {
    const fakePlayerNames = ['DragonSlayer', 'ShadowMage', 'IronFist', 'MysticWolf', 'DarkKnight', 'FireStorm', 'IceQueen', 'ThunderBolt', 'NightBlade', 'StormBreaker', 'GoldHunter', 'TreasureSeeker', 'ItemCollector', 'LegendFinder', 'EpicHunter'];
    
    const attackInterval = setInterval(() => {
        if (!gameState.worldBossActive) {
            clearInterval(attackInterval);
            return;
        }
        
        // 3-8 fake players attack each tick
        const numAttackers = rand(3, 8);
        const attackers = [];
        
        for (let i = 0; i < numAttackers; i++) {
            const attacker = pick(fakePlayerNames.filter(n => !attackers.includes(n)));
            if (!attacker) continue;
            attackers.push(attacker);
            
            const dmg = rand(20, 150 + gameState.player.level * 5);
            gameState.currentWorldBoss.hp = Math.max(0, gameState.currentWorldBoss.hp - dmg);
            
            if (!gameState.worldBossDamage[attacker]) {
                gameState.worldBossDamage[attacker] = 0;
            }
            gameState.worldBossDamage[attacker] += dmg;
            gameState.worldBossTotalDamage += dmg;
            
            // Show some attacks in chat
            if (Math.random() < 0.2) {
                addChatMessage(attacker, `attacked the World Boss for ${dmg} damage!`, false, true);
            }
        }
        
        // Check if boss is dead
        if (gameState.currentWorldBoss.hp <= 0) {
            clearInterval(attackInterval);
            despawnWorldBoss(true);
        }
    }, 3000);
}

function distributeWorldBossRewards() {
    const playerName = gameState.player.name;
    const playerDamage = gameState.worldBossDamage[playerName] || 0;
    
    if (playerDamage <= 0) {
        addBattleMsg('You did not participate in the World Boss fight.', 'info');
        return;
    }
    
    const damagePercent = playerDamage / gameState.worldBossTotalDamage;
    const boss = gameState.currentWorldBoss;
    
    // Base rewards based on damage contribution
    const baseXp = Math.floor(boss.xp * damagePercent * 10);
    const baseGold = Math.floor(boss.gold * damagePercent * 10);
    
    gameState.player.xp += baseXp;
    gameState.player.gold += baseGold;
    
    addBattleMsg(`World Boss Rewards: ${baseXp} XP, ${baseGold} Gold!`, 'reward');
    
    // Item drops - higher damage = higher rarity chance
    const dropChance = Math.min(1, (0.3 + damagePercent * 0.5) * (1 + getScrollDropBoost()));
    if (Math.random() < dropChance) {
        // 10x drop rate for epic and above
        const luck = getTotalLuck();
        const luckBonus = Math.min(luck * 0.01, 0.3);
        
        const roll = Math.random();
        let targetRarity;
        
        if (roll < 0.05 + luckBonus * 0.1) {
            targetRarity = 'legendary';
        } else if (roll < 0.25 + luckBonus * 0.2) {
            targetRarity = 'epic';
        } else if (roll < 0.50 + luckBonus * 0.3) {
            targetRarity = 'rare';
        } else {
            targetRarity = 'uncommon';
        }
        
        const droppedItem = getLeveledItemDrop(targetRarity, boss.tier);
        if (droppedItem) {
            addToInventory({ ...droppedItem, qty: 1 });
            const rarityColor = getRarityColor(droppedItem.rarity);
            const isUber = isUberUnique(droppedItem);
            const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
            addBattleMsg(`World Boss dropped: <span style="${itemColorStyle}">${droppedItem.name}</span> (${droppedItem.rarity})!`, 'reward');
            addItemLog('worldboss', droppedItem.name);
            addChatMessage('SYSTEM', `${playerName} received ${droppedItem.name} (${droppedItem.rarity}) from World Boss!`, true);
        }
    }
    
    checkLevelUp();
    updateStats();
}

// Override renderBattle to add World Boss section
const originalRenderBattle = renderBattle;
renderBattle = function() {
    const container = document.getElementById('battle-content');
    
    // Show World Boss if active
    if (gameState.worldBossActive && gameState.currentWorldBoss) {
        const boss = gameState.currentWorldBoss;
        const hpPct = (boss.hp / boss.maxHp * 100).toFixed(0);
        const timeRemaining = Math.max(0, WORLD_BOSS_DURATION - (Date.now() - gameState.worldBossSpawnTime));
        const minsLeft = Math.floor(timeRemaining / 60000);
        const secsLeft = Math.floor((timeRemaining % 60000) / 1000);
        
        let html = `<div class="boss-alert">
            <div class="boss-name">${boss.name}</div>
            <div style="color:#aaa">Time Remaining: ${minsLeft}m ${secsLeft}s | Total Damage: ${gameState.worldBossTotalDamage.toLocaleString()}</div>
            <div class="boss-hp-bar">
                <div class="boss-hp-fill" style="width:${hpPct}%"></div>
            </div>
            <div style="color:#ff6600;margin:5px 0">HP: ${boss.hp.toLocaleString()} / ${boss.maxHp.toLocaleString()} (${hpPct}%)</div>
            <button class="action-btn boss-btn" onclick="attackWorldBoss()" style="margin-top:10px;font-size:1.1em;padding:12px 25px;">⚔️ ATTACK WORLD BOSS</button>
        </div>`;

        const hasScrolls = gameState.equippedScrolls.some(s => s !== null);
        if (hasScrolls) {
            html += `<div class="section-title">Scrolls</div>`;
            gameState.equippedScrolls.forEach((scroll, idx) => {
                if (scroll) {
                    html += `<button class="action-btn scroll-btn" onclick="useScroll(${idx})">${scroll.name}</button>`;
                }
            });
        }
        
        // Show player's damage rank
        const damageSorted = Object.entries(gameState.worldBossDamage)
            .sort((a, b) => b[1] - a[1]);
        const playerRank = damageSorted.findIndex(e => e[0] === gameState.player.name) + 1;
        const playerDamage = gameState.worldBossDamage[gameState.player.name] || 0;
        
        if (playerRank > 0) {
            html += `<div style="background:#1a1a1a;padding:10px;margin:10px 0;border:1px solid #ffaa00;">
                <div style="color:#ffaa00;font-weight:bold">📊 Your Contribution</div>
                <div>Rank: #${playerRank} / ${damageSorted.length} participants</div>
                <div>Damage Dealt: ${playerDamage.toLocaleString()}</div>
                <div>Damage %: ${(playerDamage / gameState.worldBossTotalDamage * 100).toFixed(1)}%</div>
            </div>`;
        }
        
        html += `<div style="margin-top:20px;">
            <button class="action-btn dungeon-btn" onclick="startDungeon()">Enter Dungeon</button>
        </div>`;
        
        container.innerHTML = html;
        return;
    }
    
    // Call original render for normal battle screen
    originalRenderBattle.apply(this, arguments);
};

// Initialize World Boss system
scheduleNextWorldBoss();

// Initialize auction system
initAuctionSystem();

// Start the game
init();
</script>
