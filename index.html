<!DOCTYPE html>
<html lang="en">
<head>

    <title>Realm of Shadows - Text MUD</title>

    <style>
        /* SVG definitions for gradients */
        .svg-defs { position: absolute; width: 0; height: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 8px; }

            25% { background-color: #1a0d0d; border-color: #ff0000; }
            50% { background-color: #1a1a0d; border-color: #00ff00; }
            75% { background-color: #0d1a1a; border-color: #0000ff; }

        @media (max-width: 900px) {

function getPvpCooldownRemainingMs() {
    return Math.max(0, (gameState.pvpCooldownUntil || 0) - Date.now());
}

function getTradeCooldownRemainingMs() {
    return Math.max(0, (gameState.tradeCooldownUntil || 0) - Date.now());
}

function getCombatCooldownRemainingMs() {
    return Math.max(0, (gameState.combatCooldownUntil || 0) - Date.now());
}

function getDefeatScreenLockRemainingMs() {
    return Math.max(0, (gameState.navigationCooldownUntil || 0) - Date.now());
}

function formatPvpCooldown(ms) {
    const totalSeconds = Math.ceil(ms / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${minutes}m ${String(seconds).padStart(2, '0')}s`;
}

function getDefeatStatusMessage() {
    const combatRemaining = getCombatCooldownRemainingMs();
    const screenLockRemaining = getDefeatScreenLockRemainingMs();
    if (combatRemaining <= 0 && screenLockRemaining <= 0) return '';

    const details = [];
    if (combatRemaining > 0) details.push(`Combat cooldown: ${formatPvpCooldown(combatRemaining)}`);
    if (screenLockRemaining > 0) details.push(`Battle/Wander locked: ${formatPvpCooldown(screenLockRemaining)}`);
    return `You have been defeated. Reviving... ${details.join(' | ')}`;
}

function updateStatusBanner() {
    const banner = document.getElementById('status-banner');
    if (!banner) return;

    const message = getDefeatStatusMessage();
    banner.textContent = message;
    banner.style.display = message ? 'block' : 'none';
}

function updateNavigationCooldownState() {
    const remaining = getDefeatScreenLockRemainingMs();
    const isActive = remaining > 0;
    const lockedButtons = [
        document.getElementById('battle-tab'),
        document.getElementById('wander-tab')
    ].filter(Boolean);

    lockedButtons.forEach(btn => {
        btn.disabled = isActive;
        btn.title = isActive ? `Unavailable after defeat for ${formatPvpCooldown(remaining)}.` : '';
    });
}

function refreshCooldownUi() {
    const combatSeconds = Math.ceil(getCombatCooldownRemainingMs() / 1000);
    const screenLockSeconds = Math.ceil(getDefeatScreenLockRemainingMs() / 1000);
    const signature = `${combatSeconds}:${screenLockSeconds}`;
    if (signature === lastCooldownUiSignature) return;
    lastCooldownUiSignature = signature;

    updateNavigationCooldownState();
    updateStatusBanner();

    const activeScreen = document.querySelector('.screen.active');
    if (!activeScreen) return;

    switch (activeScreen.id) {
        case 'travel-screen': renderTravel(); break;
        case 'battle-screen': renderBattle(); break;
        case 'players-screen': renderPlayers(); break;
        case 'wandering-screen': renderWandering(); break;
    }
}

function attemptShowScreen(screenName) {
    const combatContext = getCurrentCombatContext();
    const targetScreen = combatContext === 'wandering' && screenName === 'battle'
        ? 'wandering'
        : screenName;
    const canBypassCooldown =
        (combatContext === 'battle' && targetScreen === 'battle') ||
        (combatContext === 'dungeon' && targetScreen === 'battle') ||
        (combatContext === 'worldboss' && targetScreen === 'battle') ||
        (combatContext === 'wandering' && targetScreen === 'wandering');

    const remaining = getDefeatScreenLockRemainingMs();
    const isLockedScreen = targetScreen === 'battle' || targetScreen === 'wandering';
    if (remaining > 0 && isLockedScreen && !canBypassCooldown) {
        addBattleMsg(`Battle and Wander are unavailable after defeat for ${formatPvpCooldown(remaining)}.`, 'damage');
        refreshCooldownUi();
        return;
    }
    showScreen(targetScreen);
}

function guardCombatCooldown(logCallback = addBattleMsg, rerenderCallback = null) {
    const remaining = getCombatCooldownRemainingMs();
    if (remaining <= 0) return false;
    logCallback(`Combat systems are on cooldown for ${formatPvpCooldown(remaining)}.`, 'damage');
    if (typeof rerenderCallback === 'function') rerenderCallback();
    refreshCooldownUi();
    return true;
}

function triggerDefeatRecovery(logCallback = addBattleMsg) {
    const now = Date.now();
    gameState.player.hp = Math.max(1, Math.floor(getTotalMaxHp() * 0.05));
    gameState.combatCooldownUntil = Math.max(gameState.combatCooldownUntil || 0, now + DEFEAT_COMBAT_COOLDOWN_MS);
    gameState.navigationCooldownUntil = Math.max(gameState.navigationCooldownUntil || 0, now + DEFEAT_SCREEN_LOCKOUT_MS);
    logCallback('You have been defeated. Reviving...', 'damage');
    addChatMessage('SYSTEM', 'You have been defeated. Reviving...', true);
    scheduleSilentPersist();
    refreshCooldownUi();
}

// QUESTS
function roundQuestReward(value, step = 25) {
    return Math.max(step, Math.round(value / step) * step);
}

function getEnemyQuestData(enemyKey) {
    const enemy = enemies[enemyKey];
    return {
        tier: enemy?.tier ?? 0,
        xp: enemy?.xp ?? 15,
        gold: enemy?.gold ?? 5
    };
}

function createFixedQuestReward(target, count, bonusMultiplier = 1) {
    const enemyData = getEnemyQuestData(target);
    const tierScale = Math.pow(enemyData.tier + 1, 1.3);
    const xpReward = enemyData.xp * count * tierScale * (1.6 + enemyData.tier * 0.35) * bonusMultiplier;
    const goldReward = enemyData.gold * count * tierScale * (1.8 + enemyData.tier * 0.25) * bonusMultiplier;

    return {
        xp: roundQuestReward(xpReward, 25),
        gold: roundQuestReward(goldReward, 25)
    };
}

function createGuildQuestReward(template, rarity, count, playerLevel) {
    const rarityScale = {
        common: 1.25,
        uncommon: 1.8,
        rare: 2.8,
        epic: 4.5,
        legendary: 8
    };

    const enemyData = getEnemyQuestData(template.target);
    const levelScale = 1 + Math.floor(playerLevel / 10) * 0.35;
    const tierScale = Math.pow(enemyData.tier + 1, 1.15);
    const countScale = 1 + Math.max(0, count - template.baseCount) * 0.12;
    const rewardScale = (rarityScale[rarity] || 1.25) * levelScale * tierScale * countScale;

    return {
        xp: roundQuestReward(template.baseXP * rewardScale, 25),
        gold: roundQuestReward(template.baseGold * rewardScale, 25),
        soulGem: template.soulGem || false
    };
}

    veteran: { label: 'Veteran', color: '#66ccff', rewardMultiplier: 1.25, baseCount: 6, minCount: 3, maxCount: 8 },

};

const DAILY_QUEST_BOARD_TIERS = [
    { maxLevel: 4, tiers: ['apprentice', 'apprentice', 'veteran'] },
    { maxLevel: 12, tiers: ['apprentice', 'apprentice', 'veteran', 'elite'] },
    { maxLevel: 25, tiers: ['apprentice', 'veteran', 'veteran', 'elite', 'mythic'] },

    { maxLevel: Infinity, tiers: ['veteran', 'veteran', 'elite', 'elite', 'mythic', 'mythic'] }
];

function getDailyQuestTierColor(tierKey) {
    return DAILY_QUEST_TIER_META[tierKey]?.color || '#6666ff';
}

function humanizeQuestTarget(target) {
    return String(target || 'unknown foe')
        .replace(/_/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
}

function pluralizeQuestTarget(name, count) {
    if (count === 1) return name;
    if (/s$/i.test(name)) return name;
    return `${name}s`;
}

function getDailyQuestTierPlan(playerLevel = gameState.player.level || 1) {
    const level = Math.max(1, Number(playerLevel) || 1);
    return (DAILY_QUEST_BOARD_TIERS.find(entry => level <= entry.maxLevel) || DAILY_QUEST_BOARD_TIERS[DAILY_QUEST_BOARD_TIERS.length - 1]).tiers.slice();
}

function getEnemyQuestLocationKey(target) {
    for (const [locKey, loc] of Object.entries(locations || {})) {
        if (Array.isArray(loc?.enemies) && loc.enemies.includes(target)) return locKey;
    }
    return 'town';
}

function getAccessibleDailyQuestTargets(playerLevel = gameState.player.level || 1) {
    const seenTargets = new Set();
    const entries = [];

    Object.entries(locations || {}).forEach(([locKey, loc]) => {
        if (!Array.isArray(loc?.enemies)) return;
        if ((loc.minLevel || 1) > playerLevel) return;

        loc.enemies.forEach(target => {
            if (!target || seenTargets.has(target)) return;
            seenTargets.add(target);

            const enemyMeta = enemies[target] || {};
            const rewardMeta = getEnemyQuestData(target);
            entries.push({
                target,
                enemyName: enemyMeta.name || humanizeQuestTarget(target),
                tier: rewardMeta.tier ?? 0,
                xp: rewardMeta.xp ?? 0,
                gold: rewardMeta.gold ?? 0,
                location: locKey,
                locationName: loc.name || humanizeQuestTarget(locKey)
            });
        });
    });

    if (entries.length === 0) {
        entries.push({
            target: 'rat',
            enemyName: enemies.rat?.name || 'Rat',
            tier: getEnemyQuestData('rat').tier,
            xp: getEnemyQuestData('rat').xp,
            gold: getEnemyQuestData('rat').gold,
            location: 'forest',
            locationName: locations.forest?.name || 'Enchanted Forest'
        });
    }

    return entries.sort((a, b) => {
        if ((a.tier || 0) !== (b.tier || 0)) return (a.tier || 0) - (b.tier || 0);
        return String(a.enemyName || '').localeCompare(String(b.enemyName || ''));
    });
}

function getDailyQuestPoolForTier(targets, tierKey) {
    if (!Array.isArray(targets) || targets.length === 0) return [];
    const total = targets.length;
    const ranges = {
        apprentice: [0, Math.max(0, Math.ceil(total * 0.45) - 1)],
        veteran: [Math.max(0, Math.floor(total * 0.15)), Math.max(0, Math.ceil(total * 0.75) - 1)],
        elite: [Math.max(0, Math.floor(total * 0.35)), total - 1],
        mythic: [Math.max(0, Math.floor(total * 0.6)), total - 1]
    };

    const [start, end] = ranges[tierKey] || [0, total - 1];
    return targets.slice(start, end + 1).filter(Boolean);
}

function getDailyQuestCount(targetData, tierKey) {
    const meta = DAILY_QUEST_TIER_META[tierKey] || DAILY_QUEST_TIER_META.apprentice;
    const enemyTierReduction = Math.min(4, Math.floor((targetData?.tier || 0) / 2));
    const count = meta.baseCount - enemyTierReduction + rand(-1, 1);
    return clamp(count, meta.minCount, meta.maxCount);
}

function createDailyQuestDefinition(targetData, tierKey, index, dayKey = getLocalDayKey()) {
    const meta = DAILY_QUEST_TIER_META[tierKey] || DAILY_QUEST_TIER_META.apprentice;
    const count = getDailyQuestCount(targetData, tierKey);
    const reward = createFixedQuestReward(targetData.target, count, meta.rewardMultiplier);
    const enemyName = targetData.enemyName || humanizeQuestTarget(targetData.target);
    const displayTarget = pluralizeQuestTarget(enemyName, count);

    return {
        id: `dq_${dayKey}_${tierKey}_${index}_${targetData.target}`,
        name: `${meta.label} Hunt: ${enemyName}`,
        desc: `Defeat ${count} ${displayTarget} in ${targetData.locationName}.`,
        target: targetData.target,
        count,
        reward,
        location: targetData.location || getEnemyQuestLocationKey(targetData.target),
        tierKey,
        tierLabel: meta.label,
        tierColor: meta.color,
        daily: true
    };
}

function generateDailyQuestBoard(playerLevel = gameState.player.level || 1, dayKey = getLocalDayKey()) {
    const targets = getAccessibleDailyQuestTargets(playerLevel);
    const tiers = getDailyQuestTierPlan(playerLevel);
    const usedTargets = new Set();
    const board = [];

    tiers.forEach((tierKey, idx) => {
        let pool = getDailyQuestPoolForTier(targets, tierKey).filter(entry => !usedTargets.has(entry.target));
        if (pool.length === 0) pool = targets.filter(entry => !usedTargets.has(entry.target));
        if (pool.length === 0) pool = targets.slice();
        if (pool.length === 0) return;

        const targetData = pick(pool);
        if (!targetData) return;

        usedTargets.add(targetData.target);
        board.push(createDailyQuestDefinition(targetData, tierKey, idx + 1, dayKey));
    });

    return board;
}

function getQuestMilestoneProgress() {
    const handedIn = Math.max(0, Number(gameState.questsHandedIn) || 0);
    const currentStep = handedIn % 5;
    return {
        handedIn,
        currentStep,
        remaining: currentStep === 0 ? 5 : 5 - currentStep
    };
}

function normalizeQuestDefinition(quest, idx = 0, dailyQuestBoard = []) {
    if (!quest) return null;

    if (typeof quest === 'string') {
        const fallback = (dailyQuestBoard || []).find(entry => entry.id === quest) || questDefs.find(entry => entry.id === quest);
        return fallback ? cloneData(fallback) : null;
    }

    if (Array.isArray(quest)) {
        const [id, name, desc, target, count, xp, gold, tierKey, tierLabel, location, daily] = quest;
        if (!target || !count) return null;
        return {
            id: String(id || `restored_daily_quest_${idx}`),
            name: name || `Quest: ${humanizeQuestTarget(target)}`,
            desc: desc || `Defeat ${count} ${pluralizeQuestTarget(humanizeQuestTarget(target), count)}.`,
            target,
            count: Math.max(1, Number(count) || 1),
            reward: {
                xp: Math.max(0, Number(xp) || 0),
                gold: Math.max(0, Number(gold) || 0)
            },
            tierKey: tierKey || '',
            tierLabel: tierLabel || DAILY_QUEST_TIER_META[tierKey]?.label || '',
            tierColor: getDailyQuestTierColor(tierKey),
            location: location || getEnemyQuestLocationKey(target),
            daily: !!daily
        };
    }

    if (typeof quest !== 'object') return null;

    const fallback = (dailyQuestBoard || []).find(entry => entry.id === quest.id) || questDefs.find(entry => entry.id === quest.id) || {};
    const target = quest.target || fallback.target;
    const count = Math.max(1, Number(quest.count ?? fallback.count) || 1);
    if (!target) return null;

    return {
        id: String(quest.id || fallback.id || `restored_daily_quest_${idx}`),
        name: quest.name || fallback.name || `Quest: ${humanizeQuestTarget(target)}`,
        desc: quest.desc || fallback.desc || `Defeat ${count} ${pluralizeQuestTarget(humanizeQuestTarget(target), count)}.`,
        target,
        count,
        reward: {
            xp: Math.max(0, Number(quest.reward?.xp ?? fallback.reward?.xp) || 0),
            gold: Math.max(0, Number(quest.reward?.gold ?? fallback.reward?.gold) || 0)
        },
        tierKey: quest.tierKey || fallback.tierKey || '',
        tierLabel: quest.tierLabel || fallback.tierLabel || DAILY_QUEST_TIER_META[quest.tierKey || fallback.tierKey]?.label || '',
        tierColor: quest.tierColor || fallback.tierColor || getDailyQuestTierColor(quest.tierKey || fallback.tierKey),
        location: quest.location || fallback.location || getEnemyQuestLocationKey(target),
        daily: quest.daily !== undefined ? !!quest.daily : !!fallback.daily
    };
}

function encodeQuestDefinitionForSave(quest) {
    if (!quest) return null;
    return [
        quest.id || '',
        quest.name || '',
        quest.desc || '',
        quest.target || '',
        Math.max(1, Number(quest.count) || 1),
        Math.max(0, Number(quest.reward?.xp) || 0),
        Math.max(0, Number(quest.reward?.gold) || 0),
        quest.tierKey || '',
        quest.tierLabel || '',
        quest.location || '',
        quest.daily ? 1 : 0
    ];
}

function encodeQuestBoardForSave(board) {
    return (board || []).map(encodeQuestDefinitionForSave).filter(Boolean);
}

function decodeQuestBoardFromSave(entries) {
    const board = [];
    (entries || []).forEach((entry, idx) => {
        const normalized = normalizeQuestDefinition(entry, idx, board);
        if (normalized) board.push(normalized);
    });
    return board;
}

function getLocalDayKey(date = new Date()) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

function getTimeUntilNextLocalMidnight(now = new Date()) {
    const nextMidnight = new Date(now);
    nextMidnight.setHours(24, 0, 0, 0);
    return Math.max(1000, nextMidnight.getTime() - now.getTime());
}

function resetDailyQuestBoard(options = {}) {
    const dayKey = options.dayKey || getLocalDayKey();
    const playerLevel = Math.max(1, Number(options.playerLevel ?? gameState.player.level) || 1);
    const hadQuestProgress =
        (gameState.quests && gameState.quests.length > 0) ||
        (gameState.completedQuests && gameState.completedQuests.length > 0) ||
        Object.keys(gameState.questProgress || {}).length > 0;

    gameState.quests = [];
    gameState.completedQuests = [];
    gameState.questProgress = {};
    gameState.dailyQuestBoard = generateDailyQuestBoard(playerLevel, dayKey);
    gameState.lastQuestRefreshDay = dayKey;

    if (options.announce !== false && hadQuestProgress) {
        addBattleMsg('Daily quests have refreshed for the new day!', 'reward');
        addChatMessage('SYSTEM', 'Daily quests refreshed at local midnight.', true);
    }

    if (document.getElementById('quest-screen')?.classList.contains('active')) {
        renderQuests();
    }

    scheduleSilentPersist();
}

function refreshDailyQuestBoardIfNeeded(options = {}) {
    const todayKey = getLocalDayKey();
    const hasBoard = Array.isArray(gameState.dailyQuestBoard) && gameState.dailyQuestBoard.length > 0;

    if (!gameState.lastQuestRefreshDay) {
        gameState.lastQuestRefreshDay = options.fallbackDayKey || todayKey;
        if (!hasBoard) {
            gameState.dailyQuestBoard = generateDailyQuestBoard(gameState.player.level || 1, gameState.lastQuestRefreshDay);
            scheduleSilentPersist();
            return true;
        }
        return false;
    }

    if (!options.force && gameState.lastQuestRefreshDay === todayKey) {
        if (!hasBoard) {
            gameState.dailyQuestBoard = generateDailyQuestBoard(gameState.player.level || 1, todayKey);
            scheduleSilentPersist();
            return true;
        }
        return false;
    }

    resetDailyQuestBoard({ announce: options.announce !== false, dayKey: todayKey, playerLevel: gameState.player.level || 1 });
    return true;
}

function scheduleDailyQuestRefresh() {
    if (dailyQuestRefreshTimeoutId) {
        clearTimeout(dailyQuestRefreshTimeoutId);
        dailyQuestRefreshTimeoutId = null;
    }

    dailyQuestRefreshTimeoutId = setTimeout(() => {
        dailyQuestRefreshTimeoutId = null;
        refreshDailyQuestBoardIfNeeded({ force: true, announce: true });
        scheduleDailyQuestRefresh();
    }, getTimeUntilNextLocalMidnight());
}

function initializeDailyQuestRefreshSystem(options = {}) {
    refreshDailyQuestBoardIfNeeded({
        announce: false,
        fallbackDayKey: options.fallbackDayKey
    });
    scheduleDailyQuestRefresh();
}

// UTILITY FUNCTIONS
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randFloat(min, max) { return Math.random() * (max - min) + min; }
function computePlayerLevelBaseStats(level = 1) {
    const safeLevel = Math.max(1, Math.floor(Number(level) || 1));
    return {
        maxHp: Math.floor(100 * Math.pow(1.10, safeLevel - 1)),
        maxMp: Math.floor(50 * Math.pow(1.10, safeLevel - 1)),
        atk: 10 + ((safeLevel - 1) * 3),
        def: 5 + ((safeLevel - 1) * 3)
    };
}

function getXpRequirementForLevel(level = 1) {
    const safeLevel = Math.max(1, Math.floor(Number(level) || 1));
    if (safeLevel >= MAX_PLAYER_LEVEL) return null;
    return Math.min(MAX_XP_REQUIREMENT, Math.floor(100 * Math.pow(1.5, safeLevel - 1)));
}

function applyLegacySaveMigrations(state) {
    if (!state || !state.player) return;

    const player = state.player;
    const flags = state.saveMigrationFlags && typeof state.saveMigrationFlags === 'object'
        ? state.saveMigrationFlags
        : {};
    const saveVersion = Math.floor(Number(state.__saveVersion) || 1);
    const legacyDungeonStage = Math.max(0, Number(state.highestDungeonStage) || 0);

    if (!flags.legacyDungeonStageBonusRemoved && legacyDungeonStage > 0 && saveVersion < 4) {
        const legacyBonus = legacyDungeonStage * 0.2;
        player.baseAtk = Math.max(10, Number((player.baseAtk ?? computePlayerLevelBaseStats(player.level).atk) - legacyBonus) || 10);
        player.baseDef = Math.max(5, Number((player.baseDef ?? computePlayerLevelBaseStats(player.level).def) - legacyBonus) || 5);
        flags.legacyDungeonStageBonusRemoved = true;
    }

    if (!flags.legacyLevel35RollbackApplied && saveVersion < 4 && (player.level || 1) > 35) {
        player.level = 35;
        player.xp = 0;
        player.xpToNext = getXpRequirementForLevel(35);
        const rolledBackStats = computePlayerLevelBaseStats(35);
        player.baseMaxHp = rolledBackStats.maxHp;
        player.baseMaxMp = rolledBackStats.maxMp;
        player.baseAtk = rolledBackStats.atk;
        player.baseDef = rolledBackStats.def;
        player.maxHp = rolledBackStats.maxHp;
        player.maxMp = rolledBackStats.maxMp;
        player.atk = rolledBackStats.atk;
        player.def = rolledBackStats.def;
        player.hp = rolledBackStats.maxHp;
        player.mp = rolledBackStats.maxMp;
        flags.legacyLevel35RollbackApplied = true;
    }

    if (!flags.level35RollbackHotfixApplied && saveVersion < 6) {
        if ((player.level || 1) > 35) {
            player.level = 35;
            player.xp = 0;
            player.xpToNext = getXpRequirementForLevel(35);
            const rolledBackStats = computePlayerLevelBaseStats(35);
            player.baseMaxHp = rolledBackStats.maxHp;
            player.baseMaxMp = rolledBackStats.maxMp;
            player.baseAtk = rolledBackStats.atk;
            player.baseDef = rolledBackStats.def;
            player.maxHp = rolledBackStats.maxHp;
            player.maxMp = rolledBackStats.maxMp;
            player.atk = rolledBackStats.atk;
            player.def = rolledBackStats.def;
            player.hp = rolledBackStats.maxHp;
            player.mp = rolledBackStats.maxMp;
            delete player.maxAtk;
            delete player.maxDef;
            flags.legacyLevel35RollbackApplied = true;
        }

        flags.level35RollbackHotfixApplied = true;
    }

    if (!flags.dungeonRebalanceInitialized) {
        state.highestDungeonRebalanceStage = 1;
        flags.dungeonRebalanceInitialized = true;
    }

    flags.saveLegibleVersion = 6;

    state.saveMigrationFlags = {
        dungeonRebalanceInitialized: !!flags.dungeonRebalanceInitialized,
        legacyDungeonStageBonusRemoved: !!flags.legacyDungeonStageBonusRemoved,
        legacyLevel35RollbackApplied: !!flags.legacyLevel35RollbackApplied,
        level35RollbackHotfixApplied: !!flags.level35RollbackHotfixApplied,
        saveLegibleVersion: Math.max(1, Math.floor(Number(flags.saveLegibleVersion) || 6))
    };
}

function sanitizeProfileText(value, fallback = '', maxLength = 24) {
    const cleaned = String(value ?? '')
        .replace(/[\r\n\t]+/g, ' ')
        .replace(/[<>]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, maxLength);
    return cleaned || fallback;
}
function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// Equip helpers - resolve equip slot from item.equipSlot or item.type
const EQUIP_TYPES = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];

function resolveEquipSlot(item) {
    if (!item) return null;
    if (item.equipSlot) return item.equipSlot;
    if (item.type) {
        const t = (typeof item.type === 'string') ? item.type.trim().toLowerCase() : item.type;
        if (t === 'charm') return 'amulet';
        if (EQUIP_TYPES.includes(t)) return t;
    }
    return null;
}

function isEquipable(item) {
    return !!resolveEquipSlot(item);
}

function normalizeEnchantingState() {
    if (!gameState.enchanting || typeof gameState.enchanting !== 'object') {
        gameState.enchanting = { selectedSlot: null, lockedIndices: [], lastBefore: [], lastAfter: [] };
    }
    if (!Array.isArray(gameState.enchanting.lockedIndices)) gameState.enchanting.lockedIndices = [];
    if (!Array.isArray(gameState.enchanting.lastBefore)) gameState.enchanting.lastBefore = [];
    if (!Array.isArray(gameState.enchanting.lastAfter)) gameState.enchanting.lastAfter = [];
    return gameState.enchanting;
}

function getEnchantBonuses(item) {
    return Array.isArray(item?.enchantBonusStats) ? item.enchantBonusStats.filter(Boolean) : [];
}

function hasEnchantBonuses(item) {
    return getEnchantBonuses(item).length > 0;
}

function isEnchantableItem(item) {
    return !!(item && resolveEquipSlot(item) && ENCHANT_RARITY_ROLL_RANGES[item.rarity]);
}

function getEnchantableEquipmentEntries() {
    return ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape']
        .map(slot => ({ slot, item: gameState.equipment[slot] }))
        .filter(({ item }) => isEnchantableItem(item));
}

function getEnchantRollRange(item) {
    return ENCHANT_RARITY_ROLL_RANGES[item?.rarity] || null;
}

function getEnchantPercentBaseStat(statKey) {
    switch (statKey) {
        case 'hpPercent': return 'maxHp';
        case 'atkPercent': return 'atk';
        case 'defPercent': return 'def';
        case 'crit': return 'crit';
        case 'critDmg': return 'critDmg';
        case 'dodge': return 'dodge';
        case 'dmgReduction': return 'dmgReduction';
        case 'attackSpeed': return 'attackSpeed';
        default: return null;
    }
}

function getEnchantStatDisplayLabel(statKey) {
    const labels = {
        maxHp: 'HP',
        atk: 'ATK',
        def: 'DEF',
        hpPercent: 'HP',
        atkPercent: 'ATK',
        defPercent: 'DEF',
        crit: 'CRIT',
        critDmg: 'Crit Damage',
        dodge: 'Dodge',
        dmgReduction: 'Damage Reduction',
        healthRegen: 'Regen',
        attackSpeed: 'Attack Speed'
    };
    return labels[statKey] || formatItemStatLabel(statKey);
}

function humanizeStatusEffectName(effectId) {
    return COMBAT_STATUS_TEMPLATES[effectId]?.name
        || String(effectId || 'effect').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function formatEnchantBonus(bonus) {
    if (!bonus) return 'Empty';
    if (bonus.kind === 'flat') return `+${bonus.value} ${getEnchantStatDisplayLabel(bonus.stat)}`;
    if (bonus.kind === 'percent') return `+${bonus.value}% ${getEnchantStatDisplayLabel(bonus.stat)}`;
    if (bonus.kind === 'onHitDebuff') return `${bonus.chance}% Inflict ${humanizeStatusEffectName(bonus.effect)} on Hit`;
    if (bonus.kind === 'onHitBuff') return `${bonus.chance}% Buff Self with ${humanizeStatusEffectName(bonus.effect)} on Hit`;
    return 'Unknown Enchant';
}

function normalizeEnchantBonus(bonus) {
    if (!bonus || typeof bonus !== 'object') return null;
    const kind = String(bonus.kind || '').trim();

    if (kind === 'flat') {
        const stat = String(bonus.stat || '').trim();
        if (!ENCHANT_FLAT_STAT_KEYS.has(stat)) return null;
        return {
            kind,
            stat,
            value: normalizeFiniteNumber(bonus.value, 0, { min: 0 })
        };
    }

    if (kind === 'percent') {
        const stat = String(bonus.stat || '').trim();
        if (!ENCHANT_PERCENT_STAT_KEYS.has(stat)) return null;
        return {
            kind,
            stat,
            value: normalizeFiniteNumber(bonus.value, 0, { min: 0 })
        };
    }

    if (kind === 'onHitDebuff') {
        const fallbackEffect = DEFAULT_RANDOM_DEBUFF_POOL[0] || 'burn';
        const effect = DEFAULT_RANDOM_DEBUFF_POOL.includes(bonus.effect) ? bonus.effect : fallbackEffect;
        return {
            kind,
            effect,
            chance: normalizeFiniteNumber(bonus.chance ?? bonus.value, 0, { min: 0, max: 100 })
        };
    }

    if (kind === 'onHitBuff') {
        const fallbackEffect = ENCHANT_POSITIVE_BUFF_EFFECTS[0] || 'strength';
        const effect = ENCHANT_POSITIVE_BUFF_EFFECTS.includes(bonus.effect) ? bonus.effect : fallbackEffect;
        return {
            kind,
            effect,
            chance: normalizeFiniteNumber(bonus.chance ?? bonus.value, 0, { min: 0, max: 100 })
        };
    }

    return null;
}

function normalizeEnchantBonuses(list) {
    return (Array.isArray(list) ? list : []).map(normalizeEnchantBonus).filter(Boolean);
}

function applyEnchantBonusesToItem(item, bonuses) {
    if (!item) return item;
    const normalized = normalizeEnchantBonuses(bonuses);
    if (normalized.length > 0) item.enchantBonusStats = normalized;
    else delete item.enchantBonusStats;
    ensureItemDescription(item);
    return item;
}

function stripEnchantDataFromItem(item) {
    if (!item) return item;
    const clean = cloneData(item);
    delete clean.enchantBonusStats;
    clean.desc = stripEnchantDescription(clean.desc || '');
    return ensureItemDescription(clean);
}

function getSelectedEnchantSlot() {
    const enchanting = normalizeEnchantingState();
    const slot = enchanting.selectedSlot;
    const item = slot ? gameState.equipment[slot] : null;
    return isEnchantableItem(item) ? slot : null;
}

function getSelectedEnchantItem() {
    const slot = getSelectedEnchantSlot();
    return slot ? gameState.equipment[slot] : null;
}

function selectEnchantSlot(slot) {
    const item = gameState.equipment[slot];
    if (!isEnchantableItem(item)) return;
    const enchanting = normalizeEnchantingState();
    enchanting.selectedSlot = slot;
    enchanting.lockedIndices = [];
    enchanting.lastBefore = getEnchantBonuses(item).map(cloneData);
    enchanting.lastAfter = getEnchantBonuses(item).map(cloneData);
    renderEnchantmentAltar();
}

function getBaseEnchantCost(item) {
    if (!item) return { gold: 0, soulGems: 0 };
    if (item.rarity === 'legendary') {
        return {
            gold: 1000 * Math.max(1, Number(item.levelReq) || 1),
            soulGems: 0
        };
    }
    return { gold: 0, soulGems: 1 };
}

function scaleEnchantCost(cost, multiplier = 1) {
    const safeMultiplier = Math.max(1, Math.floor(multiplier || 1));
    return {
        gold: Math.floor((cost?.gold || 0) * safeMultiplier),
        soulGems: Math.floor((cost?.soulGems || 0) * safeMultiplier)
    };
}

function formatEnchantCost(cost) {
    const parts = [];
    if (cost.gold > 0) parts.push(`${cost.gold.toLocaleString()} Gold`);
    if (cost.soulGems > 0) parts.push(`${cost.soulGems} Soul Gem${cost.soulGems === 1 ? '' : 's'}`);
    return parts.join(' + ') || 'Free';
}

function canAffordEnchantCost(cost) {
    return gameState.player.gold >= (cost.gold || 0) && gameState.soulGems >= (cost.soulGems || 0);
}

function spendEnchantCost(cost) {
    if (!canAffordEnchantCost(cost)) return false;
    gameState.player.gold -= cost.gold || 0;
    gameState.soulGems -= cost.soulGems || 0;
    return true;
}

function toggleEnchantLock(index) {
    const enchanting = normalizeEnchantingState();
    const item = getSelectedEnchantItem();
    const bonuses = getEnchantBonuses(item);
    if (!item || !bonuses[index]) return;

    if (enchanting.lockedIndices.includes(index)) {
        enchanting.lockedIndices = enchanting.lockedIndices.filter(i => i !== index);
    } else {
        enchanting.lockedIndices.push(index);
        enchanting.lockedIndices.sort((a, b) => a - b);
    }
    renderEnchantmentAltar();
}

function generateRandomEnchantBonus() {
    const definition = pick(ENCHANT_BONUS_DEFINITIONS);
    if (!definition) return null;

    if (definition.kind === 'onHitDebuff') {
        return normalizeEnchantBonus({
            kind: 'onHitDebuff',
            effect: pick(DEFAULT_RANDOM_DEBUFF_POOL) || 'burn',
            chance: rand(definition.min, definition.max)
        });
    }

    if (definition.kind === 'onHitBuff') {
        return normalizeEnchantBonus({
            kind: 'onHitBuff',
            effect: pick(ENCHANT_POSITIVE_BUFF_EFFECTS) || 'strength',
            chance: rand(definition.min, definition.max)
        });
    }

    return normalizeEnchantBonus({
        kind: definition.kind,
        stat: definition.stat,
        value: rand(definition.min, definition.max)
    });
}

function buildEnchantRerollBonuses(item, lockedIndices = []) {
    const currentBonuses = getEnchantBonuses(item);
    const lockedSet = new Set((Array.isArray(lockedIndices) ? lockedIndices : []).filter(idx => currentBonuses[idx]));
    const nextBonuses = currentBonuses.filter((_, idx) => lockedSet.has(idx)).map(cloneData);
    const rollRange = getEnchantRollRange(item) || { min: 1, max: 1 };
    const targetCount = Math.max(nextBonuses.length, rand(rollRange.min, rollRange.max));

    while (nextBonuses.length < targetCount) {
        const nextBonus = generateRandomEnchantBonus();
        if (nextBonus) nextBonuses.push(nextBonus);
    }

    return normalizeEnchantBonuses(nextBonuses);
}

function performEnchant() {
    const enchanting = normalizeEnchantingState();
    const item = getSelectedEnchantItem();
    if (!item || !isEnchantableItem(item)) {
        addBattleMsg('Select a Legendary, Unique, or Uber Unique equipped item first.', 'damage');
        renderEnchantmentAltar();
        return;
    }

    const currentBonuses = getEnchantBonuses(item);
    const rerolling = currentBonuses.length > 0;
    const lockedIndices = rerolling ? enchanting.lockedIndices.filter(idx => currentBonuses[idx]) : [];
    const baseCost = getBaseEnchantCost(item);
    const totalCost = scaleEnchantCost(baseCost, rerolling ? (1 + lockedIndices.length) : 1);

    if (!spendEnchantCost(totalCost)) {
        addBattleMsg(`Not enough currency! Required: ${formatEnchantCost(totalCost)}.`, 'damage');
        renderEnchantmentAltar();
        return;
    }

    const beforeBonuses = currentBonuses.map(cloneData);
    const afterBonuses = buildEnchantRerollBonuses(item, lockedIndices);
    applyEnchantBonusesToItem(item, afterBonuses);

    enchanting.lastBefore = beforeBonuses;
    enchanting.lastAfter = afterBonuses.map(cloneData);
    enchanting.lockedIndices = lockedIndices.filter(idx => afterBonuses[idx]);

    recalculateAllPlayerStats();
    updateStats();
    renderEquipment();
    renderInventory();
    renderEnchantmentAltar();
    updateSidePanels();
    scheduleSilentPersist();

    addBattleMsg(
        rerolling
            ? `Rerolled ${item.name} for ${formatEnchantCost(totalCost)}!`
            : `Enchanted ${item.name} for ${formatEnchantCost(totalCost)}!`,
        'reward'
    );
    addChatMessage('SYSTEM', `${gameState.player.name} ${rerolling ? 'rerolled' : 'enchanted'} ${item.name}.`, true);
}

function renderEnchantBonusBoxes(bonuses, options = {}) {
    const showLocks = !!options.showLocks;
    const lockedSet = new Set(options.lockedIndices || []);
    let html = `<div class="enchant-box-list">`;

    for (let i = 0; i < 5; i++) {
        const bonus = bonuses[i];
        const locked = lockedSet.has(i);
        if (!bonus) {
            html += `<div class="enchant-box empty"><div class="enchant-box-text">Empty</div></div>`;
            continue;
        }

        html += `<div class="enchant-box ${locked ? 'locked' : ''}">
            <div class="enchant-box-text">${formatEnchantBonus(bonus)}</div>
            ${showLocks ? `<button class="enchant-lock-btn ${locked ? 'locked' : ''}" onclick="toggleEnchantLock(${i})">${locked ? '🔒 Locked' : '🔓 Lock'}</button>` : ''}
        </div>`;
    }

    html += `</div>`;
    return html;
}

function stripEnchantDescription(desc) {
    const raw = String(desc || '');
    return raw.split('\n🔮 Enchant Bonuses:')[0];
}

function buildEnchantDescription(baseDescription, item) {
    const bonuses = getEnchantBonuses(item);
    const root = stripEnchantDescription(baseDescription || '');
    if (bonuses.length === 0) return root;
    const lines = bonuses.map((bonus, idx) => `${idx + 1}. ${formatEnchantBonus(bonus)}`);
    return `${root}${root ? '\n' : ''}🔮 Enchant Bonuses:\n${lines.join('\n')}`;
}

    const poolSize = FAKE_PLAYER_NAMES.length || 1;
    const baseName = FAKE_PLAYER_NAMES[safeIndex % poolSize] || `RealmWanderer${safeIndex + 1}`;

function fakePlayerHash(text) {
    let hash = 2166136261;
    for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
    }
    return hash >>> 0;
}

function nextFakeSeed(seed) {
    return (Math.imul(seed, 1664525) + 1013904223) >>> 0;
}

function seededRange(seed, min, max) {
    const next = nextFakeSeed(seed);
    return {
        seed: next,
        value: min + (next % (max - min + 1))
    };
}

function seededPick(seed, arr) {
    if (!arr || arr.length === 0) return { seed, value: null };
    const roll = seededRange(seed, 0, arr.length - 1);
    return { seed: roll.seed, value: arr[roll.value] };
}

function getFakePlayerRegion(level) {
    if (level >= 55) return locations.ceaseless_void.name;
    if (level >= 45) return locations.dragon_lair.name;
    if (level >= 30) return locations.gates_of_shadow.name;
    if (level >= 28) return locations.swamp.name;
    if (level >= 16) return locations.dark_forest.name;
    if (level >= 8) return locations.mountains.name;
    return locations.forest.name;
}

function getFakeEquipmentPercent(item, stat) {
    if (!item) return 0;
    const directPercent = item[`${stat}%`] || item[`${stat}Percent`] || 0;
    if (directPercent) return directPercent;
    if (stat === 'maxHp') return item.hpPercent || item['hp%'] || 0;
    if (stat === 'maxMp') return item.mpPercent || item['mp%'] || 0;
    return 0;
}

function scoreFakePlayerItem(item, level, slot, archetype) {
    const levelReq = item.levelReq || 1;
    const rarityScore = FAKE_PLAYER_RARITY_SCORE[item.rarity] || 0;
    const statValue =
        (item.atk || 0) * 3 +
        (item.def || 0) * 2.6 +
        ((item.maxHp || item.hp || 0) / 12) +
        (item.crit || 0) * 1.8 +
        (item.dodge || 0) * 1.6 +
        (item.luck || 0) * 0.8 +
        (item.dmgReduction || 0) * 4 +
        getFakeEquipmentPercent(item, 'atk') * 1.8 +
        getFakeEquipmentPercent(item, 'def') * 1.5;
    const closeness = 120 - Math.abs(level - levelReq) * 5;
    const preference = archetype.preferredSlots.includes(slot) ? 20 : 0;
    return closeness + (rarityScore * 14) + statValue + preference;
}

function buildFakePlayerEquipment(level, archetype, seed) {
    const equipment = {};
    let workingSeed = seed;

    FAKE_PLAYER_SLOT_ORDER.forEach(slot => {
        const candidates = Object.values(itemPool)
            .filter(item => {
                if (resolveEquipSlot(item) !== slot) return false;
                if ((item.levelReq || 1) > level) return false;
                if (item.rarity === 'uber_unique' && level < 55) return false;
                return true;
            })
            .sort((a, b) => scoreFakePlayerItem(b, level, slot, archetype) - scoreFakePlayerItem(a, level, slot, archetype));

        if (candidates.length === 0) return;

        const shortlist = candidates.slice(0, Math.min(4, candidates.length));
        const picked = seededPick(workingSeed, shortlist);
        workingSeed = picked.seed;
        equipment[slot] = cloneData(picked.value);
    });

    return { equipment, seed: workingSeed };
}

function calculateFakePlayerStats(level, equipment, archetype) {
    const gear = Object.values(equipment || {}).filter(Boolean);
    let maxHp = Math.floor(100 * Math.pow(1.10, level - 1));
    let maxMp = Math.floor(50 * Math.pow(1.10, level - 1));
    let atk = 10 + ((level - 1) * 3);
    let def = 5 + ((level - 1) * 3);
    let crit = Math.floor(level / 12);

    gear.forEach(item => {
        atk += item.atk || 0;
        def += item.def || 0;
        maxHp += item.maxHp || item.hp || 0;
        maxMp += item.maxMp || item.mp || 0;
        crit += item.crit || 0;
    });

    let atkMultiplier = 1;
    let defMultiplier = 1;
    let hpMultiplier = 1;
    let mpMultiplier = 1;

    gear.forEach(item => {
        atkMultiplier += getFakeEquipmentPercent(item, 'atk') / 100;
        defMultiplier += getFakeEquipmentPercent(item, 'def') / 100;
        hpMultiplier += getFakeEquipmentPercent(item, 'maxHp') / 100;
        mpMultiplier += getFakeEquipmentPercent(item, 'maxMp') / 100;
    });

    atk = Math.floor(atk * atkMultiplier * archetype.bias.atk);
    def = Math.floor(def * defMultiplier * archetype.bias.def);
    maxHp = Math.floor(maxHp * hpMultiplier * archetype.bias.maxHp);
    maxMp = Math.floor(maxMp * mpMultiplier);
    crit = clamp(crit + (archetype.critBonus || 0), 0, 75);

    return { hp: maxHp, maxHp, mp: maxMp, maxMp, atk, def, crit };
}

function summarizeFakePlayerEquipment(equipment) {
    const highlights = [

function buildFakePlayerRoster(count = 80) {
    const targetCount = Math.max(1, Number(count) || 80);
    return Array.from({ length: targetCount }, (_, idx) => {
        const name = getExpandedFakePlayerName(idx);
        let seed = fakePlayerHash(`${name}:${idx}`);
        const levelFloor = Math.max(1, Math.floor((idx / targetCount) * 60) + 1);
        const levelRoll = seededRange(seed, levelFloor, Math.min(60, levelFloor + 7));
        seed = levelRoll.seed;

        const archetypeRoll = seededPick(seed, FAKE_PLAYER_ARCHETYPES);
        seed = archetypeRoll.seed;
        const archetype = archetypeRoll.value || FAKE_PLAYER_ARCHETYPES[0];

        const equipped = buildFakePlayerEquipment(levelRoll.value, archetype, seed);
        const stats = calculateFakePlayerStats(levelRoll.value, equipped.equipment, archetype);
        const goldReward = Math.max(25, Math.floor(levelRoll.value * 22 + ((stats.atk + stats.def) * 0.2)));

        return {
            name,
            title: archetype.title,
            region: getFakePlayerRegion(levelRoll.value),
            level: levelRoll.value,
            ...stats,
            gold: goldReward,
            xp: Math.max(120, Math.floor(levelRoll.value * 95)),
            tier: Math.max(1, Math.ceil(levelRoll.value / 10)),
            equipment: equipped.equipment,
            gearSummary: summarizeFakePlayerEquipment(equipped.equipment)
        };
    });
}

function ensureFakePlayerRoster(minCount = 80) {
    const targetCount = Math.max(80, Number(minCount) || 80);
    if (!Array.isArray(pvpEnemies) || pvpEnemies.length < targetCount) {
        pvpEnemies = buildFakePlayerRoster(targetCount);

    return pvpEnemies;
}

        .filter(({ item }) => {

            return !!slot &&
                item.rarity !== 'legendary' &&
                item.rarity !== 'unique' &&
                item.rarity !== 'uber_unique' &&
                item.uberUnique !== true &&
                item.type !== 'material' &&
                item.type !== 'currency' &&
                item.type !== 'consumable' &&
                item.type !== 'scroll';
        })
        .map(({ idx }) => idx);
}

function getPlayerTradeRewardRarity() {
    const roll = Math.random() * 100;
    if (roll < 1) return 'unique';
    if (roll < 15) return 'legendary';
    return 'epic';
}

function getPlayerTradeRewardItem(targetRarity) {
    const maxLevel = Math.max(6, (gameState.player.level || 1) + 5);
    const allItems = Object.values(itemPool || {});
    const baseFilter = item =>
        item &&
        item.rarity === targetRarity &&
        item.equipSlot &&
        item.type !== 'material' &&
        item.type !== 'currency' &&
        item.type !== 'consumable';

    let matches = allItems.filter(item => baseFilter(item) && (!item.levelReq || item.levelReq <= maxLevel));
    if (matches.length === 0) {
        matches = allItems.filter(baseFilter);
    }

    return matches.length > 0 ? { ...pick(matches) } : null;
}

function tradeWithPlayer(idx) {
    const trader = ensureFakePlayerRoster()[idx];
    const remainingCooldown = getTradeCooldownRemainingMs();
    if (remainingCooldown > 0) {
        addChatMessage('SYSTEM', `Trade is on cooldown for ${formatPvpCooldown(remainingCooldown)}.`, true);
        if (document.getElementById('players-screen').classList.contains('active')) renderPlayers();
        return;
    }

    const tradableIndices = getTradableInventoryEquipmentIndices();
    if (tradableIndices.length === 0) {
        addChatMessage('SYSTEM', 'You need at least one unequipped Common, Uncommon, Rare, or Epic equipment item in your inventory to trade.', true);
        return;
    }

    const rewardRarity = getPlayerTradeRewardRarity();
    const rewardItem = getPlayerTradeRewardItem(rewardRarity);
    if (!rewardItem) {
        addChatMessage('SYSTEM', 'No valid trade rewards are available right now. Try again later.', true);
        return;
    }

    const removedIndex = pick(tradableIndices);
    const removedItem = gameState.inventory[removedIndex];
    if (!removedItem) return;

    removeFromInventory(removedIndex);
    addToInventory({ ...rewardItem, qty: 1 }, { announcementContext: 'trade' });
    addItemLog('trade', rewardItem.name);
    gameState.tradeCooldownUntil = Date.now() + TRADE_COOLDOWN_MS;

    const traderName = trader ? trader.name : 'Traveler';
    addChatMessage(traderName, `Pleasure doing business with you.`, false, true);
    addChatMessage('SYSTEM', `You traded away ${removedItem.name} and received ${rewardItem.name} (${rewardItem.rarity}).`, true);

    updateStats();
    updateSidePanels();
    if (document.getElementById('players-screen').classList.contains('active')) renderPlayers();
    if (document.getElementById('inventory-screen').classList.contains('active')) renderInventory();
    scheduleSilentPersist();
}

    function getTotalStat(stat) {
        const p = gameState.player;
        const baseStatKeys = {
            atk: 'baseAtk',
            def: 'baseDef',
            maxHp: 'baseMaxHp',
            maxMp: 'baseMaxMp',
            luck: 'baseLuck',
            crit: 'baseCrit',
            critDmg: 'baseCritDmg',
            dodge: 'baseDodge',
            lifesteal: 'baseLifesteal',
            dmgReduction: 'baseDmgReduction',
            armorPen: 'baseArmorPen',
            magicPen: 'baseMagicPen',
            attackSpeed: 'baseAttackSpeed',
            cdr: 'baseCdr',
            moveSpeed: 'baseMoveSpeed',
            healthRegen: 'baseHealthRegen',
            manaRegen: 'baseManaRegen'
        };
        const baseKey = baseStatKeys[stat];
        let base = baseKey ? (p[baseKey] ?? p[stat] ?? 0) : (p[stat] || 0);
        if (stat === 'atk') base += p.permanentAtkBonus || 0;
        if (stat === 'def') base += p.permanentDefBonus || 0;
        let flatBonus = 0;
        let percentMultiplier = 1;
        let globalMergeMultiplier = 1;
        
        const eqSlots = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];
        eqSlots.forEach(slot => {
            const eq = gameState.equipment[slot];
            if (eq) {
                const mergeLevel = eq.mergeLevel || 0;
                const baseName = eq.name ? eq.name.replace(/ \+\d+$/, '') : null;
                const canonicalBase = getCanonicalItemByName(baseName);
                const shouldApplyGlobalMerge =
                    mergeLevel > 0 &&
                    (eq.rarity === 'unique' || eq.rarity === 'uber_unique' || eq.uberUnique || eq.canMerge) &&
                    (stat === 'atk' || stat === 'def');
                const canUseCanonicalBaseStat = canonicalBase && typeof canonicalBase[stat] === 'number';
                const hasIntrinsicStat = typeof eq[stat] === 'number';

                // Add flat stat bonus
                if (eq[stat]) {
                    if (shouldApplyGlobalMerge && canUseCanonicalBaseStat) {
                        flatBonus += canonicalBase[stat];
                    } else {
                        flatBonus += eq[stat];
                    }
                }
                // Special case: items use 'hp' property for max HP bonuses
                if (stat === 'maxHp' && eq.hp) {
                    flatBonus += eq.hp;
                }
                // Add percentage multiplier (supports atk%, atkPercent, def%, defPercent, etc.)
                const percentStat = stat + '%';
                const percentStatAlt = stat + 'Percent';
                if (eq[percentStat]) {
                    percentMultiplier += (eq[percentStat] / 100);
                }
                if (eq[percentStatAlt]) {
                    percentMultiplier += (eq[percentStatAlt] / 100);
                }
                // Special case for HP percentage bonuses (also look for 'hp%' and 'hpPercent')
                if (stat === 'maxHp') {
                    if (eq['hp%']) {
                        percentMultiplier += (eq['hp%'] / 100);
                    }
                    if (eq['hpPercent']) {
                        percentMultiplier += (eq['hpPercent'] / 100);
                    }
                }
                if (stat === 'maxMp') {
                    if (eq['mp%']) {
                        percentMultiplier += (eq['mp%'] / 100);
                    }
                    if (eq['mpPercent']) {
                        percentMultiplier += (eq['mpPercent'] / 100);
                    }
                }

                getEnchantBonuses(eq).forEach(bonus => {
                    if (!bonus) return;

                    if (bonus.kind === 'flat') {
                        if (bonus.stat === stat) {
                            flatBonus += bonus.value || 0;
                        }
                        if (stat === 'maxHp' && bonus.stat === 'hp') {
                            flatBonus += bonus.value || 0;
                        }
                        return;
                    }

                    if (bonus.kind === 'percent') {
                        if (ENCHANT_DIRECT_PERCENT_STATS.has(bonus.stat)) {
                            if (bonus.stat === stat) {
                                flatBonus += bonus.value || 0;
                            }
                            return;
                        }
                        const mappedStat = getEnchantPercentBaseStat(bonus.stat);
                        if (mappedStat === stat) {
                            percentMultiplier += ((bonus.value || 0) / 100);
                        }
                    }
                });

                if (shouldApplyGlobalMerge && (!hasIntrinsicStat || canUseCanonicalBaseStat)) {
                    globalMergeMultiplier *= Math.pow(1.5, mergeLevel);
                }
            }
        });
        
        // Apply percentage scaling to total base + flat bonuses.
        // For merged unique / uber unique items, ATK and DEF merge bonuses apply globally
        // to the final stat total instead of only inflating the individual equipment stat line.
        return Math.floor((base + flatBonus) * percentMultiplier * globalMergeMultiplier);
    }

    getScrollEffectsByType('berserker').forEach(() => {

function getAttackSpeedHitCount() {
    const attackSpeed = getTotalAttackSpeed();
    const guaranteedExtraHits = Math.floor(attackSpeed / 100);
    const bonusHitChance = attackSpeed % 100;
    let totalHits = 1 + guaranteedExtraHits;

    if (Math.random() * 100 < bonusHitChance) {
        totalHits++;
    }

    return Math.max(1, totalHits);
}

function getTotalAttackInstances(baseHits = 1) {
    let totalHits = 0;
    const safeBaseHits = Math.max(1, Math.floor(baseHits || 1));
    for (let i = 0; i < safeBaseHits; i++) {
        totalHits += getAttackSpeedHitCount();
    }
    return Math.max(1, totalHits);
}

function applyCombatHealthRegen(playerObj, logCallback = addBattleMsg) {
    if (!playerObj) return 0;

    if (!Number.isFinite(combatScrollState.turnCounter)) {
        combatScrollState.turnCounter = 0;
    }

    combatScrollState.turnCounter++;
    if (combatScrollState.turnCounter % 5 !== 0) return 0;

    const regenPercent = getTotalHealthRegen();
    if (regenPercent <= 0) return 0;

    const maxHp = getTotalMaxHp();
    const healAmt = Math.min(maxHp - playerObj.hp, Math.floor(maxHp * regenPercent / 100));
    if (healAmt > 0) {
        playerObj.hp += healAmt;
        logCallback(`💚 Health Regen restores ${healAmt} HP! (${regenPercent}% Max HP)`, 'heal');
    }

    return healAmt;
}

function getCombatManaRegenAmount() {

function getWanderRankTextStyle(rankData = getWanderRankData()) {

function formatWanderScalingText(rankKey = gameState.wandering?.rankKey) {

function rollWanderRank() {
    const totalWeight = WANDER_RANKS.reduce((sum, rank) => sum + rank.weight, 0);
    let roll = Math.random() * totalWeight;
    for (const rank of WANDER_RANKS) {
        roll -= rank.weight;
        if (roll <= 0) return rank;
    }
    return WANDER_RANKS[WANDER_RANKS.length - 1];
}

function getWanderingLocationRewardMultiplier(expedition = gameState.wandering) {

function applyWanderingRewardBoost(amount, expedition = gameState.wandering, extraMultiplier = 1) {
    const rankKey = expedition?.rankKey || gameState.wandering?.rankKey;
    const effectiveRankMultiplier = getWanderRewardRankMultiplier(rankKey) * Math.max(0, extraMultiplier || 1);
    return Math.max(0, Math.floor((amount || 0) * getWanderingRewardMultiplier() * getWanderingLocationRewardMultiplier(expedition) * effectiveRankMultiplier));
}

    };

function buildCeaselessVoidEnemy(template, options = {}) {
    const benchmark = getCeaselessVoidBenchmarkStats();
    const statMultiplier = Math.max(0.25, Number(options.statMultiplier) || 1);
    const rewardMultiplier = Math.max(0.25, Number(options.rewardMultiplier) || statMultiplier);
    const profileMap = {
        void_seraph: { hp: 1.55, atk: 0.95, def: 0.82 },
        entropy_behemoth: { hp: 2.15, atk: 1.05, def: 1.02 },
        null_watcher: { hp: 1.45, atk: 1.10, def: 0.88 },
        ceaseless_maw: { hp: 1.95, atk: 1.00, def: 0.78 },
        paradox_harbinger: { hp: 2.45, atk: 1.18, def: 1.05 }
    };
    const keyGuess = Object.keys(enemies).find(key => enemies[key] === template) || '';
    const profile = profileMap[keyGuess] || { hp: 1.8, atk: 1.0, def: 0.9 };

    const hp = Math.floor(benchmark.maxHp * profile.hp * statMultiplier);
    const atk = Math.floor(benchmark.atk * profile.atk * statMultiplier);
    const def = Math.floor(benchmark.def * profile.def * statMultiplier);
    const xp = Math.floor((template.xp + benchmark.atk * 18) * rewardMultiplier);
    const gold = Math.floor((template.gold + benchmark.def * 8) * rewardMultiplier);

    return {
        ...template,
        hp,
        maxHp: hp,
        atk,
        def,
        xp,
        gold,
        tier: Math.max(template.tier || 11, 11)
    };
}

function getStatusEffectCollection(target) {
    if (!target) return [];
    if (target === gameState.player) {
        if (!Array.isArray(gameState.activeStatusEffects)) gameState.activeStatusEffects = [];
        return gameState.activeStatusEffects;
    }
    if (!Array.isArray(target.activeStatusEffects)) target.activeStatusEffects = [];
    return target.activeStatusEffects;
}

function getActiveStatusEffectsForTarget(target) {
    return getStatusEffectCollection(target).filter(effect => effect && effect.remainingTurns > 0);
}

function getStatusTargetName(target) {
    return target === gameState.player ? 'you' : (target?.name || 'the target');
}

function getStatusTargetDisplayName(target) {
    return target === gameState.player ? 'You' : (target?.name || 'Target');
}

function createStatusEffectInstance(effectId, options = {}) {
    const template = COMBAT_STATUS_TEMPLATES[effectId];
    if (!template) return null;

    const instance = {
        ...template,
        source: options.source || null,
        stacks: Math.max(1, Number(options.stacks) || 1),
        remainingTurns: Math.max(1, Number(options.duration) || template.duration || 1)
    };

    if (template.absorbDamage !== undefined) {
        instance.absorbDamageRemaining = Math.max(0, Number(options.absorbDamageRemaining) || template.absorbDamage);
    }

    return instance;
}

function getStatusSnapshot(target) {
    const snapshot = {
        damageDealtMultiplier: 1,
        damageTakenMultiplier: 1,
        defenseMultiplier: 1,
        dodgeMultiplier: 1,
        dodgeBonus: 0,
        critMultiplier: 1,
        missChance: 0,
        skipTurn: false,
        cannotAttack: false,
        immuneToDebuffs: false,
        enemyGuaranteedCrit: false,
        cannotUseAbilities: false,
        cannotEscape: false,
        attackTwice: false,
        immuneToDamage: false,
        immuneToDebuffs: false
    };

    getActiveStatusEffectsForTarget(target).forEach(effect => {
        if (effect.damageDealtMultiplier !== undefined) snapshot.damageDealtMultiplier *= effect.damageDealtMultiplier;
        if (effect.damageTakenMultiplier !== undefined) snapshot.damageTakenMultiplier *= effect.damageTakenMultiplier;
        if (effect.defenseMultiplier !== undefined) snapshot.defenseMultiplier *= effect.defenseMultiplier;
        if (effect.dodgeMultiplier !== undefined) snapshot.dodgeMultiplier *= effect.dodgeMultiplier;
        if (effect.dodgeBonus !== undefined) snapshot.dodgeBonus += effect.dodgeBonus;
        if (effect.critMultiplier !== undefined) snapshot.critMultiplier *= effect.critMultiplier;
        if (effect.missChance !== undefined) snapshot.missChance = Math.max(snapshot.missChance, effect.missChance);
        if (effect.enemyGuaranteedCrit) snapshot.enemyGuaranteedCrit = true;
        if (effect.skipTurn) snapshot.skipTurn = true;
        if (effect.cannotAttack) snapshot.cannotAttack = true;
        if (effect.cannotUseItems) snapshot.cannotUseItems = true;
        if (effect.cannotUseAbilities) snapshot.cannotUseAbilities = true;
        if (effect.cannotEscape) snapshot.cannotEscape = true;
        if (effect.attackTwice) snapshot.attackTwice = true;
        if (effect.immuneToDamage) snapshot.immuneToDamage = true;
        if (effect.immuneToDebuffs) snapshot.immuneToDebuffs = true;
    });

    return snapshot;
}

function getActivePlayerStatusEffects() {
    return getActiveStatusEffectsForTarget(gameState.player);
}

function getPlayerStatusSnapshot() {
    return getStatusSnapshot(gameState.player);
}

function getEnemyStatusSnapshot(enemyObj) {

function addStatusEffectToTarget(target, effectId, options = {}) {
    const template = COMBAT_STATUS_TEMPLATES[effectId];
    if (!target || !template) return false;

    if (target === gameState.player && template.type === 'debuff' && hasEquippedSpecialAbility('status_immunity')) {
        return false;
    }

    if (template.type === 'debuff' && getStatusSnapshot(target).immuneToDebuffs) {
        return false;
    }

    const collection = getStatusEffectCollection(target);
    const existing = collection.find(effect => effect && effect.id === effectId);
    if (existing) {
        if (COMBAT_STATUS_RULES.unique.has(effectId)) {
            return false;
        }

        if (COMBAT_STATUS_RULES.stackable.has(effectId)) {
            existing.stacks = Math.max(1, existing.stacks || 1) + Math.max(1, Number(options.stacks) || 1);
            existing.remainingTurns = Math.max(existing.remainingTurns || 0, template.duration || 1);
            return true;
        }

        existing.remainingTurns = Math.max(existing.remainingTurns || 0, template.duration || 1);
        if (template.absorbDamage !== undefined) {
            existing.absorbDamageRemaining = Math.max(existing.absorbDamageRemaining || 0, template.absorbDamage);
        }
        return true;
    }

    const instance = createStatusEffectInstance(effectId, options);
    if (!instance) return false;
    collection.push(instance);
    return true;
}

function addPlayerStatusEffect(effectId, options = {}) {
    return addStatusEffectToTarget(gameState.player, effectId, options);
}

function addEnemyStatusEffect(enemyObj, effectId, options = {}) {
    return addStatusEffectToTarget(enemyObj, effectId, options);
}

function decrementStatusEffectsForTarget(target, logCallback = addBattleMsg) {
    const remainingEffects = getActiveStatusEffectsForTarget(target).filter(effect => {
        effect.remainingTurns--;
        if (effect.remainingTurns <= 0) {
            const message = target === gameState.player
                ? `${effect.icon || '⚠️'} ${effect.name} wore off.`
                : `${effect.icon || '⚠️'} ${effect.name} on ${getStatusTargetDisplayName(target)} wore off.`;
            logCallback(message, 'info');
            return false;
        }
        return true;
    });

    if (target === gameState.player) gameState.activeStatusEffects = remainingEffects;
    else target.activeStatusEffects = remainingEffects;
}

function decrementPlayerStatusEffects(logCallback = addBattleMsg) {
    decrementStatusEffectsForTarget(gameState.player, logCallback);
}

function removeStatusEffectFromTarget(target, effectId) {
    if (!target || !effectId) return false;
    const collection = getStatusEffectCollection(target);
    const next = collection.filter(effect => effect && effect.id !== effectId);
    if (next.length === collection.length) return false;
    if (target === gameState.player) gameState.activeStatusEffects = next;
    else target.activeStatusEffects = next;
    return true;
}

function absorbDamageWithStatusEffects(target, damage, logCallback = addBattleMsg) {
    let remainingDamage = Math.max(0, Math.floor(damage));
    if (remainingDamage <= 0) return 0;

    getActiveStatusEffectsForTarget(target).forEach(effect => {
        if (remainingDamage <= 0 || effect.absorbDamage === undefined) return;
        if (!Number.isFinite(effect.absorbDamageRemaining)) {
            effect.absorbDamageRemaining = Math.max(0, effect.absorbDamage || 0);
        }
        if (effect.absorbDamageRemaining <= 0) return;

        const absorbed = Math.min(remainingDamage, effect.absorbDamageRemaining);
        effect.absorbDamageRemaining -= absorbed;
        remainingDamage -= absorbed;
        logCallback(`${effect.icon || '🛡️'} ${effect.name} absorbs ${absorbed} damage on ${getStatusTargetName(target)}!`, 'reward');

        if (effect.absorbDamageRemaining <= 0) {
            effect.remainingTurns = 0;
            logCallback(`${effect.icon || '🛡️'} ${effect.name} shatters on ${getStatusTargetName(target)}!`, 'info');
        }
    });

    return remainingDamage;
}

function applyDamageToTarget(target, damage, logCallback = addBattleMsg, options = {}) {
    if (!target) return 0;

    let finalDamage = Math.max(0, Math.floor(damage));
    if (finalDamage <= 0) return 0;

    const snapshot = getStatusSnapshot(target);
    if (snapshot.immuneToDamage) {
        logCallback(`✨ ${getStatusTargetDisplayName(target)} is immune to damage right now!`, 'info');
        return 0;
    }

    if (options.applyTakenMultiplier !== false) {
        finalDamage = Math.max(1, Math.ceil(finalDamage * snapshot.damageTakenMultiplier));
    }

    finalDamage = absorbDamageWithStatusEffects(target, finalDamage, logCallback);
    if (finalDamage <= 0) return 0;

    target.hp = Math.max(0, target.hp - finalDamage);
    return finalDamage;
}

function applyHealingToTarget(target, amount, maxHp, logCallback = addBattleMsg, sourceLabel = 'Healing') {
    if (!target) return 0;
    const actualMaxHp = Math.max(1, Number(maxHp) || Number(target.maxHp) || (target === gameState.player ? getTotalMaxHp() : 1));
    const healAmount = Math.min(Math.max(0, Math.floor(amount)), Math.max(0, actualMaxHp - target.hp));
    if (healAmount <= 0) return 0;

    target.hp += healAmount;
    if (removeStatusEffectFromTarget(target, 'bleed')) {
        logCallback(`🩹 ${sourceLabel} closes ${target === gameState.player ? 'your' : `${getStatusTargetDisplayName(target)}'s`} bleeding wounds.`, 'heal');
    }
    return healAmount;
}

function applyEndOfTurnStatusEffects(target, logCallback = addBattleMsg) {
    let targetDied = false;
    const maxHp = Math.max(1, Number(target?.maxHp) || (target === gameState.player ? getTotalMaxHp() : 1));

    getActiveStatusEffectsForTarget(target).forEach(effect => {
        const stacks = Math.max(1, effect.stacks || 1);
        let damage = 0;
        let healing = 0;

        if (effect.dotFlat) {
            damage += effect.stackIncrease
                ? effect.dotFlat + (effect.stackIncrease * (stacks - 1))
                : effect.dotFlat * stacks;
        }
        if (effect.dotPercentMaxHp) damage += Math.floor(maxHp * effect.dotPercentMaxHp * stacks);
        if (effect.healFlat) healing += effect.healFlat * stacks;
        if (effect.healPercentMaxHp) healing += Math.floor(maxHp * effect.healPercentMaxHp);

        if (damage > 0 && target.hp > 0) {
            const appliedDamage = applyDamageToTarget(target, damage, logCallback, { applyTakenMultiplier: false });
            if (appliedDamage > 0) {
                const message = target === gameState.player
                    ? `${effect.icon || '⚠️'} ${effect.name} deals ${appliedDamage} damage to you!`
                    : `${effect.icon || '⚠️'} ${effect.name} deals ${appliedDamage} damage to ${target.name}!`;
                logCallback(message, 'damage');
                if (target === gameState.currentWorldBoss) recordWorldBossPlayerDamage(appliedDamage);
            }
            if (target.hp <= 0) targetDied = true;
        }

        if (healing > 0 && target.hp > 0) {
            const healed = applyHealingToTarget(target, healing, maxHp, logCallback, effect.name);
            if (healed > 0) {
                const message = target === gameState.player
                    ? `${effect.icon || '✨'} ${effect.name} restores ${healed} HP to you!`
                    : `${effect.icon || '✨'} ${effect.name} restores ${healed} HP to ${target.name}!`;
                logCallback(message, 'heal');
            }
        }
    });

    decrementStatusEffectsForTarget(target, logCallback);
    return { targetDied };
}

function applyEndOfTurnPlayerStatusEffects(playerObj, logCallback = addBattleMsg) {
    return applyEndOfTurnStatusEffects(playerObj || gameState.player, logCallback);
}

function applyEndOfTurnEnemyStatusEffects(enemyObj, logCallback = addBattleMsg) {
