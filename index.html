function wanderingUseItem(idx) {
    const w = gameState.wandering;
    if (!w.active || !w.inBattle) return;
    
    const item = gameState.inventory[idx];
    if (!item || item.type !== 'consumable') return;
    
    const p = gameState.player;
    
    if (item.effect === 'heal') {
        p.hp = Math.min(p.maxHp, p.hp + item.value);
        addWanderingLog(`Used ${item.name}: Healed ${item.value} HP`, 'heal');
    } else if (item.effect === 'mana') {
        p.mp = Math.min(p.maxMp, p.mp + item.value);
        addWanderingLog(`Used ${item.name}: Restored ${item.value} MP`, 'heal');
    } else if (item.effect === 'blessing') {
        addWanderingLog(`Blessing Oil cannot be used from inventory! Go to the Temple to use it.`, 'info');
        return; // Don't remove from inventory
    }
    
    removeFromInventory(idx);
    updateStats();
    renderWandering();
}

// Generate merchant items (Rare and above only - very rare and valuable!)
function generateMerchantItems() {
    const items = [];
    const allItems = Object.values(itemPool);
    const uniqueItems = allItems.filter(item => 
        item.rarity === 'unique' &&
        item.equipSlot &&
        item.type !== 'material' &&
        item.type !== 'currency' &&
        item.type !== 'consumable'
    );
    
    // Filter to only Rare, Epic, and Legendary equipment items
    const rareItems = allItems.filter(item => 
        item.rarity === 'rare' &&
        item.equipSlot &&
        item.type !== 'material' &&
        item.type !== 'currency' &&
        item.type !== 'consumable'
    );
    const epicItems = allItems.filter(item => 
        item.rarity === 'epic' &&
        item.equipSlot &&
        item.type !== 'material' &&
        item.type !== 'currency' &&
        item.type !== 'consumable'
    );
    const legendaryItems = allItems.filter(item => 
        item.rarity === 'legendary' &&
        item.equipSlot &&
        item.type !== 'material' &&
        item.type !== 'currency' &&
        item.type !== 'consumable'
    );
    
    // Generate 3-5 items for the merchant
    const numItems = rand(3, 5);
    
    for (let i = 0; i < numItems; i++) {
        // Rarity weighting: 1% unique, 5% legendary, 25% epic, 69% rare
        const rarityRoll = Math.random();
        let item;
        let price;
        
        if (rarityRoll < 0.01 && uniqueItems.length > 0) {
            // 1% chance for unique
            item = pick(uniqueItems);
            price = getVendorPriceForRarity('unique');
        } else if (rarityRoll < 0.06 && legendaryItems.length > 0) {
            // 5% chance for legendary
            item = pick(legendaryItems);
            price = getVendorPriceForRarity('legendary');
        } else if (rarityRoll < 0.31 && epicItems.length > 0) {
            // 25% chance for epic (0.06 to 0.31)
            item = pick(epicItems);
            price = getVendorPriceForRarity('epic');
        } else if (rareItems.length > 0) {
            // 69% chance for rare
            item = pick(rareItems);
            price = getVendorPriceForRarity('rare');
        } else if (legendaryItems.length > 0) {
            item = pick(legendaryItems);
            price = getVendorPriceForRarity('legendary');
        } else if (epicItems.length > 0) {
            item = pick(epicItems);
            price = getVendorPriceForRarity('epic');
        } else if (uniqueItems.length > 0) {
            item = pick(uniqueItems);
            price = getVendorPriceForRarity('unique');
        }
        
        if (item) {
            items.push({
                ...item,
                merchantPrice: price,
                qty: 1
            });
        }
    }
    
    return items;
}

// Wandering merchant purchase function
function buyMerchantItem(idx) {
    const w = gameState.wandering;
    if (!w.merchantActive || !w.merchantItems || !w.merchantItems[idx]) return;
    
    const item = w.merchantItems[idx];
    const p = gameState.player;
    
    if (p.gold < item.merchantPrice) {
        addWanderingLog(`Not enough gold! ${item.name} costs ${item.merchantPrice} gold.`, 'damage');
        renderWandering();
        return;
    }
    
    p.gold -= item.merchantPrice;
    addToInventory({ ...item, qty: 1 });
    w.merchantItems.splice(idx, 1);
    
    addWanderingLog(`Purchased ${item.name} (${item.rarity}) for ${item.merchantPrice} gold!`, 'reward');
    
    // If no more items, merchant leaves
    if (w.merchantItems.length === 0) {
        w.merchantActive = false;
        addWanderingLog('The merchant nods and vanishes into the shadows...', 'info');
    }
    
    updateStats();
    renderWandering();
}

function dismissMerchant() {
    const w = gameState.wandering;
    w.merchantActive = false;
    w.merchantItems = [];
    addWanderingLog('The merchant shrugs and disappears into the mist...', 'info');
    renderWandering();
}

// Get random item drop based on rarity percentages for wander function
function getWanderItemDrop() {
    const targetRarity = getModifiedItemRarity({
        common: 55,
        uncommon: 23,
        rare: 14,
        epic: 6,
        legendary: 2
    }) || 'common';
    
    // Filter items of this rarity (equipment only, not materials/consumables/currency)
    const allItems = Object.values(itemPool);
    const matchingItems = allItems.filter(item => 
        item.rarity === targetRarity && 
        item.equipSlot && 
        item.type !== 'material' && 
        item.type !== 'currency' &&
        item.type !== 'consumable'
    );
    
    if (matchingItems.length > 0) {
        return { ...pick(matchingItems) };
    }
    
    // Fallback to any item of that rarity
    const fallbackItems = allItems.filter(item => item.rarity === targetRarity);
    if (fallbackItems.length > 0) {
        return { ...pick(fallbackItems) };
    }
    
    return null;
}

// LOCATION SPECIFIC ACTIONS
function handleLocationAction(locKey) {
    switch (locKey) {
        case 'market':
            if (grandMarketItems.length === 0) refreshMarketItems();
            renderMarket();
            return true;
        case 'temple':
            renderTemple();
            return true;
        case 'guild':
            renderGuildQuests();
            return true;
        default:
            return false;
    }
}

function travelTo(locKey) {
    if (!isLocationUnlocked(locKey)) {
        showLockedLocationMessage(locKey);
        return;
    }
    gameState.player.location = locKey;
    addBattleMsg(`Traveled to ${locations[locKey].name}`, 'info');
    
    // Check if this location has special rendering on the battle screen
    if (handleLocationAction(locKey)) {
        showScreen('battle');
    } else {
        showScreen('travel');
    }
}

// BATTLE RENDER
function renderBattle() {
    const container = document.getElementById('battle-content');
    const combatCooldownRemaining = getCombatCooldownRemainingMs();
    const combatLocked = combatCooldownRemaining > 0;
    
    // Check if we're showing Temple
    if (gameState.player.location === 'temple' && !gameState.inBattle) {
        renderTemple();
        return;
    }
    
    // Check if we're showing Market
    if (gameState.player.location === 'market' && !gameState.inBattle) {
        renderMarket();
        return;
    }
    
    // Check if we're showing Guild
    if (gameState.player.location === 'guild' && !gameState.inBattle) {
        renderGuildQuests();
        return;
    }
    
    // Check if dungeon is active
    if (dungeonState.active) {
        renderDungeon();
        return;
    }
    
    if (!gameState.inBattle || !gameState.currentEnemy) {
        container.innerHTML = `<div class="msg">No active battle. Search for enemies from the map!</div>
            <button class="action-btn dungeon-btn" onclick="startDungeon()" ${combatLocked ? 'disabled' : ''}>${combatLocked ? `Combat Cooldown (${formatPvpCooldown(combatCooldownRemaining)})` : 'Enter Dungeon'}</button>`;
        return;
    }

    activateCombatScrollsForCurrentBattle('battle');
    if (!gameState.inBattle || !gameState.currentEnemy) return;
    
    const e = gameState.currentEnemy;
    const hpPct = (e.hp / e.maxHp * 100).toFixed(0);
    
    let html = `<div class="section-title">Battle - ${e.name}</div>`;
    html += `<div class="boss-hp-bar"><div class="boss-hp-fill" style="width:${hpPct}%"></div></div>`;
    html += `<div class="description">HP: ${e.hp}/${e.maxHp} | ATK: ${e.atk} | DEF: ${e.def}</div>`;
    
    html += `<div class="section-title">Actions</div>`;
    html += `<button class="action-btn" onclick="battleAction('attack')" ${combatLocked ? 'disabled' : ''}>Attack</button>`;
    html += `<button class="action-btn" onclick="battleAction('spell')" ${(gameState.player.mp < 15 || combatLocked) ? 'disabled' : ''}>Cast Spell (15 MP)</button>`;
    html += `<button class="action-btn" onclick="battleAction('flee')" ${combatLocked ? 'disabled' : ''}>Flee</button>`;
    if (combatLocked) {
        html += `<div class="encounter-info" style="color:#ff8888;">Combat systems recover in ${formatPvpCooldown(combatCooldownRemaining)}.</div>`;
    }
    
    // Show equipped scrolls
    const visibleScrolls = getVisibleCombatScrolls();
    if (visibleScrolls.length > 0) {
        html += `<div class="section-title">Scrolls</div>`;
        visibleScrolls.forEach(({ scroll, idx }) => {
            html += `<button class="action-btn scroll-btn" onclick="useScroll(${idx})">${scroll.name}</button>`;
        });
    }
    
    // Show usable items
    const potions = gameState.inventory.filter(i => i.type === 'consumable');
    if (potions.length > 0) {
        html += `<div class="section-title">Items</div>`;
        potions.forEach(p => {
            const idx = gameState.inventory.indexOf(p);
            html += `<button class="action-btn" onclick="battleUseItem(${idx})">${p.name} (x${p.qty || 1})</button>`;
        });
    }
    
    html += `<div class="section-title">Battle Log</div>`;
    html += `<div class="battle-log">`;
    gameState.battleLog.slice(-20).reverse().forEach(log => {
        html += `<p class="${log.cls}">${log.msg}</p>`;
    });
    html += `</div>`;
    
    container.innerHTML = html;
}

function battleUseItem(idx) {
    if (!gameState.inBattle || !gameState.currentEnemy) return;
    useItem(idx);
    renderBattle();
}

// JOBS RENDER

const ITEM_STAT_DISPLAY_ORDER = [
    'atk', 'def', 'maxHp', 'maxMp', 'crit', 'critDmg', 'luck', 'dodge', 'block',
    'lifesteal', 'dmgReduction', 'armorPen', 'magicPen', 'attackSpeed', 'cdr', 'moveSpeed'
];

const ITEM_STAT_LABELS = {
    atk: 'ATK',
    def: 'DEF',
    maxHp: 'MAX HP',
    maxMp: 'MAX MP',
    crit: 'CRIT',
    critDmg: 'CRIT DMG',
    luck: 'LUCK',
    dodge: 'DODGE',
    block: 'BLOCK',
    lifesteal: 'LIFESTEAL',
    dmgReduction: 'DMG REDUCTION',
    armorPen: 'ARMOR PEN',
    magicPen: 'MAGIC PEN',
    attackSpeed: 'ATTACK SPEED',
    cdr: 'COOLDOWN REDUCTION',
    moveSpeed: 'MOVE SPEED'
};

function isComparableItemStatKey(statKey, value) {
    if (typeof value !== 'number' || Number.isNaN(value)) return false;
    return ITEM_STAT_DISPLAY_ORDER.includes(statKey) || statKey.endsWith('Percent') || statKey.endsWith('%');
}

function getComparableItemStatKeys(item, equippedItem) {
    const keys = new Set();

    [item, equippedItem].forEach(source => {
        if (!source) return;
        Object.entries(source).forEach(([statKey, value]) => {
            if (isComparableItemStatKey(statKey, value)) {
                keys.add(statKey);
            }
        });
    });

    return Array.from(keys).sort((a, b) => {
        const aIndex = ITEM_STAT_DISPLAY_ORDER.indexOf(a);
        const bIndex = ITEM_STAT_DISPLAY_ORDER.indexOf(b);
        const normalizedA = aIndex === -1 ? Number.MAX_SAFE_INTEGER : aIndex;
        const normalizedB = bIndex === -1 ? Number.MAX_SAFE_INTEGER : bIndex;
        if (normalizedA !== normalizedB) return normalizedA - normalizedB;
        return a.localeCompare(b);
    });
}

function formatItemStatLabel(statKey) {
    if (ITEM_STAT_LABELS[statKey]) return ITEM_STAT_LABELS[statKey];

    if (statKey.endsWith('Percent')) {
        return `${formatItemStatLabel(statKey.slice(0, -7))} %`;
    }

    if (statKey.endsWith('%')) {
        return `${formatItemStatLabel(statKey.slice(0, -1))} %`;
    }

    return statKey
        .replace(/([A-Z])/g, ' $1')
        .trim()
        .toUpperCase();
}

function formatItemStatValue(statKey, value, isDelta = false) {
    const percentStats = new Set(['crit', 'critDmg', 'dodge', 'block', 'lifesteal', 'dmgReduction', 'attackSpeed', 'cdr', 'moveSpeed']);
    const isPercent = percentStats.has(statKey) || statKey.endsWith('Percent') || statKey.endsWith('%');
    const roundedValue = Number.isInteger(value) ? value : Number(value.toFixed(1));

    if (isDelta) {
        const sign = roundedValue > 0 ? '+' : '';
        return `${sign}${roundedValue}${isPercent ? '%' : ''}`;
    }

    return `${roundedValue}${isPercent ? '%' : ''}`;
}

function formatItemTypeLabel(item) {
    const rawType = resolveEquipSlot(item) || item?.type;
    if (!rawType) return '';

    return String(rawType)
        .replace(/_/g, ' ')
        .replace(/\b\w/g, char => char.toUpperCase());
}

function renderInventoryItemComparison(item, equippedItem) {
    const statKeys = getComparableItemStatKeys(item, equippedItem);
    if (statKeys.length === 0) return '';

    let html = `<div class="item-compare-header">Compared to: ${equippedItem && equippedItem.name ? equippedItem.name : 'Empty slot'}</div>`;

    statKeys.forEach(statKey => {
        const itemValue = typeof item[statKey] === 'number' ? item[statKey] : 0;
        const equippedValue = equippedItem && typeof equippedItem[statKey] === 'number' ? equippedItem[statKey] : 0;
        const diff = itemValue - equippedValue;

        let comparisonClass = 'item-stat-equal';
        if (diff > 0) comparisonClass = 'item-stat-better';
        if (diff < 0) comparisonClass = 'item-stat-worse';

        const deltaText = diff === 0 ? '' : ` (${formatItemStatValue(statKey, diff, true)})`;
        html += `<div class="item-stat-comparison ${comparisonClass}">${formatItemStatLabel(statKey)}: ${formatItemStatValue(statKey, itemValue)}${deltaText}</div>`;
    });

    return html;
}

function renderPurchasableItemComparison(item) {
    const slot = resolveEquipSlot(item);
    if (!slot) return '';

    return renderInventoryItemComparison(item, gameState.equipment[slot]);
}

        html += `<div class="msg">Inventory is empty</div>`;
    }
    
    gameState.inventory.forEach((item, idx) => {
        const slot = resolveEquipSlot(item);
        const equippedItem = slot ? gameState.equipment[slot] : null;
        const canEquip = slot && (!item.levelReq || gameState.player.level >= item.levelReq);
        const canUse = item.type === 'consumable';
        const comparisonHtml = slot ? renderInventoryItemComparison(item, equippedItem) : '';

                ${item.qty ? `<span class="inv-mini-qty">x${item.qty}</span>` : ''}
                ${item.type ? `<span style="color:#666; font-size:0.8em; margin-left:8px;">[${item.type.charAt(0).toUpperCase() + item.type.slice(1)}]</span>` : ''}

                <div class="description" style="font-size:0.8em">${item.desc || ''}</div>

function getRarityColor(rarity) {
    switch (rarity) {
        case 'common': return '#aaa';
        case 'uncommon': return '#44ff44';
        case 'rare': return '#4444ff';
        case 'epic': return '#ff00ff';
        case 'legendary': return '#ffd700';
        case 'unique': return '#ff3333';
        case 'uber_unique': return 'url(#rainbow-gradient)';
        default: return '#aaa';
    }
}

function getRarityTextStyle(itemOrRarity) {
    const rarity = typeof itemOrRarity === 'string' ? itemOrRarity : itemOrRarity?.rarity;
    const isUber = rarity === 'uber_unique' || (itemOrRarity && typeof itemOrRarity === 'object' && itemOrRarity.uberUnique === true);
    if (isUber) {
        return 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;';
    }
    return `color:${getRarityColor(rarity)}`;
}

function formatRarityLabel(rarity) {
    return String(rarity || 'common').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function isUberUnique(item) {
    return item.rarity === 'uber_unique' || item.uberUnique === true;
}

function sellItem(idx) {
    const item = gameState.inventory[idx];
    if (!item) return;

    const soldItemWasScroll = item.type === 'scroll' || !!scrollPool[item.name];
    
    const raritySell = SELL_VALUES[item.rarity];
    if (!raritySell) return;
    
    if (raritySell.soulGems) {
        gameState.soulGems += raritySell.soulGems;
    } else {
        gameState.player.gold += raritySell.gold;
    }
    
    removeFromInventory(idx);
    updateStats();
    renderInventory();
    if (soldItemWasScroll) renderScrolls();
    updateSidePanels();
    scheduleSilentPersist();
}

// SCROLLS RENDER
function renderScrolls() {
    const container = document.getElementById('scrolls-screen-content');
    const scrollInv = gameState.inventory.filter(i => i.type === 'scroll' || scrollPool[i.name]);
    
    let html = `<div class="section-title">Scroll Slots (${gameState.unlockedScrollSlots}/${gameState.scrollSlots})</div>`;
    
    // Display scroll slots
    for (let i = 0; i < gameState.scrollSlots; i++) {
        const isLocked = i >= gameState.unlockedScrollSlots;
        const equippedScroll = gameState.equippedScrolls[i];
        
        html += `<div class="scroll-slot ${isLocked ? 'locked' : ''}">`;
        html += `<div class="scroll-slot-title">Slot ${i + 1} ${isLocked ? '(Locked)' : ''}</div>`;
        
        if (isLocked) {
            // Show unlock option with soul gem cost
            const unlockCost = 1;
            const canUnlock = gameState.soulGems >= unlockCost;
            html += `<div style="color:#888;font-size:0.85em;margin-bottom:8px">Unlock with ${unlockCost} Soul Gem</div>`;
            html += `<button class="action-btn soul-btn" onclick="unlockScrollSlot(${i})" ${canUnlock ? '' : 'disabled'}>Unlock Slot</button>`;
        } else if (equippedScroll) {
            // Show equipped scroll
            html += `<div class="scroll-item ${equippedScroll.rarity}">`;
            html += `<div style="color:${getRarityColor(equippedScroll.rarity)}">${equippedScroll.name}</div>`;
            html += `<div class="description">${equippedScroll.desc}</div>`;
            html += `<button class="action-btn scroll-btn" onclick="unequipScrollSlot(${i})">Unequip</button>`;
            html += `</div>`;
        } else {
            // Empty slot
            html += `<div class="msg">Empty - Equip a scroll from below</div>`;
        }
        
        html += `</div>`;
    }
    
    // Display available scrolls in inventory
    html += `<div class="section-title">Scrolls in Inventory (${scrollInv.length})</div>`;
    
    if (scrollInv.length === 0) {
        html += `<div class="msg">No scrolls in inventory</div>`;
    }
    
    scrollInv.forEach((scroll, idx) => {
        const realIdx = gameState.inventory.indexOf(scroll);
        // Find first empty unlocked slot
        let emptySlot = -1;
        for (let i = 0; i < gameState.unlockedScrollSlots; i++) {
            if (!gameState.equippedScrolls[i]) {
                emptySlot = i;
                break;
            }
        }
        
        html += `<div class="scroll-item ${scroll.rarity}">`;
        html += `<div style="color:${getRarityColor(scroll.rarity)}">${scroll.name}</div>`;
        html += `<div class="description">${scroll.desc}</div>`;
        html += `<div style="display:flex;gap:5px;margin-top:5px">`;
        if (emptySlot >= 0) {
            html += `<button class="action-btn scroll-btn" onclick="equipScroll(${realIdx}, ${emptySlot})">Equip to Slot ${emptySlot + 1}</button>`;
        } else {
            html += `<button class="action-btn scroll-btn" disabled>No Empty Slots</button>`;
        }
        html += `<button class="action-btn scroll-btn" onclick="sellItem(${realIdx})">Sell</button>`;
        html += `</div></div>`;
    });
    
    container.innerHTML = html;
}

// Unlock a scroll slot with soul gems
function unlockScrollSlot(slotIndex) {
    if (slotIndex < 0 || slotIndex >= gameState.scrollSlots) return;
    if (slotIndex < gameState.unlockedScrollSlots) return; // Already unlocked
    
    const unlockCost = 1;
    if (gameState.soulGems < unlockCost) {
        addBattleMsg('Not enough Soul Gems! Need 1 Soul Gem to unlock.', 'damage');
        return;
    }
    
    gameState.soulGems -= unlockCost;
    gameState.unlockedScrollSlots++;
    
    addBattleMsg(`Unlocked Scroll Slot ${slotIndex + 1}! (${gameState.unlockedScrollSlots}/${gameState.scrollSlots} slots)`, 'reward');
    addChatMessage('SYSTEM', `${gameState.player.name} unlocked a scroll slot with a Soul Gem!`, true);
    
    updateStats();
    renderScrolls();
}

// Equip a scroll to a slot
function equipScroll(inventoryIndex, slotIndex) {
    const item = gameState.inventory[inventoryIndex];
    if (!item || (item.type !== 'scroll' && !scrollPool[item.name])) return;
    if (slotIndex < 0 || slotIndex >= gameState.unlockedScrollSlots) return;
    if (gameState.equippedScrolls[slotIndex]) return; // Slot occupied
    
    // Make sure it has all scroll properties when equipping
    const scrollData = scrollPool[item.name] || item;
    gameState.equippedScrolls[slotIndex] = { ...item, ...scrollData, type: 'scroll' };
    removeFromInventory(inventoryIndex);
    
    addBattleMsg(`Equipped ${item.name} to Scroll Slot ${slotIndex + 1}!`, 'reward');
    
    updateStats();
    renderScrolls();
}

// Unequip a scroll from a slot
function unequipScrollSlot(slotIndex) {
    if (slotIndex < 0 || slotIndex >= gameState.unlockedScrollSlots) return;
    const scroll = gameState.equippedScrolls[slotIndex];
    if (!scroll) return;
    
    // Add back to inventory
    addToInventory({ ...scroll, qty: 1 });
    gameState.equippedScrolls[slotIndex] = null;
    
    addBattleMsg(`Unequipped ${scroll.name} from Scroll Slot ${slotIndex + 1}!`, 'info');
    
    updateStats();
    renderScrolls();
}

// ==============================================
// AUCTION SYSTEM
// ==============================================
function createDefaultAuctionState() {
    return {
        active: false,
        currentItem: null,
        currentPrice: 0,
        minimumBid: 0,
        bidders: [],
        endTime: 0,
        highestBidder: null,
        lastBidTime: 0,
        playerHasBid: false,
        maxPrice: 0,
        nextStartTime: 0
    };
}

let auctionState = createDefaultAuctionState();
let auctionStartTimeoutId = null;
let auctionEndTimeoutId = null;
let auctionTickIntervalId = null;

const AUCTION_BIDDER_NAMES = ['DragonSlayer', 'ShadowMage', 'IronFist', 'MysticWolf', 'DarkKnight', 'FireStorm', 'IceQueen', 'ThunderBolt', 'NightBlade', 'StormBreaker', 'GoldHunter', 'TreasureSeeker', 'ItemCollector', 'LegendFinder', 'EpicHunter'];

function setAuctionTabAlert(isActive) {
    const tab = document.getElementById('auction-tab');
    if (!tab) return;
    tab.classList.toggle('alert', !!isActive);
}

function clearAuctionTimers() {
    if (auctionStartTimeoutId) {
        clearTimeout(auctionStartTimeoutId);
        auctionStartTimeoutId = null;
    }
    if (auctionEndTimeoutId) {
        clearTimeout(auctionEndTimeoutId);
        auctionEndTimeoutId = null;
    }
}

function scheduleAuctionStartAt(timestamp) {
    if (!timestamp) return;
    if (auctionStartTimeoutId) clearTimeout(auctionStartTimeoutId);
    auctionState.nextStartTime = timestamp;
    auctionStartTimeoutId = setTimeout(() => {
        auctionStartTimeoutId = null;
        startNewAuction();
    }, Math.max(0, timestamp - Date.now()));
    scheduleSilentPersist();
}

function scheduleAuctionEndAt(timestamp) {
    if (auctionEndTimeoutId) clearTimeout(auctionEndTimeoutId);
    if (!timestamp) return;
    auctionEndTimeoutId = setTimeout(() => {
        auctionEndTimeoutId = null;
        endAuction();
    }, Math.max(0, timestamp - Date.now() + 1000));
}

function initAuctionSystem() {
    if (!auctionTickIntervalId) {
        auctionTickIntervalId = setInterval(() => {
            if (auctionState.active) {
                if (auctionState.endTime <= Date.now()) {
                    endAuction();
                    return;
                }
                processAuctionTick();
                if (document.getElementById('auction-screen').classList.contains('active')) {
                    renderAuction();
                }
            } else if (auctionState.nextStartTime && auctionState.nextStartTime <= Date.now()) {
                startNewAuction();
            }
        }, 1000);
    }

    resumeAuctionSystem();
}

function resumeAuctionSystem() {
    clearAuctionTimers();

    if (auctionState.active && auctionState.currentItem) {
        setAuctionTabAlert(true);
        if (auctionState.endTime <= Date.now()) {
            endAuction();
            return;
        }
        scheduleAuctionEndAt(auctionState.endTime);
        return;
    }

    setAuctionTabAlert(false);
    if (auctionState.nextStartTime && auctionState.nextStartTime > Date.now()) {
        scheduleAuctionStartAt(auctionState.nextStartTime);
    } else if (auctionState.nextStartTime && auctionState.nextStartTime <= Date.now()) {
        startNewAuction();
    } else {
        scheduleNextAuction();
    }
}

function scheduleNextAuction() {
    const delay = rand(10 * 60 * 1000, 60 * 60 * 1000); // 10-60 minutes
    scheduleAuctionStartAt(Date.now() + delay);
}

function getAuctionDurationForRarity(rarity) {
    switch (rarity) {
        case 'epic':
            return 20 * 60 * 1000;
        case 'legendary':
            return 40 * 60 * 1000;
        case 'unique':
        case 'uber_unique':
            return 60 * 60 * 1000;
        default:
            return 20 * 60 * 1000;
    }
}

function getInitialAuctionBidderCountForRarity(rarity) {
    switch (rarity) {
        case 'epic':
            return 20;
        case 'legendary':
            return 50;
        case 'unique':
            return 80;
        case 'uber_unique':
            return 200;
        default:
            return 20;
    }
}

function formatAuctionRarityLabel(rarity) {
    switch (rarity) {
        case 'uber_unique':
            return 'UberUnique';
        case 'unique':
            return 'Unique';
        case 'legendary':
            return 'Legendary';
        case 'epic':
            return 'Epic';
        default:
            return String(rarity || '').replace(/_/g, ' ');
    }
}

function selectAuctionItemRarity() {
    const roll = Math.random() * 100;
    if (roll < 0.5) return 'uber_unique';
    if (roll < 5.0) return 'unique';
    if (roll < 30.0) return 'legendary';
    return 'epic';
}

function getBasePriceForRarity(rarity) {
    const basePrices = {
        'epic': 2000,
        'legendary': 3000,
        'unique': 80000,
        'uber_unique': 1000000
    };
    return basePrices[rarity] || 2000;
}

function getAuctionLevelMultiplier(levelReq = 1) {
    const clampedLevel = clamp(Number(levelReq) || 1, 1, 60);
    const progress = (clampedLevel - 1) / 59;
    return 0.2 + ((50 - 0.2) * progress);
}

function calculateAuctionValue(item) {
    const rarityBaseValue = getBasePriceForRarity(item?.rarity);
    const levelMultiplier = getAuctionLevelMultiplier(item?.levelReq || 1);
    const varianceMultiplier = randFloat(0.8, 1.4);
    const baseValue = Math.max(1, Math.floor(rarityBaseValue * levelMultiplier * varianceMultiplier));

    return {
        rarityBaseValue,
        levelMultiplier,
        varianceMultiplier,
        baseValue
    };
}

function startNewAuction() {
    const rarity = selectAuctionItemRarity();
    
    // Get random item of selected rarity
    const allItems = Object.values(itemPool);
    const matchingItems = allItems.filter(item => 
        item.rarity === rarity && 
        item.equipSlot && 
        item.type !== 'material' && 
        item.type !== 'currency' &&
        item.type !== 'consumable'
    );
    
    if (matchingItems.length === 0) {
        scheduleNextAuction();
        return;
    }
    
    const item = pick(matchingItems);
    const auctionValue = calculateAuctionValue(item);
    const basePrice = auctionValue.baseValue;
    const auctionDuration = getAuctionDurationForRarity(rarity);
    const initialBidderCount = getInitialAuctionBidderCountForRarity(rarity);
    const bidderRoster = ensureFakePlayerRoster(initialBidderCount).slice(0, initialBidderCount);
    
    clearAuctionTimers();
    auctionState = {
        ...createDefaultAuctionState(),
        active: true,
        currentItem: {
            ...item,
            auctionBaseValue: basePrice,
            auctionLevelMultiplier: auctionValue.levelMultiplier,
            auctionVarianceMultiplier: auctionValue.varianceMultiplier
        },
        currentPrice: Math.floor(basePrice * 0.7),
        minimumBid: Math.floor(basePrice * 0.7 * 1.05),
        bidders: [],
        endTime: Date.now() + auctionDuration,
        highestBidder: null,
        lastBidTime: Date.now(),
        playerHasBid: false,
        maxPrice: basePrice * (1.2 + Math.random() * 0.6),
        nextStartTime: 0
    };
    
    // Add initial bidders
    bidderRoster.forEach(fakePlayer => {
        auctionState.bidders.push({
            name: fakePlayer.name,
            active: true,
            maxBid: auctionState.maxPrice * (0.7 + Math.random() * 0.3),
            bidDelay: rand(3000, 10000)
        });
    });
    
    // Highlight auction tab
    setAuctionTabAlert(true);
    
    addChatMessage('SYSTEM', `⚠️ NEW AUCTION STARTED: ${item.name} (${formatAuctionRarityLabel(rarity)})! Click Auction tab to view.`, true);
    
    scheduleAuctionEndAt(auctionState.endTime);
    scheduleSilentPersist();
    if (document.getElementById('auction-screen').classList.contains('active')) {
        renderAuction();
    }
}

function processAuctionTick() {
    if (!auctionState.active) return;
    
    const now = Date.now();
    const timeRemaining = auctionState.endTime - now;

    auctionState.bidders.forEach(bidder => {
        if (!bidder.active) return;
        if (auctionState.currentPrice >= bidder.maxBid) {
            bidder.active = false;
        }
    });

    // Fake players bid normally, but stop bidding during the final 2 minutes.
    if (timeRemaining > 2 * 60 * 1000) {
        const eligibleBidders = auctionState.bidders.filter(bidder =>
            bidder.active &&
            auctionState.currentPrice < bidder.maxBid &&
            now - auctionState.lastBidTime > bidder.bidDelay
        );

        const activeBidder = pick(eligibleBidders);
        if (activeBidder && Math.random() < 0.7) {
            placeFakeBid(activeBidder);
        }
    }
}

function placeFakeBid(bidder) {
    const increment = Math.floor(auctionState.currentPrice * (0.05 + Math.random() * 0.1));
    auctionState.currentPrice += increment;
    auctionState.minimumBid = Math.floor(auctionState.currentPrice * 1.05);
    auctionState.lastBidTime = Date.now();
    auctionState.highestBidder = bidder.name;
    
    bidder.bidDelay = rand(4000, 12000);
    
    addChatMessage(bidder.name, `placed a bid of ${auctionState.currentPrice} gold on ${auctionState.currentItem.name}!`, false, true);
    scheduleSilentPersist();
    
    if (document.getElementById('auction-screen').classList.contains('active')) {
        renderAuction();
    }
}

function placePlayerBid() {
    if (!auctionState.active) return;
    if (gameState.player.gold < auctionState.minimumBid) {
        addChatMessage('SYSTEM', 'You do not have enough gold!', true);
        return;
    }
    
    // Place player bid
    gameState.player.gold -= auctionState.minimumBid;
    if (auctionState.highestBidder === 'You') {
        gameState.player.gold += auctionState.currentPrice;
    }
    
    auctionState.currentPrice = auctionState.minimumBid;
    auctionState.minimumBid = Math.floor(auctionState.currentPrice * 1.05);
    auctionState.lastBidTime = Date.now();
    auctionState.highestBidder = 'You';
    auctionState.playerHasBid = true;
    
    addChatMessage('You', `placed a bid of ${auctionState.currentPrice} gold!`);

    const instantOutbidCandidates = auctionState.bidders.filter(bidder =>
        bidder.active && auctionState.currentPrice < bidder.maxBid
    );
    const instantOutbidBidder = pick(instantOutbidCandidates);
    if (instantOutbidBidder && Math.random() < 0.20) {
        placeFakeBid(instantOutbidBidder);
        addChatMessage('SYSTEM', 'You were immediately outbid!', true);
    }
    
    updateStats();
    scheduleSilentPersist();
    renderAuction();
}

function endAuction() {
    if (!auctionState.active) return;
    const completedAuction = {
        ...auctionState,
        currentItem: auctionState.currentItem ? { ...auctionState.currentItem } : null,
        bidders: cloneData(auctionState.bidders || [])
    };
    clearAuctionTimers();
    
    auctionState = createDefaultAuctionState();
    
    // Remove alert from tab
    setAuctionTabAlert(false);
    
    if (completedAuction.highestBidder === 'You') {
        addToInventory({ ...completedAuction.currentItem, qty: 1 }, {
            forceAnnouncement: true,
            announcementContext: 'auction',
            announcementTitle: 'Auction Victory!',
            announcementBody: `${gameState.player.name} won ${completedAuction.currentItem.name} from the auction house.`
        });
        addChatMessage('SYSTEM', `🎉 You won the auction! You received: ${completedAuction.currentItem.name}`, true);
        addItemLog('auction', completedAuction.currentItem.name);
    } else {
        if (completedAuction.highestBidder) {
            addChatMessage('SYSTEM', `Auction ended. ${completedAuction.highestBidder} won ${completedAuction.currentItem.name} for ${completedAuction.currentPrice} gold`, true);
        } else {
            addChatMessage('SYSTEM', `Auction ended with no bids on ${completedAuction.currentItem.name}`, true);
        }
        // Refund player if they bid but didn't win
        if (completedAuction.playerHasBid && completedAuction.highestBidder !== 'You') {
            gameState.player.gold += completedAuction.currentPrice;
            updateStats();
        }
    }
    
    // Schedule next auction
    scheduleNextAuction();
    scheduleSilentPersist();
    
    if (document.getElementById('auction-screen').classList.contains('active')) {
        renderAuction();
    }
}

// MERGE ITEMS FUNCTION
function mergeItems(groupKey) {
    // Create a fresh copy of inventory indices to avoid shifting issues
    const itemPositions = [];
    for (let i = 0; i < gameState.inventory.length; i++) {
        const item = gameState.inventory[i];
        if (item.equipSlot && 
            item.type !== 'material' && 
            item.type !== 'currency' &&
            item.type !== 'consumable' &&
            item.type !== 'scroll') {
            
            const key = `${item.name}_${item.rarity}`;
            if (key === groupKey) {
                itemPositions.push({ index: i, qty: item.qty || 1, item: item });
            }
        }
    }
    
    // Calculate total available count
    const totalCount = itemPositions.reduce((sum, pos) => sum + pos.qty, 0);
    
    if (totalCount < 2) {
        addBattleMsg('Not enough items to merge! Need 2 identical items.', 'damage');
        renderMerge();
        return;
    }
    
    // Get first item for template
    const baseItem = itemPositions[0].item;

    // ONLY ALLOW MERGING FOR UNIQUE AND UBER UNIQUE ITEMS
    if (baseItem.rarity === 'unique' || baseItem.rarity === 'uber_unique' || baseItem.uberUnique) {
        
        // Collect actual items to merge
        const itemsToMerge = [];
        let remaining = 2;
        
        // Work backwards to avoid index shifting issues
        for (let i = itemPositions.length - 1; i >= 0 && remaining > 0; i--) {
            const pos = itemPositions[i];
            const take = Math.min(pos.qty, remaining);
            
            for (let t = 0; t < take; t++) {
                itemsToMerge.push({ ...gameState.inventory[pos.index] });
            }
            
            // Remove from inventory
            if (gameState.inventory[pos.index].qty) {
                gameState.inventory[pos.index].qty -= take;
                if (gameState.inventory[pos.index].qty <= 0) {
                    gameState.inventory.splice(pos.index, 1);
                }
            } else {
                gameState.inventory.splice(pos.index, 1);
            }
            
            remaining -= take;
        }
        
        // Use official Uber Unique merge system with actual separate items
        const mergedItem = mergeUberUniqueItems(itemsToMerge[0], itemsToMerge[1]);
        
        if (mergedItem) {
            addToInventory({ ...mergedItem, qty: 1 });
            addBattleMsg(`Merge success! ${mergedItem.name} created with +50% ATK & DEF!`, 'reward');
            addChatMessage('SYSTEM', `${gameState.player.name} merged items to create ${mergedItem.name}!`, true);
        }
    } else {
        addBattleMsg('Only Unique and Uber Unique items can be merged!', 'damage');
    }
    
    updateStats();
    renderMerge();
}

// WEAPON LUCK BLESSING OIL
// Increases weapon luck by 1 (40%), does nothing (30%), decreases weapon luck by 1 (20%)
// Weapon luck is capped at 9
function applyWeaponLuckOil() {
    const roll = Math.random();
    const equip = gameState.equipment;
    const hasWeapon = equip.weapon && equip.weapon.name;

    if (roll < 0.4) {
        // 40% chance: increase weapon luck by 1 (max 9)
        if (hasWeapon) {
            if (equip.weapon_luck >= 9) {
                addBattleMsg('Blessing Oil activates, but your weapon luck is already maxed at 9!', 'info');
                addChatMessage('SYSTEM', `Blessing Oil: Weapon Luck is already maxed at 9. No change applied.`, true);
            } else {
                equip.weapon_luck = (equip.weapon_luck || 0) + 1;
                addBattleMsg(`Blessing Oil succeeds! Weapon Luck increased by 1! (Current: +${equip.weapon_luck})`, 'reward');
                addChatMessage('SYSTEM', `✅ Blessing Oil succeeded! Weapon Luck +1! Current Weapon Luck: +${equip.weapon_luck}/9`, true);
            }
        } else {
            addBattleMsg('Blessing Oil activates, but you have no weapon equipped! Luck unchanged.', 'info');
            addChatMessage('SYSTEM', `Blessing Oil: No weapon equipped. Luck unchanged.`, true);
        }
    } else if (roll < 0.7) {
        // 30% chance: do nothing
        addBattleMsg('Blessing Oil does nothing. The oil shimmers and fades...', 'info');
        addChatMessage('SYSTEM', `✨ Blessing Oil fizzles and does nothing. Try again!`, true);
    } else if (roll < 0.9) {
        // 20% chance: decrease weapon luck by 1
        if (hasWeapon) {
            equip.weapon_luck = (equip.weapon_luck || 0) - 1;
            addBattleMsg(`Blessing Oil backfires! Weapon Luck decreased by 1. (Current: +${equip.weapon_luck})`, 'damage');
            addChatMessage('SYSTEM', `❌ Blessing Oil backfired! Weapon Luck -1. Current Weapon Luck: +${equip.weapon_luck}/9`, true);
        } else {
            addBattleMsg('Blessing Oil activates, but you have no weapon equipped! Luck unchanged.', 'info');
            addChatMessage('SYSTEM', `Sacred Blessing Oil: No weapon equipped. Luck unchanged.`, true);
        }
    } else {
        // 10% remainder: do nothing
        addBattleMsg('Blessing Oil does nothing. The oil shimmers and fades...', 'info');
        addChatMessage('SYSTEM', `✨ Sacred Blessing Oil shimmers... nothing happened.`, true);
    }
    updateStats();
    renderTemple();
}

// PREMIUM SACRED BLESSING - Costs 1 Soul Gem, never decreases luck
// Weapon luck is capped at 9
function applyWeaponLuckOilPremium() {
    if (gameState.soulGems < 1) {
        addBattleMsg('Not enough Soul Gems! Sacred Blessing requires 1 Soul Gem.', 'damage');
        renderTemple();
        return;
    }
    
    gameState.soulGems -= 1;
    
    const roll = Math.random();
    const equip = gameState.equipment;
    const hasWeapon = equip.weapon && equip.weapon.name;

    if (roll < 0.7) {
        // 70% chance: increase weapon luck by 1 (max 9)
        if (hasWeapon) {
            if (equip.weapon_luck >= 9) {
                addBattleMsg('Sacred Blessing activates, but your weapon luck is already maxed at 9!', 'info');
            } else {
                equip.weapon_luck = (equip.weapon_luck || 0) + 1;
                addBattleMsg(`Sacred Blessing succeeds! Weapon Luck increased by 1! (Current: +${equip.weapon_luck})`, 'reward');
            }
        } else {
            addBattleMsg('Sacred Blessing activates, but you have no weapon equipped! Luck unchanged.', 'info');
        }
    } else {
        // 30% chance: do nothing (but never decrease)
        addBattleMsg('Sacred Blessing glows warmly but does nothing this time. Your luck is safe!', 'info');
    }
    updateStats();
    renderTemple();
}

// GRAND MARKET - Refreshing shop with 20 items every hour
function getVendorPriceForRarity(rarity) {
    switch (rarity) {
        case 'common': return rand(1, 100);
        case 'uncommon': return rand(101, 499);
        case 'rare': return rand(500, 1000);
        case 'epic': return rand(1500, 3000);
        case 'legendary': return rand(5000, 10000);
        case 'unique': return rand(50000, 150000);
        default: return rand(100, 500);
    }
}

function refreshMarketItems() {
    grandMarketItems = [];
    const allItems = Object.values(itemPool);
    const rarities = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
    
    // Shuffle and pick items with rarity weighting
    for (let i = 0; i < 20; i++) {
        // Use weighted random for rarity distribution
        const rarityRoll = Math.random();
        let targetRarity;
        if (rarityRoll < 0.40) targetRarity = 'common';
        else if (rarityRoll < 0.70) targetRarity = 'uncommon';
        else if (rarityRoll < 0.88) targetRarity = 'rare';
        else if (rarityRoll < 0.97) targetRarity = 'epic';
        else targetRarity = 'legendary';
        
        // Filter items of this rarity
        const matchingItems = allItems.filter(item => item.rarity === targetRarity && item.type !== 'material' && item.type !== 'currency');
        
        if (matchingItems.length > 0) {
            const item = pick(matchingItems);
            const price = getVendorPriceForRarity(item.rarity);
            
            grandMarketItems.push({
                ...item,
                marketPrice: price,
                marketQty: 1,
                marketId: Date.now() + i
            });
        }
    }
    lastMarketRefresh = Date.now();
    // Reset force refresh cost on automatic refresh
    gameState.marketForceRefreshCost = 150;
    gameState.marketForceRefreshCount = 0;
}

function forceRefreshMarketItems() {
    const cost = gameState.marketForceRefreshCost;
    
    // Check if player has enough gold
    if (gameState.player.gold < cost) {
        addBattleMsg(`Not enough gold! Force refresh costs ${cost} gold.`, 'damage');
        return;
    }
    
    // Deduct gold
    gameState.player.gold -= cost;
    
    // Increase cost multiplicatively (x2 each time)
    gameState.marketForceRefreshCost = gameState.marketForceRefreshCost * 2;
    gameState.marketForceRefreshCount++;
    
    // Generate new market items
    refreshMarketItems();
    
    addBattleMsg(`Force refreshed Grand Market for ${cost} gold! Next cost: ${gameState.marketForceRefreshCost} gold`, 'reward');
    updateStats();
    renderMarket();
}

function renderMarket() {
    // Check if we need to refresh
    const now = Date.now();
    const timeSinceRefresh = now - lastMarketRefresh;
    if (timeSinceRefresh >= MARKET_REFRESH_INTERVAL) {
        refreshMarketItems();
    }
    
    const container = document.getElementById('battle-content');
    const timeLeft = MARKET_REFRESH_INTERVAL - timeSinceRefresh;
    const timeLeftMins = Math.floor(timeLeft / 60000);
    const timeLeftSecs = Math.floor((timeLeft % 60000) / 1000);
    
    let html = `<div class="location-header" style="color:#ffd700">&#9878; Grand Market &#9878;</div>`;
    html += `<div class="description">A refreshing marketplace with ever-changing wares. New stock arrives every hour!</div>`;
    html += `<div style="color:#aaa;font-size:0.85em;margin-bottom:10px">Next refresh in: ${timeLeftMins}m ${timeLeftSecs}s</div>`;
    html += `<div class="section-title">Market Stall (20 items)</div>`;
    
    if (grandMarketItems.length === 0) {
        html += `<div class="msg">No items currently available. Refreshing soon...</div>`;
    } else {
        grandMarketItems.forEach((item, idx) => {
            const rarityColor = getRarityColor(item.rarity);
            const comparisonHtml = renderPurchasableItemComparison(item);
            const itemTypeLabel = formatItemTypeLabel(item);
            const isUber = isUberUnique(item);
            const canAfford = gameState.player.gold >= item.marketPrice;
            html += `<div style="background:#1a1a1a;border:1px solid ${rarityColor};padding:10px;margin:5px 0;display:flex;justify-content:space-between;align-items:center;">
                <div>
                    ${itemTypeLabel ? `<span style="color:#666;font-size:0.8em;margin-left:8px">[${itemTypeLabel}]</span>` : ''}
                    <span style="${isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor};font-weight:bold">${item.name}</span>
                    ${item.levelReq ? `<span style="color:#888;font-size:0.8em;margin-left:5px">[Lvl ${item.levelReq}]</span>` : ''}
                    ${comparisonHtml}
                    <div style="color:#888;font-size:0.8em">${item.desc || ''}</div>
                </div>
                <div style="text-align:right;">
                    <div style="color:#ffd700">${item.marketPrice} Gold</div>
                    <button class="action-btn gold-btn" onclick="buyMarketItem(${idx})" ${canAfford ? '' : 'disabled'}>Buy</button>
                </div>
            </div>`;
        });
    }
    
    html += `<div style="margin-top:15px;">
        <button class="action-btn gold-btn" onclick="forceRefreshMarketItems()" ${gameState.player.gold < gameState.marketForceRefreshCost ? 'disabled' : ''}>Force Refresh Now - ${gameState.marketForceRefreshCost} Gold</button>
        <div style="color:#888;font-size:0.8em;margin-top:5px;">Cost doubles with each use (resets on auto-refresh)</div>
    </div>`;
    
    container.innerHTML = html;
}

function buyMarketItem(idx) {
    const item = grandMarketItems[idx];
    if (!item) return;
    
    if (gameState.player.gold < item.marketPrice) {
        addBattleMsg(`Not enough gold! This item costs ${item.marketPrice} gold.`, 'damage');
        renderMarket();
        return;
    }
    
    gameState.player.gold -= item.marketPrice;
    addToInventory({ ...item, qty: 1 });
    addBattleMsg(`Purchased ${item.name} for ${item.marketPrice} gold!`, 'reward');
    grandMarketItems.splice(idx, 1);
    updateStats();
    renderMarket();
}

function refreshMarketManually() {
    refreshMarketItems();
    addBattleMsg('The market has been refreshed with new items!', 'info');
    renderMarket();
}

// DUNGEON INFINITE CRAWLER
function startDungeon() {
    if (dungeonState.active) return;
    if (guardCombatCooldown(addBattleMsg, renderBattle)) return;

    dungeonState.active = true;
    // Start from highest stage reached, but track highest stage across runs
    dungeonState.stage = gameState.highestDungeonStage > 0 ? gameState.highestDungeonStage : 1;
    dungeonState.hp = gameState.player.hp;
    dungeonState.maxHp = gameState.player.maxHp;
    dungeonState.rewards = [];
    dungeonState.log = [];
    dungeonState.inBattle = false;

    // Show highest stage reached if previously recorded
    if (gameState.highestDungeonStage > 0) {
        addDungeonLog(`Your highest stage reached: ${gameState.highestDungeonStage}. Continuing from this stage...`, 'info');
    } else {
        addDungeonLog('You enter the Dungeon of Shadows. How deep can you go?');
    }
    generateDungeonEncounter();
    showScreen('battle');
}

function generateDungeonEncounter() {
    const p = gameState.player;
    const stage = dungeonState.stage;
    const isMiniboss = stage % 5 === 0 && stage > 0;
    
    // Progressive difficulty scaling: starts very easy, gets harder
    // Stage 1: 0.3x (really easy), scales up quadratically
    let stageMultiplier;
    if (stage === 1) {
        stageMultiplier = 0.3; // First stage is really easy
    } else {
        // Linear 10% stat boost per stage
        stageMultiplier = 1 + (stage - 1) * 0.1;
    }
    
    // Miniboss bonus: additional 50% stats for minibosses
    const minibossMultiplier = isMiniboss ? 1.5 : 1;
    const totalMultiplier = stageMultiplier * minibossMultiplier;
    
    // Select enemy based on stage tier
    let tier;
    if (stage >= 501) {
        // Original dynamic scaling ONLY for stages 501 and above
        tier = Math.min(Math.floor((stage - 1) / 5), 10);
    } else {
        // Fixed tier progression for first 500 stages: 50 stages per tier
        // OLD DYNAMIC SYSTEM IS FULLY DISABLED HERE
        tier = Math.min(Math.ceil(stage / 50), 10);
    }
    const tierKey = Object.keys(ENEMY_TIERS)[tier];
    const baseTier = ENEMY_TIERS[tierKey];
    
    // DUNGEON ONLY: COMPLETELY RANDOM ENEMIES FROM FULL LIST - NO RESTRICTIONS
    const key = pick(Object.keys(enemies));
    const template = enemies[key];
    
    // Generate enemy with scaled stats
    const enemy = {
        name: isMiniboss ? `⚔️ ${template.name} [MINIBOSS Stage ${stage}]` : `${template.name} [Stage ${stage}]`,
        hp: Math.floor(template.hp * totalMultiplier),
        maxHp: Math.floor(template.hp * totalMultiplier),
        atk: Math.floor(template.atk * totalMultiplier),
        def: Math.floor(template.def * totalMultiplier),
        xp: Math.floor(template.xp * totalMultiplier * (isMiniboss ? 3 : 2)),
        gold: Math.floor(template.gold * totalMultiplier * (isMiniboss ? 3 : 2)),
        drops: template.drops,
        rarity: template.rarity,
        isMiniboss: isMiniboss // Track if this is a miniboss for drop multiplier
    };
    
    dungeonState.currentEnemy = enemy;
    dungeonState.inBattle = true;
    
    if (isMiniboss) {
        addDungeonLog(`⚔️ A powerful ${template.name} appears as a MINIBOSS! (Stage ${stage})`, 'damage');
        addChatMessage('SYSTEM', `${p.name} encountered a Miniboss at Dungeon Stage ${stage}!`, true);
    } else {
        addDungeonLog(`A ${template.name} appears! (Stage ${stage})`);
    }
    renderDungeon();
}

function dungeonAction(action) {
    if (!dungeonState.active || !dungeonState.inBattle) return;
    if (guardCombatCooldown(addDungeonLog, renderDungeon)) return;
    activateCombatScrollsForCurrentBattle('dungeon');

    const p = gameState.player;
    const e = dungeonState.currentEnemy;
    
    // Sync dungeon HP with player before combat
    p.hp = dungeonState.hp;
    
    if (action === 'spell') {
        // Spell attack: 0.5-3x damage at cost of 15 mana
        if (p.mp < 15) {
            addDungeonLog('Not enough mana! Requires 15 MP to cast spell.', 'damage');
            renderDungeon();
            return;
        }
        
        p.mp -= 15;
        
        // Get scroll effect values (DOUBLE EFFECT FOR SPELLS)
        const damageMult = getScrollDamageMultiplier() * 2;
        const critBonus = getScrollCritBonus() * 2;
        const invulnerable = isInvulnerable();
        const executeThreshold = getExecuteThreshold();
        const totalDef = getEffectivePlayerDefense();
        
        // Calculate spell damage multiplier between 0.5x and 3x
        const spellMultiplier = 0.5 + Math.random() * 2.5;
        const totalAtk = getTotalAtk();
        const totalCrit = getTotalCrit();
        const effectiveEnemyDefense = getEffectiveEnemyDefense(e);
        const totalAttackInstances = getTotalAttackInstances();
        
        let dmg = Math.max(1, totalAtk - effectiveEnemyDefense + rand(-3, 3));
        let crit = Math.random() * 100 < (totalCrit + critBonus);
        if (crit) dmg = Math.floor(dmg * (1.5 + getTotalCritDmg() / 100));
        
        // Apply spell multiplier + scroll damage multiplier
        dmg = Math.floor(dmg * spellMultiplier * damageMult);
        dmg *= totalAttackInstances;
        
        e.hp = Math.max(0, e.hp - dmg);
        
        addDungeonLog(`You cast a spell for ${dmg} damage${totalAttackInstances > 1 ? ` (${totalAttackInstances} hits)` : ''}! (${spellMultiplier.toFixed(1)}x ${damageMult > 1 ? `+ Scroll x${damageMult.toFixed(1)}` : ''})`, crit ? 'reward' : 'info');

        const spellHeal = calculateDamageBasedHealing(dmg);
        if (spellHeal > 0) {
            const actualHeal = Math.min(spellHeal, getTotalMaxHp() - p.hp);
            if (actualHeal > 0) {
                p.hp += actualHeal;
                dungeonState.hp = p.hp;
                addDungeonLog(`Lifesteal healed you for ${actualHeal} HP!`, 'heal');
            }
        }
        
        // Check for execute effect
        if (executeThreshold > 0 && e.hp > 0 && e.hp <= Math.floor(e.maxHp * executeThreshold)) {
            e.hp = 0;
            addDungeonLog(`Execute effect triggers! ${e.name} is instantly killed!`, 'reward');
        }
        
        if (e.hp <= 0) {
            dungeonEnemyDefeated();
            return;
        }
        
        const counterResult = resolveEnemyCounterAttack(p, e, addDungeonLog, (healAmt) => {
            dungeonState.hp = Math.min(dungeonState.maxHp, dungeonState.hp + healAmt);
        }, {
            invulnerable,
            totalDef
        });
        dungeonState.hp = p.hp;

        if (counterResult.enemyDied) {
            dungeonEnemyDefeated();
            return;
        }

        const endOfTurnResult = applyEndOfTurnScrollEffects(p, e, addDungeonLog);
        dungeonState.hp = p.hp;
        if (endOfTurnResult.enemyDied) {
            dungeonEnemyDefeated();
            return;
        }
        
        if (p.hp <= 0) {
            addDungeonLog('You have fallen in the dungeon!', 'damage');
            triggerDefeatRecovery(addDungeonLog);
            endDungeon();
            return;
        }
        
        // Decrement scroll effects at end of turn
        decrementScrollEffects(addDungeonLog);
        
        // Mana regeneration: 5% of max MP every turn
        const maxMp = getTotalMaxMp();
        const manaRegenAmount = Math.floor(maxMp * 0.05);
        p.mp = Math.min(maxMp, p.mp + manaRegenAmount);
        
        renderDungeon();
        updateStats();
        return;
    }
    
    // ✅ CALL UNIVERSAL COMBAT ENGINE - SAME EXACT CODE AS BATTLE SYSTEM!
    const result = runUniversalCombatTurn(action, p, e, addDungeonLog, (healAmt) => {
        dungeonState.hp += healAmt;
    });
    
    // Sync HP back to dungeon state after combat
    dungeonState.hp = p.hp;
    
    if (result.enemyDied) {
        dungeonEnemyDefeated();
        return;
    }
    
    if (result.playerDied) {
        addDungeonLog('You have fallen in the dungeon!', 'damage');
        triggerDefeatRecovery(addDungeonLog);
        endDungeon();
        return;
    }
    
    if (result.fled) {
        addDungeonLog('You leave the dungeon with your loot!', 'info');
        endDungeon();
        return;
    }
    
    renderDungeon();
    updateStats();
}

function dungeonEnemyDefeated() {
    const p = gameState.player;
    const e = dungeonState.currentEnemy;
    const isMiniboss = e.isMiniboss;

    // Scale XP and Gold to enemy level/tier, not player level
    // Minibosses give triple XP and Gold
    const dropMultiplier = isMiniboss ? 3 : 1;
    const scaledXp = e.xp * dropMultiplier;
    const scaledGold = e.gold * dropMultiplier;

    p.xp += scaledXp;
    p.gold += scaledGold;
    dungeonState.rewards.push(`${scaledXp} XP, ${scaledGold} Gold`);

    if (isMiniboss) {
        addDungeonLog(`You defeated the MINIBOSS ${e.name}! Gained ${scaledXp} XP and ${scaledGold} gold! (3x rewards!)`, 'reward');
        addChatMessage('SYSTEM', `${p.name} defeated a MINIBOSS at Dungeon Stage ${dungeonState.stage} and gained ${scaledXp} XP, ${scaledGold} Gold!`, true);
    } else {
        addDungeonLog(`You defeated ${e.name}! Gained ${scaledXp} XP and ${scaledGold} gold!`, 'reward');
        addChatMessage('SYSTEM', `${p.name} defeated ${e.name} in Dungeon Stage ${dungeonState.stage} and gained ${scaledXp} XP, ${scaledGold} Gold!`, true);
    }

    // Drop system with new rarity rates
    // 35% base chance to drop something (tripled for miniboss = 3 rolls)
    const dropChance = Math.min(1, (0.35 + getTotalLuck() * 0.01) * (1 + getScrollDropBoost()));
    const numDropRolls = isMiniboss ? 3 : 1;

    for (let roll = 0; roll < numDropRolls; roll++) {
        if (Math.random() < dropChance) {
            // 60% chance for material/consumable drop (from enemy's loot table)
            // 40% chance for equipment drop (using new rarity system)
            if (Math.random() < 0.6 && e.drops && e.drops.length > 0) {
                // Material/consumable drop from enemy's loot table
                const dropItem = getMaterialDrop(e.drops);
                if (dropItem) {
                    addToInventory({ ...dropItem, qty: dropItem.qty || 1 });
                    addDungeonLog(`Dropped: ${dropItem.name}${(dropItem.qty || 1) > 1 ? ` x${dropItem.qty}` : ''}${isMiniboss ? ' (Miniboss bonus!)' : ''}!`, 'reward');
                    addItemLog('dungeon', dropItem.name);
                    // Show in chat
                    addChatMessage('SYSTEM', `${p.name} found in dungeon: ${dropItem.name}${(dropItem.qty || 1) > 1 ? ` x${dropItem.qty}` : ''}!`, true);
                }
            } else {
                // Equipment drop using new rarity system
                const targetRarity = getItemDropByRarity();
                const droppedItem = getLeveledItemDrop(targetRarity, e.tier);

                if (droppedItem) {
                    addToInventory({ ...droppedItem, qty: 1 });
                    const rarityColor = getRarityColor(droppedItem.rarity);
                    const isUber = isUberUnique(droppedItem);
                    const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
                    addDungeonLog(`Dropped: <span style="${itemColorStyle}">${droppedItem.name}</span> (${droppedItem.rarity})${isMiniboss ? ' (Miniboss bonus!)' : ''}!`, 'reward');
                    addItemLog('dungeon', droppedItem.name);
                    // Show in chat
                    addChatMessage('SYSTEM', `${p.name} found a ${droppedItem.rarity} item in dungeon: ${droppedItem.name}!`, true);
                }
            }
        }
    }

    // Random scroll drop (0.5% chance, tripled for miniboss = 3 rolls) with Magic Find-adjusted rarity weighting
    for (let roll = 0; roll < numDropRolls; roll++) {
        if (Math.random() < 0.005) {
            const scrollName = getRandomScrollDropName();
            if (scrollName && scrollPool[scrollName]) {
                addToInventory({ name: scrollName, type: 'scroll', qty: 1, ...scrollPool[scrollName] });
                addDungeonLog(`Dropped scroll: ${scrollName}${isMiniboss ? ' (Miniboss bonus!)' : ''}!`, 'reward');
                addChatMessage('SYSTEM', `${p.name} found a scroll in dungeon: ${scrollName}!`, true);
            }
        }
    }

    // Check level up
    checkLevelUp();

    resetCombatScrollSession();

    // Every 5 stages: permanent +1 ATK and +1 DEF reward (check BEFORE incrementing)
    if (dungeonState.stage > 0 && dungeonState.stage % 5 === 0) {
        p.atk += 1;
        p.def += 1;
        addDungeonLog(`🏆 STAGE ${dungeonState.stage} MILESTONE! Permanent +1 ATK and +1 DEF!`, 'reward');
        addChatMessage('SYSTEM', `${p.name} reached Stage ${dungeonState.stage} in the Dungeon and gained permanent +1 ATK and +1 DEF!`, true);
    }

    // Advance to next stage
    dungeonState.stage++;
    
    // Track highest dungeon stage reached
    if (dungeonState.stage > gameState.highestDungeonStage) {
        gameState.highestDungeonStage = dungeonState.stage;
        addDungeonLog(`🏆 New record! Highest dungeon stage: ${dungeonState.stage}!`, 'reward');
        // Auto-save when new highest stage is achieved so it persists across refresh
        saveGame();
    }
    
    addDungeonLog(`--- Stage ${dungeonState.stage} ---`, 'info');

    // Heal slightly between stages
    dungeonState.hp = Math.min(dungeonState.maxHp, dungeonState.hp + Math.floor(dungeonState.maxHp * 0.1));
    p.hp = dungeonState.hp;

    // Generate next encounter
    generateDungeonEncounter();
    updateStats();
}

function endDungeon() {
    const p = gameState.player;
    const stage = dungeonState.stage;
    
    // Track highest dungeon stage reached
    if (stage > gameState.highestDungeonStage) {
        gameState.highestDungeonStage = stage;
        addDungeonLog(`🏆 New record! Highest dungeon stage: ${stage}!`, 'reward');
    }
    
    addDungeonLog(`Dungeon complete! You reached Stage ${stage}.`, 'info');
    addBattleMsg(`Completed ${stage} stages in the dungeon!`, 'reward');
    addChatMessage('SYSTEM', `${p.name} cleared ${stage} stages in the Dungeon!`, true);
    
    dungeonState.active = false;
    dungeonState.inBattle = false;
    dungeonState.currentEnemy = null;
    resetCombatScrollSession();
    
    updateStats();
    showScreen('battle');
}

function addDungeonLog(msg, type = 'info') {
    dungeonState.log.push({ msg, type });
    if (dungeonState.log.length > 100) dungeonState.log.shift();
}

function renderDungeon() {
    const container = document.getElementById('battle-content');
    const combatCooldownRemaining = getCombatCooldownRemainingMs();
    const combatLocked = combatCooldownRemaining > 0;
    
    if (!dungeonState.active) {
        container.innerHTML = `<div class="msg">No active dungeon. Click below to enter!</div>
            <button class="action-btn dungeon-btn" onclick="startDungeon()" ${combatLocked ? 'disabled' : ''}>${combatLocked ? `Combat Cooldown (${formatPvpCooldown(combatCooldownRemaining)})` : 'Enter Dungeon'}</button>`;
        return;
    }
    
    const e = dungeonState.currentEnemy;
    if (!e) {
        container.innerHTML = `<div class="dungeon-info">
            <div class="dungeon-stage">Dungeon - Stage ${dungeonState.stage}</div>
        </div>`;
        return;
    }

    activateCombatScrollsForCurrentBattle('dungeon');
    if (!dungeonState.active || !dungeonState.inBattle || !dungeonState.currentEnemy) return;
    
    const hpPct = (e.hp / e.maxHp * 100).toFixed(0);
    
    let html = `<div class="dungeon-info">
        <div class="dungeon-stage">Dungeon - Stage ${dungeonState.stage}</div>
        <div class="dungeon-rewards">Rewards so far: ${dungeonState.rewards.length} victories</div>
        ${gameState.highestDungeonStage > 0 ? `<div style="color:#ffd700;font-size:0.9em;margin-top:5px;">🏆 Highest Stage Reached: ${gameState.highestDungeonStage}</div>` : ''}
    </div>`;
    
    html += `<div class="section-title">Battle - ${e.name}</div>`;
    html += `<div class="boss-hp-bar"><div class="boss-hp-fill" style="width:${hpPct}%"></div></div>`;
    html += `<div class="description">HP: ${e.hp}/${e.maxHp} | ATK: ${e.atk} | DEF: ${e.def}</div>`;
    
    html += `<div class="section-title">Actions</div>`;
    html += `<button class="action-btn" onclick="dungeonAction('attack')" ${combatLocked ? 'disabled' : ''}>Attack</button>`;
    html += `<button class="action-btn" onclick="dungeonAction('spell')" ${(gameState.player.mp < 15 || combatLocked) ? 'disabled' : ''}>Cast Spell (15 MP)</button>`;
    html += `<button class="action-btn danger" onclick="dungeonAction('flee')" ${combatLocked ? 'disabled' : ''}>Leave Dungeon</button>`;
    if (combatLocked) {
        html += `<div class="encounter-info" style="color:#ff8888;">Combat systems recover in ${formatPvpCooldown(combatCooldownRemaining)}.</div>`;
    }

    const visibleScrolls = getVisibleCombatScrolls();
    if (visibleScrolls.length > 0) {
        html += `<div class="section-title">Scrolls</div>`;
        visibleScrolls.forEach(({ scroll, idx }) => {
            html += `<button class="action-btn scroll-btn" onclick="useScroll(${idx})">${scroll.name}</button>`;
        });

    const potions = gameState.inventory.filter(i => i.type === 'consumable');

function dungeonUseItem(idx) {
    if (!dungeonState.active || !dungeonState.inBattle) return;
    const item = gameState.inventory[idx];
    if (!item) return;
    
    if (item.type === 'consumable') {
        if (item.effect === 'heal') {
            dungeonState.hp = Math.min(dungeonState.maxHp, dungeonState.hp + item.value);
            gameState.player.hp = dungeonState.hp;
            addDungeonLog(`Used ${item.name}: Healed ${item.value} HP`, 'heal');
        } else if (item.effect === 'mana') {
            gameState.player.mp = Math.min(gameState.player.maxMp, gameState.player.mp + item.value);
            addDungeonLog(`Used ${item.name}: Restored ${item.value} MP`, 'heal');
    } else if (item.effect === 'blessing') {
        addDungeonLog(`Blessing Oil cannot be used from inventory! Go to the Temple to use it.`, 'info');
        return; // Don't remove from inventory
    }
        removeFromInventory(idx);
        updateStats();
        renderDungeon();
    }
}

// ENCRYPTION UTILITIES (XOR + Base64 for anti-tampering)
const ENCRYPTION_KEY = 'R3alm0fSh4d0ws_S3cr3tK3y_2026!';

function encryptData(data) {
    const jsonString = JSON.stringify(data);
    let encrypted = '';
    for (let i = 0; i < jsonString.length; i++) {
        encrypted += String.fromCharCode(jsonString.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
    }
    return btoa(encodeURIComponent(encrypted));
}

function decryptData(encryptedBase64) {
    try {
        const decoded = decodeURIComponent(atob(encryptedBase64));
        let decrypted = '';
        for (let i = 0; i < decoded.length; i++) {
            decrypted += String.fromCharCode(decoded.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
        }
        return JSON.parse(decrypted);
    } catch (e) {
        return null;
    }
}

function invertAliasMap(map) {
    return Object.fromEntries(Object.entries(map).map(([key, value]) => [value, key]));
}

const SAVE_PLAYER_KEY_FROM_ALIAS = invertAliasMap(SAVE_PLAYER_KEY_ALIASES);
const SAVE_ITEM_KEY_FROM_ALIAS = invertAliasMap(SAVE_ITEM_KEY_ALIASES);
const SAVE_EQUIPMENT_KEY_FROM_ALIAS = invertAliasMap(SAVE_EQUIPMENT_KEY_ALIASES);

function cloneData(value) {
    if (value === undefined) return undefined;
    return JSON.parse(JSON.stringify(value));
}

function valuesEqual(a, b) {
    return JSON.stringify(a) === JSON.stringify(b);
}

function isGeneratedCatalogItemName(name) {
    return typeof name === 'string' && SAVE_ITEM_NAME_PATTERN.test(name);
}

function buildStaticSaveItemCatalog() {
    const entries = new Map();
    const addEntry = (name, item) => {
        if (!name || !item || entries.has(name) || isGeneratedCatalogItemName(name)) return;
        entries.set(name, item);
    };

    Object.entries(itemPool || {}).forEach(([name, item]) => addEntry(name, item));
    Object.entries(scrollPool || {}).forEach(([name, item]) => addEntry(name, item));
    Object.entries(SAVE_ITEM_BASE_EXTRAS).forEach(([name, item]) => addEntry(name, item));

    return Array.from(entries.keys()).sort((a, b) => a.localeCompare(b));
}

const SAVE_ITEM_CATALOG = buildStaticSaveItemCatalog();
const SAVE_ITEM_ID_TO_NAME = Object.create(null);
SAVE_ITEM_CATALOG.forEach((name, index) => {
    const id = index + 1;
    SAVE_ITEM_ID_TO_NAME[id] = name;
});

function getCanonicalItemByName(name) {
    if (!name) return null;
    return itemPool[name] || scrollPool[name] || SAVE_ITEM_BASE_EXTRAS[name] || null;
}

function getCatalogBaseForItem(item) {
    if (!item || !item.name) return null;
    const baseName = item.name.replace(/ \+\d+$/, '');
    const base = getCanonicalItemByName(baseName);
    if (!base) return null;
    return { id: baseName, baseName, base };
}

function encodeAliasedDiffObject(source, base, aliases, options = {}) {
    const out = {};
    const omitKeys = new Set(options.omitKeys || []);
    const keys = new Set([
        ...Object.keys(base || {}),
        ...Object.keys(source || {})
    ]);

    keys.forEach(key => {
        if (omitKeys.has(key)) return;
        const value = source ? source[key] : undefined;
        if (value === undefined || typeof value === 'function') return;
        if (key === 'qty' && (value === undefined || value === 1) && (!base || base[key] === undefined)) return;

        const baseValue = base ? base[key] : undefined;
        const normalizedValue = key === 'qty' ? (value ?? 1) : value;
        const normalizedBase = key === 'qty' ? (baseValue ?? 1) : baseValue;
        if (base && valuesEqual(normalizedValue, normalizedBase)) return;

        const alias = aliases[key] || key;
        out[alias] = cloneData(value);
    });

    return out;
}

function decodeAliasedObject(source, reverseAliases) {
    const out = {};
    Object.entries(source || {}).forEach(([key, value]) => {
        out[reverseAliases[key] || key] = cloneData(value);
    });
    return out;
}

function getExpectedMergedItemName(baseName, mergeLevel) {
    return mergeLevel > 0 ? `${baseName} +${mergeLevel}` : baseName;
}

function humanizeSpecialAbility(ability) {
    const labels = {
        half_current_hp: 'Deals 50% of enemy current HP as bonus damage',
        status_immunity: 'Immune to negative status effects',
        encounter_multiplier_escape: 'Wander counts as extra encounters and escape keeps rewards'
    };
    return labels[ability] || String(ability || '').replace(/_/g, ' ');
}

function buildFallbackItemDescription(item) {
    if (!item) return '';

    const statLabels = [
        ['atk', 'ATK'], ['def', 'DEF'], ['crit', '% CRIT'], ['luck', 'LUCK'], ['critDmg', '% Crit Damage'],
        ['atkPercent', '% ATK'], ['defPercent', '% DEF'], ['hp', 'HP'], ['mp', 'MP'], ['maxHp', 'Max HP'],
        ['maxMp', 'Max MP'], ['dodge', '% Dodge'], ['lifesteal', '% Lifesteal'], ['dmgReduction', '% Damage Reduction'],
        ['armorPen', 'Armor Pen'], ['magicPen', 'Magic Pen'], ['attackSpeed', 'Attack Speed'], ['cdr', '% CDR'],
        ['moveSpeed', 'Move Speed'], ['healthRegen', 'Health Regen'], ['manaRegen', 'Mana Regen'],
        ['magicFind', 'Magic Find'], ['expBonus', '% EXP'], ['goldFind', '% Gold'], ['block', '% Block'],
        ['reflect', 'Reflect Damage'], ['thorns', 'Thorns'], ['eleDmg', 'Elemental Damage'], ['stunChance', '% Stun']
    ];

    if (item.type === 'scroll' || item.type === 'consumable') {
        const effectParts = [];
        if (item.effect) effectParts.push(String(item.effect).replace(/_/g, ' '));
        if (item.value !== undefined) effectParts.push(String(item.value));
        if (item.duration !== undefined) effectParts.push(`${item.duration} turns`);
        if (effectParts.length) return effectParts.join(' | ');
    }

    const parts = [];
    statLabels.forEach(([key, label]) => {
        if (typeof item[key] === 'number' && item[key] !== 0) {
            const prefix = label.startsWith('%') ? '' : '+';
            parts.push(`${prefix}${item[key]} ${label}`.trim());
        }
    });

    if (item.specialAbility) {
        parts.push(`Special: ${humanizeSpecialAbility(item.specialAbility)}`);
    }

    let desc = parts.join(', ');
    if (item.mergeLevel > 0) {
        const totalPercent = Math.round((Math.pow(1.5, item.mergeLevel) - 1) * 100);
        desc += `${desc ? '\n' : ''}✨ Merged ${item.mergeLevel} times | ATK +${totalPercent}%, DEF +${totalPercent}% | All other stats increased`;
    }

    return desc;
}

function ensureItemDescription(item) {
    if (!item) return item;
    if (item.desc) return item;

    const baseName = item.name ? item.name.replace(/ \+\d+$/, '') : null;
    const base = getCanonicalItemByName(baseName);
    if (base && base.desc) {
        item.desc = base.desc.split('\n✨')[0];
        if (item.mergeLevel > 0) {
            const totalPercent = Math.round((Math.pow(1.5, item.mergeLevel) - 1) * 100);
            item.desc += `\n✨ Merged ${item.mergeLevel} times | ATK +${totalPercent}%, DEF +${totalPercent}% | All other stats increased`;
        }
        return item;
    }

    item.desc = buildFallbackItemDescription(item);
    return item;
}

function encodeItemForSave(item) {
    if (!item) return 0;

    const catalogBase = getCatalogBaseForItem(item);
    if (catalogBase) {
        const { id, baseName, base } = catalogBase;
        const overrides = encodeAliasedDiffObject(item, base, SAVE_ITEM_KEY_ALIASES, {
            omitKeys: ['desc', 'equipped', 'equippedAt']
        });

        const mergeLevel = item.mergeLevel || 0;
        const expectedName = getExpectedMergedItemName(baseName, mergeLevel);
        if (item.name && item.name !== expectedName && item.name !== baseName) {
            overrides[SAVE_ITEM_KEY_ALIASES.name] = item.name;
        }

        if (Object.keys(overrides).length === 0) return id;
        return [id, overrides];
    }

    return ['c', encodeAliasedDiffObject(item, null, SAVE_ITEM_KEY_ALIASES, {
        omitKeys: ['desc', 'equipped', 'equippedAt']
    })];
}

function decodeItemForSave(entry) {
    if (!entry) return null;

    let item;
    if (typeof entry === 'number') {
        const baseName = SAVE_ITEM_ID_TO_NAME[entry];
        const base = getCanonicalItemByName(baseName);
        if (!base) return null;
        item = cloneData(base);
    } else if (typeof entry === 'string') {
        const base = getCanonicalItemByName(entry);
        if (!base) return null;
        item = cloneData(base);
    } else if (Array.isArray(entry) && entry[0] === 'c') {
        item = decodeAliasedObject(entry[1] || {}, SAVE_ITEM_KEY_FROM_ALIAS);
    } else if (Array.isArray(entry)) {
        const baseName = typeof entry[0] === 'number' ? SAVE_ITEM_ID_TO_NAME[entry[0]] : entry[0];
        const base = getCanonicalItemByName(baseName);
        if (!base) return null;
        const overrides = decodeAliasedObject(entry[1] || {}, SAVE_ITEM_KEY_FROM_ALIAS);
        item = { ...cloneData(base), ...overrides };
        if (item.mergeLevel > 0 && !overrides.name) {
            item.name = getExpectedMergedItemName(baseName, item.mergeLevel);
        }
    } else {
        return null;
    }

    if (item.qty === 1) delete item.qty;
    return ensureItemDescription(item);
}

function encodeEquipmentForSave(equipment) {
    const encoded = {};
    Object.entries(equipment || {}).forEach(([key, value]) => {
        const alias = SAVE_EQUIPMENT_KEY_ALIASES[key] || key;
        if (SAVE_EQUIPMENT_SLOT_KEYS.includes(key)) {
            if (!value) return;
            encoded[alias] = encodeItemForSave(value);
            return;
        }
        if (value === undefined || value === null || value === 0) return;
        encoded[alias] = value;
    });
    return encoded;
}

function decodeEquipmentFromSave(encoded) {
    const equipment = cloneData(INITIAL_GAME_STATE_SNAPSHOT.equipment);
    Object.entries(encoded || {}).forEach(([alias, value]) => {
        const key = SAVE_EQUIPMENT_KEY_FROM_ALIAS[alias] || alias;
        if (SAVE_EQUIPMENT_SLOT_KEYS.includes(key)) {
            equipment[key] = decodeItemForSave(value);
        } else {
            equipment[key] = cloneData(value);
        }
    });
    return equipment;
}

function encodeActiveQuestsForSave() {

function decodeActiveQuestsFromSave(entries) {

    const questProgress = {};
    (entries || []).forEach((entry, idx) => {
        const [questId, progress = 0] = entry || [];
        const def = questDefs.find(q => q.id === questId);
        if (!def) return;
        quests.push({ ...def, progress });
        if (progress > 0) questProgress[questId || idx] = progress;
    });

function findGuildQuestTemplate(name, target) {
    for (const rarity of Object.keys(guildQuestTemplates || {})) {
        const template = (guildQuestTemplates[rarity] || []).find(q => q.name === name && q.target === target);
        if (template) return { ...template, rarity };
    }
    return null;
}

function encodeGuildQuestsForSave() {
    return (gameState.guildQuests || []).map((quest, idx) => [
        quest.name,
        quest.target,
        quest.count,
        quest.reward?.xp || 0,
        quest.reward?.gold || 0,
        quest.reward?.soulGem ? 1 : 0,
        quest.rarity || '',
        quest.accepted ? 1 : 0,
        (gameState.guildQuestProgress && gameState.guildQuestProgress[quest.id || idx]) || quest.progress || 0
    ]);
}

function decodeGuildQuestsFromSave(entries) {
    const quests = [];
    const guildQuestProgress = {};

    (entries || []).forEach((entry, idx) => {
        const [name, target, count, xp, gold, soulGem, rarity, accepted, progress = 0] = entry || [];
        if (!name || !target || !count) return;
        const template = findGuildQuestTemplate(name, target);
        const desc = template
            ? template.desc.replace('{count}', count)
            : `Defeat ${count} ${String(target).replace(/_/g, ' ')}`;
        const questId = `guild_restore_${idx}_${target}`;

        quests.push({
            id: questId,
            name,
            desc,
            target,
            count,
            reward: { xp: xp || 0, gold: gold || 0, soulGem: !!soulGem },
            rarity: rarity || (template ? template.rarity : 'common'),
            accepted: !!accepted,
            progress
        });

        if (progress > 0) guildQuestProgress[questId] = progress;
    });

    return { quests, guildQuestProgress };
}

function sanitizeLoadedStateData(state) {
