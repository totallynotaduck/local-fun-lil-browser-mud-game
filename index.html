    ]
};

// Rarity weights for quest generation
const guildRarityWeights = {
    common: 40,
    uncommon: 30,
    rare: 18,
    epic: 10,
    legendary: 2
};

// Rarity colors
const rarityColors = {
    common: '#aaaaaa',
    uncommon: '#44ff44',
    rare: '#4444ff',
    epic: '#ff00ff',
    legendary: '#ffd700'
};

function generateGuildQuest(rarity) {
    const templates = guildQuestTemplates[rarity];
    if (!templates || templates.length === 0) return null;
    
    const template = pick(templates);
    const playerLevel = gameState.player.level;
    const location = getEnemyQuestLocationKey(template.target);
    
    // Scale count and rewards based on player level
    const levelScale = 1 + Math.floor(playerLevel / 10) * 0.2;
    const count = Math.max(1, Math.floor(template.baseCount * levelScale));
    const reward = createGuildQuestReward(template, rarity, count, playerLevel);
    
    return {
        id: `guild_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
        name: template.name,
        desc: template.desc.replace('{count}', count),
        target: template.target,
        location,
        count: count,
        reward,
        rarity: rarity,
        progress: 0
    };
}

function generateGuildQuests() {
    gameState.guildQuests = [];
    gameState.guildQuestProgress = {};
    
    // Generate 1-5 quests
    const numQuests = rand(1, 5);
    
    for (let i = 0; i < numQuests; i++) {
        // Determine rarity based on weights
        const roll = rand(1, 100);
        let rarity;
        let cumulative = 0;
        
        for (const [r, weight] of Object.entries(guildRarityWeights)) {
            cumulative += weight;
            if (roll <= cumulative) {
                rarity = r;
                break;
            }
        }
        
        const quest = generateGuildQuest(rarity);
        if (quest) {
            gameState.guildQuests.push(quest);
        }
    }
    
    gameState.lastGuildQuestRefresh = Date.now();
    // Reset force refresh cost on automatic refresh
    gameState.forceRefreshCost = 100;
    gameState.forceRefreshCount = 0;
    addChatMessage('SYSTEM', 'The Adventurer\'s Guild has posted new quests!', true);
}

function forceRefreshGuildQuests() {
    const cost = gameState.forceRefreshCost;
    
    // Check if player has enough gold
    if (gameState.player.gold < cost) {
        addBattleMsg(`Not enough gold! Force refresh costs ${cost} gold.`, 'damage');
        return;
    }
    
    // Deduct gold
    gameState.player.gold -= cost;
    
    // Increase cost multiplicatively (x2 each time)
    gameState.forceRefreshCost = gameState.forceRefreshCost * 2;
    gameState.forceRefreshCount++;
    
    // Generate new quests
    gameState.guildQuests = [];
    gameState.guildQuestProgress = {};
    
    const numQuests = rand(1, 5);
    
    for (let i = 0; i < numQuests; i++) {
        const roll = rand(1, 100);
        let rarity;
        let cumulative = 0;
        
        for (const [r, weight] of Object.entries(guildRarityWeights)) {
            cumulative += weight;
            if (roll <= cumulative) {
                rarity = r;
                break;
            }
        }
        
        const quest = generateGuildQuest(rarity);
        if (quest) {
            gameState.guildQuests.push(quest);
        }
    }
    
    addBattleMsg(`Force refreshed guild quests for ${cost} gold! Next cost: ${gameState.forceRefreshCost} gold`, 'reward');
    updateStats();
    renderGuildQuests();
}

function acceptGuildQuest(idx) {
    if (idx < 0 || idx >= gameState.guildQuests.length) return;
    
    const quest = gameState.guildQuests[idx];
    if (quest.accepted) return;
    
    quest.accepted = true;
    gameState.guildQuestProgress[quest.id || idx] = 0;
    renderGuildQuests();
    addBattleMsg(`Accepted guild quest: ${quest.name}`, 'info');
}

function turnInGuildQuest(idx) {
    const quest = gameState.guildQuests[idx];
    if (!quest || !quest.accepted) return;
    
    const progressKey = quest.id || idx;
    const progress = gameState.guildQuestProgress[progressKey] || 0;
    if (progress < quest.count) return;
    
    // Grant rewards
    gameState.player.xp += quest.reward.xp;
    gameState.player.gold += quest.reward.gold;
    
    // Legendary quests give Soul Gems
    if (quest.reward.soulGem) {
        gameState.soulGems++;
        addBattleMsg(`Legendary quest complete: ${quest.name}! Gained ${quest.reward.xp} XP, ${quest.reward.gold} gold, and 1 Soul Gem!`, 'reward');
        addChatMessage('SYSTEM', `${gameState.player.name} completed a legendary guild quest and earned a Soul Gem!`, true);
    } else {
        addBattleMsg(`Guild quest complete: ${quest.name}! Gained ${quest.reward.xp} XP and ${quest.reward.gold} gold!`, 'reward');
    }

    gameState.guildQuests.splice(idx, 1);
    delete gameState.guildQuestProgress[progressKey];
    
    checkLevelUp();
    updateStats();
    renderGuildQuests();
}

function renderGuildQuests() {
    const container = document.getElementById('battle-content');
    
    // Check if we need to refresh quests
    const now = Date.now();
    const timeSinceRefresh = now - (gameState.lastGuildQuestRefresh || 0);
    if (timeSinceRefresh >= GUILD_QUEST_REFRESH_INTERVAL || gameState.guildQuests.length === 0) {
        generateGuildQuests();
    }
    
    const timeLeft = GUILD_QUEST_REFRESH_INTERVAL - timeSinceRefresh;
    const timeLeftMins = Math.floor(timeLeft / 60000);
    const timeLeftSecs = Math.floor((timeLeft % 60000) / 1000);
    
    let html = `<div class="location-header" style="color:#ffd700">&#9876; Adventurer's Guild &#9876;</div>`;
    html += `<div class="description">The guild posts new quests every hour. Complete legendary quests to earn Soul Gems!</div>`;
    html += `<div style="color:#aaa;font-size:0.85em;margin-bottom:15px">Next refresh in: ${timeLeftMins}m ${timeLeftSecs}s</div>`;
    
    html += `<div class="section-title">Available Guild Quests (${gameState.guildQuests.length})</div>`;
    
    if (gameState.guildQuests.length === 0) {
        html += `<div class="msg">No quests available. Check back soon!</div>`;
    }
    
    gameState.guildQuests.forEach((quest, idx) => {
        const progress = gameState.guildQuestProgress[quest.id || idx] || 0;
        const complete = quest.accepted && progress >= quest.count;
        const color = rarityColors[quest.rarity] || '#aaa';
        const locationName = locations[quest.location]?.name || humanizeQuestTarget(quest.location || getEnemyQuestLocationKey(quest.target));
        
        html += `<div class="quest-item" style="border-color: ${color}">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="quest-title" style="color:${color}">${quest.name}</div>
                <span style="color:${color};font-size:0.8em;font-weight:bold">[${quest.rarity.toUpperCase()}]</span>
            </div>
            <div class="description">${quest.desc}</div>
            <div style="color:#888;font-size:0.85em">Target Zone: ${locationName}</div>
            <div style="color:#aaa;font-size:0.85em">
                Reward: ${quest.reward.xp} XP, ${quest.reward.gold} Gold
                ${quest.reward.soulGem ? '<span style="color:#ff00ff;font-weight:bold"> + 1 Soul Gem</span>' : ''}
            </div>
            ${quest.accepted ? `
                <div style="margin-top:8px">Progress: ${progress}/${quest.count} ${complete ? '- COMPLETE!' : ''}</div>
                ${complete ? `<button class="action-btn quest" onclick="turnInGuildQuest(${idx})">Turn In Quest</button>` : ''}
            ` : `
                <button class="action-btn quest" onclick="acceptGuildQuest(${idx})" style="margin-top:8px">Accept Quest</button>
            `}
        </div>`;
    });
    
    html += `<div style="margin-top:20px;">
        <button class="action-btn gold-btn" onclick="forceRefreshGuildQuests()" ${gameState.player.gold < gameState.forceRefreshCost ? 'disabled' : ''}>Refresh Quests (Force) - ${gameState.forceRefreshCost} Gold</button>
        <div style="color:#888;font-size:0.8em;margin-top:5px;">Cost doubles with each use (resets on auto-refresh)</div>
    </div>`;
    
    container.innerHTML = html;
}

// JOB SYSTEM - INSTANT COMPLETION
function increaseMaxJobPoints() {
    if (gameState.soulGems < 1) {
        addBattleMsg('Not enough Soul Gems! Requires 1 Soul Gem.', 'damage');
        return;
    }
    
    gameState.soulGems -= 1;
    gameState.maxJobPoints += 1;
    // Grant extra job point when upgrading
    gameState.jobPoints += 1;
    
    addBattleMsg(`Max Job Points increased! New maximum: ${gameState.maxJobPoints}`, 'reward');
    addChatMessage('SYSTEM', `${gameState.player.name} increased Max Job Points to ${gameState.maxJobPoints}!`, true);
    
    updateStats();
    renderJobs();
}

function refillJobPointsToMax() {
    if (gameState.soulGems < 1) {
        addBattleMsg('Not enough Soul Gems! Requires 1 Soul Gem.', 'damage');
        return;
    }

    if (gameState.jobPoints >= gameState.maxJobPoints) {
        addBattleMsg('Your Job Points are already full.', 'info');
        return;
    }

    const restoredPoints = gameState.maxJobPoints - gameState.jobPoints;
    gameState.soulGems -= 1;
    gameState.jobPoints = gameState.maxJobPoints;

    addBattleMsg(`Job Points refilled to max! Restored ${restoredPoints} point${restoredPoints === 1 ? '' : 's'}.`, 'reward');
    addChatMessage('SYSTEM', `${gameState.player.name} spent 1 Soul Gem to refill Job Points to max!`, true);

    updateStats();
    renderJobs();
}

function startJob(idx) {
    const job = jobDefs[idx];
    if (!job) return;
    if (gameState.player.level < job.levelReq) return;
    if (gameState.jobPoints <= 0) return;
    
    gameState.jobPoints--;
    gameState.jobsCompleted++;
    
    // Instant completion - no waiting
    gameState.player.xp += job.xp;
    gameState.player.gold += job.gold;
    
    checkLevelUp();
    updateStats();
    renderJobs();
    addChatMessage('SYSTEM', `${gameState.player.name} completed ${job.name}!`, true);
}

// CRAFTING
let craftingStatusMessage = null;
let craftingCraftableFilter = 'all';
let craftingSortMode = 'default';

function setCraftingStatus(message, type = 'info') {
    craftingStatusMessage = { message, type };
}

function setCraftingCraftableFilter(filterValue) {
    craftingCraftableFilter = filterValue === 'craftable' ? 'craftable' : 'all';
    renderCrafting();
}

function setCraftingSortMode(sortMode) {
    craftingSortMode = sortMode === 'craftable' ? 'craftable' : 'default';
    renderCrafting();
}

function getInventoryItemQuantity(itemName) {
    return gameState.inventory.reduce((total, item) => {
        if (!item || item.name !== itemName) return total;
        return total + ((Number.isFinite(item.qty) && item.qty > 0) ? item.qty : 1);
    }, 0);
}

function consumeInventoryItemQuantity(itemName, qtyNeeded) {
    let remaining = Math.max(0, Number(qtyNeeded) || 0);
    if (remaining <= 0) return true;

    for (let i = gameState.inventory.length - 1; i >= 0 && remaining > 0; i--) {
        const item = gameState.inventory[i];
        if (!item || item.name !== itemName) continue;

        const itemQty = (Number.isFinite(item.qty) && item.qty > 0) ? item.qty : 1;
        const qtyToRemove = Math.min(itemQty, remaining);
        removeFromInventory(i, qtyToRemove);
        remaining -= qtyToRemove;
    }

    return remaining <= 0;
}

function meetsCraftLevelRequirement(recipe) {
    const result = recipe && recipe.result;
    if (!result || !result.levelReq) return true;
    return gameState.player.level >= result.levelReq;
}

function canCraft(recipe) {
    if (!meetsCraftLevelRequirement(recipe)) return false;
    for (const [mat, qty] of Object.entries(recipe.materials)) {
        if (getInventoryItemQuantity(mat) < qty) return false;
    }
    return true;
}

function craftItem(recipeIdx) {
    const recipe = craftingRecipes[recipeIdx];
    if (!recipe) return;

    if (!meetsCraftLevelRequirement(recipe)) {
        setCraftingStatus(`You need to be level ${recipe.result.levelReq} to craft ${recipe.result.name}.`, 'damage');
        renderCrafting();
        return;
    }

    if (!canCraft(recipe)) {
        setCraftingStatus(`Insufficient materials for ${recipe.name}.`, 'damage');
        renderCrafting();
        return;
    }
    
    // Remove materials
    for (const [mat, qty] of Object.entries(recipe.materials)) {
        if (!consumeInventoryItemQuantity(mat, qty)) {
            setCraftingStatus(`Insufficient materials for ${recipe.name}.`, 'damage');
            renderCrafting();
            return;
        }
    }
    
    // Add result
    if (Math.random() <= recipe.chance) {
        addToInventory({ ...recipe.result, qty: 1 });
        addBattleMsg(`Crafted: ${recipe.result.name}!`, 'reward');
        setCraftingStatus(`Crafted ${recipe.result.name} successfully!`, 'reward');

        if (recipe.result && recipe.result.rarity === 'unique' && Math.random() < (globalThis.UNIQUE_CRAFT_UBER_DROP_CHANCE || 0.10)) {
            const bonusUberUnique = getCraftingUberUniqueDrop(recipe.result);
            if (bonusUberUnique) {
                addToInventory({ ...bonusUberUnique, qty: 1 });
                addBattleMsg(`Lucky bonus drop! You also received Uber Unique: ${bonusUberUnique.name}!`, 'reward');
                setCraftingStatus(`Crafted ${recipe.result.name} successfully! Bonus Uber Unique: ${bonusUberUnique.name}!`, 'reward');
            }
        }
    } else {
        addBattleMsg('Crafting failed!', 'damage');
        setCraftingStatus(`Crafting ${recipe.result.name} failed.`, 'damage');
    }
    
    renderCrafting();
    updateStats();
}

function getCraftingUberUniqueDrop(baseItem) {
    const uberUniquePool = Object.values(itemPool).filter(item => item && (item.rarity === 'uber_unique' || item.uberUnique === true));
    if (!uberUniquePool.length) return null;

    const targetSlot = baseItem && (baseItem.equipSlot || baseItem.type);
    const slotMatches = targetSlot
        ? uberUniquePool.filter(item => (item.equipSlot || item.type) === targetSlot)
        : [];

    return pick(slotMatches.length ? slotMatches : uberUniquePool);
}

// LOCATIONS RENDER
function renderTravel() {
    const container = document.getElementById('travel-content');
    const p = gameState.player;
    const loc = locations[p.location];
    const combatCooldownRemaining = getCombatCooldownRemainingMs();
    const defeatLockRemaining = getDefeatScreenLockRemainingMs();
    const combatLocked = combatCooldownRemaining > 0;
    const defeatLocked = defeatLockRemaining > 0;
    const canWanderHere = locationSupportsWandering(p.location);
    const wanderButtonLabel = gameState.wandering.active ? 'Stop Wandering' : 'Enable Wandering';

    const locationEnemyNames = Array.isArray(loc.enemies) && loc.enemies.length > 0
        ? loc.enemies.map(enemyKey => {
            const enemyData = enemies[enemyKey];
            return enemyData?.name || enemyKey.replace(/_/g, ' ');
        })
        : [];

    let html = `<div class="location-header">${loc.name}</div>`;
    html += `<div class="description">${loc.desc}</div>`;

    if (locationEnemyNames.length > 0) {
        html += `<div class="description"><span style="color:#00ffff;">Enemies here:</span> ${locationEnemyNames.join(', ')}</div>`;
    }
    
    html += `<div class="section-title">Actions</div>`;
    if (canWanderHere) {
        const battleDisabled = combatLocked || defeatLocked;
        const wanderDisabled = combatLocked || defeatLocked;
        const battleLabel = combatLocked
            ? `Combat Cooldown (${formatPvpCooldown(combatCooldownRemaining)})`
            : defeatLocked
                ? `Defeat Lock (${formatPvpCooldown(defeatLockRemaining)})`
                : 'Search for Enemies';
        const wanderLabel = combatLocked
            ? 'Recovery Active'
            : defeatLocked
                ? `Defeat Lock (${formatPvpCooldown(defeatLockRemaining)})`
                : wanderButtonLabel;

        html += `<button class="action-btn" onclick="startBattle('${p.location}')" ${battleDisabled ? 'disabled' : ''}>${battleLabel}</button>`;
        html += `<button class="action-btn ${gameState.wandering.active ? 'danger' : ''}" onclick="toggleWander()" ${wanderDisabled ? 'disabled' : ''}>${wanderLabel}</button>`;

        if (defeatLocked) {
            html += `<div class="encounter-info" style="color:#ff8888;">Battle and Wandering unlock in ${formatPvpCooldown(defeatLockRemaining)}.</div>`;
        }
        if (loc.levelRange) {
            html += `<div class="encounter-info">Level Range: ${loc.levelRange[0]}-${loc.levelRange[1]}</div>`;
        }
        if (combatLocked) {
            html += `<div class="encounter-info" style="color:#ff8888;">Combat systems recover in ${formatPvpCooldown(combatCooldownRemaining)}.</div>`;
        }
    } else {
        html += `<button class="action-btn" disabled title="Wandering requires a location with assigned enemies.">${wanderButtonLabel}</button>`;
        html += `<div class="encounter-info" style="color:#888;">No enemies are assigned to this location, so wandering is unavailable here.</div>`;
    }
    
    // Show wandering status if active
    if (gameState.wandering.active) {
        html += `<div class="battle-log" style="border-left-color: #00ffff; margin-top: 10px;">
            <p class="info">🔄 Wandering expedition is active... You are exploring the area.</p>
        </div>`;
    }
    
    html += `<div class="section-title">Connected Locations</div>`;
    html += `<div class="location-grid">`;
    
    loc.connections.forEach(connKey => {
        const conn = locations[connKey];
        const isCurrent = connKey === p.location;
        const unlocked = isLocationUnlocked(connKey);
        html += `<div class="location-card ${isCurrent ? 'current' : ''} ${unlocked ? '' : 'locked'}" onclick="${unlocked ? `travelTo('${connKey}')` : `showLockedLocationMessage('${connKey}')`}">
            <div class="location-name">${unlocked ? conn.name : `<span style="color:#ff4444">&#x1F512;</span> ${conn.name}`}</div>
            <div class="location-info">${isCurrent ? 'Current Location' : (unlocked ? conn.desc.substring(0, 50) : `Requires Level ${conn.minLevel}`)}...</div>
        </div>`;
    });
    
    html += `</div>`;
    container.innerHTML = html;
}

function showLockedLocationMessage(locKey) {
    const loc = locations[locKey];
    const requiredLevel = loc.minLevel;
    const currentLevel = gameState.player.level;
    addBattleMsg(`🔒 ${loc.name} is locked! Requires Level ${requiredLevel} (Your Level: ${currentLevel})`, 'damage');
    
    // Show a more prominent alert
    const container = document.getElementById('travel-content');
    const alertDiv = document.createElement('div');
    alertDiv.className = 'battle-log';
    alertDiv.style.borderLeftColor = '#ff4444';
    alertDiv.innerHTML = `<p class="damage">🔒 <strong>${loc.name} is locked!</strong></p>
        <p class="info">Required Level: ${requiredLevel}</p>
        <p class="info">Your Level: ${currentLevel}</p>
        <p class="info">Defeat enemies and complete quests to gain XP and level up!</p>`;
    
    // Remove existing alert if any
    const existing = container.querySelector('.locked-alert');
    if (existing) existing.remove();
    
    alertDiv.classList.add('locked-alert');
    container.insertBefore(alertDiv, container.firstChild);
    
    // Auto-remove after 5 seconds
    setTimeout(() => {
        if (alertDiv.parentNode) alertDiv.remove();
    }, 5000);
}

// WANDERING EXPEDITION SYSTEM
function toggleWander() {
    if (guardCombatCooldown(addBattleMsg, renderTravel)) return;
    if (!locationSupportsWandering(gameState.player.location)) {
        addBattleMsg(`Wandering is unavailable in ${locations[gameState.player.location]?.name || 'this location'} because no enemies are assigned here.`, 'info');
        renderTravel();
        return;
    }
    // Start a wandering expedition and navigate to the wander screen
    startWanderingExpedition();
}

function startWanderingExpedition() {
    const p = gameState.player;
    if (!locationSupportsWandering(p.location)) {
        addBattleMsg(`Wandering is unavailable in ${locations[p.location]?.name || 'this location'} because no enemies are assigned here.`, 'info');
        renderWandering();
        return;
    }

    const rankData = rollWanderRank();
    const [minStages, maxStages] = getWanderStageRange(rankData.key, p.location);
    const totalEvents = rand(minStages, maxStages);
    
    // Initialize wandering state
    gameState.wandering = {
        active: true,
        totalEvents: totalEvents,
        currentEvent: 0,
        rankKey: rankData.key,
        rankMultiplier: rankData.multiplier,
        locationKey: p.location,
        merchantActive: false,
        merchantItems: [],
        rewards: { xp: 0, gold: 0, items: [] },
        log: [],
        inBattle: false,
        currentEnemy: null,
        slotMachineActive: false,
        slotMachineRarity: null,
        slotMachineLastResults: null,
        slotMachineBet: 0,
        slotMachineFreeSpins: 0,
        slotMachineAutoBetActive: false,
        slotMachineSpinning: false,
        slotMachineJackpots: { minor: false, major: false, grand: false },
        slotMachineBonusActive: false,
        plinkoActive: false,
        plinkoBet: 0,
        plinkoCurrency: 'gold',
        plinkoBallCount: 1,
        plinkoRows: 16,
        plinkoRisk: 'medium',
        plinkoAnimating: false,
        plinkoAutoBetActive: false,
        plinkoResult: null,
        plinkoHistory: []
    };
    
    addWanderingLog('You begin your wandering expedition...', 'info');
    addWanderingLog(`Wander Rank: <span style="${getWanderRankTextStyle(rankData)}">${rankData.key}</span> (${formatWanderScalingText(rankData.key)})`, 'reward');
    addWanderingLog(`This journey will have ${totalEvents} events.`, 'info');
    if (WANDER_HIGH_RANK_KEYS.has(rankData.key)) {
        addWanderingLog(`⚠️ High-rank rules active: ${minStages}-${maxStages} stages, no expedition escape after stage 2, enemies may inflict extra debuffs.`, 'damage');
    }
    
    // Show wandering screen
    showScreen('wandering');
}

function addWanderingLog(msg, type = 'info') {
    gameState.wandering.log.push({ msg, type });
    if (gameState.wandering.log.length > 100) gameState.wandering.log.shift();
}

function wanderingContinue() {
    const w = gameState.wandering;
    if (!w.active) return;

    // If in battle or at slot machine (including bonus), don't continue
    if (w.inBattle || w.slotMachineActive || w.plinkoActive) return;
    
    // Check if we've completed all events
    if (w.currentEvent >= w.totalEvents) {
        completeWanderingExpedition();
        return;
    }
    
    // Advance to next event
    w.currentEvent++;
    
    // Generate random event
    generateWanderingEvent();
    
    renderWandering();
    updateStats();
}

function generateWanderingEvent() {
    const w = gameState.wandering;
    const p = gameState.player;
    const level = p.level;
    const luck = getTotalLuck();
    const rewardRankMultiplier = getWanderRewardRankMultiplier(w.rankKey);
    const enemyRankMultiplier = getWanderEnemyRankMultiplier(w.rankKey);
    const itemRankMultiplier = Math.max(0.25, w.rankMultiplier || 1);
    
    const eventType = Math.random() * 100;
    
    if (eventType < 30) {
        // 30% chance: Battle encounter
        const loc = locations[p.location];
        if (loc && loc.enemies && loc.enemies.length > 0) {
            const enemy = generateEnemy(p.location, false, { statMultiplier: enemyRankMultiplier, rewardMultiplier: rewardRankMultiplier });
            if (enemy) {
                w.inBattle = true;
                w.currentEnemy = enemy;
                addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: A ${enemy.name} attacks!`, 'damage');
                return;
            }
        }
        // Fallback to trap if no enemies
        const trapDmg = Math.max(1, Math.floor(level * 1.5) + rand(-2, 2));
        p.hp = Math.max(1, p.hp - trapDmg);
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: You triggered a trap! Took ${trapDmg} damage.`, 'damage');
    } else if (eventType < 45) {
        // 15% chance: Trap encounter (standalone)
        const trapTypes = [
            { name: 'Spike Trap', dmgMult: 1.5, desc: 'Hidden spikes pierce your armor!' },
            { name: 'Pit Trap', dmgMult: 2, desc: 'You fall into a hidden pit!' },
            { name: 'Poison Dart Trap', dmgMult: 1, desc: 'Poisonous darts fly from the walls!' },
            { name: 'Magic Rune Trap', dmgMult: 2.5, desc: 'A magical rune explodes beneath you!' },
            { name: 'Swinging Blade Trap', dmgMult: 1.8, desc: 'A massive blade swings from the ceiling!' }
        ];
        const trap = pick(trapTypes);
        const trapDmg = Math.max(1, Math.floor(level * trap.dmgMult) + rand(-3, 3));
        p.hp = Math.max(1, p.hp - trapDmg);
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: ${trap.desc} (${trap.name}) Took ${trapDmg} damage!`, 'damage');
    } else if (eventType < 55) {
        // 10% chance: Find gold
        const goldFound = rand(Math.floor(level * 2) + 5, Math.floor(level * 5) + 20);
        const luckBonus = Math.floor(luck * 0.5);
        const totalGold = applyWanderingRewardBoost(goldFound + luckBonus, w, 1);
        w.rewards.gold += totalGold;
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Found ${totalGold} gold!`, 'reward');
    } else if (eventType < 65) {
        // 10% chance: Gain XP
        const xpGained = rand(Math.floor(level * 2) + 10, Math.floor(level * 5) + 30);
        const luckBonus = Math.floor(luck * 0.2);
        const totalXp = applyWanderingRewardBoost(xpGained + luckBonus, w, 1);
        w.rewards.xp += totalXp;
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Gained ${totalXp} XP from exploration!`, 'reward');
    } else if (eventType < 80) {
        // 15% chance: Find item
        const droppedItem = getWanderItemDrop(itemRankMultiplier);
        if (droppedItem) {
            w.rewards.items.push({ ...droppedItem, qty: 1 });
            const rarityColor = getRarityColor(droppedItem.rarity);
            const isUber = isUberUnique(droppedItem);
            const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Found <span style="${itemColorStyle}">${droppedItem.name}</span> (${droppedItem.rarity})!`, 'reward');
        } else {
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Searched but found nothing.`, 'info');
        }
    } else if (eventType < 95) {
        // 15% chance: Nothing or minor heal
        if (Math.random() < 0.5) {
            const healAmt = Math.floor(p.maxHp * 0.1);
            p.hp = Math.min(p.maxHp, p.hp + healAmt);
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Found a healing spring. Restored ${healAmt} HP.`, 'heal');
        } else {
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Uneventful passage.`, 'info');
        }
     } else if (eventType < 99.4) {
        // 4.4% chance: Nothing or minor heal (remainder before rare events)
        if (Math.random() < 0.5) {
            const healAmt = Math.floor(p.maxHp * 0.1);
            p.hp = Math.min(p.maxHp, p.hp + healAmt);
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Found a healing spring. Restored ${healAmt} HP.`, 'heal');
        } else {
            addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: Uneventful passage.`, 'info');
        }
    } else if (eventType < 99.6) {
        // 0.2% chance: Slot Machine encounter
        w.slotMachineActive = true;
        // Random rarity: silver (50%), gold (30%), diamond (20%)
        const rarityRand = Math.random() * 100;
        w.slotMachineRarity = rarityRand < 50 ? 'silver' : rarityRand < 80 ? 'gold' : 'diamond';
        w.slotMachineLastResults = null;
        w.slotMachineBet = 0;
        w.slotMachineFreeSpins = 0;
        w.slotMachineAutoBetActive = false;
        w.slotMachineSpinning = false;
        w.slotMachineJackpots = { minor: false, major: false, grand: false };
        w.slotMachineBonusActive = false;
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: The Apostles of Fate have presented you with a slot machine. Test your luck!`, 'reward');
        showScreen('wandering');
    } else if (eventType < 99.8) {
        // 0.2% chance: Plinko encounter
        w.plinkoActive = true;
        w.plinkoBet = 0;
        w.plinkoCurrency = 'gold';
        w.plinkoBallCount = 1;
        w.plinkoRows = 16;
        w.plinkoRisk = 'medium';
        w.plinkoAnimating = false;
        w.plinkoResult = null;
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: The Apostles of Fate has invited you to determine your fate...`, 'reward');
        showScreen('plinko');
    } else {
        // 0.2% chance: Wandering Merchant (extremely rare!)
        w.merchantActive = true;
        w.merchantItems = generateMerchantItems();
        addWanderingLog(`Event ${w.currentEvent}/${w.totalEvents}: A mysterious merchant appears from the shadows!`, 'reward');
        addWanderingLog(`The merchant offers rare and powerful items for sale...`, 'info');
    }
}

function wanderingBattle(action) {
    const w = gameState.wandering;
    if (!w.active || !w.inBattle || !w.currentEnemy) return;
    if (guardCombatCooldown(addWanderingLog, renderWandering)) return;
    activateCombatScrollsForCurrentBattle('wandering');
    
    const p = gameState.player;
    const e = w.currentEnemy;
    const result = runUniversalCombatTurn(action, p, e, addWanderingLog);

    if (result.enemyDied) {
        wanderingEnemyDefeated();
        return;
    }

    if (result.playerDied) {
        wanderingPlayerDeath();
        return;
    }

    if (result.fled) {
        resetCombatScrollSession();
        w.inBattle = false;
        w.currentEnemy = null;
        renderWandering();
        return;
    }
    
    renderWandering();
    updateStats();
}

function wanderingEnemyDefeated() {
    const w = gameState.wandering;
    const e = w.currentEnemy;
    const p = gameState.player;
    const maxDropLevel = getPlayerItemDropLevelCap(e?.tier);
    
    // Scale XP and Gold to enemy level/tier, not player level
    const scaledXp = applyWanderingRewardBoost(e.xp, w, 1);
    const scaledGold = applyWanderingRewardBoost(e.gold, w, 1);
    
    // Add battle rewards to wandering rewards
    w.rewards.xp += scaledXp;
    w.rewards.gold += scaledGold;
    
    addWanderingLog(`Defeated ${e.name}! Gained ${scaledXp} XP and ${scaledGold} gold!`, 'reward');
    
    // Show in chat
    addChatMessage('SYSTEM', `${p.name} defeated ${e.name} while wandering and gained ${scaledXp} XP, ${scaledGold} Gold!`, true);

    // Count wandering kills toward quests too
    checkQuestProgress(e.name.replace(/ /g, '_'));
    
    // Drop system with new rarity rates
    // 35% base chance to drop something
    const dropChance = Math.min(1, ((0.35 + getTotalLuck() * 0.01) * (1 + getScrollDropBoost())) * Math.max(1, w.rankMultiplier || 1));
    
    if (Math.random() < dropChance) {
        // 60% chance for material/consumable drop (from enemy's loot table)
        // 40% chance for equipment drop (using new rarity system)
        if (Math.random() < 0.6 && e.drops && e.drops.length > 0) {
            // Material/consumable drop from enemy's loot table
            const dropItem = getMaterialDrop(e.drops, maxDropLevel);
            if (dropItem) {
                w.rewards.items.push({ ...dropItem, qty: dropItem.qty || 1 });
                addWanderingLog(`Dropped: ${dropItem.name}${(dropItem.qty || 1) > 1 ? ` x${dropItem.qty}` : ''}!`, 'reward');
                addItemLog('wandering', dropItem.name);
                // Show in chat
                addChatMessage('SYSTEM', `${p.name} found while wandering: ${formatChatItemMention(dropItem)}${(dropItem.qty || 1) > 1 ? ` x${dropItem.qty}` : ''}!`, true);
            }
        } else {
            // Equipment drop using new rarity system
            const targetRarity = getRankScaledItemRarity(w.rankMultiplier || 1);
            const droppedItem = getLeveledItemDrop(targetRarity, e.tier);
            
            if (droppedItem) {
                w.rewards.items.push({ ...droppedItem, qty: 1 });
                const rarityColor = getRarityColor(droppedItem.rarity);
                const isUber = isUberUnique(droppedItem);
                const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
                addWanderingLog(`Dropped: <span style="${itemColorStyle}">${droppedItem.name}</span> (${droppedItem.rarity})!`, 'reward');
                addItemLog('wandering', droppedItem.name);
                // Show in chat
                addChatMessage('SYSTEM', `${p.name} found a ${droppedItem.rarity} item while wandering: ${formatChatItemMention(droppedItem)}!`, true);
            }
        }
    }
    
    // Random scroll drop (0.5% chance) with Magic Find-adjusted rarity weighting
    if (Math.random() < Math.min(0.05, 0.005 * Math.max(1, w.rankMultiplier || 1))) {
        const scrollName = getRandomScrollDropName();
        if (scrollName && scrollPool[scrollName]) {
            w.rewards.items.push({ name: scrollName, type: 'scroll', qty: 1, ...scrollPool[scrollName] });
            addWanderingLog(`Dropped scroll: ${scrollName}!`, 'reward');
            addChatMessage('SYSTEM', `${p.name} found a scroll while wandering: ${formatChatItemMention(scrollName)}!`, true);
        }
    }

    resetCombatScrollSession();
    
    w.inBattle = false;
    w.currentEnemy = null;
    
    renderWandering();
    updateStats();
}

function wanderingPlayerDeath() {
    const w = gameState.wandering;
    const p = gameState.player;
    
    addWanderingLog('You have fallen during your expedition!', 'damage');
    addWanderingLog('All rewards have been lost...', 'damage');
    
    // Nullify all rewards on death
    w.rewards = { xp: 0, gold: 0, items: [] };
    
    triggerDefeatRecovery(addWanderingLog);
    
    // End wandering
    w.active = false;
    w.inBattle = false;
    w.currentEnemy = null;
    resetCombatScrollSession();
    
    addChatMessage('SYSTEM', `${p.name} fell during a wandering expedition and lost all rewards!`, true);
    
    updateStats();
    renderWandering();
}

function wanderingEscape() {
    const w = gameState.wandering;
    const p = gameState.player;
    
    if (!w.active) return;
    
    // If in battle, can't escape this way
    if (w.inBattle) {
        addWanderingLog('You must finish or flee from the current battle first!', 'damage');
        renderWandering();
        return;
    }

    if (WANDER_HIGH_RANK_KEYS.has(w.rankKey) && w.currentEvent > 2) {
        addWanderingLog('This high-rank expedition has sealed off escape beyond stage 2!', 'damage');
        renderWandering();
        return;
    }
    
    addWanderingLog('You chose to escape the expedition...', 'info');
    
    // Forfeit half the rewards
    const halfXp = Math.floor(w.rewards.xp / 2);
    const halfGold = Math.floor(w.rewards.gold / 2);
    const halfItems = w.rewards.items.slice(0, Math.floor(w.rewards.items.length / 2));
    
    // Apply halved rewards
    p.xp += halfXp;
    p.gold += halfGold;
    halfItems.forEach(item => addToInventory(item));
    
    addWanderingLog(`Escaped with half rewards: ${halfXp} XP, ${halfGold} Gold, ${halfItems.length} items.`, 'reward');
    
    // End wandering
    w.active = false;
    resetCombatScrollSession();
    
    addChatMessage('SYSTEM', `${p.name} escaped a wandering expedition with partial rewards.`, true);
    
    checkLevelUp();
    updateStats();
    showScreen('wandering');
}

function completeWanderingExpedition() {
    const w = gameState.wandering;
    const p = gameState.player;
    const rankData = getWanderRankData(w.rankKey);
    const statReward = getWanderCompletionStatReward(w.rankKey, w.locationKey);
    
    addWanderingLog('Expedition complete!', 'reward');
    
    // Apply all rewards
    p.xp += w.rewards.xp;
    p.gold += w.rewards.gold;
    w.rewards.items.forEach(item => addToInventory(item));
    
    addWanderingLog(`Final rewards: ${w.rewards.xp} XP, ${w.rewards.gold} Gold, ${w.rewards.items.length} items.`, 'reward');
    
    // End wandering
    w.active = false;
    resetCombatScrollSession();
    
    addChatMessage('SYSTEM', `${p.name} completed a wandering expedition and gained ${w.rewards.xp} XP!`, true);
    if (statReward) {
        p.permanentAtkBonus = (p.permanentAtkBonus || 0) + statReward.atk;
        p.permanentDefBonus = (p.permanentDefBonus || 0) + statReward.def;
        addWanderingLog(`🏆 ${rankData.key} expedition reward: permanent +${statReward.atk} ATK and +${statReward.def} DEF!`, 'reward');
        addChatMessage('SYSTEM', `🌈 ${p.name} completed a full ${rankData.key} wandering expedition and earned permanent +${statReward.atk} ATK / +${statReward.def} DEF!`, true);
    }
    if (WANDER_HIGH_RANK_KEYS.has(w.rankKey)) {
        ensureFakePlayerRoster(100).slice(0, 3).forEach(fake => {
            const msg = pick(WANDER_COMPLETION_CONGRATS)
                .replace(/\{player\}/g, p.name)
                .replace(/\{rank\}/g, rankData.key);
            addChatMessage(fake.name, msg, false, true);
        });
    }
    
    checkLevelUp();
    updateStats();
    renderWandering();
}

function getPlinkoRiskMultipliers(rows, risk) {
    const rowCount = Math.max(1, Math.floor(Number(rows) || 16));
    const binCount = getPlinkoBinCount(rowCount);
    if (rowCount === 16 && binCount === 18) {
        if (risk === 'low') {
            return [2.4, 2, 1.7, 1.4, 1.2, 1, 0.85, 0.65, 0.78, 0.78, 0.65, 0.85, 1, 1.2, 1.4, 1.7, 2, 2.4];
        }
        if (risk === 'medium') {
            return [5.5, 4.5, 3.5, 2.8, 2.1, 1.55, 1.05, 0.6, 0.44, 0.44, 0.6, 1.05, 1.55, 2.1, 2.8, 3.5, 4.5, 5.5];
        }
    }

    if (risk === 'high' && rowCount === 16 && binCount === 18) {
        return [1000, 120, 30, 10, 4, 1.5, 0.6, 0.2, 0.35, 0.35, 0.2, 0.6, 1.5, 4, 10, 30, 120, 1000];
    }

    const center = (binCount - 1) / 2;
    const targetRoi = 0.8;
    const riskConfig = {
        low: { floor: 0.55, edgeBoost: 1.55, exponent: 1.15 },
        medium: { floor: 0.28, edgeBoost: 4.2, exponent: 1.65 },
        high: { floor: 0.12, edgeBoost: 14, exponent: 2.3 }
    }[risk] || { floor: 0.28, edgeBoost: 4.2, exponent: 1.65 };

    const rawMultipliers = Array.from({ length: binCount }, (_, idx) => {
        const distance = Math.abs(idx - center) / Math.max(1, center);
        return riskConfig.floor + (riskConfig.edgeBoost * Math.pow(distance, riskConfig.exponent));
    });

    const bucketProbabilities = getPlinkoBucketProbabilities(rowCount);

    const currentExpectedValue = rawMultipliers.reduce((sum, multiplier, idx) => sum + (multiplier * (bucketProbabilities[idx] || 0)), 0) || 1;
    const scaleFactor = targetRoi / currentExpectedValue;

    return rawMultipliers.map(multiplier => {
        const value = multiplier * scaleFactor;
        if (value >= 10) return Math.round(value * 100) / 100;
        if (value >= 1) return Math.round(value * 1000) / 1000;
        return Math.round(value * 10000) / 10000;
    });
}

function combination(n, k) {
    const safeN = Math.max(0, Math.floor(Number(n) || 0));
    const safeK = Math.max(0, Math.floor(Number(k) || 0));
    if (safeK > safeN) return 0;
    if (safeK === 0 || safeK === safeN) return 1;

    const iterations = Math.min(safeK, safeN - safeK);
    let result = 1;
    for (let i = 1; i <= iterations; i++) {
        result = (result * (safeN - iterations + i)) / i;
    }
    return result;
}

function getPlinkoBinColor(multiplier, risk) {
    if (multiplier >= 50) return 'linear-gradient(180deg, #ff4d4d, #b10000)';
    if (multiplier >= 10) return 'linear-gradient(180deg, #ff8b38, #c04b00)';
    if (multiplier >= 3) return 'linear-gradient(180deg, #f1c84e, #9a6a00)';
    if (multiplier >= 1) return risk === 'low'
        ? 'linear-gradient(180deg, #65d68d, #237a43)'
        : 'linear-gradient(180deg, #5bc8ff, #2351b5)';
    return 'linear-gradient(180deg, #62708a, #303746)';
}

function getPlinkoBinCount(rows) {
    return Math.max(2, Math.floor(Number(rows) || 16) + 2);
}

function getPlinkoBucketProbabilities(rows) {
    const rowCount = Math.max(1, Math.floor(Number(rows) || 16));
    const binCount = getPlinkoBinCount(rowCount);
    const probabilities = Array(binCount).fill(0);
    const branchProbability = 1 / Math.pow(2, rowCount + 1);

    for (let entryLane = 0; entryLane < 2; entryLane++) {
        for (let rights = 0; rights <= rowCount; rights++) {
            probabilities[entryLane + rights] += combination(rowCount, rights) * branchProbability;
        }
    }

    return probabilities;
}

function formatPlinkoBinLabel(multiplier, compact = false) {
    const numericMultiplier = Number(multiplier) || 0;
    if (!compact) return `${numericMultiplier}x`;
    if (numericMultiplier >= 100) return `${Math.round(numericMultiplier)}x`;
    if (numericMultiplier >= 10) return `${numericMultiplier.toFixed(1).replace(/\.0$/, '')}x`;
    if (numericMultiplier >= 1) return `${numericMultiplier.toFixed(2).replace(/0+$/, '').replace(/\.$/, '')}x`;
    return `${numericMultiplier.toFixed(3).replace(/0+$/, '').replace(/\.$/, '')}x`;
}

function getPlinkoLayoutMetrics(rows) {
    const boardSize = 400;
    const binCount = getPlinkoBinCount(rows);
    const sidePadding = 28;
    const topY = 34;
    const bottomY = 334;
    const startY = 18;
    const centerX = boardSize / 2;
    const spacingX = (boardSize - (sidePadding * 2)) / Math.max(1, rows + 2);
    const rowSpacing = (bottomY - topY) / rows;
    const pegDiameter = 5;
    const ballDiameter = 9;
    const wallPadding = 18;
    const binWidth = (boardSize - (sidePadding * 2)) / binCount;
    const binCenters = Array.from({ length: binCount }, (_, idx) => sidePadding + (binWidth * idx) + (binWidth / 2));
    const entryLanes = [centerX - (spacingX / 2), centerX + (spacingX / 2)];
    const pegs = [];

    for (let row = 0; row < rows; row++) {
        const pegCount = row + 3;
        const startX = centerX - ((pegCount - 1) * spacingX / 2);
        const y = topY + (row * rowSpacing);
        for (let peg = 0; peg < pegCount; peg++) {
            pegs.push({
                x: startX + (peg * spacingX),
                y,
                row,
                col: peg,
                radius: pegDiameter / 2
            });
        }
    }

    return {
        boardWidth: boardSize,
        boardHeight: boardSize,
        scale: 1,
        binCenters,
        binWidth,
        entryLanes,
        spacingX,
        centerX,
        pegDiameter,
        ballDiameter,
        wallPadding,
        topY,
        bottomY,
        rowSpacing,
        startY,
        pegs
    };
}

function drawPlinkoBoard(rows, risk, lastResult = null) {
    const board = document.getElementById('plinko-board');
    if (!board) return;

    const layout = getPlinkoLayoutMetrics(rows);
    board.style.width = `${layout.boardWidth}px`;
    board.style.height = `${layout.boardHeight}px`;
    board.style.minHeight = `${layout.boardHeight}px`;

    let html = '';
    layout.pegs.forEach((peg, idx) => {
        html += `<div id="plinko-peg-${idx}" class="plinko-peg" style="left:${peg.x}px; top:${peg.y}px; width:${layout.pegDiameter}px; height:${layout.pegDiameter}px;"></div>`;
    });
    html += `<div id="plinko-ball-layer"><div id="plinko-ball" class="plinko-ball${lastResult && lastResult.profit > 0 ? ' drop-win' : ' drop-loss'}" style="left:${layout.centerX}px; top:${layout.startY}px; width:${layout.ballDiameter}px; height:${layout.ballDiameter}px;"></div></div>`;
    board.innerHTML = html;
}

function createPlinkoRigidBody(drop, idx, layout) {
    const path = Array.from({ length: Math.max(1, Math.floor(Number(drop.rows) || 16)) }, () => (Math.random() >= 0.5 ? 1 : 0));
    const entryLane = Math.random() >= 0.5 ? 1 : 0;
    const targetBucket = entryLane + getPlinkoBucketFromPath(path);
    const trajectory = buildPlinkoTrajectory(layout, path, entryLane, idx);
    return {
        ...drop,
        x: trajectory.start.x,
        y: trajectory.start.y,
        vx: 0,
        vy: 0,
        radius: layout.ballDiameter / 2,
        bucket: null,
        targetBucket,
        settled: false,
        landing: false,
        elapsed: 0,
        settleElapsed: 0,
        path,
        entryLane,
        trajectory,
        currentRow: 0,
        lastPegIndex: -1,
        el: null
    };
}

function getPlinkoBucketFromPath(path) {
    return (Array.isArray(path) ? path : []).reduce((sum, step) => sum + (step ? 1 : 0), 0);
}

function buildPlinkoTrajectory(layout, path, entryLane, idx) {
    const safeEntryLane = entryLane === 1 ? 1 : 0;
    const entryX = layout.entryLanes[safeEntryLane] ?? layout.centerX;
    const start = {
        x: entryX + ((Math.random() - 0.5) * layout.spacingX * 0.14),
        y: layout.startY - (idx * 3)
    };
    let rights = 0;

    const rowTargets = path.map((step, row) => {
        rights += step ? 1 : 0;
        const direction = step ? 1 : -1;
        const laneCount = row + 3;
        const laneIndex = safeEntryLane + rights;
        const laneCenterX = layout.centerX + ((laneIndex - ((laneCount - 1) / 2)) * layout.spacingX);
        const lateralBias = direction * ((layout.spacingX * 0.12) + (Math.random() * 2.4));
        const verticalBias = layout.rowSpacing * (0.5 + (Math.random() * 0.08));
        return {
            x: laneCenterX + lateralBias,
            y: layout.topY + (row * layout.rowSpacing) + verticalBias,
            direction
        };
    });

    return {
        start,
        rowTargets,
        finalTarget: {
            x: layout.binCenters[safeEntryLane + getPlinkoBucketFromPath(path)] ?? layout.centerX,
            y: layout.bottomY
        }
    };
}

let plinkoAudioContext = null;
let plinkoLastPegSoundAt = 0;
function playPlinkoPegCollisionSound(intensity = 1) {
    if (typeof window === 'undefined') return;
    const now = Date.now();
    if (now - plinkoLastPegSoundAt < 28) return;
    plinkoLastPegSoundAt = now;

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    try {
        if (!plinkoAudioContext) plinkoAudioContext = new AudioCtx();
        const ctx = plinkoAudioContext;
        if (ctx.state === 'suspended') ctx.resume();

        const gain = ctx.createGain();
        const osc = ctx.createOscillator();
        const hitStrength = Math.max(0.2, Math.min(1.2, Number(intensity) || 0.6));
        const startTime = ctx.currentTime;
        const duration = 0.045;

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880 + (hitStrength * 180), startTime);
        osc.frequency.exponentialRampToValueAtTime(540 + (hitStrength * 80), startTime + duration);
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(0.018 * hitStrength, startTime + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
    } catch (err) {
        // Ignore audio errors to avoid interrupting gameplay.
    }
}

function animatePlinkoPegImpact(pegIndex) {
    if (pegIndex < 0) return;
    const pegEl = document.getElementById(`plinko-peg-${pegIndex}`);
    if (!pegEl) return;
    pegEl.classList.add('impact');
    const existingTimer = Number(pegEl.dataset.impactTimer || 0);
    if (existingTimer) clearTimeout(existingTimer);
    const timer = window.setTimeout(() => {
        pegEl.classList.remove('impact');
        delete pegEl.dataset.impactTimer;
    }, 70);
    pegEl.dataset.impactTimer = String(timer);
}

function getPlinkoSteeringTarget(drop) {
    const rowTargets = Array.isArray(drop.trajectory?.rowTargets) ? drop.trajectory.rowTargets : [];
    while (drop.currentRow < rowTargets.length && drop.y >= rowTargets[drop.currentRow].y) {
        drop.currentRow++;
    }
    if (drop.currentRow < rowTargets.length) {
        return rowTargets[drop.currentRow];
    }
    return drop.trajectory?.finalTarget || null;
}

function applyPlinkoPegDeflection(drop, layout, physics, frameScale) {
    const influenceRadius = drop.radius + (layout.pegDiameter / 2) + physics.pegBuffer;
    const influenceRadiusSq = influenceRadius * influenceRadius;
    let impactedPegIndex = -1;
    let strongestImpact = 0;
    const pathIndex = Math.min(drop.currentRow, Math.max(0, drop.path.length - 1));
    const steeringDirection = drop.path[pathIndex] ? 1 : -1;

    layout.pegs.forEach((peg, pegIndex) => {
        if (Math.abs(peg.y - drop.y) > layout.rowSpacing * 0.82) return;
        const dx = drop.x - peg.x;
        const dy = drop.y - peg.y;
        const distSq = (dx * dx) + (dy * dy);
        if (distSq >= influenceRadiusSq) return;

        const dist = Math.max(0.001, Math.sqrt(distSq));
        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = influenceRadius - dist;
        const approachSpeed = (drop.vx * nx) + (drop.vy * ny);

        drop.x += nx * overlap * 0.52;
        drop.y += ny * overlap * 0.3;

        if (approachSpeed < 0) {
            drop.vx -= approachSpeed * nx * (1 + physics.pegBounce);
            drop.vy -= approachSpeed * ny * (1 + (physics.pegBounce * 0.35));
        }

        drop.vx += steeringDirection * overlap * physics.pegSlideBoost * frameScale;
        drop.vy += Math.max(0, -ny) * overlap * physics.pegFallBoost * frameScale;

        if (overlap > strongestImpact) {
            strongestImpact = overlap;
            impactedPegIndex = pegIndex;
        }
    });

    if (impactedPegIndex >= 0 && drop.lastPegIndex !== impactedPegIndex) {
        drop.lastPegIndex = impactedPegIndex;
        animatePlinkoPegImpact(impactedPegIndex);
        playPlinkoPegCollisionSound((Math.abs(drop.vx) + Math.abs(drop.vy)) / 90);
    } else if (impactedPegIndex < 0) {
        drop.lastPegIndex = -1;
    }
}

function animatePlinkoDrop(rows, dropResults, callback) {
    const board = document.getElementById('plinko-board');
    const ballLayer = document.getElementById('plinko-ball-layer');
    if (!board || !ballLayer) {
        callback?.([]);
        return;
    }

    const layout = getPlinkoLayoutMetrics(rows);
    const totalDrops = Array.isArray(dropResults) ? dropResults.length : 0;
    const drops = (Array.isArray(dropResults) ? dropResults : []).map((drop, idx) => createPlinkoRigidBody(drop, idx, layout));
    const physics = {
        gravity: 0.22,
        lanePull: 0.023,
        lanePullFinal: 0.036,
        laneDamping: 0.989,
        descentAssist: 0.018,
        pegBuffer: 3.1,
        pegBounce: 0.82,
        pegSlideBoost: 0.045,
        pegFallBoost: 0.026,
        wallBounce: 0.58,
        settleRange: 18
    };

    ballLayer.innerHTML = drops.map((drop, idx) => `<div id="plinko-ball-${idx}" class="plinko-ball" style="left:${drop.x}px; top:${drop.y}px; width:${layout.ballDiameter}px; height:${layout.ballDiameter}px;"></div>`).join('');
    drops.forEach((drop, idx) => {
        drop.el = document.getElementById(`plinko-ball-${idx}`);
        const edgeCenter = (layout.binCenters.length - 1) / 2;
        drop.edgeDistance = Math.abs((drop.targetBucket - edgeCenter) / Math.max(1, edgeCenter));
    });

    let lastTimestamp = null;
    function step(timestamp) {
        if (lastTimestamp === null) lastTimestamp = timestamp;
        const deltaSeconds = Math.min(0.033, Math.max(0.008, (timestamp - lastTimestamp) / 1000));
        lastTimestamp = timestamp;
        let unfinished = 0;

        drops.forEach((drop, idx) => {
            if (!drop.el || drop.settled) return;
            unfinished++;
            const dropDelay = idx * 0.045;
            drop.elapsed += deltaSeconds;
            if (drop.elapsed < dropDelay) return;

            if (drop.landing) {
                drop.settleElapsed += deltaSeconds;
                const settleProgress = Math.min(1, drop.settleElapsed / 0.2);
                const settleEase = easeOutBounce(settleProgress);
                const settledX = drop.trajectory?.finalTarget?.x ?? layout.binCenters[drop.targetBucket] ?? drop.x;
                const settledY = layout.bottomY;
                const settleLift = (1 - settleEase) * 5.5;
                drop.x += (settledX - drop.x) * Math.min(1, deltaSeconds * 14);
                drop.y = settledY - settleLift;
                drop.el.style.left = `${drop.x}px`;
                drop.el.style.top = `${drop.y}px`;
                drop.el.style.transform = 'translate(-50%, -50%) scale(1)';

                if (settleProgress >= 1) {
                    drop.bucket = drop.targetBucket;
                    drop.x = settledX;
                    drop.y = settledY;
                    drop.vx = 0;
                    drop.vy = 0;
                    drop.settled = true;
                    drop.el.style.left = `${drop.x}px`;
                    drop.el.style.top = `${drop.y}px`;
                    const bin = document.getElementById(`plinko-bin-${drop.bucket}`);
                    if (bin) bin.classList.add('active');
                }
                return;
            }

            const frameScale = deltaSeconds * 60;
            const target = getPlinkoSteeringTarget(drop);
            if (!target) {
                drop.landing = true;
                drop.settleElapsed = 0;
                return;
            }

            const targetDx = target.x - drop.x;
            const targetDy = target.y - drop.y;
            const lanePull = drop.currentRow >= drop.path.length ? physics.lanePullFinal : physics.lanePull;

            drop.vx += targetDx * lanePull * (0.86 + (drop.edgeDistance * 0.22)) * frameScale;
            drop.vy += (physics.gravity + (Math.max(-10, Math.min(10, targetDy)) * physics.descentAssist)) * frameScale;

            applyPlinkoPegDeflection(drop, layout, physics, frameScale);

            drop.vx *= Math.pow(physics.laneDamping, frameScale);
            drop.vy *= Math.pow(physics.laneDamping, frameScale * 0.52);
            drop.x += drop.vx * frameScale;
            drop.y += drop.vy * frameScale;

            const leftBound = layout.wallPadding;
            const rightBound = layout.boardWidth - layout.wallPadding;
            if (drop.x < leftBound) {
                drop.x = leftBound;
                drop.vx = Math.abs(drop.vx) * physics.wallBounce;
            } else if (drop.x > rightBound) {
                drop.x = rightBound;
                drop.vx = -Math.abs(drop.vx) * physics.wallBounce;
            }

            if (drop.currentRow >= drop.path.length && Math.abs(drop.y - layout.bottomY) <= physics.settleRange) {
                drop.landing = true;
                drop.settleElapsed = 0;
            }

            drop.el.style.left = `${drop.x}px`;
            drop.el.style.top = `${drop.y}px`;

            const speed = Math.hypot(drop.vx, drop.vy);
            const squash = Math.min(0.18, speed / 180);
            const stretchX = 1 + squash;
            const stretchY = 1 - (squash * 0.7);
            const tilt = Math.max(-12, Math.min(12, drop.vx * 0.24));
            drop.el.style.transform = `translate(-50%, -50%) rotate(${tilt.toFixed(2)}deg) scale(${stretchX.toFixed(3)}, ${stretchY.toFixed(3)})`;
        });

        if (unfinished > 0) {
            requestAnimationFrame(step);
        } else {
            callback?.(drops);
        }
    }

    if (totalDrops === 0) {
        callback?.([]);
        return;
    }
    requestAnimationFrame(step);
}

function getElasticOut(progress) {
    if (progress <= 0) return 0;
    if (progress >= 1) return 1;
    const c4 = (2 * Math.PI) / 3;
    return Math.pow(2, -10 * progress) * Math.sin((progress * 10 - 0.75) * c4) + 1;
}

function easeInQuad(progress) {
    return progress * progress;
}

function easeOutCubic(progress) {
    return 1 - Math.pow(1 - progress, 3);
}

function easeInOutCubic(progress) {
    return progress < 0.5
        ? 4 * progress * progress * progress
        : 1 - Math.pow(-2 * progress + 2, 3) / 2;
}

function easeOutBounce(progress) {
    const n1 = 7.5625;
    const d1 = 2.75;
    if (progress < 1 / d1) return n1 * progress * progress;
    if (progress < 2 / d1) {
        progress -= 1.5 / d1;
        return n1 * progress * progress + 0.75;
    }
    if (progress < 2.5 / d1) {
        progress -= 2.25 / d1;
        return n1 * progress * progress + 0.9375;
    }
    progress -= 2.625 / d1;
    return n1 * progress * progress + 0.984375;
}

function dropPlinkoBall() {
    const w = gameState.wandering;
    if (!w.active || !w.plinkoActive || w.plinkoAnimating) return;

    const betInput = document.getElementById('plinko-bet-input');
    const currencySelect = document.getElementById('plinko-currency-select');
    const ballCountInput = document.getElementById('plinko-ball-count-input');
    const riskSelect = document.getElementById('plinko-risk-select');

    const bet = Math.max(1, Math.floor(Number(betInput?.value) || 0));
    const currency = currencySelect?.value === 'soulGems' ? 'soulGems' : 'gold';
    const ballCount = Math.max(1, Math.min(25, Math.floor(Number(ballCountInput?.value) || 1)));
    const rows = 16;
    const risk = ['low', 'medium', 'high'].includes(riskSelect?.value) ? riskSelect.value : 'medium';
    const balance = getPlinkoBalance(currency);
    const totalCost = bet * ballCount;

    if (bet <= 0) {
        addWanderingLog('Enter a valid Plinko bet.', 'damage');
        renderPlinko();
        return;
    }
    if (currency === 'soulGems' && !Number.isInteger(bet)) {
        addWanderingLog('Soul Gem wagers must be whole numbers.', 'damage');
        renderPlinko();
        return;
    }
    if (balance < totalCost) {
        addWanderingLog(`Not enough ${formatPlinkoCurrencyLabel(currency)} for ${ballCount} Plinko ball${ballCount === 1 ? '' : 's'}.`, 'damage');
        renderPlinko();
        return;
    }

    w.plinkoBet = bet;
    w.plinkoCurrency = currency;
    w.plinkoBallCount = ballCount;
    w.plinkoRows = rows;
    w.plinkoRisk = risk;
    w.plinkoAnimating = true;
    w.plinkoResult = null;

    if (currency === 'soulGems') gameState.soulGems -= totalCost;
    else gameState.player.gold -= totalCost;

    updateStats();
    renderPlinko();

    const pendingDrops = Array.from({ length: ballCount }, () => {
        return {
            bet,
            currency,
            rows,
            risk
        };
    });

    animatePlinkoDrop(rows, pendingDrops, settledDrops => {
        const multipliers = getPlinkoRiskMultipliers(rows, risk);
        const results = (Array.isArray(settledDrops) ? settledDrops : []).map(drop => {
            const bucket = Math.max(0, Math.min(rows, Math.floor(Number(drop.bucket) || 0)));
            const multiplier = multipliers[bucket] || 0;
            const payoutRaw = bet * multiplier;
            const payout = currency === 'soulGems' ? Math.floor(payoutRaw) : formatRoundedGold(payoutRaw);
            return {
                bucket,
                bet,
                currency,
                rows,
                risk,
                multiplier,
                payout,
                profit: payout - bet
            };
        });
        const totalPayoutRaw = results.reduce((sum, entry) => sum + entry.payout, 0);
        const totalPayout = currency === 'soulGems' ? Math.floor(totalPayoutRaw) : formatRoundedGold(totalPayoutRaw);
        const profit = totalPayout - totalCost;
        const totalMultiplier = totalCost > 0 ? (totalPayout / totalCost) : 0;

        if (currency === 'soulGems') gameState.soulGems += totalPayout;
        else gameState.player.gold = formatRoundedGold(gameState.player.gold + totalPayout);

        const result = {
            ballCount,
            bet,
            currency,
            rows,
            risk,
            totalCost,
            totalPayout,
            totalMultiplier,
            profit,
            results
        };
        w.plinkoResult = result;
        w.plinkoHistory = Array.isArray(w.plinkoHistory) ? w.plinkoHistory : [];
        results.forEach(entry => w.plinkoHistory.push(entry));
        if (w.plinkoHistory.length > 20) w.plinkoHistory.shift();
        w.plinkoAnimating = false;

        const topHits = results
            .slice()
            .sort((a, b) => b.multiplier - a.multiplier)
            .slice(0, 3)
            .map(entry => `${entry.multiplier}x`)
            .join(', ');
        const signText = profit >= 0
            ? `won ${totalPayout.toLocaleString()} ${formatPlinkoCurrencyLabel(currency)}`
            : `recovered ${totalPayout.toLocaleString()} ${formatPlinkoCurrencyLabel(currency)}`;
        addWanderingLog(`Plinko: dropped ${ballCount} ball${ballCount === 1 ? '' : 's'} at ${bet.toLocaleString()} ${formatPlinkoCurrencyLabel(currency)} each on ${risk} risk / ${rows} rows, best hits ${topHits || 'none'}, and ${signText}.`, profit >= 0 ? 'reward' : 'info');
        updateStats();
        if (w.plinkoAutoBetActive) {
            const nextBalance = getPlinkoBalance(currency);
            if (nextBalance >= totalCost) {
                setTimeout(() => {
                    renderPlinko();
                    if (gameState.wandering?.plinkoAutoBetActive && !gameState.wandering?.plinkoAnimating) {
                        dropPlinkoBall();
                    }
                }, 260);
                return;
            }
            w.plinkoAutoBetActive = false;
            addWanderingLog(`Plinko auto bet stopped: not enough ${formatPlinkoCurrencyLabel(currency)} remaining.`, 'info');
        }
        setTimeout(() => renderPlinko(), 260);
    });
}

function togglePlinkoAutoBet() {
    const w = gameState.wandering;
    if (!w.active || !w.plinkoActive) return;
    if (w.plinkoAnimating && !w.plinkoAutoBetActive) return;
    w.plinkoAutoBetActive = !w.plinkoAutoBetActive;
    addWanderingLog(w.plinkoAutoBetActive ? 'Plinko auto bet enabled.' : 'Plinko auto bet stopped.', 'info');
    renderPlinko();
    if (w.plinkoAutoBetActive) {
        setTimeout(() => {
            if (gameState.wandering?.plinkoAutoBetActive && !gameState.wandering?.plinkoAnimating) {
                dropPlinkoBall();
            }
        }, 120);
    }
}

function spinSlotMachine() {
    const w = gameState.wandering;
    const bet = w.slotMachineBet || 0;
    const freeSpins = w.slotMachineFreeSpins || 0;
    const player = gameState.player;

    if (w.slotMachineSpinning) return;

    if (freeSpins === 0) {
        if (bet <= 0 || player.gold < bet) {
            addWanderingLog('Invalid bet or insufficient gold!', 'damage');
            w.slotMachineAutoBetActive = false;
            return;
        }
        player.gold -= bet;
        updateStats();
    } else {
        w.slotMachineFreeSpins--;
    }

    w.slotMachineSpinning = true;
    renderWandering();

    // Generate slot results
    const results = generateSlotResults();
    animateSlotSpin(results);
}

function generateSlotResults() {
    // 243 way slot machine with weighted poker cards: A, K, Q, J, 10
    // Plus wilds (2-5x), scatters (10-100x)
    // 3 rows x 5 reels
    const weightedSymbols = [
        ['A', 16],
        ['K', 14],
        ['Q', 13],
        ['J', 27],
        ['10', 30]
    ];
    const wildMultipliers = [2, 3, 4, 5];
    const scatterBonuses = [10, 25, 50, 100];

    const pickWeightedSymbol = () => {
        const totalWeight = weightedSymbols.reduce((sum, [, weight]) => sum + weight, 0);
        let roll = Math.random() * totalWeight;
        for (const [symbol, weight] of weightedSymbols) {
            roll -= weight;
            if (roll <= 0) return symbol;
        }
        return weightedSymbols[weightedSymbols.length - 1][0];
    };

    // Generate 3x5 grid
    const grid = [];
    for (let row = 0; row < 3; row++) {
        grid[row] = [];
        for (let col = 0; col < 5; col++) {
            const rand = Math.random();
            if (rand < 0.015) { // 1.5% wild
                const mult = pick(wildMultipliers);
                grid[row][col] = { type: 'wild', symbol: `W${mult}x`, multiplier: mult };
            } else if (rand < 0.03) { // 1.5% scatter
                const bonus = pick(scatterBonuses);
                grid[row][col] = { type: 'scatter', symbol: `S${bonus}x`, bonus: bonus };
            } else if (rand < 0.045) { // 1.5% bonus
                grid[row][col] = { type: 'bonus', symbol: 'BONUS', bonus: true };
            } else {
                grid[row][col] = { type: 'card', symbol: pickWeightedSymbol() };
            }
        }
    }

    return grid;
}

function renderSlotMachineGrid(results) {
    const symbols = [];
    for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 5; col++) {
            const r = results[row][col];
            let color = '#00ff00';
            if (r.type === 'wild') color = '#ffff00';
            else if (r.type === 'scatter') color = '#ff00ff';
            else if (r.type === 'bonus') color = '#ff6600';
            symbols.push(`<div><span style="color:${color}">[ ${r.symbol} ]</span></div>`);
        }
    }
    return symbols.join('');
}

function animateSlotSpin(results) {
    const reelsDiv = document.getElementById('slot-reels');
    let spinCount = 0;
    const maxSpins = 20;

    const spinInterval = setInterval(() => {
        spinCount++;
        // Show random spinning symbols in grid
        const spinning = [];
        for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 5; col++) {
                const rand = Math.random();
                let symbol = pick(['A','K','Q','J','10']);
                let color = '#00ff00';
                if (rand < 0.075) {
                    symbol = 'W';
                    color = '#ffff00';
                } else if (rand < 0.15) {
                    symbol = 'S';
                    color = '#ff00ff';
                } else if (rand < 0.225) {
                    symbol = 'BONUS';
                    color = '#ff6600';
                }
                spinning.push(`<div><span style="color:${color}">[ ${symbol} ]</span></div>`);
            }
        }
        reelsDiv.innerHTML = spinning.join('');

        if (spinCount >= maxSpins) {
            clearInterval(spinInterval);
            // Show final results
            gameState.wandering.slotMachineLastResults = results;
            reelsDiv.innerHTML = renderSlotMachineGrid(results);
            // Calculate win
            setTimeout(() => processSlotWin(results), 500);
        }
    }, 100);
}

function processSlotWin(results) {
    const w = gameState.wandering;
    const bet = w.slotMachineBet;
    w.slotMachineSpinning = false;

    // Calculate wins based on 243 ways
    let totalWin = 0;
    let scatters = 0;
    let bonuses = 0;
    let jackpotType = null;

    // Count scatters and bonuses
    for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 5; col++) {
            if (results[row][col].type === 'scatter') {
                scatters++;
            } else if (results[row][col].type === 'bonus') {
                bonuses++;
            }
        }
    }

    if (scatters >= 3) {
        w.slotMachineFreeSpins = 5;
        addWanderingLog(`3+ Scatters! ${w.slotMachineFreeSpins} Free Spins awarded!`, 'reward');
    }

    if (bonuses >= 3) {
        w.slotMachineBonusActive = true;
        addWanderingLog(`3+ Bonus symbols! Bonus round activated!`, 'reward');
    }

    const waysWins = calculate243Ways(results);
    const bestWay = waysWins.reduce((best, way) => (way.win > (best?.win || 0) ? way : best), null);

    const isCenterLineJackpot = (symbol) => {
        for (let col = 0; col < 5; col++) {
            const cell = results[1][col];
            if (cell.type !== 'card' || cell.symbol !== symbol) return false;
        }
        return true;
    };

    // Rebalanced payout model: only the single best 243-way result pays.
    if (bestWay && bestWay.win > 0) {
        if (bestWay.count === 5 && bestWay.symbol === 'A' && bestWay.multiplier === 1 && isCenterLineJackpot('A')) {
            jackpotType = 'grand';
            totalWin += bet * 1000;
            gameState.soulGems += 1;
            addWanderingLog(`GRAND JACKPOT! ${bet * 1000} gold + 1 Soul Gem!`, 'reward');
            triggerRainbowAnimation();
        } else if (bestWay.count === 5 && bestWay.symbol === 'K' && bestWay.multiplier === 1 && isCenterLineJackpot('K')) {
            jackpotType = 'major';
            totalWin += bet * 100;
            addWanderingLog(`MAJOR JACKPOT! ${bet * 100} gold!`, 'reward');
        } else if (bestWay.count === 5 && bestWay.symbol === 'Q' && bestWay.multiplier === 1 && isCenterLineJackpot('Q')) {
            jackpotType = 'minor';
            totalWin += bet * 10;
            addWanderingLog(`MINOR JACKPOT! ${bet * 10} gold!`, 'reward');
        } else {
            totalWin += bestWay.win * bet;
            addWanderingLog(`Best Way Win: ${bestWay.count} ${bestWay.symbol} - ${bestWay.win}x bet`, 'reward');
        }
    }

    if (totalWin > 0) {
        totalWin = formatRoundedGold(totalWin);
        gameState.player.gold = formatRoundedGold(gameState.player.gold + totalWin);
        updateStats();
        addWanderingLog(`Total Win: ${totalWin} gold!`, 'reward');
    } else {
        addWanderingLog('No win this spin.', 'info');
    }

    // Reset free spins if jackpot during free spin
    if (jackpotType && w.slotMachineFreeSpins > 0) {
        w.slotMachineFreeSpins = 5;
        addWanderingLog('Jackpot during free spins! Free spins reset to 5!', 'reward');
    }

    renderWandering();
    maybeContinueSlotAutoBet();
}

function calculate243Ways(results) {
    // 243 ways: all possible combinations of one symbol per column
    const ways = [];
    const multipliers = {
        'A': { 3: 0.23, 4: 0.72, 5: 2.45 },
        'K': { 3: 0.18, 4: 0.58, 5: 1.9 },
        'Q': { 3: 0.145, 4: 0.45, 5: 1.45 },
        'J': { 3: 0.115, 4: 0.35, 5: 1.1 },
        '10': { 3: 0.085, 4: 0.26, 5: 0.82 }
    };

    // Generate all 3^5 = 243 combinations
    for (let r0 = 0; r0 < 3; r0++) {
        for (let r1 = 0; r1 < 3; r1++) {
            for (let r2 = 0; r2 < 3; r2++) {
                for (let r3 = 0; r3 < 3; r3++) {
                    for (let r4 = 0; r4 < 3; r4++) {
                        const way = [results[r0][0], results[r1][1], results[r2][2], results[r3][3], results[r4][4]];
                        const win = evaluateWay(way, multipliers);
                        if (win.win > 0) {
                            ways.push(win);
                        }
                    }
                }
            }
        }
    }

    return ways;
}

function evaluateWay(way, multipliers) {
    // Check for 3+ consecutive matches in the way
    let bestWin = { win: 0, count: 0, symbol: '', multiplier: 1 };
    const symbols = ['A', 'K', 'Q', 'J', '10'];

    for (let symbol of symbols) {
        let count = 0;
        let mult = 1;

        for (let i = 0; i < 5; i++) {
            const cell = way[i];
            // Scatters are counted separately for free spins and should not also
            // behave like wild substitutions inside 243-ways line evaluation.
            if (cell.symbol === symbol || cell.type === 'wild') {
                count++;
                if (cell.type === 'wild') mult *= cell.multiplier;
            } else {
                break;
            }
        }

        if (count >= 3) {
            const baseMult = (multipliers[symbol] && multipliers[symbol][count]) || 0;
            const totalMult = baseMult * mult;
            if (totalMult > bestWin.win) {
                bestWin = { win: totalMult, count, symbol, multiplier: mult };
            }
        }
    }

    return bestWin;
}

function spinBonusWheel() {
    const w = gameState.wandering;
    const bet = w.slotMachineBet;
    if (!w.slotMachineBonusActive || w.slotMachineSpinning) return;
    w.slotMachineSpinning = true;

    // Possible prizes
    const prizes = [
        { name: '2x Multiplier', multiplier: 2, chance: 20 },
        { name: '5x Multiplier', multiplier: 5, chance: 15 },
        { name: '10x Multiplier', multiplier: 10, chance: 10 },
        { name: '25x Multiplier', multiplier: 25, chance: 5 },
        { name: '5 Free Spins', freeSpins: 5, chance: 15 },
        { name: '10 Free Spins', freeSpins: 10, chance: 10 },
        { name: 'Soul Gem', soulGem: 1, chance: 5 },
        { name: 'Jackpot Reset', jackpotReset: true, chance: 5 },
        { name: 'No Prize', multiplier: 0, chance: 15 }
    ];

    // Weighted random selection
    let totalWeight = prizes.reduce((sum, p) => sum + p.chance, 0);
    let rand = Math.random() * totalWeight;
    let selectedPrize = null;
    for (let prize of prizes) {
        rand -= prize.chance;
        if (rand <= 0) {
            selectedPrize = prize;
            break;
        }
    }

    // Animate wheel
    const wheelDiv = document.getElementById('bonus-wheel');
    let spins = 0;
    const maxSpins = 20;
    const spinInterval = setInterval(() => {
        spins++;
        const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
        wheelDiv.textContent = randomPrize.name;
        if (spins >= maxSpins) {
            clearInterval(spinInterval);
            wheelDiv.textContent = selectedPrize.name;
            wheelDiv.style.color = '#ff6600';
            wheelDiv.style.fontWeight = 'bold';

            // Award prize
            setTimeout(() => awardBonusPrize(selectedPrize), 500);
        }
    }, 100);
}

// Simulation helper: run many short sessions instead of one huge continuous block.
function simulateSlotRTP(batchCount = 100, playsPerBatch = 100, bet = 100) {
    const batchRtps = [];

    function sampleBonusGoldPrize() {
        const prizes = [
            { multiplier: 2, chance: 20 },
            { multiplier: 5, chance: 15 },
            { multiplier: 10, chance: 10 },
            { multiplier: 25, chance: 5 },
            { freeSpins: 5, chance: 15 },
            { freeSpins: 10, chance: 10 },
            { soulGem: 1, chance: 5 },
            { jackpotReset: true, chance: 5 },
            { multiplier: 0, chance: 15 }
        ];
        let roll = Math.random() * prizes.reduce((sum, prize) => sum + prize.chance, 0);
        for (const prize of prizes) {
            roll -= prize.chance;
            if (roll <= 0) {
                if (prize.multiplier !== undefined) return bet * prize.multiplier;
                if (prize.jackpotReset) return bet * 50;
                return 0;
            }
        }
        return 0;
    }

    for (let batch = 0; batch < batchCount; batch++) {
        let totalBet = 0;
        let totalWin = 0;

        for (let play = 0; play < playsPerBatch; play++) {
            totalBet += bet;

            let pendingSpins = 1;
            let freeSpins = 0;

            while (pendingSpins > 0) {
                pendingSpins--;
                const results = generateSlotResults();
                const waysWins = calculate243Ways(results);
                const bestWay = waysWins.reduce((best, way) => (way.win > (best?.win || 0) ? way : best), null);

                let spinWin = 0;
                let scatters = 0;
                let bonuses = 0;

                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 5; col++) {
                        if (results[row][col].type === 'scatter') scatters++;
                        if (results[row][col].type === 'bonus') bonuses++;
                    }
                }

                if (scatters >= 3) freeSpins = 5;
                if (bonuses >= 3) spinWin += sampleBonusGoldPrize();
                if (bestWay && bestWay.win > 0) spinWin += bestWay.win * bet;

                totalWin += spinWin;

                if (freeSpins > 0) {
                    freeSpins--;
                    pendingSpins++;
                }
            }
        }

        batchRtps.push((totalWin / totalBet) * 100);
    }

    const avgRtp = batchRtps.reduce((sum, rtp) => sum + rtp, 0) / batchRtps.length;
    console.log(`Simulated RTP across ${batchCount} batches of ${playsPerBatch} plays: ${avgRtp.toFixed(2)}%`);
    console.log('Batch RTPs:', batchRtps.map(rtp => rtp.toFixed(2)).join(', '));
    return {
        averageRtp: avgRtp,
        minRtp: Math.min(...batchRtps),
        maxRtp: Math.max(...batchRtps),
        batchRtps
    };
}
