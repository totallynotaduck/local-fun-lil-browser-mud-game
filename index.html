<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realm of Shadows - Text MUD</title>
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <linearGradient id="rainbow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ff0000" />
                <stop offset="16%" stop-color="#ff7700" />
                <stop offset="33%" stop-color="#ffff00" />
                <stop offset="50%" stop-color="#00ff00" />
                <stop offset="66%" stop-color="#00ffff" />
                <stop offset="83%" stop-color="#0077ff" />
                <stop offset="100%" stop-color="#ff00ff" />
            </linearGradient>
        </defs>
    </svg>
    <style>
        /* SVG definitions for gradients */
        .svg-defs { position: absolute; width: 0; height: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 10px; }
        #game-container { width: 100%; max-width: 950px; background-color: #111; border: 2px solid #00ff00; border-radius: 5px; overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 20px); }
        #header { background: linear-gradient(to right, #003300, #006600, #003300); padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; }
        #header h1 { font-size: 1.8em; text-shadow: 0 0 10px #00ff00; }
        #stats-bar { display: flex; justify-content: space-between; padding: 10px 15px; background-color: #1a1a1a; border-bottom: 1px solid #333; font-size: 0.85em; flex-wrap: wrap; }
        .stat { display: flex; gap: 5px; }
        .stat-label { color: #888; }
        .stat-value { color: #00ff00; }
        .stat-value.hp { color: #ff4444; }
        .stat-value.mp { color: #4444ff; }
        .stat-value.gold { color: #ffd700; }
        .stat-value.xp { color: #ff66ff; }
        .stat-value.soul { color: #ff00ff; }
        #navigation { display: flex; flex-wrap: wrap; background-color: #1a1a1a; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1 0 auto; width: calc(100% / 6); padding: 8px 5px; background: none; border: none; color: #666; font-family: 'Courier New', monospace; font-size: 0.75em; cursor: pointer; transition: all 0.3s; border-right: 1px solid #333; border-bottom: 1px solid #333; white-space: nowrap; text-align: center; }
        .nav-btn:nth-child(6n) { border-right: none; }
        .nav-btn:hover { background-color: #2a2a2a; color: #00ff00; }
        .nav-btn.active { background-color: #003300; color: #00ff00; }
        .nav-btn.alert { animation: alertPulse 1s infinite; background-color: #663300; color: #ffd700; }
        @keyframes alertPulse { 0%,100% { background-color: #663300; } 50% { background-color: #996600; } }
        #game-layout { display: flex; gap: 0; flex: 1; min-height: 0; overflow: hidden; }
        #left-panel { width: 200px; background-color: #0d0d0d; border-right: 1px solid #333; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; min-height: 0; }
        #left-panel-content { flex: 1; overflow-y: auto; min-height: 0; }
        #main-content { flex: 1; background-color: #0d0d0d; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; overflow-x: hidden; min-width: 0; }
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; overflow-x: hidden; min-height: 0; }
        .screen.active { display: flex; }
        .screen > div { display: flex; flex-direction: column; min-height: 0; overflow-y: auto; overflow-x: hidden; }
        .screen > div > .screen-content { flex: 1 1 auto; overflow-y: visible; overflow-x: visible; min-height: 0; padding-bottom: 5px; }
        .fixed-buttons { background-color: #0d0d0d; padding: 10px 0; border-top: 1px solid #333; margin-top: 0; flex-shrink: 0; }
        #right-panel { width: 200px; background-color: #0d0d0d; border-left: 1px solid #333; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; min-height: 0; }
        #right-panel-content { flex: 1; overflow-y: auto; min-height: 0; }
        .side-panel-content { padding: 10px; }
        .side-panel-header { color: #00ffff; font-weight: bold; font-size: 0.9em; padding: 8px; background-color: #1a1a1a; border-bottom: 1px solid #333; text-align: center; cursor: pointer; }
        .side-panel-header:hover { background-color: #2a2a2a; }
        .equip-mini { padding: 6px; border-bottom: 1px solid #222; font-size: 0.75em; }
        .equip-mini-name { color: #ff44ff; font-weight: bold; margin-bottom: 2px; }
        .equip-mini-stats { color: #888; }
        .equip-mini-slot { color: #666; font-size: 0.85em; }
        .inv-mini { padding: 6px; border-bottom: 1px solid #222; font-size: 0.75em; display: flex; justify-content: space-between; align-items: center; }
        .inv-mini-info { flex: 1; }
        .inv-mini-name { color: #00ff00; }
        .inv-mini-qty { color: #888; margin-left: 5px; }
        .inv-mini-btn { background-color: #003300; border: 1px solid #00ff00; color: #00ff00; padding: 2px 6px; cursor: pointer; font-size: 0.8em; margin-left: 3px; }
        .inv-mini-btn:hover { background-color: #006600; }
        .inv-mini-btn:disabled { background-color: #333; border-color: #555; color: #555; cursor: not-allowed; }
        .panel-collapsed { display: none; }
        .expand-btn { width: 100%; padding: 5px; background-color: #1a1a1a; border: none; color: #00ff00; cursor: pointer; font-size: 0.75em; }
        .expand-btn:hover { background-color: #2a2a2a; }
        .location-header { color: #00ffff; font-size: 1.2em; margin-bottom: 10px; }
        .description { color: #aaa; line-height: 1.6; margin-bottom: 15px; }
        .action-btn { background-color: #003300; border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; margin: 5px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 0.85em; }
        .action-btn:hover { background-color: #006600; }
        .action-btn:disabled { background-color: #333; border-color: #555; color: #555; cursor: not-allowed; }
        .action-btn.danger { background-color: #330000; border-color: #ff4444; color: #ff4444; }
        .action-btn.danger:hover { background-color: #660000; }
        .action-btn.quest { background-color: #000033; border-color: #4444ff; color: #4444ff; }
        .action-btn.gold-btn { background-color: #333300; border-color: #ffd700; color: #ffd700; }
        .action-btn.equip-btn { background-color: #330033; border-color: #ff44ff; color: #ff44ff; }
        .action-btn.equip-btn:hover { background-color: #660066; }
        .action-btn.soul-btn { background-color: #330033; border-color: #ff00ff; color: #ff00ff; }
        .action-btn.soul-btn:hover { background-color: #660066; }
        .action-btn.scroll-btn { background-color: #003333; border-color: #00ffff; color: #00ffff; }
        .action-btn.scroll-btn:hover { background-color: #006666; }
        .action-btn.premium-btn { background: linear-gradient(135deg, #330033, #660066); border-color: #ff00ff; color: #ff00ff; font-weight: bold; }
        .action-btn.premium-btn:hover { background: linear-gradient(135deg, #660066, #990099); }
        .action-btn.craft-btn { background-color: #332200; border-color: #ffaa00; color: #ffaa00; }
        .action-btn.craft-btn:hover { background-color: #664400; }
        .action-btn.dungeon-btn { background-color: #002233; border-color: #0088ff; color: #0088ff; }
        .action-btn.dungeon-btn:hover { background-color: #004466; }
        .action-btn.boss-btn { background-color: #330000; border-color: #ff6600; color: #ff6600; font-weight: bold; }
        .action-btn.boss-btn:hover { background-color: #660000; }
        .action-btn.temple-btn { background-color: #333300; border-color: #ffff00; color: #ffff00; }
        .action-btn.temple-btn:hover { background-color: #666600; }
        .location-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .location-card { background-color: #1a1a1a; border: 1px solid #333; padding: 12px; cursor: pointer; }
        .location-card:hover { border-color: #00ff00; }
        .location-card.current { border-color: #00ff00; background-color: #001a00; }
        .location-card.locked { opacity: 0.5; cursor: not-allowed; }
        .location-name { color: #00ffff; font-weight: bold; margin-bottom: 5px; }
        .location-info { color: #666; font-size: 0.8em; }
        .battle-log { background-color: #1a1a1a; padding: 10px; margin: 10px 0; border-left: 3px solid #ff4444; max-height: 150px; overflow-y: auto; }
        .battle-log p { margin: 5px 0; line-height: 1.4; }
        .damage { color: #ff4444; }
        .heal { color: #44ff44; }
        .info { color: #4444ff; }
        .reward { color: #ffd700; }
        .quest-item, .job-item { background-color: #1a1a1a; border: 1px solid #4444ff; padding: 12px; margin: 10px 0; }
        .job-item { border-color: #ffd700; }
        .quest-title, .job-title { color: #00ffff; font-weight: bold; margin-bottom: 5px; }
        .job-title { color: #ffd700; }
        .job-info { display: flex; justify-content: space-between; color: #aaa; font-size: 0.85em; margin-bottom: 8px; }
        .msg { color: #888; font-style: italic; margin: 10px 0; }
        .section-title { color: #00ffff; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 15px 0 10px 0; }
        .inv-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; align-items: center; }
        .inv-item button { background-color: #003300; border: 1px solid #00ff00; color: #00ff00; padding: 3px 8px; cursor: pointer; margin-left: 5px; }
        .equip-slot-card { background-color: #1a1a1a; border: 2px solid #ff44ff; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .equip-slot-card.empty { border-color: #555; }
        .equip-slot-title { color: #ff44ff; font-weight: bold; font-size: 1em; margin-bottom: 8px; }
        .equip-slot-stats { color: #00ff00; font-size: 0.9em; margin-bottom: 10px; }
        .item-compare-header { color: #666; font-size: 0.75em; margin: 6px 0 2px 0; }
        .item-stat-comparison { font-size: 0.8em; margin: 2px 0; }
        .item-stat-better { color: #44ff44; }
        .item-stat-worse { color: #ff4444; }
        .item-stat-equal { color: #aaa; }
        .progress-bar { width: 150px; height: 15px; background-color: #333; overflow: hidden; }
        .progress-fill { height: 100%; background-color: #4444ff; }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #222; font-size: 0.8em; color: #aaa; }
        .log-source { color: #ffd700; }
        .log-item { color: #00ffff; }
        .reward-pool { background-color: #1a1a1a; border: 2px solid #ffd700; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .reward-pool-title { color: #ffd700; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .scroll-slot { background-color: #1a1a1a; border: 2px solid #00ffff; padding: 12px; margin: 8px 0; border-radius: 5px; }
        .scroll-slot.locked { border-color: #555; opacity: 0.6; }
        .scroll-slot-title { color: #00ffff; font-weight: bold; margin-bottom: 5px; }
        .scroll-item { background-color: #0a0a0a; border: 1px solid #00ffff; padding: 8px; margin: 5px 0; }
        .scroll-item.common { border-color: #aaa; }
        .scroll-item.uncommon { border-color: #44ff44; }
        .scroll-item.rare { border-color: #4444ff; }
        .scroll-item.epic { border-color: #ff00ff; }
        .scroll-item.legendary { border-color: #ffd700; }
        .premium-actions { display: flex; gap: 10px; margin: 10px 0; }
        .premium-action { flex: 1; text-align: center; }
        .premium-action-title { color: #ff00ff; font-weight: bold; margin-bottom: 5px; }
        .premium-action-cost { color: #ffd700; font-size: 0.8em; }
        #chat-container { background-color: #1a1a1a; border-top: 1px solid #333; padding: 10px; max-height: 150px; overflow-y: auto; }
        .chat-message { padding: 5px; margin: 3px 0; border-left: 2px solid #555; padding-left: 8px; }
        .chat-player { color: #00ff00; font-weight: bold; }
        .chat-fake { color: #ff8800; }
        .chat-system { color: #ffff00; font-style: italic; }
        .chat-time { color: #555; font-size: 0.75em; margin-right: 5px; }
        .player-card { background-color: #1a1a1a; border: 1px solid #00ff00; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .player-card.hostile { border-color: #ff4444; }
        .player-name { font-weight: bold; }
        .player-level { color: #888; font-size: 0.85em; }
        .auction-item { background-color: #1a1a1a; border: 2px solid #ffd700; padding: 12px; margin: 10px 0; }
        .auction-timer { color: #ff4444; font-weight: bold; }
        .auction-bidders { color: #888; font-size: 0.85em; margin-top: 5px; }
        .dungeon-info { background-color: #002233; border: 2px solid #0088ff; padding: 15px; margin: 10px 0; }
        .dungeon-stage { color: #0088ff; font-size: 1.3em; font-weight: bold; }
        .dungeon-rewards { color: #ffd700; }
        .boss-alert { background-color: #330000; border: 3px solid #ff6600; padding: 15px; margin: 10px 0; animation: bossPulse 2s infinite; }
        @keyframes bossPulse { 0%,100% { box-shadow: 0 0 5px #ff6600; } 50% { box-shadow: 0 0 20px #ff6600; } }
        .boss-name { color: #ff6600; font-size: 1.4em; font-weight: bold; }
        .boss-hp-bar { width: 100%; height: 20px; background-color: #333; margin: 10px 0; }
        .boss-hp-fill { height: 100%; background: linear-gradient(to right, #ff0000, #ff6600); }
        .craft-recipe { background-color: #1a1a1a; border: 1px solid #ffaa00; padding: 12px; margin: 8px 0; }
        .craft-materials { color: #aaa; margin: 5px 0; }
        .craft-result { color: #00ff00; font-weight: bold; }
        .encounter-info { color: #888; font-size: 0.8em; margin: 5px 0; }
        
        @media (max-width: 900px) {
            #left-panel, #right-panel { width: 150px; }
            .nav-btn { font-size: 0.65em; padding: 6px 3px; }
            #header h1 { font-size: 1.4em; }
            #stats-bar { font-size: 0.75em; padding: 8px 10px; }
        }
        @media (max-width: 700px) {
            #left-panel, #right-panel { display: none; }
            .nav-btn { font-size: 0.6em; width: calc(100% / 4); }
            #main-content { padding: 10px; }
        }
        @media (max-width: 500px) {
            .nav-btn { font-size: 0.55em; width: calc(100% / 3); }
            #header h1 { font-size: 1.1em; }
            #stats-bar { font-size: 0.65em; }
            .location-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="header"><h1>[S] Realm of Shadows [S]</h1></div>
    <div id="stats-bar">
        <div class="stat"><span class="stat-label">HP:</span><span class="stat-value hp" id="stat-hp">100/100</span></div>
        <div class="stat"><span class="stat-label">MP:</span><span class="stat-value mp" id="stat-mp">50/50</span></div>
        <div class="stat"><span class="stat-label">ATK:</span><span class="stat-value" id="stat-atk">10</span></div>
        <div class="stat"><span class="stat-label">DEF:</span><span class="stat-value" id="stat-def">5</span></div>
        <div class="stat"><span class="stat-label">CRIT:</span><span class="stat-value" id="stat-crit" style="color:#ff00ff">0%</span></div>
        <div class="stat"><span class="stat-label">LVL:</span><span class="stat-value" id="stat-lvl">1</span></div>
        <div class="stat"><span class="stat-label">XP:</span><span class="stat-value xp" id="stat-xp">0/100</span></div>
        <div class="stat"><span class="stat-label">GOLD:</span><span class="stat-value gold" id="stat-gold">50</span></div>
        <div class="stat"><span class="stat-label">SOUL GEMS:</span><span class="stat-value soul" id="stat-soul">0</span></div>
    </div>
    <div id="navigation">
        <button class="nav-btn active" onclick="showScreen('travel')">Map Travel</button>
        <button class="nav-btn" onclick="showScreen('battle')">[/] Battle</button>
        <button class="nav-btn" onclick="showScreen('quest')">~ Quest</button>
        <button class="nav-btn" onclick="showScreen('job')">$ Job</button>
<button class="nav-btn" onclick="showScreen('wandering')" id="wander-tab">[?] Wander</button>
        <button class="nav-btn" onclick="showScreen('inventory')">[] Inventory</button>
        <button class="nav-btn" onclick="showScreen('equipment')">[=] Equipment</button>
        <button class="nav-btn" onclick="showScreen('scrolls')">[*] Scrolls</button>
        <button class="nav-btn" onclick="showScreen('crafting')">[+] Crafting</button>
        <button class="nav-btn" onclick="showScreen('auction')" id="auction-tab">[$] Auction</button>
        <button class="nav-btn" onclick="showScreen('players')">[@] Players</button>
        <button class="nav-btn" onclick="showScreen('merge')">[#] Merge</button>
        <button class="nav-btn" onclick="showScreen('save')">{*} Save</button>
    </div>
    <div id="game-layout">
        <div id="left-panel">
            <div class="side-panel-header" onclick="showScreen('equipment')">[=] Equipment</div>
            <div id="left-panel-content" class="side-panel-content"></div>
        </div>
        <div id="main-content">
            <div id="travel-screen" class="screen active"><div id="travel-content"></div></div>
            <div id="battle-screen" class="screen"><div id="battle-content"></div></div>
            <div id="dungeon-screen" class="screen"><div id="dungeon-content"></div></div>
            <div id="quest-screen" class="screen"><div id="quest-content"></div></div>
            <div id="job-screen" class="screen"><div id="job-content"></div></div>
            <div id="inventory-screen" class="screen"><div id="inventory-screen-content"></div></div>
            <div id="equipment-screen" class="screen"><div id="equipment-screen-content"></div></div>
            <div id="scrolls-screen" class="screen"><div id="scrolls-screen-content"></div></div>
            <div id="crafting-screen" class="screen"><div id="crafting-screen-content"></div></div>
            <div id="auction-screen" class="screen"><div id="auction-screen-content"></div></div>
            <div id="players-screen" class="screen"><div id="players-screen-content"></div></div>
            <div id="save-screen" class="screen"><div id="save-screen-content"></div></div>
            <div id="merge-screen" class="screen"><div id="merge-screen-content"></div></div>
            <div id="wandering-screen" class="screen"><div id="wandering-content"></div></div>
        </div>
        <div id="right-panel">
            <div class="side-panel-header" onclick="showScreen('inventory')">[] Inventory</div>
            <div id="right-panel-content" class="side-panel-content"></div>
        </div>
    </div>
    <div id="chat-container"></div>
</div>
<script src="items.js"></script>
<script src="uberUniqueItems.js"></script>
<script src="normalUniqueItems.js"></script>
<script src="level55UberUniques.js"></script>
<script src="enemies.js"></script>
<script src="uberUniqueMergeSystem.js"></script>
<script>
// GAME STATE
const gameState = {
    player: { name: 'Hero', hp: 100, maxHp: 100, mp: 50, maxMp: 50, atk: 10, def: 5, level: 1, xp: 0, xpToNext: 100, gold: 50, location: 'town', luck: 0, crit: 0 },
    equipment: { weapon: null, weapon_ml: 0, weapon_luck: 0, armor: null, armor_ml: 0, helmet: null, helmet_ml: 0, shield: null, shield_ml: 0, ring: null, ring_ml: 0, amulet: null, amulet_ml: 0, boots: null, boots_ml: 0, gloves: null, gloves_ml: 0, cape: null, cape_ml: 0 },
    inBattle: false, currentEnemy: null, battleLog: [], quests: [], completedQuests: [], questProgress: {},
    activeScrollEffects: [], // Track active scroll effects with durations
    inventory: [
        { name: 'Health Potion', type: 'consumable', effect: 'heal', value: 30, qty: 3 },
        { name: 'Mana Potion', type: 'consumable', effect: 'mana', value: 20, qty: 2 },
        { name: 'Rusty Sword', type: 'weapon', equipSlot: 'weapon', atk: 3, desc: '+3 ATK. A worn blade', rarity: 'common', qty: 1 }
    ],
    jobCooldown: 0, daysPassed: 0, itemLog: [], wanderMode: false, jobsCompleted: 0,
    soulGems: 0, premiumMultiplier: 1, premiumActionsUsed: 0,
    activeStatusEffects: [], // Active status effects (buffs/debuffs) with duration
    jobPoints: 5, maxJobPoints: 5, lastJobPointRegen: Date.now(),
    scrollSlots: 5, unlockedScrollSlots: 1, equippedScrolls: [null, null, null, null, null], scrolls: [],
    lastRegen: Date.now(),
    dungeonStage: 0, dungeonActive: false, dungeonHP: 0, dungeonMaxHP: 0, highestDungeonStage: 0,
    bossActive: false, currentBoss: null,
    worldBossActive: false, currentWorldBoss: null, worldBossDamage: {}, worldBossTotalDamage: 0, worldBossSpawnTime: 0, worldBossNextSpawn: 0,
    auctionItems: [], chatMessages: [], fakePlayers: [],
    // Guild quest state
    guildQuests: [],
    guildQuestProgress: {},
    lastGuildQuestRefresh: 0,
    // Wandering expedition state
    wandering: {
        active: false,
        totalEvents: 0,
        currentEvent: 0,
        rewards: { xp: 0, gold: 0, items: [] },
        log: [],
        inBattle: false,
        currentEnemy: null
    },
    // Force refresh cost tracking
    forceRefreshCost: 100,
    forceRefreshCount: 0,
    // Grand Market force refresh cost tracking
    marketForceRefreshCost: 150,
    marketForceRefreshCount: 0
};

// LOCATIONS
const locations = {
    town: { name: 'Town Hub', desc: 'A bustling town center. Various paths lead out from here.', connections: ['forest', 'dark_forest', 'mountains', 'swamp', 'dragon_lair', 'market', 'guild', 'temple'] },
    forest: { name: 'Enchanted Forest', desc: 'A mystical forest teeming with life.', connections: ['town', 'mountains'], levelRange: [1, 10], minLevel: 1, enemies: ['rat', 'slime', 'wolf', 'goblin', 'forest_sprite', 'giant_bat'] },
    dark_forest: { name: 'Dark Forest', desc: 'A shadowy forest filled with danger.', connections: ['town', 'swamp'], levelRange: [10, 25], minLevel: 10, enemies: ['dark_wolf', 'wraith', 'rock_golem', 'harpy', 'orc_warrior'] },

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Equip helpers - resolve equip slot from item.equipSlot or item.type
const EQUIP_TYPES = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];

function resolveEquipSlot(item) {
    if (!item) return null;
    if (item.equipSlot) return item.equipSlot;
    if (item.type) {
        const t = (typeof item.type === 'string') ? item.type.trim().toLowerCase() : item.type;
        if (t === 'charm') return 'amulet';
        if (EQUIP_TYPES.includes(t)) return t;
    }
    return null;
}

function isEquipable(item) {
    return !!resolveEquipSlot(item);
}

    function getTotalStat(stat) {
        const p = gameState.player;
        let base = p[stat] || 0;
        let flatBonus = 0;
        let percentMultiplier = 1;
        
        const eqSlots = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];
        eqSlots.forEach(slot => {
            const eq = gameState.equipment[slot];
            if (eq) {
                // Add flat stat bonus
                if (eq[stat]) {
                    flatBonus += eq[stat];
                }
                // Special case: items use 'hp' property for max HP bonuses
                if (stat === 'maxHp' && eq.hp) {
                    flatBonus += eq.hp;
                }
                // Add percentage multiplier (supports atk%, def%, etc.)
                const percentStat = stat + '%';
                if (eq[percentStat]) {
                    percentMultiplier += (eq[percentStat] / 100);
                }
                // Special case for HP percentage bonuses (also look for 'hp%' and 'hpPercent')
                if (stat === 'maxHp') {
                    if (eq['hp%']) {
                        percentMultiplier += (eq['hp%'] / 100);
                    }
                    if (eq['hpPercent']) {
                        percentMultiplier += (eq['hpPercent'] / 100);
                    }
                }
            }
        });
        
        // Apply percentage scaling to total base + flat bonuses
        return Math.floor((base + flatBonus) * percentMultiplier);
    }

function getTotalAtk() { return getTotalStat('atk'); }
function getTotalDef() { return getTotalStat('def'); }
function getTotalLuck() { return getTotalStat('luck'); }
function getTotalCrit() { return getTotalStat('crit'); }
function getTotalCritDmg() { return getTotalStat('critDmg') || 0; }
function getTotalMaxHp() { return getTotalStat('maxHp'); }
function getTotalMaxMp() { return getTotalStat('maxMp'); }
function getTotalBlock() { return getTotalStat('block'); }
function getTotalReflect() { return getTotalStat('reflect'); }

function hasEquippedSpecialAbility(abilityName) {
    return ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'].some(slot => {
        const eq = gameState.equipment[slot];
        return eq && eq.specialAbility === abilityName;
    });
}

function getScrollEffectsByType(type) {
    return (gameState.activeScrollEffects || []).filter(effect => effect && effect.effect === type && effect.remainingTurns > 0);
}

function getScrollDefenseMultiplier() {
    let multiplier = 1;
    getScrollEffectsByType('defense_boost').forEach(effect => {
        multiplier *= effect.value;
    });
    getScrollEffectsByType('berserker').forEach(() => {
        multiplier *= 0.7;
    });
    return Math.max(0.1, multiplier);
}

function getScrollDodgeBonusPercent() {
    return getScrollEffectsByType('dodge_boost').reduce((bonus, effect) => bonus + ((effect.value || 0) * 100), 0);
}

function getScrollEnemyDamageMultiplier() {
    let multiplier = 1;
    getScrollEffectsByType('slow').forEach(effect => {
        multiplier *= Math.max(0, 1 - (effect.value || 0));
    });
    return Math.max(0, multiplier);
}

function getScrollLifestealPercent() {
    return getScrollEffectsByType('lifesteal').reduce((bonus, effect) => bonus + ((effect.value || 0) * 100), 0);
}

function getScrollThornsDamage() {
    return getScrollEffectsByType('thorns').reduce((total, effect) => total + (effect.value || 0), 0);
}

function getScrollDropBoost() {
    return getScrollEffectsByType('drop_boost').reduce((bonus, effect) => bonus + (effect.value || 0), 0);
}

function isEnemyFrozenByScroll() {
    return getScrollEffectsByType('freeze').length > 0;
}

function getEffectivePlayerDefense() {
    return Math.max(0, Math.floor(getTotalDef() * getScrollDefenseMultiplier()));
}

function getEffectivePlayerDodgeChance() {
    const dodgePercent = (gameState.player.dodge || 0) + getScrollDodgeBonusPercent();
    return Math.min(95, dodgePercent) / 100;
}

function calculateDamageBasedHealing(damageDealt) {
    let healAmt = 0;

    if (hasEquippedSpecialAbility('full_lifesteal')) {
        healAmt += damageDealt;
    }

    const lifestealPercent = Math.min(100, (gameState.player.lifesteal || 0) + getScrollLifestealPercent());
    if (lifestealPercent > 0) {
        healAmt += Math.floor(damageDealt * lifestealPercent / 100);
    }

    return healAmt;
}

function recordWorldBossPlayerDamage(dmg) {
    if (!gameState.worldBossActive || !gameState.currentWorldBoss || dmg <= 0) return;

    const playerName = gameState.player.name;
    if (!gameState.worldBossDamage[playerName]) {
        gameState.worldBossDamage[playerName] = 0;
    }

    gameState.worldBossDamage[playerName] += dmg;
    gameState.worldBossTotalDamage += dmg;
}

function tryConsumeReviveScroll(playerObj, logCallback = addBattleMsg) {
    const reviveIndex = (gameState.activeScrollEffects || []).findIndex(effect => effect && effect.effect === 'revive');
    if (reviveIndex === -1) return false;

    const reviveEffect = gameState.activeScrollEffects[reviveIndex];
    gameState.activeScrollEffects.splice(reviveIndex, 1);

    const reviveHp = Math.max(1, Math.floor(getTotalMaxHp() * (reviveEffect.value || 0.5)));
    playerObj.hp = reviveHp;
    logCallback(`🔥 ${reviveEffect.name} revives you with ${reviveHp} HP!`, 'heal');
    return true;
}

function resolveEnemyCounterAttack(playerObj, enemyObj, logCallback = addBattleMsg, healCallback, options = {}) {
    let enemyDied = false;
    const invulnerable = !!options.invulnerable;
    const totalDef = options.totalDef === undefined ? getEffectivePlayerDefense() : options.totalDef;
    const defenseMitigationFactor = options.defenseMitigationFactor === undefined ? 1 : options.defenseMitigationFactor;

    if (invulnerable) {
        logCallback(`${enemyObj.name} attacks, but you are invulnerable!`, 'info');
        return { enemyDied, damageTaken: 0 };
    }

    if (isEnemyFrozenByScroll()) {
        logCallback(`❄️ ${enemyObj.name} is frozen and cannot act!`, 'reward');
        return { enemyDied, damageTaken: 0, skipped: true };
    }

    const playerDodgeChance = getEffectivePlayerDodgeChance();
    if (Math.random() < playerDodgeChance) {
        logCallback(`You DODGED the attack! (Dodge: ${(playerDodgeChance * 100).toFixed(1)}%)`, 'heal');
        return { enemyDied, damageTaken: 0, dodged: true };
    }

    const blockChance = Math.min(getTotalBlock(), 95);
    if (Math.random() * 100 < blockChance) {
        logCallback(`🛡️ You BLOCKED the attack! (Block: ${blockChance.toFixed(1)}%)`, 'heal');

        if (hasEquippedSpecialAbility('heal_on_block')) {
            const healAmt = enemyObj.atk;
            playerObj.hp = Math.min(getTotalMaxHp(), playerObj.hp + healAmt);
            logCallback(`💚 Heal on Block activated! Healed ${healAmt} HP!`, 'heal');
            if (healCallback) healCallback(healAmt);
        }

        return { enemyDied, damageTaken: 0, blocked: true };
    }

    let enemyDmg = Math.max(1, enemyObj.atk - Math.floor(totalDef * defenseMitigationFactor) + rand(-2, 2));
    enemyDmg = Math.ceil(enemyDmg * getScrollEnemyDamageMultiplier());

    const drPercent = Math.min(gameState.player.dmgReduction || gameState.player.damageReduction || 0, 95) / 100;
    if (gameState.has75DamageReduction || hasEquippedSpecialAbility('damage_reduction_75')) {
        enemyDmg = Math.ceil(enemyDmg * 0.25);
        logCallback(`${enemyObj.name} hits you for ${enemyDmg} damage! (75% DR ACTIVE)`, 'damage');
    } else {
        enemyDmg = Math.ceil(enemyDmg * (1 - drPercent));
        logCallback(`${enemyObj.name} hits you for ${enemyDmg} damage! (DR: ${(drPercent * 100).toFixed(1)}%)`, 'damage');
    }

    const reflectChance = Math.min(getTotalReflect(), 95);
    if (reflectChance > 0 && Math.random() * 100 < reflectChance) {
        const reflectDamage = enemyDmg;
        enemyObj.hp = Math.max(0, enemyObj.hp - reflectDamage);
        if (enemyObj === gameState.currentWorldBoss) recordWorldBossPlayerDamage(reflectDamage);
        logCallback(`⚡ DAMAGE REFLECT! ${enemyObj.name} takes ${reflectDamage} reflected damage!`, 'reward');

        if (enemyObj.hp <= 0) {
            logCallback(`${enemyObj.name} was killed by reflected damage!`, 'reward');
            enemyDied = true;
        }
    }

    const thornsDamage = getScrollThornsDamage();
    if (thornsDamage > 0 && enemyObj.hp > 0) {
        enemyObj.hp = Math.max(0, enemyObj.hp - thornsDamage);
        if (enemyObj === gameState.currentWorldBoss) recordWorldBossPlayerDamage(thornsDamage);
        logCallback(`🌵 THORNS! ${enemyObj.name} takes ${thornsDamage} damage!`, 'reward');

        if (enemyObj.hp <= 0) {
            logCallback(`${enemyObj.name} was slain by thorns damage!`, 'reward');
            enemyDied = true;
        }
    }

    playerObj.hp = Math.max(0, playerObj.hp - enemyDmg);
    if (playerObj.hp <= 0 && tryConsumeReviveScroll(playerObj, logCallback)) {
        return { enemyDied, damageTaken: enemyDmg, revived: true };
    }

    return { enemyDied, damageTaken: enemyDmg };
}

function applyEndOfTurnScrollEffects(playerObj, enemyObj, logCallback = addBattleMsg) {
    let enemyDied = false;

    getScrollEffectsByType('regen').forEach(effect => {
        const healAmt = Math.min(effect.value || 0, getTotalMaxHp() - playerObj.hp);
        if (healAmt > 0) {
            playerObj.hp += healAmt;
            logCallback(`✨ ${effect.name} restores ${healAmt} HP!`, 'heal');
        }
    });

    ['burn', 'poison'].forEach(type => {
        getScrollEffectsByType(type).forEach(effect => {
            if (!enemyObj || enemyObj.hp <= 0) return;

            const dmg = Math.max(1, Math.floor(effect.value || 0));
            enemyObj.hp = Math.max(0, enemyObj.hp - dmg);
            if (enemyObj === gameState.currentWorldBoss) recordWorldBossPlayerDamage(dmg);

            const icon = type === 'burn' ? '🔥' : '☠️';
            logCallback(`${icon} ${effect.name} deals ${dmg} ${type} damage to ${enemyObj.name}!`, 'damage');

            if (enemyObj.hp <= 0) {
                logCallback(`${enemyObj.name} succumbs to ${type}!`, 'reward');
                enemyDied = true;
            }
        });
    });

    return { enemyDied };
}

function updateStats() {
    const p = gameState.player;
    const hpEl = document.getElementById('stat-hp');
    const mpEl = document.getElementById('stat-mp');
    const atkEl = document.getElementById('stat-atk');
    const defEl = document.getElementById('stat-def');
    const lvlEl = document.getElementById('stat-lvl');
    const xpEl = document.getElementById('stat-xp');
    const goldEl = document.getElementById('stat-gold');
    const soulEl = document.getElementById('stat-soul');
    const critEl = document.getElementById('stat-crit');
    
    // Calculate actual max HP/MP including equipment bonuses
    const actualMaxHp = getTotalMaxHp();
    const actualMaxMp = getTotalMaxMp();
    const actualCrit = getTotalCrit();
    
    // Scale current HP/MP proportionally when max values change, maintain percentage
    if (p.hp > 0 && p.maxHp > 0) {
        const hpPercent = p.hp / p.maxHp;
        p.hp = Math.max(1, Math.floor(actualMaxHp * hpPercent));
    }
    if (p.mp > 0 && p.maxMp > 0) {
        const mpPercent = p.mp / p.maxMp;
        p.mp = Math.max(1, Math.floor(actualMaxMp * mpPercent));
    }
    
    // Always make sure we don't exceed max values
    p.hp = Math.min(p.hp, actualMaxHp);
    p.mp = Math.min(p.mp, actualMaxMp);
    
    if (hpEl) hpEl.textContent = `${p.hp}/${actualMaxHp}`;
    if (mpEl) mpEl.textContent = `${p.mp}/${actualMaxMp}`;
    if (atkEl) atkEl.textContent = getTotalAtk();
    if (defEl) defEl.textContent = getTotalDef();
    if (critEl) critEl.textContent = `${actualCrit}%`;
    if (lvlEl) lvlEl.textContent = p.level;
    if (xpEl) xpEl.textContent = `${p.xp}/${p.xpToNext}`;
    if (goldEl) goldEl.textContent = p.gold;
    if (soulEl) soulEl.textContent = gameState.soulGems;
}

function generateEnemy(location, isBoss = false) {
    const enemyKeys = getAvailableEnemies(location);
    if (enemyKeys.length === 0) return null;
    
    if (isBoss && location === 'dragon_lair') {
        const boss = pick(WORLD_BOSSES.filter(b => b.tier <= gameState.player.level));
        return boss ? { ...boss, maxHp: boss.hp } : null;
    }
    
    const key = pick(enemyKeys);
    const template = enemies[key];
    if (!template) return null;
    
    const levelScale = 1 + (gameState.player.level - 1) * 0.05;
    return {
        ...template,
        hp: Math.floor(template.hp * levelScale),
        maxHp: Math.floor(template.maxHp * levelScale),
        atk: Math.floor(template.atk * levelScale),
        def: Math.floor(template.def * levelScale)
    };
}

// ITEM DROP SYSTEM WITH RARITY RATES
// Legendary: 0.5%, Epic: 2.5%, Rare: 10%, Uncommon: 25%, Common: 62%
function getItemDropByRarity() {
    const luck = getTotalLuck();
    const luckBonus = Math.min(luck * 0.005, 0.15); // Max 15% bonus from luck
    
    const roll = Math.random();
    let targetRarity;
    
    // Rarity percentages with luck bonus applied to higher rarities
    if (roll < 0.005 + luckBonus * 0.05) {
        // 10% chance when rolling legendary to get an uber unique
        if (Math.random() < 0.10) {
            targetRarity = 'uber_unique';
        } else {
            targetRarity = 'legendary'; // 0.5% base
        }
    } else if (roll < 0.0117 + luckBonus * 0.07) {
        targetRarity = 'unique'; // ~0.67% base (1/3 of legendary rate)
    } else if (roll < 0.03 + luckBonus * 0.1) {
        targetRarity = 'epic'; // 1.83% base (0.0117 to 0.03)
    } else if (roll < 0.13 + luckBonus * 0.15) {
        targetRarity = 'rare'; // 10% base (0.03 to 0.13)
    } else if (roll < 0.38 + luckBonus * 0.2) {
        targetRarity = 'uncommon'; // 25% base (0.13 to 0.38)
    } else {
        targetRarity = 'common'; // 62% base
    }
    
    return targetRarity;
}

// Get item drop with level cap based on ENEMY TIER, not player level
// Enemy tier 0-10 maps directly to maximum item level requirement
// Tier 0 = max level 5, Tier 1 = max level 10, Tier 5 = max level 30, Tier 10 = max level 60
function getLeveledItemDrop(targetRarity, enemyTier) {
    // Calculate maximum allowed item level based on enemy tier
    const maxItemLevel = enemyTier * 6;
    
    // Filter items by rarity and level requirement matching enemy strength
    const allItems = [...Object.values(itemPool), ...Object.values(scrollPool)];
    const matchingItems = allItems.filter(item => 
        item.rarity === targetRarity && 
        item.type !== 'material' && 
        item.type !== 'currency' &&
        (!item.levelReq || item.levelReq <= maxItemLevel)
    );
    
    if (matchingItems.length > 0) {
        return pick(matchingItems);
    }
    
    // Fallback: try lower rarity if no items match
    const rarityOrder = ['legendary', 'epic', 'rare', 'uncommon', 'common'];
    const currentIdx = rarityOrder.indexOf(targetRarity);
    
    for (let i = currentIdx + 1; i < rarityOrder.length; i++) {
        const fallbackItems = allItems.filter(item => 
            item.rarity === rarityOrder[i] && 
            item.equipSlot && 
            item.type !== 'material' && 
            item.type !== 'currency' &&
            item.type !== 'consumable' &&
            (!item.levelReq || item.levelReq <= maxItemLevel)
        );
        
        if (fallbackItems.length > 0) {
            return pick(fallbackItems);
        }
    }
    
    // Final fallback: any item that fits level cap
    const anyLevelItems = allItems.filter(item => 
        item.equipSlot && 
        item.type !== 'material' && 
        item.type !== 'currency' &&
        item.type !== 'consumable' &&
        (!item.levelReq || item.levelReq <= maxItemLevel)
    );
    
    if (anyLevelItems.length > 0) {
        return pick(anyLevelItems);
    }
    
    return null;
}

// Get material/consumable drop (always allow, no level cap)
function getMaterialDrop(enemyDrops) {
    if (!enemyDrops || enemyDrops.length === 0) return null;
    
    const dropName = pick(enemyDrops);
    const dropItem = itemPool[dropName];
    
    if (dropItem) {
        return { ...dropItem, qty: 1 };
    }
    
    return null;
}

// BATTLE SYSTEM
function startBattle(location) {
    if (gameState.inBattle) {
        // If already in battle, go directly to battle screen
        showScreen('battle');
        return;
    }
    
    const enemy = generateEnemy(location);
    if (!enemy) {
        // No enemies found - show feedback directly on travel screen
        const container = document.getElementById('travel-content');
        
        // Remove existing no enemy alert if present
        const existingAlert = container.querySelector('.no-enemies-alert');
        if (existingAlert) existingAlert.remove();
        
        const alertDiv = document.createElement('div');
        alertDiv.className = 'battle-log no-enemies-alert';
        alertDiv.style.borderLeftColor = '#4444ff';
        alertDiv.innerHTML = `<p class="info">🔍 No enemies found here right now! Try again.</p>`;
        
        // Insert alert at top of travel screen
        container.insertBefore(alertDiv, container.firstChild);
        
        // Auto-remove after 3 seconds
        setTimeout(() => {
            if (alertDiv.parentNode) alertDiv.remove();
        }, 3000);
        
        addBattleMsg('No enemies found here!', 'info');
        return;
    }
    
    gameState.inBattle = true;
    gameState.currentEnemy = enemy;
    gameState.battleLog = [];
    addBattleMsg(`A ${enemy.name} appears!`, 'info');
    
    showScreen('battle');
}

function addBattleMsg(msg, type = 'info') {
    const cls = type === 'damage' ? 'damage' : type === 'heal' ? 'heal' : type === 'reward' ? 'reward' : 'info';
    gameState.battleLog.push({ msg, cls });
    if (gameState.battleLog.length > 100) gameState.battleLog.shift();
}

// Use a scroll from equipped scrolls
function useScroll(slotIndex) {
    const context = getCurrentCombatContext();
    if (!context) return;
    if (slotIndex < 0 || slotIndex >= gameState.unlockedScrollSlots) return;
    
    const scroll = gameState.equippedScrolls[slotIndex];
    if (!scroll) {
        getCombatLogCallback(context)('No scroll equipped in this slot!', 'info');
        return;
    }

    const logCallback = getCombatLogCallback(context);
    const target = getCurrentCombatEnemy(context);
    const isImmediateEffect = scroll.effect === 'heal' || scroll.effect === 'nuke';
    
    if (!isImmediateEffect) {
        gameState.activeScrollEffects.push({
            name: scroll.name,
            effect: scroll.effect,
            value: scroll.value,
            duration: scroll.duration,
            remainingTurns: scroll.duration
        });
    }
    
    // Immediate effects
    if (scroll.effect === 'heal') {
        gameState.player.hp = Math.min(getTotalMaxHp(), gameState.player.hp + scroll.value);
        logCallback(`Used ${scroll.name}: Healed ${scroll.value} HP!`, 'heal');
    } else if (scroll.effect === 'nuke') {
        if (!target) {
            logCallback(`${scroll.name} fizzles with no target.`, 'damage');
        } else {
            const actualDamage = Math.min(scroll.value, target.hp);
            target.hp = Math.max(0, target.hp - scroll.value);
            if (context === 'worldboss') recordWorldBossPlayerDamage(actualDamage);
            logCallback(`💥 Used ${scroll.name}: Dealt ${actualDamage} damage instantly!`, 'reward');
        }
    } else if (scroll.effect === 'invulnerable') {
        logCallback(`Used ${scroll.name}: Invulnerable for ${scroll.duration} turn${scroll.duration > 1 ? 's' : ''}!`, 'reward');
    } else if (scroll.effect === 'crit_chance') {
        logCallback(`Used ${scroll.name}: ${(scroll.value * 100).toFixed(0)}% crit for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'execute') {
        logCallback(`Used ${scroll.name}: Execute enemies under ${(scroll.value * 100).toFixed(0)}% HP for ${scroll.duration} turn${scroll.duration > 1 ? 's' : ''}!`, 'reward');
    } else if (scroll.effect === 'damage_boost' || scroll.effect === 'berserker') {
        logCallback(`Used ${scroll.name}: Offensive power surges for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'defense_boost') {
        logCallback(`Used ${scroll.name}: Defense increased for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'dodge_boost') {
        logCallback(`Used ${scroll.name}: Dodge increased for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'burn' || scroll.effect === 'poison') {
        logCallback(`Used ${scroll.name}: ${target ? target.name : 'The enemy'} is afflicted for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'slow') {
        logCallback(`Used ${scroll.name}: ${target ? target.name : 'The enemy'} deals reduced damage for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'regen') {
        logCallback(`Used ${scroll.name}: Regenerating health for ${scroll.duration} turns!`, 'heal');
    } else if (scroll.effect === 'thorns') {
        logCallback(`Used ${scroll.name}: Thorns active for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'lifesteal') {
        logCallback(`Used ${scroll.name}: ${(scroll.value * 100).toFixed(0)}% lifesteal for ${scroll.duration} turns!`, 'reward');
    } else if (scroll.effect === 'freeze') {
        logCallback(`Used ${scroll.name}: ${target ? target.name : 'The enemy'} is frozen for ${scroll.duration} turn${scroll.duration > 1 ? 's' : ''}!`, 'reward');
    } else if (scroll.effect === 'revive') {
        logCallback(`Used ${scroll.name}: You will revive at ${(scroll.value * 100).toFixed(0)}% HP if defeated!`, 'reward');
    } else if (scroll.effect === 'drop_boost') {
        logCallback(`Used ${scroll.name}: Drop rate increased for ${scroll.duration} turns!`, 'reward');
    }
    
    // Scrolls are infinite-use, so they remain equipped after activation.

    if (target && target.hp <= 0) {
        handleCombatVictoryByContext(context);
        updateStats();
        return;
    }
    
    rerenderCombatContext(context);
    updateStats();
}

// ==============================================
// ✅ UNIVERSAL SINGLE COMBAT ENGINE
// ==============================================
// This is the ONLY combat system in the entire game.
// EVERY SINGLE COMBAT IN THE GAME GOES THROUGH THIS FUNCTION.
// Change this once, and it changes EVERYTHING.
// ==============================================
function runUniversalCombatTurn(action, playerObj, enemyObj, logCallback, healCallback, afterHitCallback) {
    if (!playerObj) playerObj = gameState.player;
    if (!enemyObj) return { playerDied: false, enemyDied: false };
    if (!logCallback) logCallback = addBattleMsg;
    
    const totalAtk = getTotalAtk();
    const totalDef = getEffectivePlayerDefense();
    const totalCrit = getTotalCrit();
    const totalCritDmg = getTotalCritDmg();
    
    // Get scroll effect values
    const damageMult = getScrollDamageMultiplier();
    const critBonus = getScrollCritBonus();
    const invulnerable = isInvulnerable();
    const executeThreshold = getExecuteThreshold();
    
    // ✅ UBER UNIQUE SPECIAL ABILITIES CHECK - RUNS FOR ALL ACTIONS
    let has75DamageReduction = false;
    let hasGuaranteedExtraDrop = false;
    let has100EscapeSuccess = false;
    
    const eqSlots = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];
    
    eqSlots.forEach(slot => {
        const eq = gameState.equipment[slot];
        if (!eq || !eq.specialAbility) return;
        
        switch(eq.specialAbility) {
            case 'damage_reduction_75':
                has75DamageReduction = true;
                break;
            case 'guaranteed_extra_drop':
                hasGuaranteedExtraDrop = true;
                break;
            case '100_escape_success':
                has100EscapeSuccess = true;
                break;
        }
    });
    
    // Store special flags
    gameState.has75DamageReduction = has75DamageReduction;
    gameState.hasGuaranteedExtraDrop = hasGuaranteedExtraDrop;
    gameState.has100EscapeSuccess = has100EscapeSuccess;
    
    let playerDied = false;
    let enemyDied = false;
    let fled = false;
    
    switch (action) {
        case 'attack': {
            // ✅ DODGE CHANCE CHECK
            const dodgeChance = enemyObj.dodge || 0;
            const cappedDodge = Math.min(dodgeChance, 0.95); // HARD CAP 95% MAX DODGE
            if (Math.random() < cappedDodge) {
                logCallback(`${enemyObj.name} DODGED your attack! (Dodge: ${(cappedDodge*100).toFixed(1)}%)`, 'damage');
                break;
            }
            
            // Luck reduces damage variance - at 9 luck, always max damage roll
            const totalLuck = getTotalLuck();
            const cappedLuck = Math.min(totalLuck, 9);
            const minRoll = Math.min(-3 + cappedLuck, 3); // luck reduces negative variance
            let dmg = Math.max(1, totalAtk - enemyObj.def + rand(minRoll, 3));
            let crit = Math.random() * 100 < (totalCrit + critBonus);
            if (crit) dmg = Math.floor(dmg * (1.5 + totalCritDmg / 100));
            // Apply damage multiplier from scrolls
            dmg = Math.floor(dmg * damageMult);

            // ✅ UBER UNIQUE SPECIAL ABILITIES SYSTEM - ATTACK SPECIFIC
            let bonusDmg = 0;
            let specialMsg = '';
            let attackCount = 1;
            let trueDamage = false;
            let guaranteedCrit = false;
            
            // Initialize attack counters if not exists
            if (typeof gameState.attackCounter === 'undefined') {
                gameState.attackCounter = 0;
            }
            gameState.attackCounter++;
            
            eqSlots.forEach(slot => {
                const eq = gameState.equipment[slot];
                if (!eq || !eq.specialAbility) return;
                
                switch(eq.specialAbility) {
                    case 'half_current_hp':
                        bonusDmg += Math.floor(enemyObj.hp * 0.5);
                        specialMsg += ' (Reaper Scythe)';
                        break;
                    case 'crit_guaranteed':
                        guaranteedCrit = true;
                        crit = true;
                        break;
                    case 'low_hp_damage_buff':
                        if (playerObj.hp < (getTotalMaxHp() * 0.1)) {
                            dmg = Math.floor(dmg * 2);
                            specialMsg += ' (Low HP Bonus x2)';
                        }
                        break;
                    case 'triple_attack_every_4':
                        if (gameState.attackCounter % 4 === 0) {
                            attackCount = 3;
                            specialMsg += ' (Triple Attack!)';
                        }
                        break;
                    case 'true_damage_every_3':
                        if (gameState.attackCounter % 3 === 0) {
                            trueDamage = true;
                            specialMsg += ' (True Damage!)';
                        }
                        break;
                }
            });
            
            // Apply guaranteed crit if active
            if (guaranteedCrit) {
                crit = true;
                dmg = Math.floor(dmg * (1.5 + totalCritDmg / 100));
            }
            
            // Apply true damage (ignore defense)
            if (trueDamage) {
                dmg = totalAtk + bonusDmg;
            } else {
                dmg += bonusDmg;
            }
            
            // Handle multiple attacks
            let totalDamageDealt = 0;
            for (let i = 0; i < attackCount; i++) {
                totalDamageDealt += dmg;
                enemyObj.hp = Math.max(0, enemyObj.hp - dmg);
            }
            
            logCallback(`You hit ${enemyObj.name} for ${totalDamageDealt} damage${crit ? ' (CRIT!)' : ''}${specialMsg}!`, crit ? 'reward' : 'info');
            
            // Apply lifesteal healing
            const healAmt = calculateDamageBasedHealing(totalDamageDealt);
            if (healAmt > 0) {
                const actualHeal = Math.min(healAmt, getTotalMaxHp() - playerObj.hp);
                playerObj.hp += actualHeal;
                if (actualHeal > 0) {
                    logCallback(`Lifesteal healed you for ${actualHeal} HP!`, 'heal');
                    if (healCallback) healCallback(actualHeal);
                }
            }

            // Check for execute effect
            if (executeThreshold > 0 && enemyObj.hp > 0 && enemyObj.hp <= Math.floor(enemyObj.maxHp * executeThreshold)) {
                enemyObj.hp = 0;
                logCallback(`Execute effect triggers! ${enemyObj.name} is instantly killed!`, 'reward');
            }
            
            if (enemyObj.hp <= 0) {
                enemyDied = true;
                break;
            }
            break;
        }
        case 'flee': {
            // ✅ Apply 100% escape success special ability
            if (gameState.has100EscapeSuccess) {
                fled = true;
                break;
            }
            
            if (Math.random() < 0.5 + getTotalLuck() * 0.02) {
                logCallback('You fled successfully!', 'info');
                fled = true;
            } else {
                logCallback('Failed to flee!', 'damage');
            }
            break;
        }
    }
    
    if (!fled && !enemyDied) {
        const enemyTurnResult = resolveEnemyCounterAttack(playerObj, enemyObj, logCallback, healCallback, {
            invulnerable,
            totalDef
        });
        if (enemyTurnResult.enemyDied) {
            enemyDied = true;
        }
    }

    const endOfTurnResult = applyEndOfTurnScrollEffects(playerObj, enemyObj, logCallback);
    if (endOfTurnResult.enemyDied) {
        enemyDied = true;
    }
    
    if (playerObj.hp <= 0) {
        if (!tryConsumeReviveScroll(playerObj, logCallback)) {
            playerDied = true;
            logCallback('You have been defeated!', 'damage');
        }
    }
    
    // Decrement scroll effects at end of turn
    decrementScrollEffects(logCallback);
    
    // Mana regeneration: 5% of max MP every turn
    const maxMp = getTotalMaxMp();
    const manaRegenAmount = Math.floor(maxMp * 0.05);
    gameState.player.mp = Math.min(maxMp, gameState.player.mp + manaRegenAmount);
    
    // After hit callback
    if (afterHitCallback) afterHitCallback();
    
    return { playerDied, enemyDied, fled };
}

// Get active scroll effect values
function getScrollDamageMultiplier() {
    let multiplier = 1;
    gameState.activeScrollEffects.forEach(effect => {
        if (effect.effect === 'damage_boost' || effect.effect === 'berserker') {
            multiplier *= effect.value;
        }
    });
    return multiplier;
}

function getScrollCritBonus() {
    let bonus = 0;
    gameState.activeScrollEffects.forEach(effect => {
        if (effect.effect === 'crit_chance') {
            bonus += effect.value * 100;
        }
    });
    return bonus;
}

function isInvulnerable() {
    return gameState.activeScrollEffects.some(effect => effect.effect === 'invulnerable');
}

function getExecuteThreshold() {
    let threshold = 0;
    gameState.activeScrollEffects.forEach(effect => {
        if (effect.effect === 'execute') {
            threshold = Math.max(threshold, effect.value);
        }
    });
    return threshold;
}

// Decrement scroll effects at end of turn
function decrementScrollEffects(logCallback = addBattleMsg) {
    gameState.activeScrollEffects = gameState.activeScrollEffects.filter(effect => {
        effect.remainingTurns--;
        if (effect.remainingTurns <= 0) {
            logCallback(`${effect.name} effect wore off.`, 'info');
            return false;
        }
        return true;
    });
}

function battleAction(action) {
    if (!gameState.inBattle || !gameState.currentEnemy) return;
    
    if (action === 'spell') {
        // Spell attack: 0.5-3x damage at cost of 15 mana
        if (gameState.player.mp < 15) {
            addBattleMsg('Not enough mana! Requires 15 MP to cast spell.', 'damage');
            renderBattle();
            return;
        }
        
        gameState.player.mp -= 15;
        
        // Get scroll effect values (DOUBLE EFFECT FOR SPELLS)
        const damageMult = getScrollDamageMultiplier() * 2;
        const critBonus = getScrollCritBonus() * 2;
        const invulnerable = isInvulnerable();
        const executeThreshold = getExecuteThreshold();
        const totalDef = getEffectivePlayerDefense();
        
        // Calculate spell damage multiplier between 0.5x and 3x
        const spellMultiplier = 0.5 + Math.random() * 2.5;
        const totalAtk = getTotalAtk();
        const totalCrit = getTotalCrit();
        
        let dmg = Math.max(1, totalAtk - gameState.currentEnemy.def + rand(-3, 3));
        let crit = Math.random() * 100 < (totalCrit + critBonus);
        if (crit) dmg = Math.floor(dmg * (1.5 + getTotalCritDmg() / 100));
        
        // Apply spell multiplier + scroll damage multiplier
        dmg = Math.floor(dmg * spellMultiplier * damageMult);
        
        gameState.currentEnemy.hp = Math.max(0, gameState.currentEnemy.hp - dmg);
        
        addBattleMsg(`You cast a spell for ${dmg} damage! (${spellMultiplier.toFixed(1)}x ${damageMult > 1 ? `+ Scroll x${damageMult.toFixed(1)}` : ''})`, crit ? 'reward' : 'info');

        const spellHeal = calculateDamageBasedHealing(dmg);
        if (spellHeal > 0) {
            const actualHeal = Math.min(spellHeal, getTotalMaxHp() - gameState.player.hp);
            if (actualHeal > 0) {
                gameState.player.hp += actualHeal;
                addBattleMsg(`Lifesteal healed you for ${actualHeal} HP!`, 'heal');
            }
        }
        
        // Check for execute effect
        if (executeThreshold > 0 && gameState.currentEnemy.hp > 0 && gameState.currentEnemy.hp <= Math.floor(gameState.currentEnemy.maxHp * executeThreshold)) {
            gameState.currentEnemy.hp = 0;
            addBattleMsg(`Execute effect triggers! ${gameState.currentEnemy.name} is instantly killed!`, 'reward');
        }
        
        if (gameState.currentEnemy.hp <= 0) {
            enemyDefeated();
            return;
        }
        
        const counterResult = resolveEnemyCounterAttack(gameState.player, gameState.currentEnemy, addBattleMsg, null, {
            invulnerable,
            totalDef
        });
        if (counterResult.enemyDied) {
            enemyDefeated();
            return;
        }

        const endOfTurnResult = applyEndOfTurnScrollEffects(gameState.player, gameState.currentEnemy, addBattleMsg);
        if (endOfTurnResult.enemyDied) {
            enemyDefeated();
            return;
        }
        
        if (gameState.player.hp <= 0) {
            addBattleMsg('You have been defeated!', 'damage');
            gameState.player.hp = Math.floor(gameState.player.maxHp * 0.5);
            gameState.player.gold = Math.floor(gameState.player.gold * 0.9);
            gameState.activeScrollEffects = []; // Clear scroll effects on death
            gameState.inBattle = false;
            gameState.currentEnemy = null;
            showScreen('travel');
            return;
        }
        
        // Decrement scroll effects at end of turn
        decrementScrollEffects(addBattleMsg);
        
        // Mana regeneration: 5% of max MP every turn
        const maxMp = getTotalMaxMp();
        const manaRegenAmount = Math.floor(maxMp * 0.05);
        gameState.player.mp = Math.min(maxMp, gameState.player.mp + manaRegenAmount);
        
        renderBattle();
        updateStats();
        return;
    }
    
    const result = runUniversalCombatTurn(action, gameState.player, gameState.currentEnemy);
    
    if (result.enemyDied) {
        enemyDefeated();
        return;
    }
    
    if (result.playerDied) {
        addBattleMsg('You have been defeated!', 'damage');
        gameState.player.hp = Math.floor(gameState.player.maxHp * 0.5);
        gameState.player.gold = Math.floor(gameState.player.gold * 0.9);
        gameState.activeScrollEffects = []; // Clear scroll effects on death
        gameState.inBattle = false;
        gameState.currentEnemy = null;
        showScreen('travel');
        return;
    }
    
    if (result.fled) {
        gameState.inBattle = false;
        gameState.currentEnemy = null;
        showScreen('travel');
        return;
    }
    
    renderBattle();
    updateStats();
}

function enemyDefeated() {
    const p = gameState.player;
    const e = gameState.currentEnemy;
    
    // Scale XP and Gold to enemy level/tier, not player level
    const scaledXp = e.xp;
    const scaledGold = e.gold;
    
    p.xp += scaledXp;
    p.gold += scaledGold;
    
    addBattleMsg(`You defeated ${e.name}!`, 'reward');
    addBattleMsg(`Gained ${scaledXp} XP and ${scaledGold} gold!`, 'reward');
    
    // Show in chat
    addChatMessage('SYSTEM', `${p.name} defeated ${e.name} and gained ${scaledXp} XP, ${scaledGold} Gold!`, true);
    
    // Check quest progress
    checkQuestProgress(e.name.replace(/ /g, '_'));
    
    // Drop system with new rarity rates
    // 35% base chance to drop something
    const dropChance = Math.min(1, (0.35 + getTotalLuck() * 0.01) * (1 + getScrollDropBoost()));
    
    if (Math.random() < dropChance) {
        // 60% chance for material/consumable drop (from enemy's loot table)
        // 40% chance for equipment drop (using new rarity system)
        if (Math.random() < 0.6 && e.drops && e.drops.length > 0) {
            // Material/consumable drop from enemy's loot table
            const dropName = pick(e.drops);
            const dropItem = itemPool[dropName];
            if (dropItem) {
                addToInventory({ ...dropItem, qty: 1 });
                addBattleMsg(`Dropped: ${dropName}!`, 'reward');
                addItemLog('battle', dropName);
                // Show in chat
                addChatMessage('SYSTEM', `${p.name} found: ${dropName}!`, true);
            }
        } else {
            // Equipment drop using new rarity system
            const targetRarity = getItemDropByRarity();
            const droppedItem = getLeveledItemDrop(targetRarity, e.tier);
            
            if (droppedItem) {
                addToInventory({ ...droppedItem, qty: 1 });
                const rarityColor = getRarityColor(droppedItem.rarity);
                const isUber = isUberUnique(droppedItem);
                const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
                addBattleMsg(`Dropped: <span style="${itemColorStyle}">${droppedItem.name}</span> (${droppedItem.rarity})!`, 'reward');
                addItemLog('battle', droppedItem.name);
                // Show in chat
                addChatMessage('SYSTEM', `${p.name} found a ${droppedItem.rarity} item: ${droppedItem.name}!`, true);
            }
        }
    }
    
    // ✅ Apply guaranteed extra item drop special ability
    if (gameState.hasGuaranteedExtraDrop) {
        // Guaranteed extra item drop - always drop an additional equipment item
        const targetRarity = getItemDropByRarity();
        const extraItem = getLeveledItemDrop(targetRarity, e.tier);
        
        if (extraItem) {
            addToInventory({ ...extraItem, qty: 1 });
            const rarityColor = getRarityColor(extraItem.rarity);
            const isUber = isUberUnique(extraItem);
            const itemColorStyle = isUber ? 'background: linear-gradient(to right, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0077ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;' : 'color:' + rarityColor;
            addBattleMsg(`✅ BONUS DROP: <span style="${itemColorStyle}">${extraItem.name}</span> (${extraItem.rarity})!`, 'reward');
            addItemLog('battle', extraItem.name);
            addChatMessage('SYSTEM', `${p.name} got BONUS DROP: ${extraItem.name}!`, true);
        }
    }
    
    // Random scroll drop (0.5% chance) with rarity weighting
    if (Math.random() < 0.005) {
        // Rarity weights: legendary being rarest
        const scrollRarityWeights = {
            common: 50,
            uncommon: 30,
            rare: 15,
            epic: 4,
            legendary: 1
        };
        
        // Build weighted scroll pool
        const weightedScrolls = [];
        Object.entries(scrollPool).forEach(([name, scroll]) => {
            const weight = scrollRarityWeights[scroll.rarity] || 1;
            for (let i = 0; i < weight; i++) {
                weightedScrolls.push(name);
            }
        });
        
        const scrollName = pick(weightedScrolls);
        addToInventory({ name: scrollName, type: 'scroll', qty: 1, ...scrollPool[scrollName] });
        addBattleMsg(`Dropped scroll: ${scrollName}!`, 'reward');
        addChatMessage('SYSTEM', `${p.name} found a scroll: ${scrollName}!`, true);
    }
    
    // Check level up
    checkLevelUp();
    
    gameState.inBattle = false;
    gameState.currentEnemy = null;
    
    renderBattle();
    updateStats();
}

function checkLevelUp() {
    const p = gameState.player;
    while (p.xp >= p.xpToNext) {
        p.xp -= p.xpToNext;
        p.level++;
        
        // ✅ HARD CORRECT LEVEL STAT CALCULATION - INFINITE LEVELS SUPPORT
        // Base stats are ALWAYS recalculated from level 1 formula
        const BASE_HP = 100;
        const BASE_MP = 50;
        const BASE_ATK = 10;
        const BASE_DEF = 5;
        
        // Exact 10% per level compound growth FOR ALL LEVELS - NO CAP
        p.maxHp = Math.floor(BASE_HP * Math.pow(1.10, p.level - 1));
        p.maxMp = Math.floor(BASE_MP * Math.pow(1.10, p.level - 1));
        
        // Exact flat +3 per level FOR ALL LEVELS - NO CAP
        p.atk = BASE_ATK + ((p.level - 1) * 3);
        p.def = BASE_DEF + ((p.level - 1) * 3);
        
        // Update base stat references for equipment calculation
        p.baseMaxHp = p.maxHp;
        p.baseMaxMp = p.maxMp;
        p.baseAtk = p.atk;
        p.baseDef = p.def;
        
        // Fully heal on level up
        p.hp = p.maxHp;
        p.mp = p.maxMp;

        // XP Requirement scaling HARD CAP at 999,999,999 XP maximum
        p.xpToNext = Math.min(999999999, Math.floor(p.xpToNext * 1.5));
        
        addBattleMsg(`LEVEL UP! You are now level ${p.level}!`, 'reward');
        addBattleMsg(`Max HP: ${p.maxHp}, Max MP: ${p.maxMp}, ATK: ${p.atk}, DEF: ${p.def}`, 'reward');
        addChatMessage('SYSTEM', `${p.name} reached level ${p.level}! Max HP: ${p.maxHp} ATK: ${p.atk} DEF: ${p.def}`, true);
    }
}

// INVENTORY
function addToInventory(item) {
    if (!item) return;
    // sanitize luck: only allow luck on weapons or explicit 'charm' types
    const allowedLuckTypes = ['weapon', 'charm'];
    const copy = { ...item };
    if (copy.type && typeof copy.type === 'string') copy.type = copy.type.trim().toLowerCase();
    if (copy.luck && !allowedLuckTypes.includes(copy.type)) {
        delete copy.luck;
    }
    // Ensure equipSlot exists for items where type implies equip slot
    const resolved = resolveEquipSlot(copy);
    if (resolved && !copy.equipSlot) copy.equipSlot = resolved;

    const existing = gameState.inventory.find(i => i.name === copy.name && i.type === copy.type);
    if (existing && copy.qty) {
        existing.qty += copy.qty;
    } else {
        gameState.inventory.push(copy);
    }
}

function removeFromInventory(index, qty = 1) {
    const item = gameState.inventory[index];
    if (!item) return;
    if (item.qty) {
        item.qty -= qty;
        if (item.qty <= 0) {
            gameState.inventory.splice(index, 1);
        }
    } else {
        gameState.inventory.splice(index, 1);
    }
}

function useItem(index) {
    const item = gameState.inventory[index];
    if (!item) return;
    
    if (item.type === 'consumable') {
        if (item.effect === 'heal') {
            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + item.value);
            addBattleMsg(`Used ${item.name}: Healed ${item.value} HP`, 'heal');
        } else if (item.effect === 'mana') {
            gameState.player.mp = Math.min(gameState.player.maxMp, gameState.player.mp + item.value);
            addBattleMsg(`Used ${item.name}: Restored ${item.value} MP`, 'heal');
        } else if (item.effect === 'blessing') {
            addBattleMsg(`Blessing Oil cannot be used from inventory! Go to the Temple to use it.`, 'info');
            return; // Don't remove from inventory
        } else if (item.effect === 'spawn_world_boss') {
            if (gameState.worldBossActive) {
                addBattleMsg(`There is already an active World Boss!`, 'damage');
                return;
            }
            spawnWorldBoss();
            addBattleMsg(`✅ World Boss summoned! Go to the Battle tab to fight!`, 'reward');
            addChatMessage('SYSTEM', `${gameState.player.name} used a World Boss Ticket!`, true);
        }
        removeFromInventory(index);
        updateStats();
        renderInventory();
    }
}

function equipItem(index) {
    const item = gameState.inventory[index];
    if (!item) return;

    const slot = resolveEquipSlot(item);
    if (!slot) {
        addChatMessage('SYSTEM', `Cannot equip ${item.name} - invalid equipment slot`, true);
        return;
    }

    // Level requirement check
    if (item.levelReq && gameState.player.level < item.levelReq) {
        addChatMessage('SYSTEM', `Cannot equip ${item.name} - requires level ${item.levelReq}`, true);
        return;
    }

    const currentlyEquipped = gameState.equipment[slot];

    // ✅ Full stat recalculation system
    // Remove old item stats first if something is equipped
    if (currentlyEquipped) {
        // Return previously equipped item to inventory with ALL stats preserved
        addToInventory({
            ...currentlyEquipped,
            qty: 1
        });
    }

    // Remove new item from inventory
    removeFromInventory(index);

    // Equip the item with complete property preservation
    gameState.equipment[slot] = {
        ...item,
        equipSlot: slot,
        equipped: true,
        equippedAt: Date.now()
    };

    // ✅ Recalculate ALL player derived stats from equipment
    recalculateAllPlayerStats();

    // Update UI
    updateStats();
    renderEquipment();
    renderInventory();
    updateSidePanels();

    addChatMessage('SYSTEM', `Equipped ${item.name}`, true);
}

/**
 * Complete stat recalculation engine - computes ALL player stats from base + equipment bonuses
 * Supports flat bonuses, percentage bonuses, stacking modifiers, and stat caps
 */
function recalculateAllPlayerStats() {
    const p = gameState.player;
    
    // Base player stats (these are permanent level up stats)
    const baseStats = {
        atk: p.baseAtk || p.atk,
        def: p.baseDef || p.def,
        maxHp: p.baseMaxHp || p.maxHp,
        maxMp: p.baseMaxMp || p.maxMp,
        luck: p.baseLuck || 0,
        crit: p.baseCrit || 0,
        critDmg: p.baseCritDmg || 50,
        dodge: p.baseDodge || 0,
        lifesteal: p.baseLifesteal || 0,
        dmgReduction: p.baseDmgReduction || 0,
        armorPen: p.baseArmorPen || 0,
        magicPen: p.baseMagicPen || 0,
        attackSpeed: p.baseAttackSpeed || 0,
        cdr: p.baseCdr || 0,
        moveSpeed: p.baseMoveSpeed || 0
    };

    // Initialize calculation accumulators
    const finalStats = { ...baseStats };
    const percentBonuses = {};

    // List of all equipment slots to process
    const equipmentSlots = ['weapon', 'armor', 'helmet', 'shield', 'ring', 'amulet', 'boots', 'gloves', 'cape'];

    // First pass: collect ALL flat bonuses and percentage modifiers
    equipmentSlots.forEach(slot => {
        const item = gameState.equipment[slot];
        if (!item) return;

        // Process every stat property on the item
        Object.keys(item).forEach(statKey => {
            // Skip non-stat properties
            if (['name', 'type', 'equipSlot', 'desc', 'rarity', 'levelReq', 'equipped', 'equippedAt', 'uberUnique', 'specialAbility'].includes(statKey)) {
                return;
            }

            const value = item[statKey];
            if (typeof value !== 'number' || isNaN(value)) return;

            // Check if this is a percentage stat (ends with Percent or %)
            if (statKey.endsWith('Percent') || statKey.endsWith('%')) {
                const baseStatName = statKey.replace('Percent', '').replace('%', '');
                if (!percentBonuses[baseStatName]) percentBonuses[baseStatName] = 0;
                percentBonuses[baseStatName] += value;
            } else {
                // Flat bonus stat
                if (finalStats[statKey] === undefined) finalStats[statKey] = 0;
                finalStats[statKey] += value;
            }
        });
    });

    // Second pass: apply all percentage bonuses AFTER flat bonuses are summed
    Object.keys(percentBonuses).forEach(stat => {
        if (finalStats[stat] !== undefined) {
            const multiplier = 1 + (percentBonuses[stat] / 100);
            finalStats[stat] = Math.floor(finalStats[stat] * multiplier);
        }
    });

    // ✅ Apply stat hard caps
    finalStats.crit = Math.min(finalStats.crit, 95);              // 95% max crit chance
    finalStats.dodge = Math.min(finalStats.dodge, 95);            // 95% max dodge
    finalStats.dmgReduction = Math.min(finalStats.dmgReduction, 95); // 95% max damage reduction
    finalStats.cdr = Math.min(finalStats.cdr, 80);                // 80% max cooldown reduction
    finalStats.lifesteal = Math.min(finalStats.lifesteal, 50);    // 50% max lifesteal

    // Assign final calculated stats back to player
    Object.keys(finalStats).forEach(stat => {
        p[stat] = finalStats[stat];
    });

    // Store base stats if not already stored (first run)
    if (!p.baseAtk) {
        p.baseAtk = p.atk;
        p.baseDef = p.def;
        p.baseMaxHp = p.maxHp;
        p.baseMaxMp = p.maxMp;
        p.baseLuck = p.luck || 0;
        p.baseCrit = p.crit || 0;
    }

    // Ensure current HP/MP don't exceed new maximums
    p.hp = Math.min(p.hp, p.maxHp);
    p.mp = Math.min(p.mp, p.maxMp);
}

function unequipItem(slot) {
    const item = gameState.equipment[slot];
    if (!item) return;

    // Return item to inventory
    addToInventory({
        ...item,
        qty: 1,
        equipped: false
    });

    // Clear equipment slot
    gameState.equipment[slot] = null;

    // Recalculate all stats without this item
    recalculateAllPlayerStats();

    // Update UI
    updateStats();
    renderEquipment();
    renderInventory();
    updateSidePanels();

    addChatMessage('SYSTEM', `Unequipped ${item.name}`, true);
}

// QUEST SYSTEM
function checkQuestProgress(enemyKey) {
    gameState.quests.forEach((quest, idx) => {
        if (quest.target === enemyKey) {
            if (!gameState.questProgress[idx]) gameState.questProgress[idx] = 0;
            gameState.questProgress[idx]++;
        }
    });
    
    // Also check guild quest progress
    gameState.guildQuests.forEach((quest, idx) => {
        if (quest.target === enemyKey) {
            if (!gameState.guildQuestProgress[idx]) gameState.guildQuestProgress[idx] = 0;
            gameState.guildQuestProgress[idx]++;
        }
    });
}

function acceptQuest(questId) {
    if (gameState.quests.find(q => q.id === questId)) return;
    
    const def = questDefs.find(q => q.id === questId);
    if (!def) return;
    
    gameState.quests.push({ ...def, progress: 0 });
    renderQuests();
}

function turnInQuest(idx) {
    const quest = gameState.quests[idx];
    if (!quest) return;
    
    const progress = gameState.questProgress[idx] || 0;
    if (progress < quest.count) return;
    
    gameState.player.xp += quest.reward.xp;
    gameState.player.gold += quest.reward.gold;
    
    addBattleMsg(`Quest complete: ${quest.name}! Gained ${quest.reward.xp} XP and ${quest.reward.gold} gold!`, 'reward');
    
    gameState.completedQuests.push(quest.id);
    gameState.quests.splice(idx, 1);
    delete gameState.questProgress[idx];
    
    checkLevelUp();
    updateStats();
    renderQuests();
}

// ==================== ADVENTURERS GUILD QUEST SYSTEM ====================
// Guild quests refresh every hour with 1-5 quests of varying rarity
// Legendary quests award 1 Soul Gem on completion

const GUILD_QUEST_REFRESH_INTERVAL = 60 * 60 * 1000; // 1 hour in ms

// Guild quest templates by rarity
const guildQuestTemplates = {
